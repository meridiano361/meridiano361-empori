<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Impostazioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/style/nav-style.css">
</head>
<body class="bg-slate-50 pb-32">

    <div id="admin-content" class="hidden max-w-2xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-black text-slate-800">Gestione Utenti</h1>
            <p class="text-slate-500">Controlla permessi e modalità sola lettura per tutti gli empori.</p>
        </header>

        <div id="user-list" class="space-y-4">
            <div class="text-center py-10 text-slate-400">Caricamento utenti...</div>
        </div>

        <div class="fixed bottom-24 left-6 right-6 flex justify-center">
            <button onclick="saveAllSettings()" class="bg-[#b75252] text-white font-bold px-10 py-4 rounded-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all">
                <i class="fas fa-save mr-2"></i> Salva Tutte le Modifiche
            </button>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPA_KEY = 'TUO_ANON_KEY'; // Usa la chiave del tuo nav-script
        const _supabase = supabase.createClient(SUPA_URL, SUPA_KEY);

        const adminEmail = 'e.mazzolari@meridiano361.it';
        const currentUser = JSON.parse(localStorage.getItem('m361_user'));

        // Protezione immediata
        if (!currentUser || currentUser.email !== adminEmail) {
            alert("Accesso negato.");
            window.location.href = "../index.html";
        } else {
            document.getElementById('admin-content').classList.remove('hidden');
            loadUsers();
        }

        async function loadUsers() {
            const { data: users, error } = await _supabase.from('user_permissions').select('*');
            if (error) return;

            const container = document.getElementById('user-list');
            container.innerHTML = '';

            users.forEach(u => {
                if (u.email === adminEmail) return; // Non mostrare l'admin stesso

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100";
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="font-bold text-slate-800">${u.email}</h3>
                            <span class="text-[10px] bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${u.livello_accesso || 'utente'}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold text-slate-400">SOLA LETTURA</span>
                            <input type="checkbox" data-email="${u.email}" class="readonly-toggle w-12 h-6 bg-slate-200 rounded-full appearance-none checked:bg-[#b75252] transition-all cursor-pointer relative before:content-[''] before:absolute before:w-5 before:h-5 before:bg-white before:rounded-full before:top-0.5 before:left-0.5 checked:before:left-6 before:transition-all" ${u.is_readonly ? 'checked' : ''}>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function saveAllSettings() {
            const toggles = document.querySelectorAll('.readonly-toggle');
            for (let t of toggles) {
                const email = t.dataset.email;
                const isReadonly = t.checked;

                await _supabase
                    .from('user_permissions')
                    .update({ is_readonly: isReadonly })
                    .eq('email', email);
            }
            alert("Impostazioni salvate con successo!");
        }
    </script>
    <script src="../scripts/nav-script.js"></script>
</body>
</html>
