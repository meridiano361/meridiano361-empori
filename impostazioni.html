<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Impostazioni Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/style/nav-style.css">
</head>
<body class="bg-slate-50 pb-24">

    <div id="admin-content" class="hidden max-w-md mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-2xl font-black text-slate-800">Impostazioni</h1>
            <p class="text-slate-500">Gestione permessi empori</p>
        </header>

        <div class="space-y-6">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 bg-[#b75252] text-white rounded-2xl flex items-center justify-center font-bold">C</div>
                    <div>
                        <h3 class="font-bold text-slate-800">Casalmaggiore</h3>
                        <p class="text-xs text-slate-400">casalmaggiore@meridiano361.it</p>
                    </div>
                </div>
                
                <div class="space-y-4 pt-4 border-t border-slate-50">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-semibold text-slate-600">Sola Lettura</span>
                        <input type="checkbox" class="w-10 h-5 bg-slate-200 rounded-full appearance-none checked:bg-[#b75252] transition-all cursor-pointer relative before:content-[''] before:absolute before:w-4 before:h-4 before:bg-white before:rounded-full before:top-0.5 before:left-0.5 checked:before:left-5 before:transition-all">
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-semibold text-slate-600">Vedi Cassa</span>
                        <input type="checkbox" checked class="w-10 h-5 bg-slate-200 rounded-full appearance-none checked:bg-[#b75252] transition-all cursor-pointer relative before:content-[''] before:absolute before:w-4 before:h-4 before:bg-white before:rounded-full before:top-0.5 before:left-0.5 checked:before:left-5 before:transition-all">
                    </div>
                </div>
            </div>
        </div>

        <button class="fixed bottom-24 left-6 right-6 bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">
            Salva Configurazioni
        </button>
    </div>

    <script>
        // PROTEZIONE ADMIN
        const user = JSON.parse(localStorage.getItem('m361_user'));
        if (user && user.email === 'e.mazzolari@meridiano361.it') {
            document.getElementById('admin-content').classList.remove('hidden');
        } else {
            alert('Accesso negato. Area riservata all\'amministratore.');
            window.location.href = '../index.html';
        }
    </script>
    <script src="../scripts/nav-script.js"></script>
</body>
</html>
