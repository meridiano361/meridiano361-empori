<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Impostazioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/style/nav-style.css">
</head>
<body class="bg-slate-50 pb-32">

    <div id="admin-content" class="hidden max-w-2xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-black text-slate-800">Gestione Utenti</h1>
            <p class="text-slate-500">Controlla permessi e modalità sola lettura per tutti gli empori.</p>
        </header>

        <div id="user-list" class="space-y-4">
            <div class="text-center py-10 text-slate-400">Caricamento utenti...</div>
        </div>

        <div class="fixed bottom-24 left-6 right-6 flex justify-center">
            <button onclick="saveAllSettings()" class="bg-[#b75252] text-white font-bold px-10 py-4 rounded-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all">
                <i class="fas fa-save mr-2"></i> Salva Tutte le Modifiche
            </button>
        </div>
    </div>

   <script>
    // Configurazione Supabase con la tua chiave reale
    const SUPA_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
    
    // Inizializzazione client
    const _supabase = supabase.createClient(SUPA_URL, SUPA_KEY);

    const adminEmail = 'e.mazzolari@meridiano361.it';
    const currentUser = JSON.parse(localStorage.getItem('m361_user'));

    // 1. Controllo Sicurezza Admin
    if (!currentUser || currentUser.email !== adminEmail) {
        alert("Accesso negato. Area riservata all'amministratore.");
        window.location.href = "../index.html";
    } else {
        document.getElementById('admin-content').classList.remove('hidden');
        loadUsers(); // Carica gli utenti solo se sei admin
    }

    // 2. Funzione per caricare gli utenti dal DB
    async function loadUsers() {
        const container = document.getElementById('user-list');
        
        const { data: users, error } = await _supabase
            .from('user_permissions')
            .select('*')
            .order('email', { ascending: true });

        if (error) {
            console.error("Errore caricamento utenti:", error);
            container.innerHTML = `<div class="text-red-500 p-4">Errore: ${error.message}</div>`;
            return;
        }

        if (users) {
            container.innerHTML = ''; // Pulisce il "Caricamento..."
            users.forEach(u => {
                // Non mostrare l'admin stesso nella lista per evitare di auto-bloccarsi
                if (u.email === adminEmail) return;

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 mb-4";
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-800 break-all">${u.email}</h3>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 uppercase font-bold">${u.livello_accesso || 'utente'}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="text-[10px] font-black text-slate-400">SOLA LETTURA</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" data-email="${u.email}" class="readonly-toggle sr-only peer" ${u.is_readonly ? 'checked' : ''}>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#b75252]"></div>
                            </label>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    }

    // 3. Funzione per salvare lo stato nel DB
    async function saveAllSettings() {
        const btn = document.querySelector('button[onclick="saveAllSettings()"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Salvataggio...';
        btn.disabled = true;

        const toggles = document.querySelectorAll('.readonly-toggle');
        let success = true;

        for (let t of toggles) {
            const { error } = await _supabase
                .from('user_permissions')
                .update({ is_readonly: t.checked })
                .eq('email', t.dataset.email);
            
            if (error) success = false;
        }

        if (success) {
            alert("Impostazioni salvate con successo!");
        } else {
            alert("Si è verificato un errore durante il salvataggio.");
        }

        btn.innerHTML = originalText;
        btn.disabled = false;
    }
</script>
    <script src="../scripts/nav-script.js"></script>
</body>
</html>
