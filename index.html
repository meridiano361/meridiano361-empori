<script>
(async function applicaPermessi() {
    const user = JSON.parse(localStorage.getItem('m361_user') || 'null');
    if (!user || !user.id) return;
    try {
        const _db = supabase.createClient(
            'https://hsalynvxazxqtmsvjrzc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
        );
        const { data } = await _db
            .from('utenti_permessi')
            .select('sezione, può_vedere')
            .eq('utente_id', user.id)
            .eq('può_vedere', false);
        if (data) {
            data.forEach(p => {
                const el = document.querySelector(`[data-sezione="${p.sezione}"]`);
                if (el) el.style.display = 'none';
            });
        }
    } catch (e) { /* ignora */ }
})();
</script>
