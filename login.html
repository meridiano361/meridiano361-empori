<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi | M361 Empori</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; -webkit-text-size-adjust: 100%; }

    /* ── Split wrapper ── */
    .lw {
      display: flex;
      min-height: 100vh;
    }

    /* ── Pannello brand (sinistra) ── */
    .lw-brand {
      flex: 0 0 50%;
      background: #B5453A;
      display: flex;
      flex-direction: column;
      padding: 52px 48px 44px;
      position: relative;
    }

    /* logo in pill bianca */
    .lw-logo {
      display: inline-flex;
      align-items: center;
      background: #fff;
      border-radius: 10px;
      padding: 12px 20px;
      width: fit-content;
    }
    .lw-logo img {
      height: 44px;
      width: auto;
      display: block;
    }

    /* testo configurabile in basso */
    .lw-caption {
      margin-top: auto;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.6);
      letter-spacing: .02em;
      line-height: 1.5;
    }

    /* ── Pannello form (destra) ── */
    .lw-form {
      flex: 1;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
    }

    .lw-form-inner {
      width: 100%;
      max-width: 390px;
    }

    /* titolo: regular weight come onearth */
    .lw-title {
      font-size: 34px;
      font-weight: 400;
      color: #111827;
      margin-bottom: 36px;
      line-height: 1.2;
      letter-spacing: -.3px;
    }

    /* label uppercase come onearth */
    .lw-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #64748b;
      margin-bottom: 8px;
    }

    /* campo form */
    .lw-field { margin-bottom: 20px; }

    /* input: altezza e stile onearth */
    .lw-input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 400;
      color: #111827;
      background: #f1f5f9;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color .15s, background .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .lw-input::placeholder { color: #94a3b8; }
    .lw-input:focus {
      border-color: #B5453A;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(181,69,58,.08);
    }

    /* password wrapper */
    .lw-pw { position: relative; }
    .lw-pw .lw-input { padding-right: 50px; }
    .lw-pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 15px;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .lw-pw-toggle:hover { color: #475569; }

    /* bottone principale: stessa forma di onearth, colore M361 */
    .lw-btn {
      width: 100%;
      height: 56px;
      margin-top: 8px;
      background: #B5453A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .15s, transform .1s;
      letter-spacing: .01em;
    }
    .lw-btn:hover   { background: #8c362d; }
    .lw-btn:active  { transform: scale(.99); }
    .lw-btn:disabled { opacity: .6; cursor: default; transform: none; }

    /* spinner */
    .lw-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin .75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* link secondario: stile onearth */
    .lw-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color .15s;
      text-decoration: none;
      width: 100%;
    }
    .lw-link:hover { color: #B5453A; }

    /* messaggi errore / successo */
    .lw-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fff1f0;
      border: 1.5px solid #fecaca;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #b91c1c;
      margin-bottom: 24px;
    }
    .lw-error.on  { display: flex; }
    .lw-success {
      display: none;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #15803d;
      margin-bottom: 24px;
    }
    .lw-success.on { display: flex; }

    /* recovery icon pill */
    .lw-recovery-icon {
      width: 52px; height: 52px;
      background: #fdf1f0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .lw-recovery-icon i { color: #B5453A; font-size: 20px; }

    .lw-recovery-title {
      font-size: 24px;
      font-weight: 400;
      color: #111827;
      margin-bottom: 8px;
      letter-spacing: -.2px;
    }
    .lw-recovery-sub {
      font-size: 14px;
      color: #94a3b8;
      font-weight: 400;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .lw { flex-direction: column; }

      .lw-brand {
        flex: 0 0 auto;
        flex-direction: row;
        align-items: center;
        gap: 16px;
        padding: 24px 20px;
      }
      .lw-caption { display: none; }
      .lw-logo img { height: 28px; }
      .lw-logo { padding: 8px 14px; }

      .lw-form {
        flex: 1;
        align-items: flex-start;
        padding: 36px 24px 52px;
      }
      .lw-form-inner { max-width: 100%; }
      .lw-title { font-size: 26px; margin-bottom: 28px; }
      .lw-input { height: 52px; font-size: 16px; } /* previene zoom iOS */
      .lw-btn   { height: 52px; font-size: 15px; }
    }

    @media (max-width: 420px) {
      .lw-brand { padding: 20px 16px; }
      .lw-form  { padding: 28px 16px 48px; }
    }
  </style>
</head>
<body>

<div class="lw">

  <!-- ── Pannello brand ── -->
  <div class="lw-brand">
    <div class="lw-logo">
      <img src="/assets/images/logom361_rosso.jpg" alt="Meridiano 361">
    </div>
    <div class="lw-caption" id="login-caption">piattaforma gestione empori</div>
  </div>

  <!-- ── Pannello form ── -->
  <div class="lw-form">
    <div class="lw-form-inner">

      <!-- Vista login -->
      <div id="login-view">
        <h1 class="lw-title">Bentornato.</h1>

        <div id="error-msg" class="lw-error">
          <i class="fas fa-exclamation-circle"></i>
          <span id="error-text"></span>
        </div>

        <form id="login-form">
          <div class="lw-field">
            <label class="lw-label" for="email">Indirizzo email</label>
            <input type="email" id="email" class="lw-input" autocomplete="email" required>
          </div>

          <div class="lw-field">
            <label class="lw-label" for="password">Password</label>
            <div class="lw-pw">
              <input type="password" id="password" class="lw-input" autocomplete="current-password" required>
              <button type="button" class="lw-pw-toggle" onclick="togglePassword()" tabindex="-1">
                <i id="pw-eye" class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="lw-btn">
            <div id="btn-spinner" class="lw-spinner"></div>
            <span id="btn-label">Accedi</span>
          </button>

          <button type="button" class="lw-link" onclick="showRecovery()">
            Hai dimenticato la password?
          </button>
        </form>
      </div>

      <!-- Vista recupero password -->
      <div id="recovery-view" style="display:none">
        <div class="lw-recovery-icon"><i class="fas fa-envelope"></i></div>
        <h2 class="lw-recovery-title">Recupera password.</h2>
        <p class="lw-recovery-sub">Ti invieremo un link per reimpostare la password al tuo indirizzo email.</p>

        <div id="recovery-error" class="lw-error">
          <i class="fas fa-exclamation-circle"></i>
          <span id="recovery-error-text"></span>
        </div>
        <div id="recovery-success" class="lw-success">
          <i class="fas fa-check-circle"></i>
          <span>Link inviato! Controlla la tua email.</span>
        </div>

        <div class="lw-field">
          <label class="lw-label" for="recovery-email">Indirizzo email</label>
          <input type="email" id="recovery-email" class="lw-input" autocomplete="email">
        </div>

        <button onclick="sendRecovery()" id="recovery-btn" class="lw-btn">
          <div id="recovery-spinner" class="lw-spinner"></div>
          <span id="recovery-label">Invia link di recupero</span>
        </button>

        <button type="button" class="lw-link" onclick="showLogin()">
          ← Torna al login
        </button>
      </div>

    </div>
  </div>

</div>

<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    'https://hsalynvxazxqtmsvjrzc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
  );

  // Carica il testo configurabile dal DB (lettura pubblica, anon)
  (async function loadCaption() {
    try {
      const { data } = await _supabase
        .from('app_settings')
        .select('value')
        .eq('key', 'login_caption')
        .maybeSingle();
      if (data?.value) document.getElementById('login-caption').textContent = data.value;
    } catch (_) { /* keep default */ }
  })();

  function showRecovery() {
    document.getElementById('login-view').style.display    = 'none';
    document.getElementById('recovery-view').style.display = '';
    document.getElementById('recovery-email').focus();
  }

  function showLogin() {
    document.getElementById('recovery-view').style.display = 'none';
    document.getElementById('login-view').style.display    = '';
  }

  async function sendRecovery() {
    const email  = document.getElementById('recovery-email').value.trim();
    const errDiv = document.getElementById('recovery-error');
    const okDiv  = document.getElementById('recovery-success');
    const btn    = document.getElementById('recovery-btn');

    errDiv.classList.remove('on');
    okDiv.classList.remove('on');

    if (!email) {
      document.getElementById('recovery-error-text').textContent = 'Inserisci la tua email.';
      errDiv.classList.add('on');
      return;
    }

    btn.disabled = true;
    document.getElementById('recovery-spinner').style.display = 'block';
    document.getElementById('recovery-label').textContent = 'Invio in corso...';

    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });

    btn.disabled = false;
    document.getElementById('recovery-spinner').style.display = 'none';
    document.getElementById('recovery-label').textContent = 'Invia link di recupero';

    if (error) {
      document.getElementById('recovery-error-text').textContent = "Errore nell'invio. Verifica l'email e riprova.";
      errDiv.classList.add('on');
    } else {
      okDiv.classList.add('on');
    }
  }

  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('pw-eye');
    const show  = input.type === 'password';
    input.type     = show ? 'text' : 'password';
    icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn       = document.getElementById('submit-btn');
    const errorDiv  = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');

    errorDiv.classList.remove('on');
    btn.disabled = true;
    document.getElementById('btn-spinner').style.display = 'block';
    document.getElementById('btn-label').textContent = 'Verifica...';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const { error: authError } = await _supabase.auth.signInWithPassword({ email, password });
      if (authError) throw new Error('Email o password non corretti.');

      const { data: operatore, error: opError } = await _supabase
        .from('operatori')
        .select('*')
        .ilike('email', email)
        .single();

      if (opError || !operatore) {
        await _supabase.auth.signOut();
        throw new Error('Accesso negato: utente non autorizzato.');
      }

      localStorage.setItem('m361_user', JSON.stringify(operatore));

      try {
        const loginNow = new Date().toISOString();
        const payload  = { last_login_at: loginNow };
        if (!operatore.first_login_at) payload.first_login_at = loginNow;
        await _supabase.from('operatori').update(payload).eq('id', operatore.id);
      } catch (_) {}

      window.location.href = 'index.html';

    } catch (err) {
      errorText.textContent = err.message;
      errorDiv.classList.add('on');
      btn.disabled = false;
      document.getElementById('btn-spinner').style.display = 'none';
      document.getElementById('btn-label').textContent = 'Accedi';
    }
  });
</script>
<script src="scripts/nav-script.js"></script>
</body>
</html>
