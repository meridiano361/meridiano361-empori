<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    'https://hsalynvxazxqtmsvjrzc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
  );

  (async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) window.location.href = 'index.html';
  })();

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    const label = document.getElementById('btn-label');
    const spinner = btn.querySelector('.spinner');
    btn.disabled = loading;
    spinner.classList.toggle('show', loading);
    label.textContent = loading ? 'Accesso in corso...' : 'Accedi al Sistema';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('error-msg').classList.add('hidden');
    setLoading(true);

    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    try {
      // 1) Auth Supabase (si basa su account creati in Auth)
      const { data: authData, error: authError } =
        await _supabase.auth.signInWithPassword({ email, password });

      if (authError) {
        setLoading(false);
        showError('Email o password errati. Riprova.');
        return;
      }

      // 2) Recupera permessi
      const { data: perms, error: permsError } = await _supabase
        .from('user_permissions')
        .select('*')
        .eq('email', email)
        .maybeSingle();

      if (permsError || !perms) {
        await _supabase.auth.signOut();
        setLoading(false);
        showError('Account non autorizzato. Contatta l\'amministrazione.');
        return;
      }

      // 3) Regola di autorizzazione richiesta:
      // - ok se mail @meridiano361.it
      // - oppure se validata (colonna nella tabella)
      const emailAllowedByDomain = email.endsWith('@meridiano361.it');

      // Serve una colonna in user_permissions:
      // validated_by_admin boolean (true = validata da te)
      const validatedByAdmin = !!perms.validated_by_admin;

      const isAuthorized = emailAllowedByDomain || validatedByAdmin;

      if (!isAuthorized) {
        await _supabase.auth.signOut();
        setLoading(false);
        showError('Account non autorizzato. Contatta l\'amministrazione.');
        return;
      }

      // 4) Salva profilo utente (permessi)
      const userProfile = {
        email: perms.email,
        nome: perms.nome_cognome,
        ruolo: perms.ruolo,
        emporio: perms.emporio_riferimento,
        livello: perms.livello_accesso,
        sezioni: (() => {
          // allowed_sections nel CSV è salvato come array? o come stringa JSON?
          // Gestiamo entrambe le possibilità.
          if (Array.isArray(perms.allowed_sections)) return perms.allowed_sections;
          if (typeof perms.allowed_sections === 'string') {
            try { return JSON.parse(perms.allowed_sections); } catch { return []; }
          }
          return [];
        })(),
        loginAt: new Date().toISOString()
      };

      localStorage.setItem('m361_user', JSON.stringify(userProfile));
      window.location.href = 'index.html';

    } catch (err) {
      console.error(err);
      setLoading(false);
      showError('Errore durante il login. Riprova.');
    }
  });
</script>
