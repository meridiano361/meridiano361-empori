<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/faviconm361.png" type="image/png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .bg-m361 { background-color: #B5453A; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-[400px] bg-white p-10 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">Meridiano <span class="text-[#B5453A]">361</span></h1>
            <p class="text-slate-500 font-medium mt-2">Piattaforma Gestione Empori</p>
        </div>

        <!-- Vista login -->
        <div id="login-view">
          <form id="login-form" class="space-y-6">
            <div id="error-msg" class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold border border-red-100 flex items-center gap-2">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text"></span>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email</label>
                <input type="email" id="email" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-[#B5453A] focus:ring-4 focus:ring-red-50 transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" required class="w-full px-5 py-4 pr-14 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-[#B5453A] focus:ring-4 focus:ring-red-50 transition-all">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" tabindex="-1">
                        <i id="pw-eye" class="fas fa-eye text-lg"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#B5453A] hover:bg-[#a14545] text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl shadow-red-100 transition-all active:scale-[0.98]">
                <div id="btn-spinner" class="spinner"></div>
                <span id="btn-label">Accedi</span>
            </button>

            <div class="text-center">
                <button type="button" onclick="showRecovery()" class="text-xs font-semibold text-slate-400 hover:text-[#B5453A] transition-colors">
                    Hai dimenticato la password?
                </button>
            </div>
          </form>
        </div>

        <!-- Vista recupero password -->
        <div id="recovery-view" class="hidden space-y-6">
            <div class="text-center">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-envelope text-[#B5453A] text-xl"></i>
                </div>
                <p class="text-sm font-semibold text-slate-700">Recupera password</p>
                <p class="text-xs text-slate-400 mt-1">Ti invieremo un link per reimpostare la password</p>
            </div>

            <div id="recovery-error" class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold border border-red-100 flex items-center gap-2">
                <i class="fas fa-exclamation-circle"></i>
                <span id="recovery-error-text"></span>
            </div>
            <div id="recovery-success" class="hidden bg-green-50 text-green-700 p-4 rounded-2xl text-xs font-bold border border-green-100 flex items-center gap-2">
                <i class="fas fa-check-circle"></i>
                <span>Link inviato! Controlla la tua email.</span>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email</label>
                <input type="email" id="recovery-email" placeholder="La tua email" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-[#B5453A] focus:ring-4 focus:ring-red-50 transition-all">
            </div>

            <button onclick="sendRecovery()" id="recovery-btn" class="w-full bg-[#B5453A] hover:bg-[#a14545] text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl shadow-red-100 transition-all active:scale-[0.98]">
                <div id="recovery-spinner" class="spinner"></div>
                <span id="recovery-label">Invia link di recupero</span>
            </button>

            <div class="text-center">
                <button type="button" onclick="showLogin()" class="text-xs font-semibold text-slate-400 hover:text-[#B5453A] transition-colors">
                    ← Torna al login
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient(
            'https://hsalynvxazxqtmsvjrzc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
        );

        function showRecovery() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('recovery-view').classList.remove('hidden');
            document.getElementById('recovery-email').focus();
        }

        function showLogin() {
            document.getElementById('recovery-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
        }

        async function sendRecovery() {
            const email = document.getElementById('recovery-email').value.trim();
            const errDiv = document.getElementById('recovery-error');
            const okDiv = document.getElementById('recovery-success');
            const btn = document.getElementById('recovery-btn');

            errDiv.classList.add('hidden');
            okDiv.classList.add('hidden');

            if (!email) {
                document.getElementById('recovery-error-text').textContent = 'Inserisci la tua email.';
                errDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            document.getElementById('recovery-spinner').style.display = 'block';
            document.getElementById('recovery-label').textContent = 'Invio in corso...';

            const redirectTo = window.location.origin + '/reset-password.html';
            const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo });

            btn.disabled = false;
            document.getElementById('recovery-spinner').style.display = 'none';
            document.getElementById('recovery-label').textContent = 'Invia link di recupero';

            if (error) {
                document.getElementById('recovery-error-text').textContent = 'Errore nell\'invio. Verifica l\'email e riprova.';
                errDiv.classList.remove('hidden');
            } else {
                okDiv.classList.remove('hidden');
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('pw-eye');
            const show  = input.type === 'password';
            input.type  = show ? 'text' : 'password';
            icon.className = show ? 'fas fa-eye-slash text-lg' : 'fas fa-eye text-lg';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            errorDiv.classList.add('hidden');
            btn.disabled = true;
            document.getElementById('btn-spinner').style.display = 'block';
            document.getElementById('btn-label').textContent = 'Verifica...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({ email, password });
                if (authError) throw new Error("Email o password non corretti.");

                const { data: operatore, error: opError } = await _supabase
                    .from('operatori')
                    .select('*')
                    .ilike('email', email)
                    .single();

                if (opError || !operatore) {
                    await _supabase.auth.signOut();
                    throw new Error("Accesso negato: utente non autorizzato.");
                }

                localStorage.setItem('m361_user', JSON.stringify(operatore));

                // Traccia primo e ultimo accesso (best-effort, non blocca il login)
                try {
                    const loginNow = new Date().toISOString();
                    const updatePayload = { last_login_at: loginNow };
                    if (!operatore.first_login_at) updatePayload.first_login_at = loginNow;
                    await _supabase.from('operatori').update(updatePayload).eq('id', operatore.id);
                } catch (_) { /* non bloccare il login se fallisce */ }

                window.location.href = 'index.html';

            } catch (err) {
                errorText.textContent = err.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                document.getElementById('btn-spinner').style.display = 'none';
                document.getElementById('btn-label').textContent = 'Accedi';
            }
        });
    </script>
    <script src="scripts/nav-script.js"></script>
</body>
</html>
