<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .bg-m361 { background-color: #b75252; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-[400px] bg-white p-8 rounded-[2rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Meridiano <span class="text-[#b75252]">361</span></h1>
            <p class="text-slate-500 text-sm mt-1">Accesso Gestione Empori</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div id="error-msg" class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-xs font-bold border border-red-100"></div>

            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-2 ml-1">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#b75252]">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-2 ml-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#b75252]">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#b75252] text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 shadow-lg">
                <div id="btn-spinner" class="spinner"></div>
                <span id="btn-label">Accedi</span>
            </button>
        </form>
    </div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient(
            'https://hsalynvxazxqtmsvjrzc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
        );

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-msg');
            
            errorDiv.classList.add('hidden');
            btn.disabled = true;
            document.getElementById('btn-spinner').style.display = 'block';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                // 1. Autenticazione
                const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({ email, password });
                if (authError) throw new Error("Email o password non corretti.");

                // 2. Controllo Permessi (Semplificato: se esisti in user_permissions, entri)
                const { data: perms, error: pError } = await _supabase
                    .from('user_permissions')
                    .select('*')
                    .ilike('email', email)
                    .single();

                if (pError || !perms) {
                    await _supabase.auth.signOut();
                    throw new Error("Utente non autorizzato in tabella permessi.");
                }

                // 3. Salvataggio e reindirizzamento
                localStorage.setItem('m361_user', JSON.stringify(perms));
                window.location.href = 'index.html';

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                document.getElementById('btn-spinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
