<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Login</title>
    
    <script src="[https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap)" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-m361 { background-color: #b75252; }
        .text-m361 { color: #b75252; }
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner.show { display: block; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-m361 p-8 text-white text-center">
            <h1 class="text-2xl font-bold">Meridiano 361</h1>
            <p class="opacity-80 text-sm mt-1">Gestione Empori — Accesso Riservato</p>
        </div>

        <form id="login-form" class="p-8 space-y-6">
            <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium border border-red-100"></div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Email</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-m361 focus:ring-2 focus:ring-red-100 outline-none transition-all"
                    placeholder="tua@email.it">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Password</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-m361 focus:ring-2 focus:ring-red-100 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full bg-m361 hover:bg-red-700 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-3 shadow-lg shadow-red-100">
                <span class="spinner"></span>
                <span id="btn-label">Accedi al Sistema</span>
            </button>
        </form>
    </div>

    <script>
        // Inizializzazione Supabase
        const { createClient } = supabase;
        const _supabase = createClient(
            '[https://hsalynvxazxqtmsvjrzc.supabase.co](https://hsalynvxazxqtmsvjrzc.supabase.co)',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
        );

        // Controllo sessione esistente
        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) window.location.href = 'index.html';
        })();

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function setLoading(loading) {
            const btn = document.getElementById('submit-btn');
            const label = document.getElementById('btn-label');
            const spinner = btn.querySelector('.spinner');
            btn.disabled = loading;
            spinner.classList.toggle('show', loading);
            label.textContent = loading ? 'Accesso in corso...' : 'Accedi al Sistema';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true);
            document.getElementById('error-msg').classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 1) Login Auth
                const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({ email, password });
                
                if (authError) throw new Error('Email o password errati.');

                // 2) Recupero Permessi dalla tabella user_permissions
                const { data: perms, error: permsError } = await _supabase
                    .from('user_permissions')
                    .select('*')
                    .eq('email', email.toLowerCase())
                    .single();

                if (permsError || !perms) {
                    await _supabase.auth.signOut();
                    throw new Error('Utente non censito nel sistema permessi.');
                }

                // 3) Salvataggio dati e reindirizzamento
                const userProfile = {
                    email: perms.email,
                    nome: perms.nome_cognome,
                    ruolo: perms.ruolo,
                    emporio: perms.emporio_riferimento,
                    sezioni: Array.isArray(perms.allowed_sections) ? perms.allowed_sections : JSON.parse(perms.allowed_sections || "[]")
                };

                localStorage.setItem('m361_user', JSON.stringify(userProfile));
                window.location.href = 'index.html';

            } catch (err) {
                showError(err.message);
                setLoading(false);
            }
        });
    </script>
</body>
</html>
