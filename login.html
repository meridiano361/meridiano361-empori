<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Accesso Riservato</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .login-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .btn-m361 { background-color: #1e293b; transition: all 0.2s; }
        .btn-m361:hover { background-color: #334155; transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="login-card w-full max-w-md p-8 md:p-12">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Meridiano 361</h1>
            <p class="text-slate-500 mt-2 text-sm font-medium">Accesso consentito solo su invito</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Indirizzo Email</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-slate-400 focus:ring-0 outline-none transition-all text-slate-700"
                    placeholder="nome@meridiano361.it">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Password</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-slate-400 focus:ring-0 outline-none transition-all text-slate-700"
                    placeholder="••••••••">
            </div>

            <button type="submit" class="btn-m361 w-full text-white font-bold py-4 rounded-xl shadow-lg shadow-slate-200">
                Accedi al Sistema
            </button>
        </form>

        <div id="error-msg" class="hidden mt-6 p-4 rounded-xl bg-red-50 text-red-600 text-xs font-bold text-center">
            Accesso negato. Utente non autorizzato o credenziali errate.
        </div>

        <p class="mt-8 text-center text-[10px] text-slate-400 leading-relaxed">
            Se non hai ricevuto un invito, contatta l'amministrazione per richiedere l'abilitazione del tuo account.
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = supabase;
        const _supabase = createClient('https://hsalynvxazxqtmsvjrzc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8');

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // 1. Autenticazione Supabase
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.classList.remove('hidden');
                return;
            }

            // 2. Controllo permessi personalizzati
            // Qui reindirizziamo alla cassa.html. 
            // In cassa.html leggeremo l'utente loggato per mostrare/nascondere le sezioni.
            window.location.href = 'cassa.html';
        });
    </script>
</body>
</html>
