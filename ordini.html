<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Nuovo Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .bg-m361-dark { background-color: #1e293b; }
        .border-m361-red { border-color: #b75252; }
        input:focus { outline: none; border-color: #b75252; ring: 1px solid #b75252; }
    </style>
</head>
<body class="pb-20">

    <!-- Header con info automatiche -->
    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-400 hover:text-m361-red transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <img src="logom361_rosso.jpg" alt="Logo" class="h-8">
            <h1 class="font-bold text-lg border-l pl-4 ml-2">Nuovo Ordine</h1>
        </div>
        <div class="text-xs font-bold uppercase tracking-widest text-gray-400">
            Emporio: <span class="text-m361-dark" id="current-emporio">Cremona</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        
        <!-- SEZIONE 1: ANAGRAFICA CLIENTE -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <h2 class="text-xs font-bold text-gray-400 mb-4 tracking-widest uppercase flex items-center gap-2">
                <span class="w-1.5 h-4 bg-m361-red rounded-full"></span> Dati Cliente & Operatore
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Preso da *</label>
                    <select class="w-full border rounded-lg p-2.5 text-sm bg-gray-50">
                        <option>Seleziona operatore...</option>
                        <option>Emilio</option>
                        <option>Chiara</option>
                        <option>Altro Collega</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nome e Cognome Cliente *</label>
                    <input type="text" placeholder="Mario Rossi" class="w-full border rounded-lg p-2.5 text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Telefono *</label>
                    <input type="tel" placeholder="+39 333..." class="w-full border rounded-lg p-2.5 text-sm">
                </div>
            </div>
        </div>

        <!-- SEZIONE 2: TABELLA PRODOTTI DINAMICA -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="text-xs font-bold text-gray-400 tracking-widest uppercase">Prodotti in ordine</h2>
                <button onclick="addRow()" class="text-[10px] bg-m361-dark text-white px-3 py-1.5 rounded-full hover:bg-m361-red transition-colors font-bold uppercase">
                    + Aggiungi riga
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase tracking-wider border-b">
                            <th class="p-4 font-bold">Descrizione</th>
                            <th class="p-4 font-bold w-20">Q.tà</th>
                            <th class="p-4 font-bold w-24">Da Parte</th>
                            <th class="p-4 font-bold w-24">Altri Empori</th>
                            <th class="p-4 font-bold w-24">Esterni</th>
                            <th class="p-4 font-bold w-32 bg-red-50 text-m361-red">Da Ordinare</th>
                            <th class="p-4 w-10"></th>
                        </tr>
                    </thead>
                    <tbody id="order-rows">
                        <!-- La riga viene generata da JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- SEZIONE 3: CHECK-LIST & STATO -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xs font-bold text-gray-400 mb-6 tracking-widest uppercase">Check-list Avanzamento</h2>
                <div class="space-y-4">
                    <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <span class="text-sm font-semibold">Merce Arrivata</span>
                        <input type="checkbox" class="w-5 h-5 accent-[#b75252]">
                    </label>
                    <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <span class="text-sm font-semibold">Cliente Avvisato</span>
                        <input type="checkbox" class="w-5 h-5 accent-[#b75252]">
                    </label>
                    <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <span class="text-sm font-semibold">Ordine Evaso (Pronto per Archivio)</span>
                        <input type="checkbox" class="w-5 h-5 accent-green-600">
                    </label>
                </div>
            </div>

            <!-- Note e Azioni -->
            <div class="flex flex-col gap-4">
                <textarea placeholder="Note interne all'ordine..." class="w-full h-full min-h-[150px] border rounded-2xl p-4 text-sm resize-none"></textarea>
                <div class="flex gap-4">
                    <button class="flex-1 bg-gray-200 text-gray-600 font-bold py-4 rounded-xl uppercase text-xs tracking-widest hover:bg-gray-300 transition-all">Salva Bozza</button>
                    <button class="flex-1 bg-m361-red text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest hover:opacity-90 shadow-lg shadow-red-200 transition-all">Conferma Ordine</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function addRow() {
            const tbody = document.getElementById('order-rows');
            const rowId = Date.now();
            const row = document.createElement('tr');
            row.className = "border-b hover:bg-gray-50/50 transition-colors";
            row.id = `row-${rowId}`;
            row.innerHTML = `
                <td class="p-3"><input type="text" placeholder="Es. Caffè 250g" class="w-full bg-transparent border-b border-transparent focus:border-gray-200 py-1 text-sm"></td>
                <td class="p-3"><input type="number" value="0" oninput="calculateRow(${rowId})" id="qty-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm font-bold"></td>
                <td class="p-3"><input type="number" value="0" oninput="calculateRow(${rowId})" id="parte-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm italic"></td>
                <td class="p-3"><input type="number" value="0" oninput="calculateRow(${rowId})" id="altri-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm italic"></td>
                <td class="p-3"><input type="number" value="0" oninput="calculateRow(${rowId})" id="est-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm italic"></td>
                <td class="p-3 bg-red-50/30 text-center font-bold text-m361-red" id="total-${rowId}">0</td>
                <td class="p-3"><button onclick="document.getElementById('row-${rowId}').remove()" class="text-gray-300 hover:text-red-500">✕</button></td>
            `;
            tbody.appendChild(row);
        }

        function calculateRow(id) {
            const qty = parseInt(document.getElementById(`qty-${id}`).value) || 0;
            const parte = parseInt(document.getElementById(`parte-${id}`).value) || 0;
            const altri = parseInt(document.getElementById(`altri-${id}`).value) || 0;
            const est = parseInt(document.getElementById(`est-${id}`).value) || 0;
            
            // Formula: Q.tà - (Da parte + Altri empori + Esterni)
            const result = qty - (parte + altri + est);
            const totalCell = document.getElementById(`total-${id}`);
            
            totalCell.innerText = result > 0 ? result : 0;
            
            // Feedback visivo se c'è qualcosa da ordinare
            if(result > 0) {
                totalCell.classList.add('bg-red-100');
            } else {
                totalCell.classList.remove('bg-red-100');
            }
        }

        // Aggiungi una riga vuota all'avvio
        window.onload = addRow;
    </script>
</body>
</html>
