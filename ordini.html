<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Nuovo Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .bg-m361-dark { background-color: #1e293b; }
        .border-m361-red { border-color: #b75252; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #b75252; ring: 1px solid #b75252; }
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-400 hover:text-m361-red transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <img src="logom361_rosso.jpg" alt="Logo" class="h-8">
            <h1 class="font-bold text-lg border-l pl-4 ml-2">Nuovo Ordine</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Emporio:</span>
            <select id="select-emporio" onchange="updateOperators()" class="text-xs font-bold uppercase bg-transparent border-none text-m361-red cursor-pointer">
                <option value="Cremona">Cremona</option>
                <option value="Casalmaggiore">Casalmaggiore</option>
                <option value="Reggio Emilia">Reggio Emilia</option>
                <option value="Viadana">Viadana</option>
                <option value="nuovo">+ Aggiungi Nuovo...</option>
            </select>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        
        <form id="orderForm">
            <!-- SEZIONE 1: ANAGRAFICA E DATA -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold text-gray-400 tracking-widest uppercase flex items-center gap-2">
                        <span class="w-1.5 h-4 bg-m361-red rounded-full"></span> Dati Cliente & Operatore
                    </h2>
                    <div class="flex items-center gap-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Data Ordine:</label>
                        <input type="date" id="order-date" class="text-xs border rounded p-1 font-semibold text-gray-600">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <!-- Operatore -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Preso da *</label>
                        <div class="flex gap-1">
                            <select id="select-operator" required class="flex-1 border rounded-lg p-2.5 text-sm bg-gray-50">
                                <!-- Popolato via JS -->
                            </select>
                            <button type="button" onclick="addNewOperator()" class="bg-gray-100 px-2 rounded-lg text-gray-400 hover:text-m361-red">+</button>
                        </div>
                    </div>

                    <!-- Cliente -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nome e Cognome Cliente *</label>
                        <input type="text" required placeholder="Mario Rossi" class="w-full border rounded-lg p-2.5 text-sm">
                    </div>

                    <!-- Telefono e Spunte -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cellulare *</label>
                        <div class="flex items-center gap-3 mt-2">
                            <input type="tel" required placeholder="333 1234567" class="flex-1 border rounded-lg p-2.5 text-sm">
                            <label class="flex items-center gap-1 text-[10px] font-bold text-gray-400">
                                <input type="checkbox" class="accent-[#b75252]"> WA
                            </label>
                            <label class="flex items-center gap-1 text-[10px] font-bold text-gray-400">
                                <input type="checkbox" class="accent-[#b75252]"> SMS
                            </label>
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Email</label>
                        <input type="email" placeholder="mario@email.it" class="w-full border rounded-lg p-2.5 text-sm">
                    </div>
                </div>
            </div>

            <!-- SEZIONE 2: TABELLA PRODOTTI -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <h2 class="text-xs font-bold text-gray-400 tracking-widest uppercase">Prodotti in ordine</h2>
                    <button type="button" onclick="addRow()" class="text-[10px] bg-m361-dark text-white px-3 py-1.5 rounded-full hover:bg-m361-red transition-colors font-bold uppercase">
                        + Aggiungi riga
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[10px] text-gray-400 uppercase tracking-wider border-b text-center">
                                <th class="p-4 font-bold text-left">Descrizione Prodotto</th>
                                <th class="p-4 font-bold w-20">Q.tà</th>
                                <th class="p-4 font-bold w-24">Da Parte</th>
                                <th class="p-4 font-bold w-24">Altri Emp.</th>
                                <th class="p-4 font-bold w-24">Esterni</th>
                                <th class="p-4 font-bold w-32 bg-red-50 text-m361-red">Da Ordinare</th>
                                <th class="p-4 w-10"></th>
                            </tr>
                        </thead>
                        <tbody id="order-rows"></tbody>
                    </table>
                </div>
            </div>

            <!-- SEZIONE 3: CHECKLIST E NOTE -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-xs font-bold text-gray-400 mb-6 tracking-widest uppercase">Check-list Avanzamento</h2>
                    <div class="space-y-4">
                        <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer hover:bg-gray-50">
                            <span class="text-sm font-semibold">Merce Arrivata</span>
                            <input type="checkbox" class="w-5 h-5 accent-[#b75252]">
                        </label>
                        <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer hover:bg-gray-50">
                            <span class="text-sm font-semibold">Cliente Avvisato</span>
                            <input type="checkbox" class="w-5 h-5 accent-[#b75252]">
                        </label>
                        <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer hover:bg-gray-50">
                            <span class="text-sm font-semibold text-green-700">Ordine Evaso / Archivio</span>
                            <input type="checkbox" class="w-5 h-5 accent-green-600">
                        </label>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <textarea placeholder="Note interne (es. preferenze orari, specifiche pacchetto)..." class="w-full h-full min-h-[150px] border rounded-2xl p-4 text-sm resize-none"></textarea>
                    <div class="flex gap-4">
                        <button type="button" class="flex-1 bg-gray-200 text-gray-600 font-bold py-4 rounded-xl uppercase text-xs tracking-widest hover:bg-gray-300">Salva Bozza</button>
                        <button type="submit" class="flex-1 bg-m361-red text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest hover:opacity-90 shadow-lg shadow-red-200">Conferma Ordine</button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script>
        const operatoriDB = {
            "Cremona": ["Emilio Mazzolari", "Chiara Monteverdi", "Giulia Galelli"],
            "Reggio Emilia": ["Marica Poli", "Manuela Capanni", "Alessia Bartolomei"],
            "Viadana": ["Alberini Roberta", "Amadini Giuseppina", "Aroldi Ave", "Bellelli Carla", "Bertolini Mariagrazia", "Bortesi Tiziana", "Chittolini Carla", "Falugi Donatella", "Furlotti Franco", "Germani Sara", "Ghelfi Elena", "Mortini Claudio", "Panato Mirella", "Piotrowska Barbara", "Rovina Alessia", "Sanfelici Marta", "Scazza Manuela"],
            "Casalmaggiore": ["Araldi Barbara", "Bossi Erica", "Cattani Elena Maria", "Chiarini Matilde", "Federici Miriam", "Frigeri Giulia", "Galelli Giulia", "Galli Ileana", "Gatti Piero", "Lunardini Francesco", "Lunardini Giuseppe", "Lunardini Vittoria", "Mabrouk Teyssir", "Machetti Barbara", "Maffei Carla", "Marchini Michele", "Pavesi Edoardo", "Poli Francesca", "Raineri Giovanna", "Rivetti Alessandra", "Scaravonati Maria Marcella", "Vezzosi Robertha"]
        };

        function updateOperators() {
            const emporio = document.getElementById('select-emporio').value;
            const opSelect = document.getElementById('select-operator');
            
            if(emporio === 'nuovo') {
                const nuovo = prompt("Inserisci il nome del nuovo Emporio:");
                if(nuovo) {
                    const select = document.getElementById('select-emporio');
                    const opt = document.createElement('option');
                    opt.value = nuovo; opt.text = nuovo;
                    select.add(opt, select.options[select.options.length - 1]);
                    select.value = nuovo;
                    operatoriDB[nuovo] = [];
                    updateOperators();
                }
                return;
            }

            opSelect.innerHTML = '<option value="">Seleziona operatore...</option>';
            const lista = operatoriDB[emporio] || [];
            lista.sort().forEach(op => {
                const opt = document.createElement('option');
                opt.value = op; opt.text = op;
                opSelect.add(opt);
            });
        }

        function addNewOperator() {
            const emporio = document.getElementById('select-emporio').value;
            const nuovo = prompt(`Aggiungi nuovo operatore per ${emporio}:`);
            if(nuovo) {
                operatoriDB[emporio].push(nuovo);
                updateOperators();
                document.getElementById('select-operator').value = nuovo;
            }
        }

        function addRow() {
            const tbody = document.getElementById('order-rows');
            const rowId = Date.now();
            const row = document.createElement('tr');
            row.className = "border-b hover:bg-gray-50/50 transition-colors";
            row.id = `row-${rowId}`;
            row.innerHTML = `
                <td class="p-3"><input type="text" required placeholder="Nome prodotto..." class="w-full bg-transparent border-b border-transparent focus:border-gray-200 py-1 text-sm"></td>
                <td class="p-3"><input type="number" min="0" value="1" oninput="calculateRow(${rowId})" id="qty-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm font-bold"></td>
                <td class="p-3"><input type="number" min="0" value="0" oninput="calculateRow(${rowId})" id="parte-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm italic"></td>
                <td class="p-3"><input type="number" min="0" value="0" oninput="calculateRow(${rowId})" id="altri-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm italic"></td>
                <td class="p-3"><input type="number" min="0" value="0" oninput="calculateRow(${rowId})" id="est-${rowId}" class="w-full text-center bg-gray-50 rounded p-1 text-sm italic"></td>
                <td class="p-3 bg-red-50 text-center font-bold text-m361-red text-lg" id="total-${rowId}">1</td>
                <td class="p-3 text-center"><button type="button" onclick="document.getElementById('row-${rowId}').remove()" class="text-gray-300 hover:text-red-500 text-xl">✕</button></td>
            `;
            tbody.appendChild(row);
        }

        function calculateRow(id) {
            const qty = parseInt(document.getElementById(`qty-${id}`).value) || 0;
            const p = parseInt(document.getElementById(`parte-${id}`).value) || 0;
            const a = parseInt(document.getElementById(`altri-${id}`).value) || 0;
            const e = parseInt(document.getElementById(`est-${id}`).value) || 0;
            const res = qty - (p + a + e);
            const cell = document.getElementById(`total-${id}`);
            cell.innerText = res > 0 ? res : 0;
            cell.className = res > 0 ? "p-3 bg-red-100 text-center font-bold text-m361-red text-lg" : "p-3 bg-gray-50 text-center font-bold text-gray-400 text-lg";
        }

        window.onload = () => {
            document.getElementById('order-date').valueAsDate = new Date();
            updateOperators();
            addRow();
        };

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Ordine confermato con successo!");
        };
    </script>
</body>
</html>
