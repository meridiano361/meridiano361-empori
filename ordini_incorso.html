<div class="ordine-card bg-white border border-slate-200 rounded-3xl p-8 flex items-center justify-between shadow-sm mb-4" id="card-${ord.id}" data-cliente="${nomeCliente}">
    
    <div class="w-1/3">
        <div class="flex items-center gap-3 mb-2">
            <span class="status-badge ${ord.merce_pronta ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                ${ord.merce_pronta ? 'Merce Pronta' : 'Da Ordinare'}
            </span>
            <span class="text-[10px] text-slate-300 font-mono">#${ord.id.toString().slice(-5)}</span>
            
            <button onclick="window.location.href='ordini_nuovi.html?edit=${ord.id}'" class="text-blue-500 hover:text-blue-700 transition-colors" title="Modifica">
                <i class="fas fa-edit text-lg"></i>
            </button>
            
            <button onclick="eliminaOrdine('${ord.id}', 'card-${ord.id}')" class="text-red-400 hover:text-red-600 transition-colors" title="Elimina">
                <i class="fas fa-trash-alt text-lg"></i>
            </button>
        </div>
        <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">${nomeCliente}</h2>
    </div>

    <div class="w-1/3 flex flex-col justify-center">
        <label class="flex items-center gap-3 cursor-pointer group">
            <input type="checkbox" 
                   ${ord.cliente_avvisato ? 'checked' : ''} 
                   onchange="aggiornaStato('${ord.id}', 'cliente_avvisato', this.checked)" 
                   class="w-6 h-6 border-slate-300 rounded-lg accent-blue-600 transition-all">
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest group-hover:text-slate-800">
                Cliente Avvisato
            </span>
        </label>
    </div>

    <div class="w-1/3 text-right flex items-center justify-end gap-8">
        <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase">Da Incassare</p>
            <p class="text-3xl font-black text-[#b75252]">€ ${ord.totale_ordine || '1.00'}</p>
        </div>
        
        <button onclick="evadiOrdine('${ord.id}', 'card-${ord.id}', '${ord.modalita_consegna}')" 
                class="bg-slate-700 text-white px-8 py-4 rounded-xl text-xs font-black uppercase hover:bg-slate-900 shadow-md transition-all active:scale-95">
            ${(ord.modalita_consegna === 'Spedizione' || ord.modalita_consegna === 'Sped.') ? 'SPEDITO' : 'RITIRATO'}
        </button>
    </div>
</div>
