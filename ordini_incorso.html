<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Logistica Ordini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding-bottom: 90px; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .status-waiting { background-color: #fef3c7; color: #92400e; }
        .status-ready { background-color: #d1fae5; color: #065f46; }
        .archive-anim { transition: all 0.5s ease; transform: translateX(100px); opacity: 0; }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            padding: 15px; border-top: 1px solid #e2e8f0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
        }
        .home-btn {
            background-color: #1e293b; color: white; padding: 12px 30px;
            border-radius: 16px; font-weight: 700; text-transform: uppercase;
            font-size: 13px; display: flex; align-items: center; gap: 10px;
            transition: all 0.3s ease; text-decoration: none;
        }
        .home-btn:hover { background-color: #b75252; transform: translateY(-2px); }
        
        /* Stile pulsanti filtri attivi */
        .filter-btn.active { background-color: #1e293b; color: white; border-color: #1e293b; }
    </style>
</head>
<body>

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
            <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Ordini in corso</h1>
        </div>
        <a href="ordini_nuovi.html" class="bg-m361-red text-white px-6 py-2 rounded-xl text-xs font-bold uppercase shadow-md hover:opacity-90">Nuovo Ordine</a>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex flex-wrap gap-2" id="filter-group">
                <button onclick="caricaOrdini('tutti', this)" class="filter-btn active bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">Tutti</button>
                <button onclick="caricaOrdini('da_ordinare', this)" class="filter-btn bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red">Da ordinare</button>
                <button onclick="caricaOrdini('merce_pronta', this)" class="filter-btn bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red">Merce Pronta</button>
                <button onclick="caricaOrdini('da_avvisare', this)" class="filter-btn bg-white border border-slate-200 text-m361-red border-m361-red px-4 py-2 rounded-xl text-xs font-bold uppercase hover:bg-red-50">Da Avvisare</button>
                <button onclick="caricaOrdini('avvisati', this)" class="filter-btn bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red">Avvisati</button>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" oninput="filtraPerNome(this.value)" placeholder="Cerca cliente..." class="w-full pl-10 pr-4 py-2.5 border rounded-xl text-sm outline-none focus:ring-1 focus:ring-m361-red">
                <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>

        <div class="space-y-4" id="orders-container">
            <p class="text-center text-slate-400 py-10">Caricamento logistica in corso...</p>
        </div>
    </main>

    <div class="bottom-nav">
        <a href="index.html" class="home-btn">
            <i class="fas fa-th-list"></i>
            <span>Dashboard Ordini</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function aggiornaStato(id, campo, valore) {
            await _supabase.from('ordini_incorso').update({ [campo]: valore }).eq('id', id);
            // Non ricarichiamo tutta la pagina per velocità, ma l'utente vedrà il cambio al prossimo filtro
        }

        async function eliminaOrdine(id, elementId) {
            if (confirm("Eliminare l'ordine?")) {
                const { error } = await _supabase.from('ordini_incorso').delete().eq('id', id);
                if (!error) document.getElementById(elementId).remove();
            }
        }

        async function evadiOrdine(id, elementId, modConsegna) {
            const azione = (modConsegna === 'Spedizione' || modConsegna === 'Sped.') ? 'SPEDITO' : 'RITIRATO';
            if (confirm(`Confermi che l'ordine è stato ${azione}? Sarà spostato in archivio.`)) {
                const { data: ordine } = await _supabase.from('ordini_incorso').select('*').eq('id', id).single();
                const { error: errInsert } = await _supabase.from('ordini_archiviati').insert([{ ...ordine, id: undefined, stato: 'Evaso', data_evasione: new Date() }]);
                if (!errInsert) {
                    await _supabase.from('ordini_incorso').delete().eq('id', id);
                    const el = document.getElementById(elementId);
                    el.classList.add('archive-anim');
                    setTimeout(() => el.remove(), 500);
                }
            }
        }

        function filtraPerNome(testo) {
            const query = testo.toLowerCase();
            document.querySelectorAll('.ordine-card').forEach(card => {
                const nome = card.getAttribute('data-cliente').toLowerCase();
                card.style.display = nome.includes(query) ? 'flex' : 'none';
            });
        }

        async function caricaOrdini(filtro = 'tutti', btn = null) {
            // Gestione estetica pulsanti
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active', 'bg-slate-800', 'text-white');
                    b.classList.add('bg-white', 'text-slate-500');
                });
                btn.classList.add('active', 'bg-slate-800', 'text-white');
                btn.classList.remove('bg-white', 'text-slate-500');
            }

            const container = document.getElementById('orders-container');
            container.innerHTML = '<p class="text-center text-slate-400 py-10">Filtraggio...</p>';

            let query = _supabase.from('ordini_incorso').select('*').order('created_at', { ascending: false });

            // LOGICA FILTRI RICHIESTA
            if (filtro === 'da_ordinare') {
                query = query.eq('merce_pronta', false);
            } 
            else if (filtro === 'merce_pronta') {
                query = query.eq('merce_pronta', true);
            }
            else if (filtro === 'da_avvisare') {
                // Merce pronta MA cliente NON avvisato
                query = query.eq('merce_pronta', true).eq('cliente_avvisato', false);
            }
            else if (filtro === 'avvisati') {
                query = query.eq('cliente_avvisato', true);
            }

            const { data: ordini, error } = await query;
            if (error) return;

                const badgeClasse = ord.merce_pronta ? 'status-ready' : 'status-waiting';

                container.insertAdjacentHTML('beforeend', `
                    <div class="ordine-card bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col md:flex-row gap-6 items-center mb-4" id="${cardId}" data-cliente="${nomeCliente}">
                        <div class="flex-1 w-full">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-3">
                                    <span class="status-badge ${badgeClasse}">${badgeTesto}</span>
                                    <span class="text-[10px] font-mono text-slate-400">#${ord.id.toString().slice(-5)}</span>
                                </div>
                                <div class="flex gap-4">
                                    <button onclick="window.location.href='ordini_nuovi.html?edit=${ord.id}'" class="text-blue-500 hover:text-blue-700">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                    </button>
                                    <button onclick="eliminaOrdine('${ord.id}', '${cardId}')" class="text-red-300 hover:text-red-500">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </div>
                            </div>
                            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">${nomeCliente || 'Senza Nome'}</h3>
                        </div>

                        <div class="flex-1 w-full flex flex-col gap-3 border-l border-r border-slate-100 px-6">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" ${ord.cliente_avvisato ? 'checked' : ''} onchange="aggiornaStato('${ord.id}', 'cliente_av
