<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Gestione Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding-bottom: 100px; }
        .bg-m361-red { background-color: #b75252; }
        .text-m361-red { color: #b75252; }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            padding: 15px; border-top: 1px solid #e2e8f0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
        }
        .home-btn {
            background-color: #1e293b; color: white; padding: 12px 30px;
            border-radius: 16px; font-weight: 700; text-transform: uppercase;
            font-size: 13px; display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
            <h1 id="page-title" class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Nuovo Ordine</h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <form id="orderForm" class="space-y-6 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Nome</label>
                    <input type="text" id="cust-nome" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-100">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Cognome</label>
                    <input type="text" id="cust-cognome" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-100">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Cellulare</label>
                    <input type="tel" id="cust-tel" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-100">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Email</label>
                    <input type="email" id="cust-email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-100">
                </div>
            </div>

            <hr class="border-slate-100">

            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-3">Modalità Consegna</label>
                <div class="flex gap-4">
                    <label class="flex-1 border p-4 rounded-xl flex items-center gap-3 cursor-pointer hover:bg-slate-50">
                        <input type="radio" name="mod_consegna" value="Ritiro" checked class="w-5 h-5 accent-red-600">
                        <span class="font-bold text-slate-700">Ritiro in sede</span>
                    </label>
                    <label class="flex-1 border p-4 rounded-xl flex items-center gap-3 cursor-pointer hover:bg-slate-50">
                        <input type="radio" name="mod_consegna" value="Spedizione" class="w-5 h-5 accent-red-600">
                        <span class="font-bold text-slate-700">Spedizione</span>
                    </label>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" id="submit-btn" class="w-full bg-m361-red text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:opacity-90 transition-all">
                    Salva Ordine
                </button>
            </div>
        </form>
    </main>

    <div class="bottom-nav">
        <a href="index.html" class="home-btn">
            <i class="fas fa-arrow-left"></i>
            <span>Torna alla Lista</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');

        // Caricamento dati in caso di MODIFICA
        async function initPage() {
            if (editId) {
                document.getElementById('page-title').innerText = "Modifica Ordine";
                document.getElementById('submit-btn').innerText = "Aggiorna Ordine";

                const { data: ord, error } = await _supabase
                    .from('ordini_incorso')
                    .select('*')
                    .eq('id', editId)
                    .single();

                if (ord) {
                    document.getElementById('cust-nome').value = ord.cliente_nome || '';
                    document.getElementById('cust-cognome').value = ord.cliente_cognome || '';
                    document.getElementById('cust-tel').value = ord.cliente_cellulare || '';
                    document.getElementById('cust-email').value = ord.cliente_email || '';
                    
                    document.querySelectorAll('input[name="mod_consegna"]').forEach(radio => {
                        if(radio.value === ord.modalita_consegna) radio.checked = true;
                    });
                }
            }
        }

        // Gestione INVIO (Salva o Aggiorna)
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "Attendere...";

            const formData = {
                cliente_nome: document.getElementById('cust-nome').value,
                cliente_cognome: document.getElementById('cust-cognome').value,
                cliente_cellulare: document.getElementById('cust-tel').value,
                cliente_email: document.getElementById('cust-email').value,
                modalita_consegna: document.querySelector('input[name="mod_consegna"]:checked').value
            };

            let result;
            if (editId) {
                // UPDATE
                result = await _supabase.from('ordini_incorso').update(formData).eq('id', editId);
            } else {
                // INSERT NUOVO
                formData.merce_pronta = false;
                formData.cliente_avvisato = false;
                result = await _supabase.from('ordini_incorso').insert([formData]);
            }

            if (!result.error) {
                alert(editId ? "Ordine aggiornato!" : "Ordine salvato!");
                window.location.href = 'index.html';
            } else {
                alert("Errore: " + result.error.message);
                btn.disabled = false;
                btn.innerText = editId ? "Aggiorna Ordine" : "Salva Ordine";
            }
        };

        window.onload = initPage;
    </script>
</body>
</html>
