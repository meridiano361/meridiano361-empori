<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Ordini in Corso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .text-m361-green { color: #6b8d53; }
        .bg-m361-green { background-color: #6b8d53; }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-waiting { background-color: #fef3c7; color: #92400e; }
        .status-ready { background-color: #d1fae5; color: #065f46; }

        /* Animazione per l'archiviazione */
        .archive-anim {
            transition: all 0.5s ease;
            transform: translateX(100px);
            opacity: 0;
        }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="ordini.html">
                <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
            </a>
            <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Ordini in Corso</h1>
        </div>
        <a href="ordini_nuovi.html" class="bg-m361-red text-white px-6 py-2 rounded-xl text-xs font-bold uppercase shadow-md hover:opacity-90 transition-all">+ Nuovo</a>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- Filtri -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex gap-2">
                <button class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">Tutti</button>
                <button class="bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red">Da Avvisare</button>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" placeholder="Cerca cliente..." class="w-full pl-10 pr-4 py-2.5 border rounded-xl text-sm focus:ring-1 focus:ring-m361-red outline-none">
                <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>

        <!-- Lista Card -->
        <div class="space-y-4" id="orders-container">
            
            <!-- ESEMPIO 1: ORDINE PRONTO -->
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col md:flex-row gap-6 items-center" id="order-1">
                <div class="flex-1 w-full">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="status-badge status-ready">Merce Pronta</span>
                        <span class="text-[10px] font-mono text-slate-400">#2026-001</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Mario Rossi</h3>
                    <p class="text-sm text-slate-500 flex items-center gap-2">
                        333 1234567 <span class="bg-emerald-50 text-emerald-600 text-[10px] px-1.5 rounded font-bold">WA</span>
                    </p>
                </div>

                <!-- Azioni Operative Centrale -->
                <div class="flex-1 w-full flex flex-col gap-3 border-l border-r border-slate-100 px-6">
                    <!-- Checkbox Avvisato -->
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 accent-blue-600 rounded">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-slate-700 uppercase group-hover:text-blue-600">Cliente Avvisato</span>
                            <span class="text-[9px] text-slate-400 uppercase font-bold">Spunta dopo chiamata/WA</span>
                        </div>
                    </label>
                    
                    <hr class="border-slate-50">

                    <!-- Checkbox Archiviazione -->
                    <label class="flex items-center gap-3 cursor-pointer group" onclick="archiveOrder('order-1')">
                        <input type="checkbox" class="w-5 h-5 accent-m361-green rounded">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-slate-700 uppercase group-hover:text-m361-green">Ordine Consegnato / Ritirato</span>
                            <span class="text-[9px] text-m361-green font-bold uppercase italic">Sposta in archivio</span>
                        </div>
                    </label>
                </div>

                <!-- Info Economiche e Dettaglio -->
                <div class="flex-1 w-full text-right flex flex-col items-end">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Da incassare</p>
                    <p class="text-2xl font-black text-m361-red mb-4">€ 42,50</p>
                    <div class="flex gap-2">
                        <button class="text-slate-400 p-2 hover:text-slate-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2"/></svg></button>
                        <button class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-slate-200">Vedi Merce</button>
                    </div>
                </div>
            </div>

            <!-- ESEMPIO 2: ORDINE IN ATTESA -->
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col md:flex-row gap-6 items-center" id="order-2">
                <div class="flex-1 w-full">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="status-badge status-waiting">In arrivo</span>
                        <span class="text-[10px] font-mono text-slate-400">#2026-002</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Elena Bianchi</h3>
                    <p class="text-sm text-slate-500">Reggio Emilia - Ritiro in sede</p>
                </div>

                <div class="flex-1 w-full flex flex-col gap-3 border-l border-r border-slate-100 px-6">
                    <label class="flex items-center gap-3 opacity-30 cursor-not-allowed">
                        <input type="checkbox" disabled class="w-5 h-5 accent-blue-600 rounded">
                        <span class="text-xs font-bold text-slate-400 uppercase">Cliente Avvisato</span>
                    </label>
                    <hr class="border-slate-50">
                    <label class="flex items-center gap-3 opacity-30 cursor-not-allowed">
                        <input type="checkbox" disabled class="w-5 h-5 accent-m361-green rounded">
                        <span class="text-xs font-bold text-slate-400 uppercase">Ordine Consegnato</span>
                    </label>
                </div>

                <div class="flex-1 w-full text-right flex flex-col items-end">
                    <p class="text-[10px] font-bold text-emerald-600 uppercase">Saldo Pagato</p>
                    <p class="text-2xl font-black text-emerald-600 mb-4">€ 0,00</p>
                    <button class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Gestisci</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        function archiveOrder(orderId) {
            const element = document.getElementById(orderId);
            // Aspettiamo un attimo per far vedere il flag prima dell'animazione
            setTimeout(() => {
                element.classList.add('archive-anim');
                setTimeout(() => {
                    element.remove();
                    alert("Ordine spostato in Archivio con successo!");
                }, 500);
            }, 300);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function caricaOrdini() {
    const container = document.getElementById('orders-container');
    
    // 1. Recupero dati
    const { data: ordini, error } = await _supabase
        .from('ordini_incorso')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Errore caricamento:", error);
        container.innerHTML = `<p class="text-center text-red-500">Errore: ${error.message}</p>`;
        return;
    }

    // 2. Pulizia container
    container.innerHTML = "";

    if (!ordini || ordini.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 py-10">Nessun ordine trovato nella tabella "ordini_incorso".</p>`;
        return;
    }

  // Funzione per aggiornare un campo su Supabase (es. cliente_avvisato o merce_pronta)
async function aggiornaStato(id, campo, valore) {
    const { error } = await _supabase
        .from('ordini_incorso')
        .update({ [campo]: valore })
        .eq('id', id);
    
    if (error) alert("Errore aggiornamento: " + error.message);
}

// Funzione per archiviare l'ordine
async function archiviaOrdine(id, elementId) {
    // 1. Recupera i dati dell'ordine corrente
    const { data: ordine } = await _supabase
        .from('ordini_incorso')
        .select('*')
        .eq('id', id)
        .single();

    // 2. Inserisci in ordini_archiviati (assicurati che la tabella esista)
    const { error: errInsert } = await _supabase
        .from('ordini_archiviati')
        .insert([{ ...ordine, id: undefined, archiviato_il: new Date() }]);

    if (!errInsert) {
        // 3. Elimina da ordini_incorso
        await _supabase.from('ordini_incorso').delete().eq('id', id);
        
        // Animazione e rimozione card
        const el = document.getElementById(elementId);
        el.classList.add('archive-anim');
        setTimeout(() => el.remove(), 500);
    } else {
        alert("Errore archiviazione: " + errInsert.message);
    }
}

// Modifica il tuo ciclo forEach dentro caricaOrdini()
ordini.forEach(ord => {
    const cardId = `card-${ord.id}`;
    const card = `
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col md:flex-row gap-6 items-center mb-4 transition-all" id="${cardId}">
        <div class="flex-1 w-full">
            <div class="flex items-center gap-3 mb-2">
                <span class="status-badge ${ord.merce_pronta ? 'status-ready' : 'status-waiting'}">
                    ${ord.merce_pronta ? 'Merce Pronta' : 'In Attesa'}
                </span>
                <span class="text-[10px] font-mono text-slate-400">#${ord.id.toString().slice(-5)}</span>
            </div>
            <h3 class="text-xl font-black text-slate-800 uppercase">${ord.cliente_nome} ${ord.cliente_cognome}</h3>
            <p class="text-xs text-slate-500 mt-1">📦 <b>Merce:</b> ${ord.merce_ordinata || 'Nessun dettaglio'}</p>
        </div>

        <div class="flex-1 w-full flex flex-col gap-3 border-l border-r border-slate-100 px-6">
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="checkbox" ${ord.merce_pronta ? 'checked' : ''} 
                    onchange="aggiornaStato('${ord.id}', 'merce_pronta', this.checked)"
                    class="w-5 h-5 accent-blue-600 rounded">
                <span class="text-xs font-bold text-slate-700 uppercase">Merce Pronta</span>
            </label>

            <label class="flex items-center gap-3 cursor-pointer">
                <input type="checkbox" ${ord.cliente_avvisato ? 'checked' : ''} 
                    onchange="aggiornaStato('${ord.id}', 'cliente_avvisato', this.checked)"
                    class="w-5 h-5 accent-blue-600 rounded">
                <span class="text-xs font-bold text-slate-700 uppercase">Cliente Avvisato</span>
            </label>
        </div>

        <div class="flex-1 w-full text-right flex flex-col items-end">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Da incassare</p>
            <p class="text-2xl font-black text-m361-red mb-4">€ ${parseFloat(ord.da_pagare || 0).toFixed(2)}</p>
            <button onclick="archiviaOrdine('${ord.id}', '${cardId}')" 
                class="bg-m361-green text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:opacity-90">
                Evadi Ordine
            </button>
        </div>
    </div>`;
    container.insertAdjacentHTML('beforeend', card);
});
    }
// Avvia al caricamento
window.onload = caricaOrdini;
</script>
</body>
</html>
