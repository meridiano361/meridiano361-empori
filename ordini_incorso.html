<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Ordini in Corso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .status-waiting { background-color: #fef3c7; color: #92400e; }
        .status-ready { background-color: #d1fae5; color: #065f46; }
        .archive-anim { transition: all 0.5s ease; transform: translateX(100px); opacity: 0; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
            <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Ordini in Corso</h1>
        </div>
        <a href="ordini_nuovi.html" class="bg-m361-red text-white px-6 py-2 rounded-xl text-xs font-bold uppercase shadow-md hover:opacity-90 transition-all">+ Nuovo</a>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex flex-wrap gap-2">
                <button onclick="caricaOrdini('tutti')" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase hover:opacity-80">Tutti</button>
                <button onclick="caricaOrdini('da_ordinare')" class="bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red">Merce da ordinare</button>
                <button onclick="caricaOrdini('da_avvisare')" class="bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red">Clienti da avvisare</button>
                <button onclick="caricaOrdini('avvisati')" class="bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red">Clienti avvisati</button>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Cerca cliente..." class="w-full pl-10 pr-4 py-2.5 border rounded-xl text-sm outline-none focus:ring-1 focus:ring-m361-red">
                <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>

        <div class="space-y-4" id="orders-container">
            <p class="text-center text-slate-400 py-10">Caricamento ordini...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function aggiornaStato(id, campo, valore) {
            const { error } = await _supabase.from('ordini_incorso').update({ [campo]: valore }).eq('id', id);
            if (error) alert("Errore: " + error.message);
        }

        async function eliminaOrdine(id, elementId) {
            if (confirm("Eliminare definitivamente questo ordine?")) {
                const { error } = await _supabase.from('ordini_incorso').delete().eq('id', id);
                if (!error) document.getElementById(elementId).remove();
            }
        }

        async function evadiOrdine(id, elementId) {
            if (confirm("L'ordine è stato evaso? Verrà spostato in archivio.")) {
                const { data: ordine } = await _supabase.from('ordini_incorso').select('*').eq('id', id).single();
                const datiArchivio = { ...ordine, id: undefined, stato: 'Evaso', data_evasione: new Date() };
                const { error: errInsert } = await _supabase.from('ordini_archiviati').insert([datiArchivio]);
                if (!errInsert) {
                    await _supabase.from('ordini_incorso').delete().eq('id', id);
                    const el = document.getElementById(elementId);
                    el.classList.add('archive-anim');
                    setTimeout(() => el.remove(), 500);
                }
            }
        }

        async function caricaOrdini(filtro = 'tutti') {
            const container = document.getElementById('orders-container');
            container.innerHTML = '<p class="text-center text-slate-400 py-10">Filtraggio in corso...</p>';

            let query = _supabase.from('ordini_incorso').select('*').order('created_at', { ascending: false });

            // LOGICA FILTRI CORRETTA
            if (filtro === 'da_ordinare') {
                query = query.eq('merce_pronta', false); // Mostra tutti quelli con badge giallo "Merce da ordinare"
            } else if (filtro === 'da_avvisare') {
                query = query.eq('merce_pronta', true).eq('cliente_avvisato', false); // Merce pronta ma non ancora avvisati
            } else if (filtro === 'avvisati') {
                query = query.eq('cliente_avvisato', true); // Solo quelli già avvisati
            }

            const { data: ordini, error } = await query;
            if (error) {
                container.innerHTML = `<p class="text-center text-red-500">Errore: ${error.message}</p>`;
                return;
            }

            container.innerHTML = ordini.length === 0 ? `<p class="text-center text-slate-400 py-10">Nessun ordine trovato.</p>` : "";

            ordini.forEach(ord => {
                const cardId = `card-${ord.id}`;
                const nomeCliente = (ord.cliente_nome || "") + " " + (ord.cliente_cognome || "");
                const badgeTesto = ord.merce_pronta ? 'Merce Pronta' : 'Merce da ordinare';
                const badgeClasse = ord.merce_pronta ? 'status-ready' : 'status-waiting';
                const merceHTML = (ord.merce_ordinata && ord.merce_ordinata !== "---") 
                                  ?
