<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Ordini in Corso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-waiting { background-color: #fef3c7; color: #92400e; }
        .status-ready { background-color: #d1fae5; color: #065f46; }

        .archive-anim {
            transition: all 0.5s ease;
            transform: translateX(100px);
            opacity: 0;
        }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
            <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Ordini in Corso</h1>
        </div>
        <a href="ordini_nuovi.html" class="bg-m361-red text-white px-6 py-2 rounded-xl text-xs font-bold uppercase shadow-md hover:opacity-90 transition-all">+ Nuovo</a>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex gap-2" id="filter-container">
                <button onclick="caricaOrdini('tutti')" class="filter-btn bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase" data-filter="tutti">Tutti</button>
                <button onclick="caricaOrdini('da_ordinare')" class="filter-btn bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red" data-filter="da_ordinare">Merce da ordinare</button>
                <button onclick="caricaOrdini('da_avvisare')" class="filter-btn bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:border-m361-red" data-filter="da_avvisare">Clienti da avvisare</button>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Cerca cliente..." class="w-full pl-10 pr-4 py-2.5 border rounded-xl text-sm focus:ring-1 focus:ring-m361-red outline-none">
                <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>

        <div class="space-y-4" id="orders-container">
            <p class="text-center text-slate-400 py-10">Caricamento ordini...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- FUNZIONI DI AGGIORNAMENTO ---

        async function aggiornaStato(id, campo, valore) {
            const { error } = await _supabase
                .from('ordini_incorso')
                .update({ [campo]: valore })
                .eq('id', id);
            
            if (error) alert("Errore: " + error.message);
        }

        async function eliminaOrdine(id, elementId) {
            if (confirm("Eliminare definitivamente questo ordine?")) {
                const { error } = await _supabase.from('ordini_incorso').delete().eq('id', id);
                if (!error) document.getElementById(elementId).remove();
            }
        }

        async function archiviaOrdine(id, elementId, metodo) {
            const { data: ordine } = await _supabase.from('ordini_incorso').select('*').eq('id', id).single();
            
            const datiArchivio = { ...ordine, id: undefined, stato: 'Evaso', metodo_evasione: metodo, data_evasione: new Date() };

            const { error: errInsert } = await _supabase.from('ordini_archiviati').insert([datiArchivio]);

            if (!errInsert) {
                await _supabase.from('ordini_incorso').delete().eq('id', id);
                const el = document.getElementById(elementId);
                el.classList.add('archive-anim');
                setTimeout(() => el.remove(), 500);
            }
        }

        function apriMenuEvasione(id, elementId) {
            const scelta = confirm("L'ordine è stato RITIRATO (OK) o SPEDITO (ANNULLA)?");
            archiviaOrdine(id, elementId, scelta ? 'ritirato' : 'spedito');
        }

        // --- CARICAMENTO E FILTRI ---

        async function caricaOrdini(filtro = 'tutti') {
            const container = document.getElementById('orders-container');
            
            let query = _supabase.from('ordini_incorso').select('*').order('created_at', { ascending: false });

            // Logica Filtri
            if (filtro === 'da_ordinare') query = query.eq('merce_pronta', false);
            if (filtro === 'da_avvisare') query = query.eq('merce_pronta', true).eq('cliente_avvisato', false);

            const { data: ordini, error } = await query;

            if (error) {
                container.innerHTML = `<p class="text-center text-red-500">Errore: ${error.message}</p>`;
                return;
            }

            container.innerHTML = ordini.length === 0 ? `<p class="text-center text-slate-400 py-10">Nessun ordine trovato.</p>` : "";

            ordini.forEach(ord => {
                const cardId = `card-${ord.id}`;
                const importo = ord.da_pagare ? parseFloat(ord.da_pagare).toFixed(2) : "0.00";
                const nomeCliente = (ord.cliente_nome || "") + " " + (ord.cliente_cognome || "");
                
                const cardHTML = `
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col md:flex-row gap-6 items-center mb-4" id="${cardId}">
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-3">
                                <span class="status-badge ${ord.merce_pronta ? 'status-ready' : 'status-waiting'}">
                                    ${ord.merce_pronta ? 'Merce Pronta' : 'In Attesa'}
                                </span>
                                <span class="text-[10px] font-mono text-slate-400">#${ord.id.toString().slice(-5)}</span>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="window.location.href='ordini_nuovi.html?edit=${ord.id}'" class="text-[#6b8d53] p-1">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                                <button onclick="eliminaOrdine('${ord.id}', '${cardId}')" class="text-[#b75252] p-1">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                        <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">${nomeCliente.trim() || 'Dati mancanti'}</h3>
                        <p class="text-xs text-slate-500 mt-2 flex items-start gap-2">
                            <span class="font-bold text-slate-700 uppercase text-[10px]">Merce:</span> 
                            ${ord.merce_ordinata ? ord.merce_ordinata : '<span class="italic text-orange-400">Dettaglio non inserito</span>'}
                        </p>
                    </div>

                    <div class="flex-1 w-full flex flex-col gap-3 border-l border-r border-slate-100 px-6">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" ${ord.merce_pronta ? 'checked' : ''} onchange="aggiornaStato('${ord.id}', 'merce_pronta', this.checked)" class="w-5 h-5 accent-blue-600 rounded-lg">
                            <span class="text-[11px] font-bold text-slate-600 uppercase">Merce Pronta</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" ${ord.cliente_avvisato ? 'checked' : ''} onchange="aggiornaStato('${ord.id}', 'cliente_avvisato', this.checked)" class="w-5 h-5 accent-blue-600 rounded-lg">
                            <span class="text-[11px] font-bold text-slate-600 uppercase">Cliente Avvisato</span>
                        </label>
                    </div>

                    <div class="flex-1 w-full text-right flex flex-col items-end justify-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Da incassare</p>
                        <p class="text-2xl font-black text-[#b75252] mb-4">€ ${importo}</p>
                        <button onclick="apriMenuEvasione('${ord.id}', '${cardId}')" class="bg-slate-700 text-white px-6 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-900 shadow-sm">
                            Ritirato / Spedito
                        </button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        window.onload = () => caricaOrdini();
    </script>
</body>
</html>
