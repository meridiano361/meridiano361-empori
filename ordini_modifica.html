<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Ordine Meridiano361 - V2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; position: relative; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em; }
        
        /* Emporio & Buttons */
        .emporio-controls { display: flex; align-items: center; gap: 5px; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2em; padding: 5px; }
        .btn-plus { color: #27ae60; }
        .btn-trash { color: #e74c3c; }
        .wa-btn { color: #25d366; font-size: 1.5em; cursor: pointer; vertical-align: middle; margin-left: 10px; }

        /* Prodotti Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th { background: #3498db; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .sub-input { font-size: 0.85em; margin-top: 5px; width: 90%; }
        .row-error { background-color: #ffebee !important; }
        
        /* Totali */
        .totali-box { background: #ecf0f1; padding: 20px; border-radius: 5px; margin-top: 20px; text-align: right; }
        .total-row { font-size: 1.2em; margin-bottom: 10px; font-weight: bold; }
        .saldo-finale { color: #c0392b; font-size: 1.5em; border-top: 2px solid #bdc3c7; padding-top: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Modifica Ordine Meridiano361</h1>

    <div class="section">
        <h2>Dati Cliente</h2>
        <div class="grid">
            <div class="form-group">
                <label>Nome e Cognome / Ragione Soc.</label>
                <input type="text" id="cliente" value="Esempio Cliente">
            </div>
            <div class="form-group">
                <label>Cellulare 
                    <span class="wa-btn" title="Invia Notifica WhatsApp">✆</span>
                </label>
                <input type="tel" id="cellulare" value="3331234567">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" value="cliente@esempio.it">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Gestione Emporio</h2>
        <div class="grid">
            <div class="form-group">
                <label>Città Emporio</label>
                <div class="emporio-controls">
                    <select id="cittaEmporio" onchange="toggleCremona(this.value)">
                        <option value="Cremona">Cremona</option>
                        <option value="Casalmaggiore">Casalmaggiore</option>
                        <option value="Viadana">Viadana</option>
                    </select>
                    <button class="btn-icon btn-plus">+</button>
                    <button class="btn-icon btn-trash">🗑️</button>
                </div>
            </div>

            <div id="canale-cremona-container" class="form-group">
                <label>Canale (Cremona)</label>
                <select id="canaleCremona">
                    <option value="on-earth.it">on-earth.it</option>
                    <option value="meridiano361.it">meridiano361.it</option>
                    <option value="altro">Altro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Operatore</label>
                <div class="emporio-controls">
                    <select id="operatore">
                        <option value="Marta">Marta</option>
                        <option value="Luca">Luca</option>
                    </select>
                    <button class="btn-icon btn-plus">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Dettaglio Prodotti</h2>
        <table id="prodottiTable">
            <thead>
                <tr>
                    <th>Prodotto</th>
                    <th>Prezzo Un.</th>
                    <th>Quantità</th>
                    <th>Provenienza (Dettaglio)</th>
                    <th>Subtotale</th>
                </tr>
            </thead>
            <tbody>
                <tr id="row-1">
                    <td><strong>Caffè Altromercato 250g</strong></td>
                    <td>€ <span class="prezzo">5.50</span></td>
                    <td><input type="number" value="10" class="qty" onchange="updateRow(1)"></td>
                    <td>
                        <div>
                            <label>Da Empori:</label>
                            <input type="number" class="da-empori sub-input" placeholder="Qta" onchange="checkSum(1)">
                            <select class="sub-input">
                                <option>Scegli Emporio...</option>
                                <option>Cremona</option>
                                <option>Casalmaggiore</option>
                            </select>
                        </div>
                        <div style="margin-top:5px;">
                            <label>Da Altri:</label>
                            <input type="number" class="da-altri sub-input" placeholder="Qta" onchange="checkSum(1)">
                            <input type="text" class="sub-input" placeholder="Specifica provenienza...">
                        </div>
                    </td>
                    <td>€ <span class="subtotale">55.00</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <div class="grid">
            <div class="form-group">
                <label>Note sull'ordine</label>
                <textarea rows="4" placeholder="Inserisci qui eventuali note o indicazioni per la logistica..."></textarea>
            </div>
            <div class="totali-box">
                <div class="total-row">Totale Lordo: € <span id="totaleLordo">55.00</span></div>
                <div class="total-row">
                    Acconto già versato: € 
                    <input type="number" id="acconto" value="0.00" step="0.50" style="width:100px;" onchange="calculateFinal()">
                </div>
                <div class="total-row saldo-finale">DA PAGARE: € <span id="saldoFinale">55.00</span></div>
            </div>
        </div>
    </div>

    <div style="text-align:right;">
        <button style="padding:15px 40px; background:#27ae60; color:white; border:none; border-radius:5px; cursor:pointer; font-size:1.1em;">
            Salva Modifiche
        </button>
    </div>
</div>

<script>
    function toggleCremona(val) {
        const container = document.getElementById('canale-cremona-container');
        if(val === 'Cremona') {
            container.classList.remove('hidden');
        } else {
            container.classList.add('hidden');
        }
    }

    function formatCurrency(input) {
        let val = parseFloat(input.value);
        if(!isNaN(val)) {
            input.value = val.toFixed(2);
        }
    }

    function checkSum(rowId) {
        const row = document.getElementById('row-' + rowId);
        const totalQty = parseInt(row.querySelector('.qty').value);
        const daEmpori = parseInt(row.querySelector('.da-empori').value) || 0;
        const daAltri = parseInt(row.querySelector('.da-altri').value) || 0;

        if((daEmpori + daAltri) > totalQty) {
            row.classList.add('row-error');
        } else {
            row.classList.remove('row-error');
        }
    }

    function updateRow(id) {
        const row = document.getElementById('row-' + id);
        const price = parseFloat(row.querySelector('.prezzo').innerText);
        const qty = parseInt(row.querySelector('.qty').value);
        const subtotal = price * qty;
        row.querySelector('.subtotale').innerText = subtotal.toFixed(2);
        
        calculateTotal();
    }

    function calculateTotal() {
        let lordo = 0;
        document.querySelectorAll('.subtotale').forEach(s => {
            lordo += parseFloat(s.innerText);
        });
        document.getElementById('totaleLordo').innerText = lordo.toFixed(2);
        calculateFinal();
    }

    function calculateFinal() {
        const lordo = parseFloat(document.getElementById('totaleLordo').innerText);
        const acconto = parseFloat(document.getElementById('acconto').value) || 0;
        const finale = lordo - acconto;
        document.getElementById('saldoFinale').innerText = finale.toFixed(2);
    }
</script>

</body>
</html>
