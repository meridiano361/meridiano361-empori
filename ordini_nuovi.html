<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Nuovo Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .bg-parte-green { background-color: rgba(107, 141, 83, 0.15); }
        .bg-ord-red { background-color: rgba(183, 82, 82, 0.15); }
        .bg-m361-antracite { background-color: #334155; }
        
        .section-title {
            color: #475569;
            background-color: rgba(183, 82, 82, 0.15);
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
        }
        
        input:focus, select:focus, textarea:focus { outline: none; border-color: #b75252; box-shadow: 0 0 0 1px #b75252; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .wa-disabled { filter: grayscale(1); opacity: 0.3; }
        .wa-icon { cursor: pointer; transition: all 0.3s ease; }

        @media (max-width: 1024px) {
            .product-row { 
                display: flex; flex-direction: column; gap: 8px; padding: 15px; 
                border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; background: white;
            }
            .product-row td { display: block; width: 100% !important; padding: 0 !important; border: none !important; }
            .product-row td::before {
                content: attr(data-label); display: block; font-size: 10px; font-weight: 700;
                text-transform: uppercase; color: #94a3b8; margin-bottom: 2px;
            }
        }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="ordini.html"><img src="logom361_rosso.jpg" alt="Logo" class="h-8"></a>
            <h1 class="font-bold text-lg border-l pl-4 ml-2 text-slate-700">Nuovo Ordine</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- SELEZIONE INIZIALE -->
        <div id="order-type-selection" class="mb-8 text-center bg-white p-12 rounded-2xl shadow-sm border">
            <div class="flex justify-center gap-6">
                <button onclick="initOrder('standard')" class="px-10 py-5 bg-m361-red text-white hover:opacity-90 rounded-xl font-bold transition-all shadow-lg text-lg uppercase">Ordine Standard</button>
                <button onclick="initOrder('bomboniere')" class="px-10 py-5 bg-m361-red text-white hover:opacity-90 rounded-xl font-bold transition-all shadow-lg text-lg uppercase">Ordine Bomboniere</button>
            </div>
        </div>

        <form id="orderForm" class="hidden">
            <!-- EMPORIO -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                    <span class="section-title text-[10px]">Emporio</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Città *</label>
                        <select id="select-emporio" onchange="handleCittaChange(this)" required class="w-full border rounded-lg p-2.5 text-sm bg-gray-50">
                            <option value="" selected>Seleziona...</option>
                            <option value="Casalmaggiore">Casalmaggiore</option>
                            <option value="Cremona">Cremona</option>
                            <option value="Reggio Emilia">Reggio Emilia</option>
                            <option value="Viadana">Viadana</option>
                            <option value="ADD_NEW">-- Aggiungi --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Operatore *</label>
                        <select id="select-operator" onchange="handleOpChange(this)" required class="w-full border rounded-lg p-2.5 text-sm bg-gray-50">
                            <option value="" selected>Seleziona...</option>
                            <option value="ADD_NEW">-- Aggiungi --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Data *</label>
                        <input type="date" id="order-date" required class="w-full border rounded-lg p-2.5 text-sm">
                    </div>
                </div>
            </div>

            <!-- CLIENTE -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h2 class="text-xs font-bold mb-6 tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                    <span class="section-title text-[10px]">Cliente</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nome *</label><input type="text" required class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cognome *</label><input type="text" required class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cellulare *</label>
                        <div class="flex items-center gap-2">
                            <input type="tel" required class="flex-1 border rounded-lg p-2.5 text-sm">
                            <i id="wa-toggle" onclick="this.classList.toggle('wa-disabled')" class="fab fa-whatsapp wa-icon text-2xl text-green-500" title="Clicca se il cliente non ha WhatsApp"></i>
                        </div>
                    </div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Email</label><input type="email" class="w-full border rounded-lg p-2.5 text-sm"></div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Modalità *</label>
                        <div class="flex gap-4 p-2.5 bg-gray-50 border rounded-lg h-[42px] items-center">
                            <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="radio" name="mod_consegna" value="Ritiro" required class="accent-m361-red"> Ritiro</label>
                            <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="radio" name="mod_consegna" value="Spedizione" class="accent-m361-red"> Spediz.</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PRODOTTI -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold tracking-widest uppercase flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-m361-red rounded-full"></span> 
                        <span id="title-prodotti" class="section-title text-[10px]">Prodotti</span>
                    </h2>
                    <button type="button" onclick="addRow()" class="text-[10px] bg-m361-antracite text-white px-6 py-2.5 rounded-xl font-bold uppercase shadow-md hover:opacity-90 transition-all">
                        + Aggiungi
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[10px] text-gray-400 uppercase tracking-wider border-b">
                                <th class="p-2 font-bold w-32">Codice *</th>
                                <th class="p-2 font-bold min-w-[180px]">Descrizione *</th>
                                <th class="p-2 font-bold w-20">Prezzo</th>
                                <th class="p-2 font-bold w-20">Tot</th>
                                <th class="p-2 font-bold w-16 text-center">Qtà</th>
                                <th class="p-2 font-bold w-16 bg-parte-green text-center">Da Parte</th>
                                <th class="p-2 font-bold w-16 text-center">Da Forn</th>
                                <th class="p-2 font-bold w-48 text-center border-x">Da Empori</th>
                                <th class="p-2 font-bold w-48 text-center">Da Altri</th>
                                <th class="p-2 font-bold w-16 bg-ord-red text-m361-red text-center">Da Ord</th>
                                <th class="p-2 w-8"></th>
                            </tr>
                        </thead>
                        <tbody id="order-rows"></tbody>
                        <tfoot class="border-t-2 border-gray-100">
                            <tr class="bg-gray-50/50">
                                <td colspan="5" class="p-4 text-right font-bold text-xs uppercase text-gray-400 italic">Totale:</td>
                                <td colspan="2" class="p-2">
                                    <div class="flex items-center justify-between bg-white border p-2 rounded-lg">
                                        <span id="grand-total" class="font-bold text-slate-800 w-full text-center text-lg">€ 0.00</span>
                                    </div>
                                </td>
                                <td colspan="2" class="p-2 border-x">
                                    <div class="flex items-center gap-2 bg-white border p-1.5 rounded-lg px-2">
                                        <span class="text-[9px] font-bold text-gray-400 uppercase">Acconto €</span>
                                        <input type="number" id="acconto" oninput="calcFinals()" class="w-24 text-right font-bold text-slate-700 bg-transparent outline-none" placeholder="0">
                                    </div>
                                </td>
                                <td colspan="1" class="p-2">
                                    <div class="flex flex-col bg-m361-red text-white p-2 rounded-lg shadow-sm text-center">
                                        <span class="text-[8px] font-bold uppercase">Da Pagare</span>
                                        <span id="saldo-finale" class="font-bold text-lg">€ 0.00</span>
                                    </div>
                                </td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <!-- NOTE FINALI -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h2 class="text-xs font-bold mb-4 tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-slate-400 rounded-full"></span> 
                    <span class="section-title text-[10px]">Note Ordine</span>
                </h2>
                <textarea id="order-notes" rows="3" class="w-full border rounded-xl p-3 text-sm" placeholder="Inserisci qui eventuali note o istruzioni speciali..."></textarea>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="w-full md:w-80 bg-m361-red text-white font-bold py-5 rounded-xl uppercase text-xs tracking-widest shadow-xl">Salva Ordine</button>
            </div>
        </form>
    </main>

    <script>
        let operatoriDB = {
            "Cremona": ["Emilio Mazzolari", "Chiara Monteverdi", "Giulia Galelli"],
            "Reggio Emilia": ["Marica Pioli", "Manuela Capanni", "Alessia Bartolomei"],
            "Viadana": ["Emilio Mazzolari", "Chiara Monteverdi"],
            "Casalmaggiore": ["Emilio Mazzolari", "Chiara Monteverdi"]
        };

        function initOrder(type) {
            document.getElementById('order-type-selection').classList.add('hidden');
            document.getElementById('orderForm').classList.remove('hidden');
            document.getElementById('title-prodotti').innerText = type === 'bomboniere' ? 'Configurazione Bomboniere' : 'Prodotti';
            addRow(type);
        }

        function handleCittaChange(select) {
            if(select.value === 'ADD_NEW') {
                const nuova = prompt("Inserisci Nome nuova Città:");
                if(nuova) {
                    const opt = new Option(nuova, nuova);
                    select.add(opt, select.options.length - 1);
                    select.value = nuova;
                    operatoriDB[nuova] = [];
                } else select.value = "";
            }
            updateOperators();
        }

        function updateOperators() {
            const val = document.getElementById('select-emporio').value;
            const opSelect = document.getElementById('select-operator');
            opSelect.innerHTML = '<option value="">Seleziona...</option>';
            if(val && val !== 'ADD_NEW') {
                (operatoriDB[val] || []).forEach(op => opSelect.add(new Option(op, op)));
            }
            opSelect.add(new Option("-- Aggiungi Nuovo --", "ADD_NEW"));
        }

        function handleOpChange(select) {
            if(select.value === 'ADD_NEW') {
                const emporio = document.getElementById('select-emporio').value;
                const nuovo = prompt("Inserisci Nome e Cognome:");
                if(nuovo) {
                    const opt = new Option(nuovo, nuovo);
                    select.add(opt, select.options.length - 1);
                    select.value = nuovo;
                    if(emporio) operatoriDB[emporio].push(nuovo);
                } else select.value = "";
            }
        }

        function addRow(type) {
            const tbody = document.getElementById('order-rows');
            const id = Date.now();
            const row = document.createElement('tr');
            row.className = "product-row border-b hover:bg-gray-50/50 transition-all text-xs";
            row.id = `row-${id}`;

            let descField = type === 'bomboniere' 
                ? `<textarea required class="w-full border rounded p-1.5 h-16" placeholder="Composizione..."></textarea>`
                : `<input type="text" required class="w-full border rounded p-2">`;

            row.innerHTML = `
                <td class="p-2"><input type="text" required id="cod-${id}" class="w-full border rounded p-2 font-mono uppercase"></td>
                <td class="p-2">${descField}</td>
                <td class="p-2"><input type="number" step="0.01" id="pr-u-${id}" oninput="calc(${id})" class="w-full border rounded p-2 text-right" placeholder="0"></td>
                <td class="p-2 font-bold text-slate-600">€ <span id="tot-riga-${id}">0.00</span></td>
                <td class="p-2"><input type="number" id="qty-${id}" oninput="calc(${id})" class="w-full border rounded p-2 font-bold text-center" placeholder="0"></td>
                <td class="p-2 bg-parte-green"><input type="number" id="parte-${id}" oninput="calc(${id})" class="w-full border rounded p-2 text-center bg-transparent" placeholder="0"></td>
                <td class="p-2"><input type="number" id="forn-${id}" oninput="calc(${id})" class="w-full border rounded p-2 text-center" placeholder="0"></td>
                
                <!-- DA EMPORI -->
                <td class="p-2 border-x bg-gray-50/30">
                    <div class="flex gap-1">
                        <input type="number" id="emp-q-${id}" oninput="calc(${id})" class="w-12 border rounded p-1 text-center" placeholder="0">
                        <select id="emp-loc-${id}" class="flex-1 border rounded p-1 text-[9px]">
                            <option value="">Dove?</option>
                            <option value="CR">Cremona</option>
                            <option value="CS">Casalmaggiore</option>
                            <option value="VD">Viadana</option>
                            <option value="RE">Reggio E.</option>
                        </select>
                    </div>
                </td>

                <!-- DA ALTRI -->
                <td class="p-2 bg-gray-50/30">
                    <div class="flex gap-1">
                        <input type="number" id="alt-q-${id}" oninput="calc(${id})" class="w-12 border rounded p-1 text-center" placeholder="0">
                        <input type="text" class="flex-1 border rounded p-1 text-[9px]" placeholder="specifica">
                    </div>
                </td>

                <td class="p-2 bg-ord-red font-bold text-m361-red text-center text-lg" id="do-${id}">0</td>
                <td class="p-2 text-center"><button type="button" onclick="this.closest('tr').remove(); calcFinals()" class="text-gray-300 hover:text-red-500">✕</button></td>
            `;
            tbody.appendChild(row);
        }

        function calc(id) {
            const qty = +document.getElementById(`qty-${id}`).value || 0;
            const pru = +document.getElementById(`pr-u-${id}`).value || 0;
            const p = +document.getElementById(`parte-${id}`).value || 0;
            const f = +document.getElementById(`forn-${id}`).value || 0;
            const eq = +document.getElementById(`emp-q-${id}`).value || 0;
            const aq = +document.getElementById(`alt-q-${id}`).value || 0;
            
            document.getElementById(`tot-riga-${id}`).innerText = (qty * pru).toFixed(2);
            const daOrd = qty - (p + f + eq + aq);
            document.getElementById(`do-${id}`).innerText = daOrd > 0 ? daOrd : 0;
            calcFinals();
        }

        function calcFinals() {
            let total = 0;
            document.querySelectorAll('[id^="tot-riga-"]').forEach(el => total += parseFloat(el.innerText) || 0);
            const acc = +document.getElementById('acconto').value || 0;
            document.getElementById('grand-total').innerText = `€ ${total.toFixed(2)}`;
            document.getElementById('saldo-finale').innerText = `€ ${(total - acc).toFixed(2)}`;
        }

        window.onload = () => { document.getElementById('order-date').valueAsDate = new Date(); };
        
        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Ordine Salvato!");
            window.location.href = "ordini_incorso.html";
        };
    </script>
</body>
</html>
