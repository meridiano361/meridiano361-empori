  <style>
    body { font-family:"Nunito",sans-serif; background:#f0f2f5; margin:0; padding-bottom:90px; }
    * { box-sizing:border-box; }

    /* ── Sticky header ── */
    .cc-top { position:sticky; top:0; z-index:200; background:#fff; border-bottom:1.5px solid #e2e8f0; }
    .cc-page-title { display:flex; align-items:center; gap:10px; padding:14px 18px 10px; }
    .cc-page-title h1 { font-size:18px; font-weight:900; color:#1e293b; margin:0; }
    .cc-back { background:none; border:none; cursor:pointer; color:#94a3b8; font-size:18px; padding:0; display:flex; align-items:center; }
    .cc-back:hover { color:#B5453A; }

    /* Year tabs */
    .year-tabs { display:flex; gap:4px; padding:0 18px 10px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .year-tabs::-webkit-scrollbar { display:none; }
    .year-tab { flex-shrink:0; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:800; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; transition:all .15s; white-space:nowrap; }
    .year-tab.active { background:#B5453A; color:#fff; border-color:#B5453A; }

    /* Settore filter */
    .cc-filters { padding:8px 18px 10px; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .cc-filters::-webkit-scrollbar { display:none; }
    .filt-chip { flex-shrink:0; padding:5px 13px; border-radius:20px; font-size:12px; font-weight:800; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; transition:all .15s; }
    .filt-chip.active { border-color:transparent; color:#fff; }

    /* Stats bar */
    .cc-stats { display:flex; gap:14px; padding:8px 18px 12px; border-top:1.5px solid #f1f5f9; overflow-x:auto; }
    .cc-stat { flex-shrink:0; text-align:center; }
    .cc-stat-num { font-size:18px; font-weight:900; color:#1e293b; }
    .cc-stat-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#94a3b8; white-space:nowrap; }

    /* Timeline Gantt strip */
    .cc-gantt-wrap { background:#fff; border-bottom:1.5px solid #e2e8f0; padding:10px 0 8px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .cc-gantt { position:relative; height:80px; min-width:600px; margin:0 14px; }
    .gantt-months { display:grid; grid-template-columns:repeat(12,1fr); height:16px; margin-bottom:4px; }
    .gantt-month { font-size:9px; font-weight:800; text-transform:uppercase; color:#94a3b8; letter-spacing:.04em; text-align:center; }
    .gantt-grid { position:relative; height:60px; background:repeating-linear-gradient(90deg,#f8fafc 0px,#f8fafc calc(100%/12 - 1px),#e2e8f0 calc(100%/12 - 1px),#e2e8f0 calc(100%/12)); border-radius:6px; overflow:hidden; }
    .gantt-bar { position:absolute; height:10px; border-radius:3px; opacity:.85; top:0; }

    /* Content */
    .cc-content { padding:14px 0 0; }
    .month-section { margin-bottom:4px; }
    .month-header { padding:10px 18px 6px; display:flex; align-items:center; gap:8px; }
    .month-name { font-size:13px; font-weight:900; color:#1e293b; text-transform:uppercase; letter-spacing:.06em; }
    .month-count { font-size:11px; font-weight:700; color:#94a3b8; background:#f1f5f9; padding:2px 8px; border-radius:10px; }

    /* Event card */
    .ev-card { background:#fff; margin:0 14px 8px; border-radius:14px; border:1.5px solid #e2e8f0; overflow:hidden; cursor:pointer; transition:box-shadow .15s; }
    .ev-card:hover { box-shadow:0 2px 12px rgba(0,0,0,.08); }
    .ev-card-top { display:flex; align-items:flex-start; gap:12px; padding:13px 14px; }
    .ev-stripe { width:4px; border-radius:2px; flex-shrink:0; align-self:stretch; min-height:36px; }
    .ev-body { flex:1; min-width:0; }
    .ev-nome { font-size:14px; font-weight:900; color:#1e293b; margin-bottom:4px; }
    .ev-meta { display:flex; align-items:center; flex-wrap:wrap; gap:5px; }
    .ev-badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:800; }
    .ev-dates { font-size:11px; color:#94a3b8; font-weight:600; display:flex; align-items:center; gap:4px; }
    .ev-pdv-row { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; }
    .ev-pdv { font-size:10px; font-weight:800; padding:2px 7px; border-radius:8px; }
    .ev-pdv.si { background:#dcfce7; color:#16a34a; }
    .ev-pdv.no { background:#f1f5f9; color:#94a3b8; }
    .ev-chevron { color:#94a3b8; font-size:12px; flex-shrink:0; transition:transform .2s; margin-top:2px; }
    .ev-card.open .ev-chevron { transform:rotate(180deg); }

    /* Event detail */
    .ev-detail { display:none; border-top:1.5px solid #f1f5f9; padding:12px 14px 14px; }
    .ev-card.open .ev-detail { display:block; }
    .ev-detail-section { margin-bottom:12px; }
    .ev-detail-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:#94a3b8; margin-bottom:5px; }
    .ev-meccanica { font-size:13px; font-weight:600; color:#475569; line-height:1.5; background:#f8fafc; border-radius:8px; padding:10px 12px; }
    .ev-table { width:100%; border-collapse:collapse; font-size:12px; }
    .ev-table th { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:#94a3b8; padding:5px 8px; text-align:left; border-bottom:1.5px solid #f1f5f9; }
    .ev-table td { padding:7px 8px; border-bottom:1px solid #f8fafc; color:#1e293b; font-weight:600; vertical-align:top; }
    .ev-table tr:last-child td { border-bottom:none; }
    .ev-adesi { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:800; padding:2px 7px; border-radius:8px; }
    .ev-adesi.si { background:#dcfce7; color:#16a34a; }
    .ev-adesi.no { background:#fef2f2; color:#dc2626; }
    .ev-note { font-size:12px; color:#64748b; font-style:italic; background:#fffbeb; border-radius:8px; padding:9px 12px; border-left:3px solid #d97706; }

    /* No events */
    .cc-empty { text-align:center; padding:40px 20px; color:#94a3b8; font-size:14px; font-weight:600; }

    /* Spinner */
    .spinner { width:24px; height:24px; border:3px solid #e2e8f0; border-top-color:#B5453A; border-radius:50%; animation:spin .8s linear infinite; margin:32px auto; display:block; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>

12-31","data_fine":"2023-01-01","pdv":[{"nome":"CR","aderisce":false,"risultati":{"2026":null,"2025":null,"2024":null,"2023":null,"2022":null}},{"nome":"CA","aderisce":false,"risultati":{"2026":null,"2025":null,"2024":null,"2023":null,"2022":null}},{"nome":"VI","aderisce":false,"risultati":{"2026":null,"2025":null,"2024":null,"2023":null,"2022":null}},{"nome":"WEB","aderisce":true,"risultati":{"2026":null,"2025":null,"2024":null,"2023":null,"2022":null}}],"considerazioni":null}]};

const SETTORI = {
  A: { label:'Alimentari', color:'#16a34a', bg:'#dcfce7' },
  N: { label:'Cosmetica',  color:'#9333ea', bg:'#fdf4ff' },
  M: { label:'Moda',       color:'#2563eb', bg:'#eff6ff' },
  C: { label:'Casa',       color:'#d97706', bg:'#fffbeb' },
  G: { label:'Generale',   color:'#B5453A', bg:'#fdf1f0' },
};

const TIPO_COLORS = {
  Promo:        { color:'#059669', bg:'#ecfdf5' },
  Focus:        { color:'#2563eb', bg:'#eff6ff' },
  Prenotazione: { color:'#d97706', bg:'#fffbeb' },
  Saldi:        { color:'#dc2626', bg:'#fef2f2' },
  Flash:        { color:'#7c3aed', bg:'#f5f3ff' },
};

const PDV_LABEL = { CR:'Cremona', CA:'Caravaggio', VI:'Vigevano', WEB:'Web' };
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
              'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let currentYear = '2026';
let filterSettore = null;

function init() {
  const u = JSON.parse(localStorage.getItem('m361_user') || 'null');
  if (!u) { window.location.href = '/login.html'; return; }
  buildYearTabs();
  buildSettoreFilters();
  render();
}

function buildYearTabs() {
  const container = document.getElementById('year-tabs');
  ['2026','2025','2024','2023'].forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (y === currentYear ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => { currentYear = y; filterSettore = null; buildYearTabs(); buildSettoreFilters(); render(); };
    container.appendChild(btn);
  });
}

function buildSettoreFilters() {
  const container = document.getElementById('settore-filters');
  container.innerHTML = '';
  const tuttiBtn = document.createElement('button');
  tuttiBtn.className = 'filt-chip' + (!filterSettore ? ' active' : '');
  tuttiBtn.textContent = 'Tutti';
  if (!filterSettore) { tuttiBtn.style.background='#1e293b'; tuttiBtn.style.color='#fff'; tuttiBtn.style.borderColor='#1e293b'; }
  tuttiBtn.onclick = () => { filterSettore = null; buildSettoreFilters(); render(); };
  container.appendChild(tuttiBtn);

  Object.entries(SETTORI).forEach(([k, s]) => {
    const btn = document.createElement('button');
    btn.className = 'filt-chip' + (filterSettore === k ? ' active' : '');
    btn.textContent = s.label;
    if (filterSettore === k) { btn.style.background=s.color; btn.style.borderColor=s.color; }
    btn.onclick = () => { filterSettore = k; buildSettoreFilters(); render(); };
    container.appendChild(btn);
  });
}

function getEventi() {
  const evs = EVENTI[currentYear] || [];
  return filterSettore ? evs.filter(e => e.settore === filterSettore) : evs;
}

function render() {
  const evs = getEventi();

  // Stats
  const statsEl = document.getElementById('cc-stats');
  const tipoCounts = {};
  evs.forEach(e => { const t = e.tipologia || '—'; tipoCounts[t] = (tipoCounts[t]||0)+1; });
  statsEl.innerHTML = `
    <div class="cc-stat"><div class="cc-stat-num">${evs.length}</div><div class="cc-stat-lbl">Totale</div></div>
    ${Object.entries(tipoCounts).sort((a,b)=>b[1]-a[1]).map(([t,n]) => {
      const tc = TIPO_COLORS[t] || {color:'#64748b',bg:'#f1f5f9'};
      return `<div class="cc-stat"><div class="cc-stat-num" style="color:${tc.color}">${n}</div><div class="cc-stat-lbl">${t}</div></div>`;
    }).join('')}
  `;

  renderGantt(evs);
  renderLista(evs);
}

function renderGantt(evs) {
  const mesiShort = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const yr = parseInt(currentYear);
  const yearStart = new Date(yr, 0, 1).getTime();
  const yearEnd   = new Date(yr, 11, 31).getTime();
  const yearDays  = (yearEnd - yearStart) / 86400000 + 1;

  document.getElementById('gantt-months').innerHTML = mesiShort.map(m =>
    `<div class="gantt-month">${m}</div>`).join('');

  const LANES = 5;
  const laneH = 10;
  const laneGap = 2;
  const totalH = LANES * (laneH + laneGap);
  const grid = document.getElementById('gantt-grid');
  grid.style.height = totalH + 'px';
  grid.innerHTML = '';

  const lanes = Array(LANES).fill(0);

  evs.forEach(ev => {
    if (!ev.data_inizio) return;
    const s = SETTORI[ev.settore] || {color:'#94a3b8',bg:'#f1f5f9'};
    const di = new Date(ev.data_inizio).getTime();
    const df = ev.data_fine ? new Date(ev.data_fine).getTime() : di + 86400000*14;
    if (df < yearStart || di > yearEnd) return;

    const left = Math.max(0, (di - yearStart) / (yearEnd - yearStart + 86400000)) * 100;
    const right = Math.min(100, (df - yearStart + 86400000) / (yearEnd - yearStart + 86400000)) * 100;
    const width = Math.max(right - left, 0.8);

    let lane = 0;
    for (let i = 0; i < LANES; i++) {
      if (lanes[i] <= left) { lane = i; break; }
      if (i === LANES-1) lane = i;
    }
    lanes[lane] = left + width;

    const bar = document.createElement('div');
    bar.className = 'gantt-bar';
    bar.title = ev.nome;
    bar.style.cssText = `left:${left}%;width:${width}%;background:${s.color};top:${lane*(laneH+laneGap)}px;height:${laneH}px;`;
    grid.appendChild(bar);
  });
}

function renderLista(evs) {
  const content = document.getElementById('cc-content');
  if (!evs.length) {
    content.innerHTML = '<div class="cc-empty"><i class="fas fa-calendar-xmark" style="font-size:32px;display:block;margin-bottom:8px"></i>Nessun evento trovato</div>';
    return;
  }

  // Group by month of data_inizio (events without date go to month 0 = "Da definire")
  const byMonth = {};
  evs.forEach(ev => {
    if (ev.data_inizio) {
      const d = new Date(ev.data_inizio);
      const m = d.getMonth(); // 0-11
      if (!byMonth[m]) byMonth[m] = [];
      byMonth[m].push(ev);
    } else {
      if (!byMonth[99]) byMonth[99] = [];
      byMonth[99].push(ev);
    }
  });

  const months = Object.keys(byMonth).map(Number).sort((a,b)=>a-b);
  content.innerHTML = months.map(m => {
    const label = m === 99 ? 'Data da definire' : MESI[m];
    const items = byMonth[m];
    return `<div class="month-section">
      <div class="month-header">
        <span class="month-name">${label}</span>
        <span class="month-count">${items.length}</span>
      </div>
      ${items.map(ev => renderCard(ev)).join('')}
    </div>`;
  }).join('');
}

function renderCard(ev) {
  const s = SETTORI[ev.settore] || {color:'#94a3b8',bg:'#f1f5f9',label:'—'};
  const tc = TIPO_COLORS[ev.tipologia] || null;
  const di = ev.data_inizio ? fmtDate(ev.data_inizio) : null;
  const df = ev.data_fine   ? fmtDate(ev.data_fine)   : null;
  const dateStr = di ? (df && df !== di ? `${di} → ${df}` : di) : '';

  const pdvHtml = (ev.pdv||[]).map(p => {
    const lbl = PDV_LABEL[p.nome] || p.nome;
    return `<span class="ev-pdv ${p.aderisce?'si':'no'}">${lbl}</span>`;
  }).join('');

  const detailHtml = buildDetail(ev, s, tc);

  return `<div class="ev-card" onclick="toggleCard(this)">
    <div class="ev-card-top">
      <div class="ev-stripe" style="background:${s.color}"></div>
      <div class="ev-body">
        <div class="ev-nome">${esc(ev.nome)}</div>
        <div class="ev-meta">
          <span class="ev-badge" style="background:${s.bg};color:${s.color}">${s.label}</span>
          ${tc ? `<span class="ev-badge" style="background:${tc.bg};color:${tc.color}">${ev.tipologia}</span>` : ''}
          ${dateStr ? `<span class="ev-dates"><i class="fas fa-calendar-day" style="font-size:9px"></i>${dateStr}</span>` : ''}
        </div>
        <div class="ev-pdv-row">${pdvHtml}</div>
      </div>
      <i class="fas fa-chevron-down ev-chevron"></i>
    </div>
    <div class="ev-detail">${detailHtml}</div>
  </div>`;
}

function buildDetail(ev, s, tc) {
  let html = '';

  if (ev.meccanica) {
    html += `<div class="ev-detail-section">
      <div class="ev-detail-label"><i class="fas fa-cogs" style="margin-right:4px"></i>Meccanica</div>
      <div class="ev-meccanica">${esc(ev.meccanica)}</div>
    </div>`;
  }

  if (ev.pdv && ev.pdv.length) {
    const years = ['2026','2025','2024','2023','2022'].filter(y => ev.pdv.some(p => p.risultati && p.risultati[y]));
    html += `<div class="ev-detail-section">
      <div class="ev-detail-label"><i class="fas fa-store" style="margin-right:4px"></i>Punti vendita</div>
      <table class="ev-table">
        <thead><tr>
          <th>PDV</th><th>Adesione</th>
          ${years.map(y=>`<th>${y}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${ev.pdv.map(p => `<tr>
            <td><strong>${PDV_LABEL[p.nome]||p.nome}</strong></td>
            <td><span class="ev-adesi ${p.aderisce?'si':'no'}">${p.aderisce?'✓ Sì':'✗ No'}</span></td>
            ${years.map(y => `<td style="color:#64748b;font-size:11px">${p.risultati&&p.risultati[y]?esc(p.risultati[y]):'—'}</td>`).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  if (ev.considerazioni) {
    html += `<div class="ev-detail-section">
      <div class="ev-detail-label"><i class="fas fa-lightbulb" style="margin-right:4px"></i>Considerazioni</div>
      <div class="ev-note">${esc(ev.considerazioni)}</div>
    </div>`;
  }

  return html || '<div style="font-size:13px;color:#94a3b8;font-weight:600">Nessun dettaglio disponibile</div>';
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${parseInt(d)} ${MESI[parseInt(m)-1].slice(0,3)} ${y}`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
