<!-- HEADER E SELEZIONE: lascia invariato il tuo blocco sopra -->

<!-- dentro #screen-day, usa UNA sola sezione operatore -->
<section class="card p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="small-label block mb-2">Operatore</label>
            <select id="chiuso-da" class="select-input"></select>
        </div>
        <div>
            <label class="small-label block mb-2">Note del giorno</label>
            <textarea id="nota-giornata" class="note-input" rows="3" placeholder="Segnalazioni importanti del negozio..."></textarea>
        </div>
    </div>

    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="small-label block mb-2">Nota mattino</label>
            <textarea id="nota-mattino" class="note-input" rows="2" placeholder="Note su pagamenti, anomalie, rimborsi..."></textarea>
        </div>
        <div>
            <label class="small-label block mb-2">Nota pomeriggio</label>
            <textarea id="nota-pomeriggio" class="note-input" rows="2" placeholder="Note su pagamenti, anomalie, rimborsi..."></textarea>
        </div>
    </div>
</section>

<section class="card p-6">
    <h2 class="section-title mb-4 flex items-center gap-2">
        <span class="w-1 h-4 bg-m361-red rounded-full"></span> Riepilogo IVA giornaliera
    </h2>

    <div class="overflow-x-auto">
        <table class="w-full iva-table border-collapse">
            <thead>
                <tr>
                    <th class="text-left">Voce</th>
                    <th>Totale</th>
                    <th>22%</th>
                    <th>10%</th>
                    <th>4%</th>
                    <th>Esente</th>
                    <th>Net es</th>
                    <th>Somma</th>
                    <th>Ver</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="font-semibold">IVA del giorno</td>
                    <td><input id="iva-totale" class="input-mini" value="€ 0,00"></td>
                    <td><input id="iva-22" class="input-mini" value="€ 0,00"></td>
                    <td><input id="iva-10" class="input-mini" value="€ 0,00"></td>
                    <td><input id="iva-4" class="input-mini" value="€ 0,00"></td>
                    <td><input id="iva-esente" class="input-mini" value="€ 0,00"></td>
                    <td><input id="iva-net-es" class="input-mini" value="€ 0,00"></td>
                    <td><input id="iva-somma" class="input-mini" value="€ 0,00"></td>
                    <td class="text-center font-bold text-emerald-600">OK</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
