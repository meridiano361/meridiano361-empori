<script>
const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SUPABASE_KEY = 'LA_TUA_KEY';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TAGLI = [50,20,10,5,2,1,0.5,0.2,0.1,0.05,0.02,0.01];

const MESI = [
    'Gennaio','Febbraio','Marzo','Aprile',
    'Maggio','Giugno','Luglio','Agosto',
    'Settembre','Ottobre','Novembre','Dicembre'
];

const PAGAMENTI = [
    { id:'bancomat',         label:'Bancomat',         sign: 1, spese:false },
    { id:'carte',            label:'Carte',            sign: 1, spese:false },
    { id:'satispay',         label:'Satispay',         sign: 1, spese:false },
    { id:'satispay_online',  label:'Satispay online',  sign: 1, spese:false },
    { id:'carte_online',     label:'Carte online',     sign: 1, spese:false },
    { id:'paypal',           label:'Paypal',           sign: 1, spese:false },
    { id:'bonifico',         label:'Bonifico',         sign: 1, spese:false },
    { id:'gift_card',        label:'Gift card',        sign: 1, spese:false },
    { id:'gift_card_online', label:'Gift card online', sign: 1, spese:false },
    { id:'buoni',            label:'Buoni',            sign: 1, spese:false },
    { id:'rimborsi_online',  label:'Rimborsi online',  sign:-1, spese:false },
    { id:'spese',            label:'Spese',            sign: 1, spese:true  }
];

let currentKey = '';
let fondoCassa = 0;
let selectedEmporio = '';

/* =========================================================
   UTILITÀ
========================================================= */

function euro(n) {
    return '€ ' + Number(n || 0).toLocaleString(
        'it-IT',
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );
}

function parseEuro(v) {

    if (v === null || v === undefined) return 0;

    return Number(
        String(v)
            .replace(/€/g,'')
            .replace(/\s/g,'')
            .replace(/\./g,'')
            .replace(',','.')
            .trim()
    ) || 0;
}

function formatMoney(el) {
    el.value = euro(parseEuro(el.value));
}

function clearMoney(el) {
    if (parseEuro(el.value) === 0) {
        el.value = '';
    }
}

function formatMiniMoney(el) {
    el.value = euro(parseEuro(el.value));
}

function clearMiniMoney(el) {
    if (parseEuro(el.value) === 0) {
        el.value = '';
    }
}

function noteId(turno,id) {
    return `${turno}_note_${id}`;
}

/* =========================================================
   METEO
========================================================= */

const WEATHER_ICON = {
    'sereno':'fa-sun',
    'prevalentemente sereno':'fa-cloud-sun',
    'parzialmente nuvoloso':'fa-cloud-sun',
    'coperto':'fa-cloud',
    'nebbia':'fa-smog',
    'pioggia':'fa-cloud-rain',

    /* FIX:
       fa-cloud-drizzle NON ESISTE in FontAwesome 6
    */
    'pioviggine':'fa-cloud-rain',

    'temporale':'fa-bolt',
    'neve':'fa-snowflake',
    'grandine':'fa-cloud-meatball',
    'variabile':'fa-cloud-sun'
};

function syncWeatherIcon() {

    const label = document.getElementById('meteo-label').value;

    document.getElementById('meteo-icona').innerHTML =
        `<i class="fas ${WEATHER_ICON[label] || 'fa-cloud-sun'}"></i>`;
}

function weatherCodeToLabel(code) {

    const m = {
        0:'sereno',
        1:'prevalentemente sereno',
        2:'parzialmente nuvoloso',
        3:'coperto',
        45:'nebbia',
        48:'nebbia',
        51:'pioviggine',
        53:'pioviggine',
        61:'pioggia',
        63:'pioggia',
        71:'neve',
        75:'neve',
        86:'grandine',
        95:'temporale'
    };

    return m[code] || 'variabile';
}

async function autoWeather(emp) {

    const current = document.getElementById('meteo-label').value;

    /* FIX:
       se già presente da DB NON sovrascrivere
    */
    if (current && current !== 'sereno') {
        syncWeatherIcon();
        return;
    }

    const CITY_COORDS = {
        'Cremona':       { lat:45.1333, lon:10.0227 },
        'Casalmaggiore': { lat:44.9916, lon:10.4217 },
        'Reggio Emilia': { lat:44.6979, lon:10.6297 },
        'Viadana':       { lat:44.9269, lon:10.5227 }
    };

    const c = CITY_COORDS[emp];

    if (!c) return;

    try {

        const r = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=weather_code&timezone=Europe%2FRome`
        );

        const j = await r.json();

        document.getElementById('meteo-label').value =
            weatherCodeToLabel(j.current.weather_code);

        syncWeatherIcon();

    } catch(e) {

        console.error(e);

    }
}

/* =========================================================
   BUILD PAGAMENTI
========================================================= */

function buildPayments(turno) {

    const wrap = document.getElementById(turno+'-payments');

    wrap.innerHTML = '';

    PAGAMENTI.forEach(function(p){

        const rowWrap = document.createElement('div');

        rowWrap.className =
            (p.spese ? 'spese-row px-2 py-1 rounded-xl ' : '');

        const row = document.createElement('div');

        row.className =
            'grid grid-cols-[1fr_130px_36px] gap-2 items-center py-1';

        /* FIX GROSSO:
           onclick aveva apici rotti
        */

        row.innerHTML = `
            <div class="pay-label truncate">${p.label}</div>

            <input
                id="${turno}_pay_${p.id}"
                type="text"
                value=""
                oninput="calcAll()"
                onblur="formatMoney(this)"
                onfocus="clearMoney(this)"
                class="money-input text-right h-11 px-3 text-sm"
                placeholder="€ 0,00"
            >

            <button
                type="button"
                id="${turno}_notebtn_${p.id}"
                onclick="toggleNote('${turno}','${p.id}','${p.label}')"
                class="h-9 w-9 rounded-xl border border-slate-200 bg-white text-slate-400 hover:text-[#b75252] hover:border-[#b75252] transition-all flex items-center justify-center"
            >
                <i class="fas fa-sticky-note text-sm"></i>
            </button>
        `;

        rowWrap.appendChild(row);

        wrap.appendChild(rowWrap);
    });
}

/* =========================================================
   CALCOLI
========================================================= */

function calcPayments(turno,lordi) {

    let total = lordi - fondoCassa;

    PAGAMENTI.forEach(function(p){

        const raw = parseEuro(
            document.getElementById(`${turno}_pay_${p.id}`)?.value
        );

        if (p.sign < 0) {
            total -= Math.abs(raw);
        } else {
            total += raw;
        }
    });

    return total;
}

function calcAll() {

    ['mat','pom'].forEach(function(turno){

        let lordi = 0;

        TAGLI.forEach(function(t){

            const id = `${turno}_coin_${String(t).replace('.','_')}`;

            const qty = Number(
                document.getElementById(id)?.value || 0
            );

            const tot = qty * t;

            lordi += tot;

            document.getElementById(id+'_tot').textContent = euro(tot);
        });

        const incassato = calcPayments(turno,lordi);

        document.getElementById(turno+'-lordi').textContent =
            euro(lordi);

        document.getElementById(turno+'-incassato').textContent =
            euro(incassato);

        const cor = parseEuro(
            document.getElementById(turno+'-corrispettivi').value
        );

        const diff = incassato - cor;

        const diffEl = document.getElementById(turno+'-diff');

        diffEl.textContent = euro(diff);

        diffEl.className =
            'row-total ' +
            (Math.abs(diff) < 0.01
                ? 'text-emerald-600'
                : 'text-red-600');
    });

    const cv = parseEuro(
        document.getElementById('cassaforte').value
    );

    const pl = parseEuro(
        document.getElementById('pom-lordi').textContent
    );

    /* FIX:
       evita negativo
    */

    const residuo = Math.max(0, pl - cv);

    document.getElementById('fondo-residuo').textContent =
        euro(residuo);

    calcIva();
}

/* =========================================================
   IVA
========================================================= */

function calcIva() {

    const v22 = parseEuro(document.getElementById('iva-22').value);
    const v10 = parseEuro(document.getElementById('iva-10').value);
    const v4  = parseEuro(document.getElementById('iva-4').value);
    const ves = parseEuro(document.getElementById('iva-esente').value);

    const somma = v22 + v10 + v4 + ves;
    const net   = v22 + v10 + v4;

    document.getElementById('iva-somma').value = euro(somma);
    document.getElementById('iva-net-es').value = euro(net);

    const pomCorr = parseEuro(
        document.getElementById('pom-corrispettivi').value
    );

    /* FIX:
       tolleranza migliore
    */

    const valid = Math.abs(somma - pomCorr) <= 0.009;

    const ver = document.getElementById('iva-ver-cell');

    ver.textContent = valid ? '✓ OK' : '✗ ERR';

    ver.className =
        'text-center font-black text-lg ' +
        (valid ? 'text-emerald-600' : 'text-red-600');

    document.getElementById('iva-error').style.display =
        valid ? 'none' : 'block';
}

/* =========================================================
   FILL FORM
========================================================= */

function fillForm(data) {

    TAGLI.forEach(function(t){

        const k = String(t).replace('.','_');

        const em = document.getElementById('mat_coin_'+k);
        const ep = document.getElementById('pom_coin_'+k);

        if (em) em.value = data['mat_coin_'+k] ?? '';
        if (ep) ep.value = data['pom_coin_'+k] ?? '';
    });

    PAGAMENTI.forEach(function(p){

        const em = document.getElementById('mat_pay_'+p.id);
        const ep = document.getElementById('pom_pay_'+p.id);

        if (em) em.value = euro(data['mat_pay_'+p.id] || 0);
        if (ep) ep.value = euro(data['pom_pay_'+p.id] || 0);

        /* FIX:
           crea nota se esiste
        */

        const matNote = data['mat_note_'+p.id];
        const pomNote = data['pom_note_'+p.id];

        if (matNote) {
            toggleNote('mat',p.id,p.label);
            document.getElementById(noteId('mat',p.id)).value = matNote;
        }

        if (pomNote) {
            toggleNote('pom',p.id,p.label);
            document.getElementById(noteId('pom',p.id)).value = pomNote;
        }
    });

    document.getElementById('mat-corrispettivi').value =
        euro(data.mat_corrispettivi || 0);

    document.getElementById('pom-corrispettivi').value =
        euro(data.pom_corrispettivi || 0);

    document.getElementById('cassaforte').value =
        euro(data.cassaforte || 0);

    document.getElementById('nota-mattino').value =
        data.note_mattino || '';

    document.getElementById('nota-pomeriggio').value =
        data.note_pomeriggio || '';

    document.getElementById('meteo-label').value =
        data.meteo || 'variabile';

    document.getElementById('arrivo-merci').checked =
        !!data.arrivo_merci;

    syncWeatherIcon();

    calcAll();
}
</script>
