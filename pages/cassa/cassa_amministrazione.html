<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Amministrazione Cassa</title>
    
    <link rel="stylesheet" href="nav-style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Stili specifici per la tabella amministrativa */
        .input-money {
            width: 100%;
            max-width: 120px;
            border: 1px solid var(--slate-200);
            border-radius: 8px;
            padding: 8px;
            font-family: var(--font-mono);
            text-align: right;
            font-size: 14px;
            background: var(--slate-50);
        }
        .input-money:focus {
            outline: none;
            border-color: var(--red);
            background: #fff;
        }
        .recap-table {
            width: 100%;
            border-collapse: collapse;
        }
        .recap-table th {
            text-align: left;
            padding: 12px;
            background: var(--slate-50);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--slate-500);
            border-bottom: 1px solid var(--slate-200);
        }
        .recap-table td {
            padding: 12px;
            border-bottom: 1px solid var(--slate-100);
            vertical-align: middle;
        }
        .diff-badge {
            font-family: var(--font-mono);
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .diff-neg { color: var(--rose); background: #fff1f2; }
        .diff-pos { color: var(--emerald); background: #ecfdf5; }
        .text-right { text-align: right; }
    </style>
</head>
<body>

    <header style="position: fixed; top: 0; width: 100%; height: 56px; background: #fff; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; padding: 0 20px; z-index: 100;">
        <div class="sec-title" style="margin-bottom: 0;">Amministrazione Cassa</div>
    </header>

    <main class="page-main space-y">
        
        <div class="grid-auto">
            <div class="card card-pad">
                <span class="field-label">Totale Sistema (Z)</span>
                <div id="display-tot-sys" class="font-mono fw-800 text-dark" style="font-size: 24px;">€ 0,00</div>
            </div>
            <div class="card card-pad">
                <span class="field-label">Totale Reale (Contanti+POS)</span>
                <div id="display-tot-real" class="font-mono fw-800 text-red" style="font-size: 24px;">€ 0,00</div>
            </div>
            <div class="card card-pad">
                <span class="field-label">Differenza Totale</span>
                <div id="display-tot-diff" class="font-mono fw-800" style="font-size: 24px;">€ 0,00</div>
            </div>
        </div>

        <div class="card" style="overflow: hidden;">
            <div class="card-pad">
                <div class="group-label">Confronto Chiusura</div>
            </div>
            <div style="overflow-x: auto;">
                <table class="recap-table">
                    <thead>
                        <tr>
                            <th>Metodo</th>
                            <th class="text-right">Sistema (Z)</th>
                            <th class="text-right">Reale (Effettivo)</th>
                            <th class="text-right">Differenza</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>Contanti</strong></td>
                            <td class="text-right">
                                <input type="number" step="0.01" class="input-money calc-trigger" id="sys-cash" placeholder="0.00">
                            </td>
                            <td class="text-right">
                                <input type="number" step="0.01" class="input-money calc-trigger" id="real-cash" placeholder="0.00">
                            </td>
                            <td class="text-right">
                                <span id="diff-cash" class="diff-badge">€ 0.00</span>
                            </td>
                        </tr>
                        <tr>
                            <td><strong>POS / Carte</strong></td>
                            <td class="text-right">
                                <input type="number" step="0.01" class="input-money calc-trigger" id="sys-pos" placeholder="0.00">
                            </td>
                            <td class="text-right">
                                <input type="number" step="0.01" class="input-money calc-trigger" id="real-pos" placeholder="0.00">
                            </td>
                            <td class="text-right">
                                <span id="diff-pos" class="diff-badge">€ 0.00</span>
                            </td>
                        </tr>
                        <tr>
                            <td><strong>Satispay</strong></td>
                            <td class="text-right">
                                <input type="number" step="0.01" class="input-money calc-trigger" id="sys-satis" placeholder="0.00">
                            </td>
                            <td class="text-right">
                                <input type="number" step="0.01" class="input-money calc-trigger" id="real-satis" placeholder="0.00">
                            </td>
                            <td class="text-right">
                                <span id="diff-satis" class="diff-badge">€ 0.00</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="grid-2">
            <div class="card card-pad">
                <div class="group-label">Note Amministrative</div>
                <textarea class="textarea-input" placeholder="Segnala eventuali ammanchi o anomalie..."></textarea>
            </div>
            <div class="card card-pad">
                <div class="group-label">Uscite / Spese</div>
                <input type="text" class="input" placeholder="Motivo spesa" style="margin-bottom: 10px;">
                <input type="number" class="input input-mono" placeholder="€ 0.00">
            </div>
        </div>

    </main>

    <nav style="position: fixed; bottom: 0; width: 100%; height: 68px; background: #fff; border-top: 1px solid var(--slate-200); display: flex; justify-content: space-around; align-items: center; padding: 0 10px;">
        <a href="turni.html" class="btn-secondary">Turni</a>
        <button class="btn-dark" onclick="alert('Dati Salvati!')">Salva Chiusura</button>
    </nav>

    <script>
        function formatVal(val) {
            return "€ " + val.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function updateCalcoli() {
            const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;

            // Valori Inseriti
            const sCash = getVal('sys-cash'), rCash = getVal('real-cash');
            const sPos = getVal('sys-pos'), rPos = getVal('real-pos');
            const sSatis = getVal('sys-satis'), rSatis = getVal('real-satis');

            // Differenze Singole
            const dCash = rCash - sCash;
            const dPos = rPos - sPos;
            const dSatis = rSatis - sSatis;

            // Aggiorna Righe Tabella
            const updateRow = (idEl, val) => {
                const el = document.getElementById(idEl);
                el.innerText = formatVal(val);
                el.className = "diff-badge " + (val < 0 ? "diff-neg" : val > 0 ? "diff-pos" : "");
            };

            updateRow('diff-cash', dCash);
            updateRow('diff-pos', dPos);
            updateRow('diff-satis', dSatis);

            // Totali Generali
            const totSys = sCash + sPos + sSatis;
            const totReal = rCash + rPos + rSatis;
            const totDiff = totReal - totSys;

            document.getElementById('display-tot-sys').innerText = formatVal(totSys);
            document.getElementById('display-tot-real').innerText = formatVal(totReal);
            
            const diffDisplay = document.getElementById('display-tot-diff');
            diffDisplay.innerText = formatVal(totDiff);
            diffDisplay.className = "font-mono fw-800 " + (totDiff < 0 ? "text-red" : "text-emerald");
        }

        // Listener su tutti gli input
        document.querySelectorAll('.calc-trigger').forEach(input => {
            input.addEventListener('input', updateCalcoli);
        });

        // Esegui calcolo iniziale
        updateCalcoli();
    </script>
</body>
</html>
