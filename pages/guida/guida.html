    <style>
        :root { --red: #B5453A; --dark: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }

        /* ── LAYOUT ── */
        .guida-wrap { display: flex; gap: 0; min-height: calc(100vh - 56px); }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 280px; flex-shrink: 0; background: #fff;
            border-right: 1px solid #e2e8f0;
            position: sticky; top: 56px; height: calc(100vh - 56px);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .sidebar-search {
            padding: 16px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
        }
        .sidebar-search input {
            width: 100%; padding: 8px 12px 8px 36px; border: 1px solid #e2e8f0;
            border-radius: 10px; font-size: 13px; background: #f8fafc;
            outline: none; font-family: 'Inter', sans-serif;
        }
        .sidebar-search input:focus { border-color: var(--red); background: #fff; }
        .sidebar-search .search-icon {
            position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 12px; pointer-events: none;
        }
        .sidebar-search { position: relative; }
        .sidebar-nav { flex: 1; padding: 8px 0; }
        .nav-group-label {
            padding: 12px 16px 4px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: .12em; color: #94a3b8;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 16px; cursor: pointer; border-radius: 0;
            font-size: 13px; font-weight: 500; color: #475569;
            transition: all .12s; border-left: 3px solid transparent;
            text-decoration: none;
        }
        .nav-item:hover { background: #f8fafc; color: #1e293b; }
        .nav-item.active {
            background: #fdf1f0; color: var(--red); font-weight: 700;
            border-left-color: var(--red);
        }
        .nav-item .nav-icon { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }
        .nav-item .nav-badge {
            margin-left: auto; font-size: 9px; font-weight: 800; text-transform: uppercase;
            background: #f1f5f9; color: #94a3b8; padding: 2px 6px; border-radius: 4px;
        }
        .nav-item.active .nav-badge { background: #fee2e2; color: var(--red); }

        /* ── MAIN CONTENT ── */
        .guida-main { flex: 1; min-width: 0; padding: 32px; max-width: 900px; }

        /* ── SECTION CARDS ── */
        .sezione-header {
            display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px;
        }
        .sezione-icona {
            width: 52px; height: 52px; border-radius: 14px; background: var(--red);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: #fff; flex-shrink: 0;
        }
        .sezione-titolo { font-size: 26px; font-weight: 900; color: var(--dark); line-height: 1.2; }
        .sezione-desc { font-size: 14px; color: #64748b; margin-top: 4px; line-height: 1.6; }
        .meta-row {
            display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 8px;
        }
        .meta-chip {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .06em; padding: 3px 9px; border-radius: 99px;
        }
        .chip-ruolo { background: #f1f5f9; color: #475569; }
        .chip-data  { background: #fffbeb; color: #92400e; }
        .chip-admin { background: #fee2e2; color: #991b1b; }
        .chip-tutti { background: #f0fdf4; color: #166534; }

        /* ── FUNZIONALITÀ ── */
        .card {
            background: #fff; border-radius: 16px; padding: 20px 24px;
            border: 1px solid #f1f5f9; box-shadow: 0 1px 3px rgba(0,0,0,.05);
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: .1em; color: #94a3b8; margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .card-title::before {
            content: ''; display: block; width: 3px; height: 12px;
            background: var(--red); border-radius: 2px;
        }

        /* Feature list */
        .feature-list { display: flex; flex-direction: column; gap: 10px; }
        .feature-item { display: flex; align-items: flex-start; gap: 12px; }
        .feature-dot {
            width: 28px; height: 28px; border-radius: 8px; background: #fdf1f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: var(--red); flex-shrink: 0; margin-top: 1px;
        }
        .feature-text { font-size: 13px; color: #334155; line-height: 1.5; }
        .feature-text strong { color: #1e293b; font-weight: 700; }

        /* Steps */
        .step-list { display: flex; flex-direction: column; gap: 12px; }
        .step-item { display: flex; gap: 14px; align-items: flex-start; }
        .step-num {
            width: 26px; height: 26px; border-radius: 50%; background: var(--red);
            color: #fff; font-size: 11px; font-weight: 800; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
        }
        .step-body { flex: 1; }
        .step-title { font-size: 13px; font-weight: 700; color: #1e293b; }
        .step-text { font-size: 12px; color: #64748b; margin-top: 2px; line-height: 1.5; }
        .step-tip {
            display: inline-flex; align-items: center; gap: 5px; margin-top: 6px;
            font-size: 11px; font-weight: 600; color: #0369a1;
            background: #eff6ff; padding: 3px 9px; border-radius: 6px;
        }

        /* Note */
        .note-box {
            background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
            padding: 12px 16px; font-size: 12px; color: #78350f; line-height: 1.6;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .note-box i { margin-top: 2px; flex-shrink: 0; }

        /* Ruoli table */
        .ruoli-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .ruolo-item {
            display: flex; align-items: center; gap: 6px;
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
            padding: 6px 12px; font-size: 12px;
        }
        .ruolo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* Home page overview */
        .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .overview-item {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 14px 16px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: all .15s; text-decoration: none; color: inherit;
        }
        .overview-item:hover { border-color: var(--red); background: #fdf1f0; }
        .overview-item .ov-icon {
            width: 36px; height: 36px; border-radius: 10px; background: var(--red);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: #fff; flex-shrink: 0;
        }
        .overview-item .ov-name { font-size: 13px; font-weight: 700; color: #1e293b; }
        .overview-item .ov-desc { font-size: 11px; color: #94a3b8; margin-top: 2px; }

        /* Search highlight */
        .search-hl { background: #fef9c3; border-radius: 2px; }

        /* Empty search */
        .empty-search {
            text-align: center; padding: 60px 20px; color: #94a3b8;
        }

        /* Divider */
        .section-divider { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .guida-main { padding: 16px; }
            .overview-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

// ═══════════════════════════════════════════════════════════════════════════════
// RENDERING ENGINE — Non modificare salvo per aggiungere nuovi tipi di blocco
// ═══════════════════════════════════════════════════════════════════════════════

const RUOLO_COLORS = {
  'admin':        '#fee2e2:#991b1b',
  'dipendente':   '#e0f2fe:#0369a1',
  'coordinatore': '#f3e8ff:#7e22ce',
  'responsabile': '#fef9c3:#92400e',
  'volontario':   '#f0fdf4:#166534',
  'scu':          '#fff7ed:#c2410c',
  'tutti':        '#f0fdf4:#166534'
};

const RUOLO_LABELS = {
  'admin': 'Admin', 'dipendente': 'Dipendente', 'coordinatore': 'Coordinatore/trice',
  'responsabile': 'Responsabile', 'volontario': 'Volontario/a', 'scu': 'Servizio Civile',
  'tutti': 'Tutti gli utenti'
};

let sezioneAttiva = null;

function init() {
  buildSidebar();
  const primo = GUIDA_DATA.sezioni[0];
  mostraSezione(primo.id);
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const gruppi = {};
  GUIDA_DATA.sezioni.forEach(s => {
    if (!gruppi[s.gruppo]) gruppi[s.gruppo] = [];
    gruppi[s.gruppo].push(s);
  });

  let html = '';
  Object.entries(gruppi).forEach(([gruppo, sezioni]) => {
    html += `<div class="nav-group-label">${gruppo}</div>`;
    sezioni.forEach(s => {
      const isAdmin = s.ruoli.length === 1 && s.ruoli[0] === 'admin';
      html += `
        <div class="nav-item" id="nav-${s.id}" onclick="mostraSezione('${s.id}')">
          <span class="nav-icon"><i class="fas ${s.icona}"></i></span>
          <span>${s.titolo}</span>
          ${isAdmin ? '<span class="nav-badge">Admin</span>' : ''}
        </div>`;
    });
  });
  nav.innerHTML = html;
}

function mostraSezione(id) {
  sezioneAttiva = id;
  const s = GUIDA_DATA.sezioni.find(x => x.id === id);
  if (!s) return;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${id}`);
  if (navEl) {
    navEl.classList.add('active');
    navEl.scrollIntoView({ block: 'nearest' });
  }

  renderSezione(s);
}

function renderSezione(s) {
  const main = document.getElementById('guida-main');

  // Ruoli chips
  const ruoliHtml = s.ruoli.map(r => {
    const [bg, fg] = (RUOLO_COLORS[r] || '#f1f5f9:#475569').split(':');
    const label = RUOLO_LABELS[r] || r;
    const icon = r === 'tutti' ? 'fa-users' : r === 'admin' ? 'fa-crown' : 'fa-user';
    return `<span class="meta-chip" style="background:${bg};color:${fg}"><i class="fas ${icon}" style="font-size:9px"></i> ${label}</span>`;
  }).join('');

  // Aggiornato
  const dataFmt = new Date(s.aggiornato).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
  const dataChip = `<span class="meta-chip chip-data"><i class="fas fa-clock" style="font-size:9px"></i> Aggiornato: ${dataFmt}</span>`;

  // Funzionalità
  const funzHtml = s.funzionalita.length > 0 ? `
    <div class="card">
      <div class="card-title">Funzionalità principali</div>
      <div class="feature-list">
        ${s.funzionalita.map(f => `
          <div class="feature-item">
            <div class="feature-dot"><i class="fas ${f.icona}"></i></div>
            <div class="feature-text">${f.testo}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  // Passaggi
  const passHtml = s.passaggi.length > 0 ? `
    <div class="card">
      <div class="card-title">Come si usa</div>
      <div class="step-list">
        ${s.passaggi.map((p, i) => `
          <div class="step-item">
            <div class="step-num">${i + 1}</div>
            <div class="step-body">
              <div class="step-title">${p.titolo}</div>
              <div class="step-text">${p.testo}</div>
              ${p.tip ? `<div class="step-tip"><i class="fas fa-lightbulb"></i> ${p.tip}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  // Nota
  const notaHtml = s.note ? `
    <div class="note-box">
      <i class="fas fa-circle-info"></i>
      <div>${s.note}</div>
    </div>` : '';

  main.innerHTML = `
    <div class="sezione-header">
      <div class="sezione-icona"><i class="fas ${s.icona}"></i></div>
      <div>
        <div class="sezione-titolo">${s.titolo}</div>
        <div class="sezione-desc">${s.descrizione}</div>
        <div class="meta-row">${ruoliHtml} ${dataChip}</div>
      </div>
    </div>
    ${funzHtml}
    ${passHtml}
    ${notaHtml}
    <div style="height:40px"></div>
  `;
}

// ── RICERCA ──────────────────────────────────────────────────────────────────
function searchGuida(q) {
  q = q.trim().toLowerCase();
  const nav = document.getElementById('sidebar-nav');

  if (!q) {
    buildSidebar();
    if (sezioneAttiva) {
      document.getElementById(`nav-${sezioneAttiva}`)?.classList.add('active');
    }
    return;
  }

  const matches = GUIDA_DATA.sezioni.filter(s => {
    const haystack = [
      s.titolo, s.descrizione, s.gruppo,
      ...s.funzionalita.map(f => f.testo),
      ...s.passaggi.map(p => p.titolo + ' ' + p.testo + ' ' + (p.tip || '')),
      s.note || ''
    ].join(' ').toLowerCase();
    return haystack.includes(q);
  });

  if (matches.length === 0) {
    nav.innerHTML = '<div class="empty-search"><i class="fas fa-magnifying-glass fa-2x mb-3"></i><br>Nessun risultato</div>';
    return;
  }

  nav.innerHTML = `<div class="nav-group-label">Risultati (${matches.length})</div>` +
    matches.map(s => `
      <div class="nav-item" id="nav-${s.id}" onclick="mostraSezione('${s.id}')">
        <span class="nav-icon"><i class="fas ${s.icona}"></i></span>
        <span>${s.titolo}</span>
      </div>`).join('');
}

document.addEventListener('DOMContentLoaded', init);

</script>
