<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/faviconm361.png" type="image/png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="../../assets/style/nav-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Richieste informazioni da clienti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --red:#B5453A;--red-dark:#8c362d;--red-light:#fdf1f0;--green:#059669;--green-light:#dcfce7;--slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-300:#cbd5e1;--slate-400:#94a3b8;--slate-500:#64748b;--slate-600:#475569;--slate-700:#334155;--slate-800:#1e293b; }
        body { font-family:'Inter',sans-serif; background:#f0f2f5; }
        .font-mono { font-family:'DM Mono',monospace; }
        .sec-t { font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--slate-400);display:flex;align-items:center;gap:10px;margin-bottom:16px; }
        .sec-t::before { content:'';width:3px;height:16px;background:var(--red);border-radius:2px;flex-shrink:0; }
        .card-r { background:#fff;border-radius:20px;border:1px solid var(--slate-200);box-shadow:0 1px 4px rgba(0,0,0,.05); }

        /* Emporio selector */
        .emp-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:10px; }
        @media(min-width:640px) { .emp-grid { grid-template-columns:repeat(4,1fr); } }
        .emp-btn { padding:20px 12px;border-radius:16px;border:2px solid var(--slate-200);background:#fff;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px; }
        .emp-btn:hover { border-color:var(--red);transform:translateY(-2px);box-shadow:0 4px 12px rgba(181,69,58,.12); }
        .emp-btn.selected { border-color:var(--red);background:var(--red-light); }
        .emp-btn img { width:48px;height:48px;object-fit:contain;border-radius:12px; }
        .emp-btn span { font-size:12px;font-weight:800;color:var(--slate-700); }

        /* Tabs */
        .tab-bar { display:flex;gap:4px;background:#fff;padding:5px;border-radius:14px;border:1px solid var(--slate-200); }
        .tab-btn { padding:8px 16px;border-radius:10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:none;background:transparent;color:var(--slate-400);transition:all .12s;position:relative; }
        .tab-btn:hover { color:var(--slate-700); }
        .tab-btn.active { background:var(--red);color:#fff; }
        .tab-btn .badge-count { position:absolute;top:-4px;right:-4px;background:var(--slate-800);color:#fff;font-size:8px;font-weight:900;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* Form */
        .f-label { font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--slate-400);margin-bottom:6px;display:block; }
        .f-input { width:100%;border:1px solid var(--slate-200);border-radius:12px;padding:10px 14px;font-size:15px;font-family:'Inter',sans-serif;color:var(--slate-700);outline:none;transition:border .15s; }
        .f-input:focus { border-color:var(--red); }
        .f-textarea { min-height:90px;resize:vertical; }
        .f-row { display:grid;gap:12px; }
        .f-row-2 { grid-template-columns:1fr 1fr; }
        @media(max-width:640px) { .f-row-2 { grid-template-columns:1fr; } }

        /* WhatsApp toggle — stesso pattern di ordini_nuovi.html */
        .wa-active { color: #25D366; }
        .wa-inactive { color: #cbd5e1; }

        /* Request cards */
        .req-card { background:#fff;border-radius:16px;border:1px solid var(--slate-200);overflow:hidden;transition:all .15s; }
        .req-card:hover { border-color:var(--slate-300); }
        .req-header { padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--slate-100);flex-wrap:wrap; }
        .req-body { padding:16px 18px; }
        .req-field { margin-bottom:10px; }
        .req-field-label { font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--slate-400); }
        .req-field-value { font-size:15px;font-weight:600;color:var(--slate-700);margin-top:2px; }
        .req-desc { background:var(--slate-50);border-radius:10px;padding:12px;font-size:15px;color:var(--slate-600);line-height:1.6;margin-top:10px; }
        .req-date { font-size:12px;font-weight:700;color:var(--slate-400);font-family:'DM Mono',monospace; }
        .req-emp { font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:8px; }

        /* Response box */
        .resp-box { margin-top:12px;padding:12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px; }
        .resp-box-label { font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:6px;display:flex;align-items:center;gap:6px; }
        .resp-box-text { font-size:15px;color:var(--slate-700);line-height:1.6; }

        /* Asterisco campi obbligatori */
        .f-required::after { content:' *';color:var(--red); }

        /* Status badges */
        .st-aperta  { background:#fef3c7;color:#92400e; }
        .st-esaurita { background:#d1fae5;color:#065f46; }

        /* Emporio color pills */
        .emp-cr { background:#fce4ec;color:#B5453A; }
        .emp-ca { background:#fff3e0;color:#c78044; }
        .emp-re { background:#e8f5e9;color:#6b8d53; }
        .emp-ma { background:#ede9fe;color:#7C3AED; }
        .emp-vi { background:#e3f2fd;color:#4c6d90; }

        /* Action buttons */
        .btn-action { font-size:11px;font-weight:700;border:1px solid var(--slate-200);border-radius:8px;padding:5px 12px;background:#fff;cursor:pointer;transition:all .12s;white-space:nowrap;color:var(--slate-600); }
        .btn-action:hover { border-color:var(--slate-400); }
        .btn-esaudi { color:#065f46;border-color:#bbf7d0;background:#f0fdf4; }
        .btn-esaudi:hover { background:#dcfce7;border-color:#86efac; }

        /* Empty state */
        .empty-st { padding:40px 20px;text-align:center;color:var(--slate-400);font-size:13px;font-weight:600; }
    </style>
</head>
<body class="pb-20">
    <script src="../../scripts/auth.js"></script>
    <script src="../../scripts/nav-script.js"></script>

    <main class="max-w-4xl mx-auto p-4 md:p-8">

        <!-- EMPORIO SELECTION -->
        <div id="emporio-selection">
            <div class="sec-t">Seleziona emporio</div>
            <div class="emp-grid" id="emp-grid-container" style="margin-bottom:24px"></div>
        </div>

        <!-- MAIN CONTENT (hidden until emporio selected) -->
        <div id="main-content" style="display:none">

            <!-- Emporio indicator + new button -->
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-3">
                    <span class="req-emp" id="current-emp-badge"></span>
                    <button onclick="changeEmporio()" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-exchange-alt"></i> Cambia
                    </button>
                </div>
                <button onclick="showForm(null)" id="btn-new" class="text-xs font-bold text-white bg-[#B5453A] hover:bg-[#8c362d] px-4 py-2 rounded-lg transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> Nuova Richiesta
                </button>
            </div>

            <!-- FORM: Nuova / Modifica -->
            <div id="req-form" class="card-r p-5 mb-6" style="display:none">
                <div class="sec-t" id="form-title" style="margin-bottom:18px">Nuova Richiesta</div>

                <div class="space-y-4">

                    <!-- 1. Cliente + Giorno richiesta -->
                    <div class="f-row f-row-2">
                        <div>
                            <label class="f-label f-required">Cliente (Nome e Cognome)</label>
                            <input type="text" id="f-cliente" class="f-input" placeholder="Mario Rossi">
                        </div>
                        <div>
                            <label class="f-label">Giorno richiesta</label>
                            <input type="date" id="f-giorno" class="f-input">
                        </div>
                    </div>

                    <!-- 2. Cellulare + WA toggle / Email -->
                    <div class="f-row f-row-2">
                        <div>
                            <label class="f-label f-required">Numero di cellulare</label>
                            <div class="relative">
                                <input type="tel" id="f-telefono" class="f-input" style="padding-right:44px" placeholder="333 1234567">
                                <button type="button" id="btn-wa-info" onclick="toggleWA()" title="WhatsApp attivo/disattivo"
                                    class="absolute wa-active transition-colors"
                                    style="right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0">
                                    <i class="fab fa-whatsapp fa-lg"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="f-label">Email</label>
                            <input type="email" id="f-email" class="f-input" placeholder="mario@email.com">
                        </div>
                    </div>

                    <!-- 3. Descrizione richiesta -->
                    <div>
                        <label class="f-label f-required">Descrizione richiesta</label>
                        <textarea id="f-descrizione" class="f-input f-textarea" placeholder="Descrivi cosa cerca il cliente, tipo di prodotto, budget, dettagli specifici..."></textarea>
                    </div>

                    <!-- 4. Risposta -->
                    <div>
                        <label class="f-label">
                            Risposta
                            <span style="font-weight:500;text-transform:none;letter-spacing:0;color:var(--slate-300);margin-left:6px">— cosa è stato risposto al cliente</span>
                        </label>
                        <textarea id="f-risposta" class="f-input f-textarea" placeholder="Inserisci qui la risposta data al cliente (opzionale per nuove richieste)..."></textarea>
                    </div>

                </div>

                <div class="flex items-center justify-end gap-3 mt-5">
                    <button onclick="hideForm()" class="text-xs font-bold text-slate-400 hover:text-slate-600 px-4 py-2">Annulla</button>
                    <button onclick="saveRequest()" class="text-xs font-bold text-white bg-[#1e293b] hover:bg-[#334155] px-5 py-3 rounded-lg transition-all flex items-center gap-2">
                        <i class="fas fa-save"></i> <span id="form-btn-label">Salva Richiesta</span>
                    </button>
                </div>
            </div>

            <!-- TABS -->
            <div class="tab-bar mb-5">
                <button class="tab-btn active" data-tab="aperte" onclick="switchTab('aperte')">
                    Da gestire <span class="badge-count" id="count-aperte">0</span>
                </button>
                <button class="tab-btn" data-tab="esaudite" onclick="switchTab('esaudite')">
                    Esaudite
                </button>
                <button class="tab-btn" data-tab="recap" onclick="switchTab('recap')">
                    Recap
                </button>
            </div>

            <!-- DA GESTIRE -->
            <div class="tab-content active" data-tab="aperte">
                <div id="list-aperte" class="space-y-4"></div>
            </div>

            <!-- ESAUDITE -->
            <div class="tab-content" data-tab="esaudite">
                <div id="list-esaudite" class="space-y-4"></div>
            </div>

            <!-- RECAP -->
            <div class="tab-content" data-tab="recap">
                <div class="card-r p-5">
                    <div class="sec-t" style="margin-bottom:14px">Recap Tutte le Richieste</div>
                    <div style="overflow-x:auto">
                        <table class="w-full text-sm border-collapse" id="recap-table">
                            <thead>
                                <tr style="background:var(--slate-50);border-bottom:2px solid var(--slate-200)">
                                    <th class="p-3 text-left text-xs font-bold text-slate-400 uppercase">Data</th>
                                    <th class="p-3 text-left text-xs font-bold text-slate-400 uppercase">Emporio</th>
                                    <th class="p-3 text-left text-xs font-bold text-slate-400 uppercase">Cliente</th>
                                    <th class="p-3 text-left text-xs font-bold text-slate-400 uppercase">Richiesta</th>
                                    <th class="p-3 text-center text-xs font-bold text-slate-400 uppercase">Stato</th>
                                    <th class="p-3 text-left text-xs font-bold text-slate-400 uppercase">Risposta</th>
                                </tr>
                            </thead>
                            <tbody id="recap-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    const { createClient } = supabase;
    const db = createClient(
        'https://hsalynvxazxqtmsvjrzc.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
    );

    const EMP_MAP = {
        cremona:       { label:'Cremona',        css:'emp-cr' },
        casalmaggiore: { label:'Casalmaggiore',  css:'emp-ca' },
        reggioemilia:  { label:'Reggio Emilia',  css:'emp-re' },
        mantova:       { label:'Mantova',        css:'emp-ma' },
        viadana:       { label:'Viadana',        css:'emp-vi' },
    };

    let currentEmporio = null;
    let requests = [];
    let editingId = null; // null = nuova richiesta, altrimenti ID del record in modifica

    // ─── EMPORIO ───────────────────────────────────────────────────────────
    function selectEmporio(emp) {
        currentEmporio = emp;
        document.querySelectorAll('.emp-btn').forEach(b => b.classList.remove('selected'));
        event.currentTarget.classList.add('selected');
        const badge = document.getElementById('current-emp-badge');
        badge.textContent = EMP_MAP[emp].label;
        badge.className = 'req-emp ' + EMP_MAP[emp].css;
        document.getElementById('emporio-selection').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        loadRequests();
    }

    function changeEmporio() {
        hideForm();
        document.getElementById('emporio-selection').style.display = 'block';
        document.getElementById('main-content').style.display = 'none';
    }

    // ─── TABS ──────────────────────────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.dataset.tab === tab));
        if (tab === 'recap') renderRecap();
    }

    // ─── WHATSAPP TOGGLE — stesso pattern di ordini_nuovi.html ─────────────
    function toggleWA() {
        const btn = document.getElementById('btn-wa-info');
        btn.classList.toggle('wa-active');
        btn.classList.toggle('wa-inactive');
    }

    function setWA(active) {
        const btn = document.getElementById('btn-wa-info');
        btn.classList.toggle('wa-active', !!active);
        btn.classList.toggle('wa-inactive', !active);
    }

    function isWAActive() {
        return document.getElementById('btn-wa-info').classList.contains('wa-active');
    }

    // ─── FORM ──────────────────────────────────────────────────────────────
    function showForm(id) {
        editingId = id || null;

        if (editingId) {
            const r = requests.find(x => x.id === editingId);
            if (!r) return;
            document.getElementById('form-title').textContent = 'Modifica Richiesta';
            document.getElementById('form-btn-label').textContent = 'Aggiorna';
            document.getElementById('f-cliente').value    = r.cliente    || '';
            document.getElementById('f-telefono').value   = r.telefono   || '';
            document.getElementById('f-email').value      = r.email      || '';
            document.getElementById('f-giorno').value     = r.giorno     || '';
            document.getElementById('f-descrizione').value = r.descrizione || '';
            document.getElementById('f-risposta').value   = r.risposta   || '';
            setWA(!!r.wa_attivo);
        } else {
            document.getElementById('form-title').textContent = 'Nuova Richiesta';
            document.getElementById('form-btn-label').textContent = 'Salva Richiesta';
            ['f-cliente','f-telefono','f-email','f-descrizione','f-risposta'].forEach(fid => {
                document.getElementById(fid).value = '';
            });
            document.getElementById('f-giorno').value = new Date().toISOString().split('T')[0];
            setWA(true); // WA attivo di default per nuove richieste
        }

        document.getElementById('req-form').style.display = 'block';
        document.getElementById('btn-new').style.display = 'none';
        document.getElementById('req-form').scrollIntoView({ behavior:'smooth', block:'start' });
    }

    function hideForm() {
        document.getElementById('req-form').style.display = 'none';
        document.getElementById('btn-new').style.display = 'flex';
        editingId = null;
    }

    async function saveRequest() {
        const cliente     = document.getElementById('f-cliente').value.trim();
        const telefono    = document.getElementById('f-telefono').value.trim();
        const descrizione = document.getElementById('f-descrizione').value.trim();
        if (!cliente)     { alert('Inserisci il nome del cliente');       document.getElementById('f-cliente').focus();     return; }
        if (!telefono)    { alert('Inserisci il numero di cellulare');    document.getElementById('f-telefono').focus();    return; }
        if (!descrizione) { alert('Inserisci la descrizione della richiesta'); document.getElementById('f-descrizione').focus(); return; }

        const payload = {
            emporio:     currentEmporio,
            cliente,
            telefono,
            descrizione,
            email:     document.getElementById('f-email').value.trim(),
            giorno:    document.getElementById('f-giorno').value || null,
            risposta:  document.getElementById('f-risposta').value.trim(),
            wa_attivo: isWAActive(),
        };

        if (editingId) {
            // MODIFICA record esistente
            if (!String(editingId).startsWith('local-')) {
                const { error } = await db.from('info_clienti').update(payload).eq('id', editingId);
                if (error) { alert('Errore nel salvataggio: ' + error.message); return; }
            }
            const idx = requests.findIndex(r => r.id === editingId);
            if (idx >= 0) requests[idx] = { ...requests[idx], ...payload };
        } else {
            // NUOVA richiesta
            const newReq = {
                ...payload,
                stato:      'Aperto',
                created_at: new Date().toISOString(),
            };
            const { data, error } = await db.from('info_clienti').insert([newReq]).select().single();
            if (error) {
                alert('Errore nel salvataggio: ' + error.message + '\n\nLa richiesta NON è stata salvata. Riprova.');
                return;
            }
            requests.push(data);
        }

        hideForm();
        render();
    }

    // ─── AZIONI SULLE CARD ────────────────────────────────────────────────
    async function esaudiRequest(id) {
        if (!confirm('Segnare questa richiesta come esaudita?')) return;
        const item = requests.find(r => r.id === id);
        if (!item) return;
        item.stato = 'Esaurito';
        if (!String(id).startsWith('local-')) {
            await db.from('info_clienti').update({ stato: 'Esaurito' }).eq('id', id);
        }
        render();
        switchTab('esaudite');
    }

    async function riaperiRequest(id) {
        if (!confirm('Riaprire questa richiesta?')) return;
        const item = requests.find(r => r.id === id);
        if (!item) return;
        item.stato = 'Aperto';
        if (!String(id).startsWith('local-')) {
            await db.from('info_clienti').update({ stato: 'Aperto' }).eq('id', id);
        }
        render();
        switchTab('aperte');
    }

    async function deleteRequest(id) {
        if (!confirm('Eliminare definitivamente questa richiesta?')) return;
        requests = requests.filter(r => r.id !== id);
        if (!String(id).startsWith('local-')) {
            await db.from('info_clienti').delete().eq('id', id);
        }
        render();
    }

    // ─── RENDER ───────────────────────────────────────────────────────────
    function render() {
        const empReqs  = requests.filter(r => r.emporio === currentEmporio);
        const aperte   = empReqs.filter(r => r.stato !== 'Esaurito');
        const esaudite = empReqs.filter(r => r.stato === 'Esaurito');

        document.getElementById('count-aperte').textContent = aperte.length;

        document.getElementById('list-aperte').innerHTML = aperte.length
            ? aperte.map(r => renderCard(r)).join('')
            : '<div class="empty-st"><i class="fas fa-inbox" style="font-size:28px;display:block;margin-bottom:10px"></i>Nessuna richiesta da gestire</div>';

        document.getElementById('list-esaudite').innerHTML = esaudite.length
            ? esaudite.map(r => renderCard(r)).join('')
            : '<div class="empty-st"><i class="fas fa-check-circle" style="font-size:28px;display:block;margin-bottom:10px"></i>Nessuna richiesta esaudita</div>';
    }

    function renderCard(r) {
        const date = r.created_at
            ? new Date(r.created_at).toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' })
            : '—';

        const giornoLabel = r.giorno
            ? new Date(r.giorno + 'T12:00:00').toLocaleDateString('it-IT', { day:'2-digit', month:'long', year:'numeric' })
            : null;

        const isEsaurita = r.stato === 'Esaurito';
        const stClass = isEsaurita ? 'st-esaurita' : 'st-aperta';
        const stLabel = isEsaurita ? 'Esaudita' : 'Da gestire';

        // Link WhatsApp (stesso pattern di ordini_incorso)
        const waLink = (r.wa_attivo && r.telefono)
            ? `<a href="https://wa.me/39${r.telefono.replace(/\D/g,'')}" target="_blank"
                  style="color:#25D366;margin-left:8px;font-size:14px;text-decoration:none"
                  title="Apri WhatsApp"><i class="fab fa-whatsapp"></i></a>`
            : '';

        const actions = isEsaurita
            ? `<button onclick="showForm('${r.id}')" class="btn-action" title="Modifica">
                   <i class="fas fa-pen" style="font-size:10px;margin-right:4px"></i>Modifica
               </button>
               <button onclick="riaperiRequest('${r.id}')" class="btn-action" title="Riapri">
                   <i class="fas fa-undo" style="font-size:10px;margin-right:4px"></i>Riapri
               </button>`
            : `<button onclick="showForm('${r.id}')" class="btn-action" title="Modifica">
                   <i class="fas fa-pen" style="font-size:10px;margin-right:4px"></i>Modifica
               </button>
               <button onclick="esaudiRequest('${r.id}')" class="btn-action btn-esaudi">
                   <i class="fas fa-check" style="font-size:10px;margin-right:4px"></i>Esaudita
               </button>`;

        return `
        <div class="req-card">
            <div class="req-header">
                <div class="flex items-center gap-3 flex-wrap">
                    <span class="req-date">${date}</span>
                    <span class="req-emp ${stClass}" style="font-size:9px;padding:3px 10px;border-radius:8px">${stLabel}</span>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                    ${actions}
                    <button onclick="deleteRequest('${r.id}')" class="text-slate-300 hover:text-red-500 transition-colors" title="Elimina">
                        <i class="fas fa-trash" style="font-size:11px"></i>
                    </button>
                </div>
            </div>
            <div class="req-body">
                <div style="display:flex;flex-wrap:wrap;gap:18px;margin-bottom:10px">
                    <div class="req-field">
                        <div class="req-field-label">Cliente</div>
                        <div class="req-field-value">${r.cliente}</div>
                    </div>
                    ${r.telefono ? `
                    <div class="req-field">
                        <div class="req-field-label">Cellulare</div>
                        <div class="req-field-value" style="display:flex;align-items:center">
                            <a href="tel:${r.telefono}" style="color:var(--slate-700);text-decoration:none">${r.telefono}</a>
                            ${waLink}
                        </div>
                    </div>` : ''}
                    ${r.email ? `
                    <div class="req-field">
                        <div class="req-field-label">Email</div>
                        <div class="req-field-value">
                            <a href="mailto:${r.email}" style="color:var(--red);text-decoration:none;font-size:13px">${r.email}</a>
                        </div>
                    </div>` : ''}
                    ${giornoLabel ? `
                    <div class="req-field">
                        <div class="req-field-label">Giorno richiesta</div>
                        <div class="req-field-value">${giornoLabel}</div>
                    </div>` : ''}
                </div>
                ${r.descrizione ? `
                <div class="req-desc">
                    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-400);margin-bottom:6px">Descrizione richiesta</div>
                    ${r.descrizione}
                </div>` : ''}
                ${r.risposta ? `
                <div class="resp-box">
                    <div class="resp-box-label"><i class="fas fa-reply"></i> Risposta</div>
                    <div class="resp-box-text">${r.risposta}</div>
                </div>` : ''}
            </div>
        </div>`;
    }

    // ─── RECAP ────────────────────────────────────────────────────────────
    function renderRecap() {
        const all = [...requests].sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
        document.getElementById('recap-body').innerHTML = all.map(r => {
            const date = r.created_at ? new Date(r.created_at).toLocaleDateString('it-IT') : '—';
            const emp  = EMP_MAP[r.emporio] || { label: r.emporio || '—', css: '' };
            const stClass = r.stato === 'Esaurito' ? 'st-esaurita' : 'st-aperta';
            const stLabel = r.stato === 'Esaurito' ? 'Esaudita' : 'Da gestire';
            return `<tr style="border-bottom:1px solid var(--slate-100)">
                <td class="p-3 font-mono text-xs" style="white-space:nowrap">${date}</td>
                <td class="p-3"><span class="req-emp ${emp.css}">${emp.label}</span></td>
                <td class="p-3 font-semibold">${r.cliente}</td>
                <td class="p-3 text-xs text-slate-500" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.descrizione || '—'}</td>
                <td class="p-3 text-center"><span class="req-emp ${stClass}" style="font-size:9px">${stLabel}</span></td>
                <td class="p-3 text-xs text-slate-500" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.risposta || '—'}</td>
            </tr>`;
        }).join('') || '<tr><td colspan="6" class="p-8 text-center text-slate-400">Nessuna richiesta registrata</td></tr>';
    }

    // ─── LOAD ─────────────────────────────────────────────────────────────
    async function loadRequests() {
        const { data, error } = await db.from('info_clienti').select('*').order('created_at', { ascending: false });
        if (error) { alert('Errore caricamento richieste: ' + error.message); return; }
        if (data) requests = data;
        render();
    }

    // ─── EMPORI ───────────────────────────────────────────────────────────
    const EMPORI_LIST = [
        {id:'casalmaggiore', nome:'Casalmaggiore',  img:'../../assets/images/logo_casalmaggiore.png'},
        {id:'cremona',       nome:'Cremona',         img:'../../assets/images/logo_cremona.png'},
        {id:'mantova',       nome:'Mantova',         img:'../../assets/images/logo_mantova.png'},
        {id:'reggioemilia',  nome:'Reggio Emilia',   img:'../../assets/images/logo_reggio_emilia.png'},
        {id:'viadana',       nome:'Viadana',         img:'../../assets/images/logo_viadana.png'},
    ];

    function nomeToId(nome) {
        const e = EMPORI_LIST.find(x => x.nome.toLowerCase() === nome.toLowerCase());
        return e ? e.id : null;
    }

    function buildEmpiGrid(filtroNomi=null) {
        const g = document.getElementById('emp-grid-container');
        g.innerHTML = '';
        const lista = filtroNomi
            ? EMPORI_LIST.filter(e => filtroNomi.some(n => n.toLowerCase() === e.nome.toLowerCase()))
            : EMPORI_LIST;
        lista.forEach(e => {
            const btn = document.createElement('button');
            btn.className = 'emp-btn';
            btn.innerHTML = `<img src="${e.img}" alt="${e.nome}" style="width:48px;height:48px;object-fit:contain;border-radius:12px"><span>${e.nome}</span>`;
            btn.onclick = () => selectEmporio(e.id);
            g.appendChild(btn);
        });
    }

    function init() {
        const user = JSON.parse(localStorage.getItem('m361_user') || 'null');
        if (!user) return;
        const allEmpori = [user.emporio, ...(Array.isArray(user.empori_aggiuntivi) ? user.empori_aggiuntivi : [])].filter(Boolean);
        const uniqNomi  = [...new Set(allEmpori)];
        const isVeroAdmin = user.ruolo === 'admin';

        if (isVeroAdmin) {
            buildEmpiGrid(null);
        } else if (uniqNomi.length === 1) {
            const id = nomeToId(uniqNomi[0]);
            if (id) { selectEmporio(id); return; }
            buildEmpiGrid(null);
        } else {
            buildEmpiGrid(uniqNomi.length > 0 ? uniqNomi : null);
        }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
    </script>
</body>
</html>
