<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/faviconm361.png" type="image/png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M361 — Ordine Bomboniere</title>
<link rel="stylesheet" href="../../assets/style/nav-style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --red:#B5453A; --red-dark:#8c362d; --red-light:#fdf1f0;
  --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0;
  --slate-300:#cbd5e1; --slate-400:#94a3b8; --slate-500:#64748b;
  --slate-600:#475569; --slate-700:#334155; --slate-800:#1e293b;
  --green:#059669; --cb-bg:rgba(51,65,85,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:var(--slate-800);padding-bottom:100px}

/* HEADER */
.page-header{
  position:sticky;top:0;z-index:100;background:#fff;
  border-bottom:1px solid var(--slate-200);padding:11px 20px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.page-header h1{flex:1;font-size:15px;font-weight:800;color:var(--slate-800)}
.btn-back{
  background:none;border:1.5px solid var(--slate-200);border-radius:8px;
  padding:7px 13px;font-size:13px;font-weight:600;color:var(--slate-600);
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;
}
.btn-back:hover{border-color:var(--slate-400)}
.btn-stampa{
  background:var(--slate-100);border:1px solid var(--slate-200);border-radius:6px;
  padding:7px 14px;font-size:13px;font-weight:600;color:var(--slate-600);
  cursor:pointer;font-family:inherit;white-space:nowrap;
}
.btn-stampa:hover{background:var(--slate-800);color:#fff}

/* LAYOUT */
.main{max-width:1280px;margin:0 auto;padding:18px 12px}

/* CARD */
.card{
  background:#fff;border-radius:16px;border:1px solid var(--slate-200);
  box-shadow:0 1px 4px rgba(0,0,0,.05);padding:18px 20px;margin-bottom:14px;
}
.sec-label{
  font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;
  color:var(--slate-400);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-label::before{content:'';width:3px;height:14px;background:var(--red);border-radius:2px}

/* FORM FIELDS */
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form-row:last-child{margin-bottom:0}
.f-grp{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px}
.f-lbl{font-size:11px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.08em}
.f-inp{
  border:1px solid var(--slate-200);border-radius:10px;padding:9px 12px;
  font-size:14px;font-family:inherit;color:var(--slate-700);outline:none;transition:border .15s;
}
.f-inp:focus{border-color:var(--red)}
select.f-inp{background:#fff}

/* TIPOLOGIA CARD */
.tipologia-bomboniera{
  background:#fff;border-radius:16px;border:1px solid var(--slate-200);
  box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:14px;overflow:hidden;
}
.tip-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--slate-100);background:var(--slate-50);
}
.tip-numero{
  font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  color:var(--slate-400);white-space:nowrap;
}
.tipologia-label-custom{
  flex:1;border:1px solid var(--slate-200);border-radius:8px;padding:7px 12px;
  font-size:13px;font-weight:600;font-family:inherit;color:var(--slate-600);
  background:#fff;outline:none;min-width:180px;
}
.tipologia-label-custom:focus{border-color:var(--red)}
.btn-rimuovi-tip{
  background:none;border:1px solid var(--slate-200);border-radius:8px;
  padding:6px 10px;cursor:pointer;color:var(--slate-400);font-size:12px;transition:all .15s;
}
.btn-rimuovi-tip:hover{color:var(--red);border-color:var(--red)}

/* TABLE */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-prodotti{width:100%;border-collapse:collapse;font-size:12px;min-width:780px}
.tab-prodotti thead th{
  padding:6px 5px;font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;color:var(--slate-400);background:var(--slate-50);
  border-bottom:2px solid var(--slate-200);white-space:nowrap;text-align:left;
}

/* COLUMN WIDTHS — shared by header, product rows, and CB/CO rows */
.col-ctrl  {width:32px;text-align:center}
.col-codice{min-width:78px}
.col-desc  {min-width:160px}
.col-prezzo{width:78px}
.col-qta   {width:58px}
.col-pronta{width:66px;background:#f0fdf4}
.col-forn  {width:66px;background:var(--slate-50)}
.col-emp   {width:86px;background:var(--slate-50)}
.col-altri {width:86px;background:var(--slate-50)}
.col-daord {width:56px;background:#fff5f5;text-align:center}
.col-tot   {width:76px;text-align:right}
.col-del   {width:30px;text-align:center}

/* PRODUCT ROW */
.riga-prodotto td{padding:4px 4px;border-bottom:1px solid var(--slate-100);vertical-align:middle}
.riga-prodotto:hover{background:#fefce8}
.riga-prodotto .col-pronta{background:#f0fdf4}
.riga-prodotto .col-forn,.riga-prodotto .col-emp,.riga-prodotto .col-altri{background:var(--slate-50)}
.riga-prodotto .col-daord{background:#fff5f5;color:var(--red);font-weight:800;font-size:12px}
.riga-prodotto.row-error td{background:#fff5f5 !important}

/* ARROWS */
.col-frecce{display:flex;flex-direction:column;align-items:center;gap:2px}
.col-frecce *{font-size:11px}
.btn-sposta{background:none;border:none;cursor:pointer;color:var(--slate-300);font-size:11px;padding:1px 3px;line-height:1;transition:color .12s}
.btn-sposta:hover{color:var(--slate-600)}

/* CELL INPUTS */
.f-cell{
  width:100%;border:1px solid transparent;border-radius:5px;padding:4px 5px;
  font-size:12px;font-family:inherit;background:transparent;outline:none;transition:border .12s;color:var(--slate-700);
}
.f-cell:focus{border-color:var(--red);background:#fff}
.f-cell-num{text-align:center}
.f-cell-right{text-align:right}
.btn-del-riga{background:none;border:none;cursor:pointer;color:var(--slate-300);font-size:13px;transition:color .12s}
.btn-del-riga:hover{color:var(--red)}

/* CB ROW — same column classes as product rows */
.riga-confezionamento td{padding:4px 4px;border-bottom:1px solid rgba(51,65,85,.1);vertical-align:middle}
.check-confezionamento{width:16px;height:16px;accent-color:var(--slate-600);cursor:pointer;display:block;margin:0 auto}
.campo-codice-cb{
  width:54px;border:1px solid transparent;border-radius:5px;padding:4px 5px;
  font-size:12px;font-family:inherit;font-weight:700;background:transparent;
  outline:none;color:var(--slate-700);
}
.campo-codice-cb:focus{border-color:rgba(51,65,85,.3);background:#fff}
.campo-descrizione-conf{
  font-weight:600;color:#334155;font-size:13px;
  padding-left:8px !important;
}
.conf-prezzo{
  width:68px;border:1px solid transparent;border-radius:5px;padding:4px 5px;
  font-size:12px;font-family:inherit;background:transparent;outline:none;
  color:var(--slate-700);text-align:right;
}
.conf-prezzo:focus{border-color:rgba(51,65,85,.3);background:#fff}
.conf-qta{
  width:50px;border:1px solid transparent;border-radius:5px;padding:4px 5px;
  font-size:12px;font-family:inherit;background:transparent;outline:none;
  color:var(--slate-700);text-align:center;
}
.conf-qta:focus{border-color:rgba(51,65,85,.3);background:#fff}

/* CONFETTI SUBROW */
.riga-confetti td,.riga-cartoncino td{border-bottom:1px solid rgba(51,65,85,.08)}
.td-confetti{padding:6px 12px !important;background:rgba(51,65,85,.07)}
.confetti-scelta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.confetti-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-500)}
.radio-lbl{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;font-weight:600;color:var(--slate-700)}
.radio-lbl input[type="radio"]{accent-color:var(--slate-700)}
.conf-gusto-altro{
  border:1px solid var(--slate-200);border-radius:6px;padding:4px 8px;
  font-size:12px;font-family:inherit;color:var(--slate-700);outline:none;
}
.conf-gusto-altro:focus{border-color:var(--red)}

/* CARTONCINO SUBROW */
.td-cartoncino{padding:8px 12px 12px !important;background:rgba(51,65,85,.05)}
.cartoncino-label{
  font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:.06em;color:var(--slate-400);margin-bottom:6px;
}
.cartoncino-preview{
  display:flex;width:400px;max-width:100%;height:120px;
  border:1.5px solid var(--slate-300);border-radius:4px;overflow:hidden;
  background:#fffdf7;
}
.cart-faccia{flex:1;display:flex;align-items:center;justify-content:center;padding:8px}
.cart-sep{width:2px;background:repeating-linear-gradient(to bottom,var(--slate-300) 0,var(--slate-300) 5px,transparent 5px,transparent 10px)}
.cart-faccia textarea{
  width:100%;height:100%;border:none;background:transparent;text-align:center;
  font-family:'Georgia',serif;font-size:13px;color:var(--slate-800);resize:none;outline:none;line-height:1.4;
}

/* TIPOLOGIA FOOTER */
.tip-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-top:1px solid var(--slate-100);background:var(--slate-50);
}
.btn-add-riga{
  background:none;border:1.5px dashed var(--slate-300);border-radius:8px;
  padding:6px 14px;font-size:12px;font-weight:700;color:var(--slate-500);
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.btn-add-riga:hover{border-color:var(--red);color:var(--red)}
.tip-subtotal{font-size:12px;color:var(--slate-500)}
.tip-sub-val{font-size:16px;font-weight:800;color:var(--slate-700)}

/* ADD TIPOLOGIA */
.btn-add-tipologia{
  width:100%;padding:15px;border:2px dashed var(--slate-300);border-radius:16px;
  background:#fff;font-size:13px;font-weight:700;color:var(--slate-500);
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;
  gap:8px;transition:all .15s;margin-bottom:14px;
}
.btn-add-tipologia:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}

/* RIEPILOGO */
.riepilogo{
  background:#fff;border-radius:16px;border:1px solid var(--slate-200);
  padding:16px 20px;margin-bottom:14px;
}
.tot-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
.tot-row.grand{border-top:2px solid var(--slate-800);padding-top:10px;margin-top:10px;font-weight:800;font-size:15px}
.tot-val{font-weight:700}
.tot-grand-val{font-size:22px;color:var(--red);font-weight:900}

/* SAVE */
.btn-salva{
  background:var(--red);color:#fff;border:none;border-radius:12px;
  padding:13px 32px;font-size:14px;font-weight:800;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;
}
.btn-salva:hover{background:var(--red-dark)}
.btn-salva:disabled{background:var(--slate-300);cursor:not-allowed}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--slate-800);color:#fff;
  padding:11px 18px;border-radius:11px;font-size:13px;font-weight:700;
  z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#166534}
.toast.err{background:#991b1b}
</style>
</head>
<body class="pb-24">

<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<!-- ALWAYS-VISIBLE HEADER with Stampa Preventivo (Correzione 2) -->
<div class="page-header">
  <button class="btn-back" onclick="history.back()">
    <i class="fas fa-arrow-left"></i> Indietro
  </button>
  <h1 id="page-title">Nuovo Ordine Bomboniere</h1>
  <button class="btn-stampa" onclick="stampaPreventivo()">🖨️ Preventivo</button>
</div>

<div class="main">

  <!-- DATI ORDINE -->
  <div class="card">
    <div class="sec-label">Dati Ordine</div>
    <div class="form-row">
      <div class="f-grp">
        <label class="f-lbl">Emporio *</label>
        <select class="f-inp" id="select-emporio">
          <option value="">Seleziona...</option>
          <option value="Casalmaggiore">Casalmaggiore</option>
          <option value="Cremona">Cremona</option>
          <option value="Reggio Emilia">Reggio Emilia</option>
          <option value="Viadana">Viadana</option>
        </select>
      </div>
      <div class="f-grp">
        <label class="f-lbl">Operatore</label>
        <select class="f-inp" id="select-operatore"><option value="">—</option></select>
      </div>
      <div class="f-grp">
        <label class="f-lbl">Data ordine</label>
        <input type="date" class="f-inp" id="order-date">
      </div>
      <div class="f-grp">
        <label class="f-lbl">N° Ordine</label>
        <input type="text" class="f-inp" id="numero-ordine" placeholder="Auto-generato" readonly
               style="background:var(--slate-50);color:var(--slate-500)">
      </div>
    </div>
  </div>

  <!-- CLIENTE -->
  <div class="card">
    <div class="sec-label">Cliente</div>
    <div class="form-row">
      <div class="f-grp">
        <label class="f-lbl">Nome *</label>
        <input type="text" class="f-inp" id="nome-cliente" placeholder="Nome">
      </div>
      <div class="f-grp">
        <label class="f-lbl">Cognome *</label>
        <input type="text" class="f-inp" id="cognome-cliente" placeholder="Cognome">
      </div>
      <div class="f-grp">
        <label class="f-lbl">Cellulare *</label>
        <input type="tel" class="f-inp" id="cel-cliente" placeholder="333 1234567">
      </div>
      <div class="f-grp">
        <label class="f-lbl">Note</label>
        <input type="text" class="f-inp" id="note-ordine" placeholder="Note interne...">
      </div>
    </div>
  </div>

  <!-- TIPOLOGIE CONTAINER -->
  <div id="contenitore-tipologie"></div>

  <button class="btn-add-tipologia" onclick="aggiungiTipologia()">
    <i class="fas fa-plus"></i> Aggiungi Tipologia Bomboniera
  </button>

  <!-- RIEPILOGO -->
  <div class="riepilogo">
    <div class="sec-label" style="margin-bottom:10px">Riepilogo</div>
    <div id="rows-riepilogo"></div>
    <div class="tot-row grand">
      <span>Totale Ordine</span>
      <span class="tot-grand-val" id="grand-total">€ 0,00</span>
    </div>
  </div>

  <div style="display:flex;justify-content:flex-end">
    <button class="btn-salva" id="btn-salva" onclick="salvaOrdine()">
      <i class="fas fa-save"></i> Salva Ordine
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let tipologiaCount = 0;
let ordineId = null;

// ── UTILS ─────────────────────────────────────────────────────────────────────

function parseEuro(v) {
  return parseFloat((String(v||'0')).replace(/€/g,'').replace(/\s/g,'').replace(',','.')) || 0;
}
function formatEuro(n) {
  return '€ ' + parseFloat(n||0).toFixed(2).replace('.',',');
}
function clearEuro(el) {
  el.value = String(el.value).replace(/€/g,'').replace(/\s/g,'').replace(',','.');
}
function formatEuroInp(el) { el.value = formatEuro(parseEuro(el.value)); }
function getVal(id) { return document.getElementById(id)?.value?.trim() || ''; }
function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ── TIPOLOGIA ─────────────────────────────────────────────────────────────────

// Correzione 1: nessun popup — aggiunge direttamente
function aggiungiTipologia() {
  const n = document.querySelectorAll('.tipologia-bomboniera').length + 1;
  const div = creaTipologia(n);
  document.getElementById('contenitore-tipologie').appendChild(div);
}

// Correzione 7: stessa funzione usata sia per nuovo che per caricamento dal DB
function creaTipologia(n, dati) {
  dati = dati || {};
  const conf       = dati.confezionamento || {};
  const confAttivo = conf.attivo || false;
  const confTipo   = conf.confetti_tipo || 'mandorla';
  const confPrezzo = conf.prezzo != null ? conf.prezzo : 3;

  const div = document.createElement('div');
  div.className = 'tipologia-bomboniera';
  div.id = `tip-${n}`;

  // Correzione 3: stessa struttura colonne (colgroup) per allineamento CB/CO
  div.innerHTML = `
    <div class="tip-header">
      <span class="tip-numero">Tipologia ${n}</span>
      <input type="text" class="tipologia-label-custom" id="tip-label-${n}"
             value="${escHtml(dati.label||'')}"
             placeholder="es. per invitati, per testimoni…">
      <button class="btn-rimuovi-tip" onclick="rimuoviTipologia(${n})" title="Rimuovi">
        <i class="fas fa-trash-can"></i>
      </button>
    </div>

    <div class="table-scroll">
      <table class="tab-prodotti">
        <colgroup>
          <col class="col-ctrl"><col class="col-codice"><col class="col-desc">
          <col class="col-prezzo"><col class="col-qta"><col class="col-pronta">
          <col class="col-forn"><col class="col-emp"><col class="col-altri">
          <col class="col-daord"><col class="col-tot"><col class="col-del">
        </colgroup>
        <thead>
          <tr>
            <th class="col-ctrl"></th>
            <th class="col-codice">Codice</th>
            <th class="col-desc">Descrizione</th>
            <th class="col-prezzo" style="text-align:right">Prezzo</th>
            <th class="col-qta" style="text-align:center">Qtà</th>
            <th class="col-pronta" style="text-align:center">Pronta</th>
            <th class="col-forn" style="text-align:center">Da forn.</th>
            <th class="col-emp" style="text-align:center">Da empori</th>
            <th class="col-altri" style="text-align:center">Da altri</th>
            <th class="col-daord">Da Ord</th>
            <th class="col-tot">Totale</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="righe-${n}">
          <!-- Riga CB — stessa griglia delle righe prodotto (Correzione 3) -->
          <!-- Correzione 4: col-ctrl ha SOLO il checkbox, niente testo "CB" -->
          <!-- Correzione 5: col-desc mostra "Confezionamento" come testo fisso -->
          <!-- Correzione 6: confetti e cartoncino appaiono sotto se flag spuntato -->
          <tr class="riga-confezionamento" id="cb-row-${n}">
            <td class="col-ctrl" style="background:var(--cb-bg)">
              <input type="checkbox" class="check-confezionamento" id="check-conf-${n}"
                     onchange="toggleConf(${n})" ${confAttivo ? 'checked' : ''}>
            </td>
            <td class="col-codice" style="background:var(--cb-bg)">
              <input type="text" class="campo-codice-cb" value="${escHtml(conf.codice||'CB')}">
            </td>
            <td class="col-desc campo-descrizione-conf" style="background:var(--cb-bg)">
              Confezionamento
            </td>
            <td class="col-prezzo" style="background:var(--cb-bg)">
              <input type="text" class="conf-prezzo" id="conf-prezzo-${n}"
                     value="${formatEuro(confPrezzo)}"
                     onfocus="clearEuro(this)"
                     onblur="formatEuroInp(this);calcConf(${n})"
                     oninput="calcConf(${n})">
            </td>
            <td class="col-qta" style="background:var(--cb-bg)">
              <input type="number" class="conf-qta" id="conf-qta-${n}"
                     value="${conf.qta||1}" min="0" oninput="calcConf(${n})">
            </td>
            <td class="col-pronta" style="background:var(--cb-bg);text-align:center">
              <input type="checkbox" id="conf-pronta-${n}"

            </td>
            <td colspan="4" style="background:var(--cb-bg)"></td>
            <td class="col-tot" id="conf-tot-${n}"
                style="background:var(--cb-bg);font-weight:700;color:var(--slate-700)">
              € 0,00
            </td>
            <td style="background:var(--cb-bg)"></td>
          </tr>

          <!-- CONFETTI (visibile solo se FLAG spuntato) -->
          <tr class="riga-confetti" id="confetti-row-${n}"
              style="${confAttivo ? '' : 'display:none'}">
            <td colspan="12" class="td-confetti">
              <div class="confetti-scelta">
                <span class="confetti-label">Confetti:</span>
                <label class="radio-lbl">
                  <input type="radio" name="confetti-tipo-${n}" value="mandorla"
                         ${confTipo==='mandorla'?'checked':''} onchange="toggleGusto(${n})">
                  <span>Mandorla</span>
                </label>
                <label class="radio-lbl">
                  <input type="radio" name="confetti-tipo-${n}" value="mandorla-cioc"
                         ${confTipo==='mandorla-cioc'?'checked':''} onchange="toggleGusto(${n})">
                  <span>Mandorla e Cioccolato</span>
                </label>
                <label class="radio-lbl">
                  <input type="radio" name="confetti-tipo-${n}" value="altro"
                         ${confTipo==='altro'?'checked':''} onchange="toggleGusto(${n})">
                  <span>Altro…</span>

                       style="${confTipo==='altro'?'':'display:none'}">
              </div>

          </tr>

          <!-- CARTONCINO (visibile solo se FLAG spuntato) -->

              style="${confAttivo ? '' : 'display:none'}">

              <div class="cartoncino-label">Anteprima Cartoncino</div>
              <div class="cartoncino-preview">

                  <textarea id="cart-fronte-${n}"
                            placeholder="Testo lato sinistro…">${escHtml(conf.cart_fronte||'')}</textarea>
                </div>
                <div class="cart-sep"></div>
                <div class="cart-faccia">
                  <textarea id="cart-interno-${n}"
                            placeholder="Testo lato destro…">${escHtml(conf.cart_interno||'')}</textarea>

      <button class="btn-add-riga" onclick="aggiungiRiga(${n})">

  // Aggiungi righe prodotto (nuove o caricate dal DB)
  const prodotti = dati.prodotti || [];
  if (prodotti.length > 0) {
    prodotti.forEach(p => aggiungiRiga(n, p));
  } else {
    aggiungiRiga(n);
  }

  calcConf(n);
  return div;
}

function rimuoviTipologia(n) {
  if (!confirm('Rimuovere questa tipologia bomboniera?')) return;
  const el = document.getElementById(`tip-${n}`);
  if (el) el.remove();
  calcTotale();
}

// ── RIGA PRODOTTO ─────────────────────────────────────────────────────────────

function aggiungiRiga(n, dati) {
  dati = dati || {};
  const tbody = document.getElementById(`righe-${n}`);
  if (!tbody) return;

  const rid = `${n}-${Date.now()}-${Math.floor(Math.random()*9999)}`;
  const tr  = document.createElement('tr');
  tr.className = 'riga-prodotto';
  tr.id = `riga-${rid}`;

  // Correzione 4: col-ctrl ha SOLO le frecce, nessun testo extra
  tr.innerHTML = `
    <td class="col-ctrl">
      <div class="col-frecce">
        <button type="button" class="btn-sposta" onclick="spostaRiga(this,-1)" title="Su">▲</button>
        <button type="button" class="btn-sposta" onclick="spostaRiga(this,1)"  title="Giù">▼</button>
      </div>
    </td>
    <td class="col-codice">
      <input type="text" class="f-cell campo-codice"
             value="${escHtml(dati.codice||'')}" placeholder="Codice">
    </td>
    <td class="col-desc">
      <input type="text" class="f-cell campo-descrizione"
             value="${escHtml(dati.descrizione||'')}" placeholder="Descrizione">
    </td>
    <td class="col-prezzo">
      <input type="text" class="f-cell f-cell-right campo-prezzo"
             value="${formatEuro(dati.prezzo||0)}">
    </td>
    <td class="col-qta">
      <input type="number" class="f-cell f-cell-num campo-qta"
             value="${dati.qta||1}" min="1">
    </td>
    <td class="col-pronta">
      <input type="number" class="f-cell f-cell-num campo-pronta"
             value="${dati.merce_pronta||0}" min="0">
    </td>
    <td class="col-forn">
      <input type="number" class="f-cell f-cell-num campo-forn"
             value="${dati.da_forn||0}" min="0">
    </td>
    <td class="col-emp">
      <input type="number" class="f-cell f-cell-num campo-emp"
             value="${dati.da_emporio_qta||0}" min="0">
    </td>
    <td class="col-altri">
      <input type="number" class="f-cell f-cell-num campo-altri"
             value="${dati.da_altri_qta||0}" min="0">
    </td>
    <td class="col-daord daord-val">0</td>
    <td class="col-tot campo-totale">€ 0,00</td>
    <td class="col-del">
      <button type="button" class="btn-del-riga" onclick="rimuoviRiga('${rid}',${n})">✕</button>
    </td>
  `;

  // Inserisci PRIMA della riga CB
  const cbRow = tbody.querySelector('.riga-confezionamento');
  if (cbRow) tbody.insertBefore(tr, cbRow);
  else tbody.appendChild(tr);

  // Event listeners
  tr.querySelector('.campo-prezzo').addEventListener('focus', function(){ clearEuro(this); });
  tr.querySelector('.campo-prezzo').addEventListener('blur',  function(){ formatEuroInp(this); calcRiga(rid,n); });
  ['campo-prezzo','campo-qta','campo-pronta','campo-forn','campo-emp','campo-altri'].forEach(cls => {
    tr.querySelector('.'+cls)?.addEventListener('input', () => calcRiga(rid, n));
  });
  tr.querySelector('.campo-qta').addEventListener('input', () => syncConfQta(n));

  calcRiga(rid, n);
}

function rimuoviRiga(rid, n) {
  document.getElementById(`riga-${rid}`)?.remove();
  calcTipologia(n);
  calcTotale();
}

function spostaRiga(btn, dir) {
  const tr    = btn.closest('tr');
  const tbody = tr?.closest('tbody');
  if (!tbody) return;
  const rows  = Array.from(tbody.querySelectorAll('tr.riga-prodotto'));
  const idx   = rows.indexOf(tr);
  const target = rows[idx + dir];
  if (!target) return;
  if (dir === -1) tbody.insertBefore(tr, target);
  else tbody.insertBefore(target, tr);
}

function calcRiga(rid, n) {
  const tr = document.getElementById(`riga-${rid}`);
  if (!tr) return;
  const prezzo  = parseEuro(tr.querySelector('.campo-prezzo')?.value);
  const qta     = parseInt(tr.querySelector('.campo-qta')?.value)     || 0;
  const pronta  = parseInt(tr.querySelector('.campo-pronta')?.value)   || 0;
  const forn    = parseInt(tr.querySelector('.campo-forn')?.value)     || 0;
  const emp     = parseInt(tr.querySelector('.campo-emp')?.value)      || 0;
  const altri   = parseInt(tr.querySelector('.campo-altri')?.value)    || 0;
  const disp    = pronta + forn + emp + altri;
  const daOrd   = Math.max(0, qta - disp);
  tr.classList.toggle('row-error', disp > qta);
  tr.querySelector('.daord-val').textContent       = daOrd;
  tr.querySelector('.campo-totale').textContent    = formatEuro(prezzo * qta);
  calcTipologia(n);
  calcTotale();
}

function syncConfQta(n) {
  const tbody    = document.getElementById(`righe-${n}`);
  const firstQta = parseInt(tbody?.querySelector('.campo-qta')?.value) || 1;
  const confQta  = document.getElementById(`conf-qta-${n}`);
  if (confQta) confQta.value = firstQta;
  calcConf(n);
}

// ── CONFEZIONAMENTO ───────────────────────────────────────────────────────────

// Correzione 6: mostra/nasconde confetti e cartoncino solo se FLAG spuntato
function toggleConf(n) {
  const attivo = document.getElementById(`check-conf-${n}`)?.checked;
  document.getElementById(`confetti-row-${n}`).style.display = attivo ? '' : 'none';
  document.getElementById(`cart-row-${n}`).style.display     = attivo ? '' : 'none';
  calcConf(n);
  calcTotale();
}

function toggleGusto(n) {
  const tipo    = document.querySelector(`input[name="confetti-tipo-${n}"]:checked`)?.value;
  const altroEl = document.getElementById(`conf-gusto-altro-${n}`);
  if (altroEl) altroEl.style.display = tipo === 'altro' ? '' : 'none';
}

function calcConf(n) {
  const attivo = document.getElementById(`check-conf-${n}`)?.checked;
  const prezzo = parseEuro(document.getElementById(`conf-prezzo-${n}`)?.value);
  const qta    = parseInt(document.getElementById(`conf-qta-${n}`)?.value) || 0;
  const tot    = attivo ? prezzo * qta : 0;
  const totEl  = document.getElementById(`conf-tot-${n}`);
  if (totEl) totEl.textContent = formatEuro(tot);
  calcTipologia(n);
}

// ── CALCOLO ───────────────────────────────────────────────────────────────────

function calcTipologia(n) {
  const tbody = document.getElementById(`righe-${n}`);
  if (!tbody) return;
  let sub = 0;
  tbody.querySelectorAll('.campo-totale').forEach(el => { sub += parseEuro(el.textContent); });
  sub += parseEuro(document.getElementById(`conf-tot-${n}`)?.textContent);
  const subEl = document.getElementById(`sub-${n}`);
  if (subEl) subEl.textContent = formatEuro(sub);
}

function calcTotale() {
  let grand = 0;
  const rows = [];
  document.querySelectorAll('.tipologia-bomboniera').forEach(tip => {
    const n     = tip.id.replace('tip-','');
    const label = tip.querySelector('.tipologia-label-custom')?.value || `Tipologia ${n}`;
    const sub   = parseEuro(document.getElementById(`sub-${n}`)?.textContent);
    grand += sub;
    rows.push({ label, sub });
  });
  document.getElementById('grand-total').textContent = formatEuro(grand);
  document.getElementById('rows-riepilogo').innerHTML = rows.map(r =>
    `<div class="tot-row">
       <span style="color:var(--slate-500)">${escHtml(r.label)}</span>
       <span class="tot-val">${formatEuro(r.sub)}</span>
     </div>`
  ).join('');
}

function raccogliArticoli() {
  const articoli = [];
  document.querySelectorAll('.tipologia-bomboniera').forEach(tip => {
    const n     = parseInt(tip.id.replace('tip-',''));
    const label = tip.querySelector('.tipologia-label-custom')?.value || '';

    tip.querySelectorAll('.riga-prodotto').forEach(tr => {
      articoli.push({
        gruppo_id:      n,
        tipologia:      label,
        codice:         tr.querySelector('.campo-codice')?.value || '',
        descrizione:    tr.querySelector('.campo-descrizione')?.value || '',
        prezzo:         parseEuro(tr.querySelector('.campo-prezzo')?.value),
        qta:            parseInt(tr.querySelector('.campo-qta')?.value) || 0,
        merce_pronta:   parseInt(tr.querySelector('.campo-pronta')?.value) || 0,
        da_forn:        parseInt(tr.querySelector('.campo-forn')?.value) || 0,
        da_emporio_qta: parseInt(tr.querySelector('.campo-emp')?.value) || 0,
        da_altri_qta:   parseInt(tr.querySelector('.campo-altri')?.value) || 0,
        totale:         parseEuro(tr.querySelector('.campo-totale')?.textContent),
        is_confez:      false
      });
    });

    const confAttivo = tip.querySelector('.check-confezionamento')?.checked || false;
    const confTipo   = tip.querySelector(`input[name="confetti-tipo-${n}"]:checked`)?.value || 'mandorla';
    articoli.push({
      gruppo_id:      n,
      tipologia:      label,
      codice:         tip.querySelector('.campo-codice-cb')?.value || 'CB',
      descrizione:    'Confezionamento',
      prezzo:         parseEuro(document.getElementById(`conf-prezzo-${n}`)?.value),
      qta:            parseInt(document.getElementById(`conf-qta-${n}`)?.value) || 0,
      pronta:         document.getElementById(`conf-pronta-${n}`)?.checked || false,
      is_confez:      true,
      confez_attivo:  confAttivo,
      confetti_tipo:  confTipo,
      confetti_altro: document.getElementById(`conf-gusto-altro-${n}`)?.value || '',
      cart_fronte:    document.getElementById(`cart-fronte-${n}`)?.value || '',
      cart_interno:   document.getElementById(`cart-interno-${n}`)?.value || ''
    });
  });
  return articoli;
}

// ── SALVA ─────────────────────────────────────────────────────────────────────

async function salvaOrdine() {
  const emporio = getVal('select-emporio');
  const nome    = getVal('nome-cliente');
  const cognome = getVal('cognome-cliente');
  const cel     = getVal('cel-cliente');

  if (!emporio) { showToast('Seleziona un emporio', 'err'); return; }
  if (!nome)    { showToast('Nome cliente obbligatorio', 'err'); return; }
  if (!cognome) { showToast('Cognome cliente obbligatorio', 'err'); return; }
  if (!cel)     { showToast('Cellulare cliente obbligatorio', 'err'); return; }
  if (!document.querySelectorAll('.tipologia-bomboniera').length) {
    showToast('Aggiungi almeno una tipologia', 'err'); return;
  }

  const btn = document.getElementById('btn-salva');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';

  try {
    const articoli = raccogliArticoli();
    const totale   = parseEuro(document.getElementById('grand-total')?.textContent);

    const payload = {
      tipo_ordine:       'bomboniere',
      emporio,
      operatore:         getVal('select-operatore'),
      data_ordine:       document.getElementById('order-date')?.value || new Date().toISOString().split('T')[0],
      cliente_nome:      nome,
      cliente_cognome:   cognome,
      cliente_cellulare: cel,
      note:              getVal('note-ordine'),
      articoli,
      totale_ordine:     totale,
      stato:             'in_corso',
      data_creazione:    new Date().toISOString()
    };

    let res;
    if (ordineId) {
      res = await db.from('ordini_incorso').update(payload).eq('id', ordineId).select();
    } else {
      res = await db.from('ordini_incorso').insert([payload]).select();
    }

    if (res.error) throw res.error;

    if (!ordineId && res.data?.[0]) {
      ordineId = res.data[0].id;
      history.replaceState(null, '', `?id=${ordineId}`);
    }

    showToast('Ordine salvato!', 'ok');

    // Correzione 7: ri-renderizza dal DB usando creaTipologia()
    if (ordineId) await caricaOrdine(ordineId, true);

  } catch(e) {
    console.error(e);
    showToast('Errore: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Salva Ordine';
  }
}

// ── CARICA DAL DB (Correzione 7) ─────────────────────────────────────────────
// Usa creaTipologia() — nessun renderer separato

async function caricaOrdine(id, preserveScroll) {
  try {
    const { data, error } = await db.from('ordini_incorso').select('*').eq('id', id).single();
    if (error || !data) { showToast('Ordine non trovato', 'err'); return; }

    ordineId = id;
    document.getElementById('page-title').textContent =
      'Ordine Bomboniere' + (data.numero_ordine ? ' #'+data.numero_ordine : '');

    document.getElementById('select-emporio').value   = data.emporio || '';
    document.getElementById('select-operatore').value = data.operatore || '';
    document.getElementById('order-date').value       = data.data_ordine || '';
    document.getElementById('numero-ordine').value    = data.numero_ordine || '';
    document.getElementById('nome-cliente').value     = data.cliente_nome || '';
    document.getElementById('cognome-cliente').value  = data.cliente_cognome || '';
    document.getElementById('cel-cliente').value      = data.cliente_cellulare || '';
    document.getElementById('note-ordine').value      = data.note || '';

    // Raggruppa articoli per gruppo_id
    const gruppi = {};
    (data.articoli || []).forEach(a => {
      const gid = a.gruppo_id || 1;
      if (!gruppi[gid]) gruppi[gid] = { label: a.tipologia || '', prodotti: [], confezionamento: null };
      if (a.is_confez) {
        gruppi[gid].confezionamento = {
          attivo:         a.confez_attivo || false,
          codice:         a.codice || 'CB',
          prezzo:         a.prezzo ?? 3,
          qta:            a.qta || 1,
          pronta:         a.pronta || false,
          confetti_tipo:  a.confetti_tipo || 'mandorla',
          confetti_altro: a.confetti_altro || '',
          cart_fronte:    a.cart_fronte || '',
          cart_interno:   a.cart_interno || ''
        };
      } else {
        gruppi[gid].prodotti.push(a);
      }
    });

    const scrollY = preserveScroll ? window.scrollY : 0;
    document.getElementById('contenitore-tipologie').innerHTML = '';
    tipologiaCount = 0;

    Object.keys(gruppi).map(Number).sort((a,b)=>a-b).forEach(gid => {
      tipologiaCount++;
      const div = creaTipologia(tipologiaCount, gruppi[gid]);
      document.getElementById('contenitore-tipologie').appendChild(div);
    });

    calcTotale();
    if (preserveScroll) requestAnimationFrame(() => window.scrollTo(0, scrollY));

    if (typeof inizializzaSelectEmporio === 'function') inizializzaSelectEmporio('select-emporio');

  } catch(e) {
    console.error(e);
    showToast('Errore caricamento: ' + e.message, 'err');
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('order-date').value = new Date().toISOString().split('T')[0];

  if (typeof inizializzaSelectEmporio === 'function') inizializzaSelectEmporio('select-emporio');

  // Carica operatori
  try {
    const { data: ops } = await db.from('operatori').select('nome').order('nome');
    const sel = document.getElementById('select-operatore');
    (ops || []).forEach(op => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = op.nome;
      sel.appendChild(opt);
    });
    const me = typeof getOperatoreLoggato === 'function' ? getOperatoreLoggato() : null;
    if (me?.nome) sel.value = me.nome;
  } catch(e) {}

  // Carica ordine esistente se ?id= nell'URL
  const urlId = new URLSearchParams(location.search).get('id');
  if (urlId) {
    await caricaOrdine(urlId);
  } else {
    aggiungiTipologia();
  }
});
</script>
