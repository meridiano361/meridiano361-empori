<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordini</title>
  <style>
    .sel-wrap{padding:24px 16px 32px;max-width:640px;margin:0 auto}
    .sel-intro{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8;text-align:center;margin-bottom:20px}
    .sel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    @media(max-width:600px){.sel-grid{grid-template-columns:repeat(3,1fr)}}
    .emp-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:22px 12px 18px;text-align:center;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;user-select:none}
    .emp-card:hover{border-color:#B5453A;box-shadow:0 4px 18px rgba(181,69,58,.14);transform:translateY(-2px)}
    .ec-icon{width:64px;height:64px;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .ec-icon img{width:100%;height:100%;object-fit:cover}
    .ec-name{font-size:14px;font-weight:800;color:#1e293b;line-height:1.2}
  </style>
</head>
<body>
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<!-- Screen: Empori -->
<div id="screen-empori" style="display:none">
  <div class="sel-wrap">
    <p class="sel-intro">Seleziona emporio</p>
    <div class="sel-grid" id="sel-grid"></div>
  </div>
</div>

<!-- Screen: Cards -->
<div id="screen-cards" style="display:none">
  <main class="main">
    <div class="grid-auto">

      <a id="link-nuovi" href="ordini_nuovi.html" class="nav-card">
        <div class="nav-card-icon" style="background:#f0fdf4">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="3" width="24" height="24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <div class="nav-card-title">Nuovo Ordine</div>
      </a>

      <a id="link-incorso" href="ordini_incorso.html" class="nav-card">
        <div class="nav-card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" width="24" height="24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="nav-card-title">In Corso</div>
      </a>

      <a id="link-archiviati" href="ordini_archiviati.html" class="nav-card">
        <div class="nav-card-icon" style="background:#f1f5f9">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#64748b" stroke-width="2" width="24" height="24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
          </svg>
        </div>
        <div class="nav-card-title">Archiviati</div>
      </a>

    </div>
  </main>
</div>

<script>
const EMPORI=[
  {nome:'Casalmaggiore', img:'../../assets/images/logo_casalmaggiore.png'},
  {nome:'Cremona',       img:'../../assets/images/logo_cremona.png'},
  {nome:'Mantova',       img:'../../assets/images/logo_mantova.png'},
  {nome:'Reggio Emilia', img:'../../assets/images/logo_reggio_emilia.png'},
  {nome:'Viadana',       img:'../../assets/images/logo_viadana.png'},
];

function buildEmpiGrid(filtro=null){
  const g=document.getElementById('sel-grid');g.innerHTML='';
  const lista=filtro
    ?EMPORI.filter(e=>filtro.some(f=>f.toLowerCase()===e.nome.toLowerCase()))
    :EMPORI;
  lista.forEach(e=>{
    const c=document.createElement('div');c.className='emp-card';
    c.innerHTML=`<div class="ec-icon"><img src="${e.img}" alt="${e.nome}"></div><div class="ec-name">${e.nome}</div>`;
    c.onclick=()=>seleziona(e.nome);
    g.appendChild(c);
  });
}

function seleziona(emp){
  const q='?emporio='+encodeURIComponent(emp);
  document.getElementById('link-nuovi').href='ordini_nuovi.html'+q;
  document.getElementById('link-incorso').href='ordini_incorso.html'+q;
  document.getElementById('link-archiviati').href='ordini_archiviati.html'+q;
  document.getElementById('screen-empori').style.display='none';
  document.getElementById('screen-cards').style.display='block';
}

function init(){
  const user=JSON.parse(localStorage.getItem('m361_user')||'null');
  if(!user)return;
  const allEmpori=[user.emporio,...(Array.isArray(user.empori_aggiuntivi)?user.empori_aggiuntivi:[])].filter(Boolean);
  const uniqEmpori=[...new Set(allEmpori)];
  const isVeroAdmin=user.ruolo==='admin';

  if(isVeroAdmin){
    buildEmpiGrid(null);
    document.getElementById('screen-empori').style.display='block';
  } else if(uniqEmpori.length===1){
    seleziona(uniqEmpori[0]);
  } else {
    buildEmpiGrid(uniqEmpori.length>0?uniqEmpori:null);
    document.getElementById('screen-empori').style.display='block';
  }
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
</html>
