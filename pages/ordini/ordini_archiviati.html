<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="stylesheet" href="/nav-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Archiviati</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="ordini_incorso.html">
                <img src="logom361_rosso.jpg" alt="Logo" class="h-10 hover:opacity-80 transition-opacity">
            </a>
            <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700">Archivio Storico</h1>
        </div>
        <a href="ordini_incorso.html" class="text-xs font-bold text-slate-400 hover:text-[#b75252] uppercase tracking-widest">
            &larr; Torna agli Ordini
        </a>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <!-- Filtri e Ricerca -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="relative w-full md:w-96">
                <input type="text" id="search-input" placeholder="Cerca cliente o numero ordine..."
                       oninput="filtra()" class="w-full pl-10 pr-4 py-2.5 border rounded-xl text-sm focus:border-[#b75252] outline-none">
                <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <div class="flex gap-3 items-center flex-wrap ml-auto">
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Emporio</label>
                    <select id="filter-citta" onchange="filtra()" class="border rounded-xl px-4 py-2 text-sm bg-slate-50 outline-none">
                        <option value="">Tutti</option>
                        <option>Casalmaggiore</option>
                        <option>Cremona</option>
                        <option>Reggio Emilia</option>
                        <option>Viadana</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Anno</label>
                    <select id="filter-anno" onchange="filtra()" class="border rounded-xl px-4 py-2 text-sm bg-slate-50 outline-none">
                        <option value="">Tutti</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Tabella Archivio -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b text-[10px] uppercase tracking-widest text-slate-500 font-bold">
                        <th class="p-4">Data Evasione</th>
                        <th class="p-4">Cliente</th>
                        <th class="p-4">Emporio / Canale</th>
                        <th class="p-4">Operatore</th>
                        <th class="p-4 text-center">Totale</th>
                        <th class="p-4 text-center">Stato</th>
                        <th class="p-4 text-right">Azioni</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-sm text-slate-600 divide-y">
                    <tr><td colspan="7" class="p-8 text-center text-slate-400">Caricamento...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Footer data aggiornamento -->
        <p class="text-right text-[10px] text-slate-300 mt-4">Ultimo aggiornamento: <span id="stat-data">-</span></p>

        <!-- Modal Dettaglio -->
        <div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[85vh] overflow-y-auto p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold text-xl text-slate-800">Dettaglio Ordine</h2>
                    <button onclick="chiudiModal()" class="text-slate-400 hover:text-slate-700 text-2xl">&times;</button>
                </div>
                <div id="modal-content"></div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let tuttiOrdini = [];

        async function caricaArchivio() {
            const { data, error } = await _supabase
                .from('ordini_archiviati')
                .select('*')
                .order('data_evasione', { ascending: false });

            if (error) {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500">Errore: ${error.message}</td></tr>`;
                return;
            }

            tuttiOrdini = data || [];

            // Popola filtro anni
            const anni = [...new Set(tuttiOrdini.map(o => o.data_evasione ? new Date(o.data_evasione).getFullYear() : null).filter(Boolean))].sort((a,b) => b-a);
            const filterAnno = document.getElementById('filter-anno');
            anni.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a; opt.text = a;
                filterAnno.add(opt);
            });

            const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('stat-data').innerText = `oggi, ${ora}`;
            renderTabella(tuttiOrdini);
        }

        function renderTabella(ordini) {
            const tbody = document.getElementById('table-body');
            if (ordini.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400">Nessun ordine trovato.</td></tr>`;
                return;
            }

            tbody.innerHTML = ordini.map(ord => {
                const dataEvasione = ord.data_evasione ? new Date(ord.data_evasione).toLocaleDateString('it-IT') : '-';
                const nome = `${ord.cliente_nome || ''} ${ord.cliente_cognome || ''}`.trim();
                const citta = ord.citta || '-';
                const canale = ord.canale ? `<div class="text-[10px] text-slate-400 italic">${ord.canale}</div>` : '';
                const totale = ord.totale_ordine ? `€ ${parseFloat(ord.totale_ordine).toFixed(2)}` : '€ 0.00';
                const stato = ord.stato || 'Evaso';
                return `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="p-4 font-mono text-xs">${dataEvasione}</td>
                        <td class="p-4">
                            <div class="font-bold text-slate-800">${nome || 'N/D'}</div>
                            <div class="text-[10px] text-slate-400">${ord.cliente_cellulare || ''}</div>
                        </td>
                        <td class="p-4">
                            <span class="text-xs font-semibold">${citta}</span>
                            ${canale}
                        </td>
                        <td class="p-4 text-xs text-slate-500">${ord.operatore || '-'}</td>
                        <td class="p-4 text-center font-bold text-slate-800">${totale}</td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-bold uppercase">${stato}</span>
                        </td>
                        <td class="p-4 text-right">
                            <div class="flex gap-2 justify-end items-center">
                                <!-- Visualizza -->
                                <button onclick="apriDettaglio('${ord.id}')" title="Visualizza" class="text-slate-500 hover:text-[#b75252] p-2 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                </button>
                                <!-- Ripristina -->
                                <button onclick="ripristinaOrdine('${ord.id}')" title="Ripristina in Ordini in corso" class="text-slate-500 hover:text-amber-500 p-2 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                </button>
                                <!-- Modifica -->
                                <button onclick="modificaOrdine('${ord.id}')" title="Modifica" class="text-slate-500 hover:text-blue-500 p-2 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                                <!-- Elimina -->
                                <button onclick="eliminaOrdine('${ord.id}')" title="Elimina definitivamente" class="text-red-400 hover:text-red-600 p-2 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }

        function filtra() {
            const testo = document.getElementById('search-input').value.toLowerCase();
            const citta = document.getElementById('filter-citta').value.toLowerCase();
            const anno = document.getElementById('filter-anno').value;

            const filtrati = tuttiOrdini.filter(ord => {
                const searchStr = `${ord.cliente_nome || ''} ${ord.cliente_cognome || ''} ${ord.id}`.toLowerCase();
                const matchTesto = !testo || searchStr.includes(testo);
                const matchCitta = !citta || (ord.citta || '').toLowerCase() === citta;
                const matchAnno = !anno || (ord.data_evasione && new Date(ord.data_evasione).getFullYear() == anno);
                return matchTesto && matchCitta && matchAnno;
            });

            renderTabella(filtrati);
        }

        function apriDettaglio(id) {
            const ord = tuttiOrdini.find(o => o.id == id);
            if (!ord) return;
            const nome = `${ord.cliente_nome || ''} ${ord.cliente_cognome || ''}`.trim();
            let articoliData = ord.articoli;
            if (typeof articoliData === 'string') {
                try { articoliData = JSON.parse(articoliData); } catch(e) { articoliData = []; }
            }
            const articoli = articoliData && articoliData.length > 0
                ? `<table class="w-full text-xs mt-2 border-collapse">
                    <thead><tr class="bg-slate-50 text-[10px] uppercase text-slate-400 border-b">
                        <th class="p-2 text-left">Codice</th>
                        <th class="p-2 text-left">Descrizione</th>
                        <th class="p-2 text-center">Qtà</th>
                    </tr></thead>
                    <tbody class="divide-y">${articoliData.map(a => `
                        <tr class="hover:bg-slate-50">
                            <td class="p-2 font-mono text-slate-500">${a.codice||a.sku||'-'}</td>
                            <td class="p-2 font-medium text-slate-800">${a.descrizione||a.nome||a.name||a.title||'-'}</td>
                            <td class="p-2 text-center font-bold text-slate-700">${a.qta||a.quantita||a.quantity||0}</td>
                        </tr>`
                    ).join('')}</tbody></table>`
                : '<p class="text-slate-400 text-xs mt-2 italic">Nessun articolo registrato.</p>';

            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-3 text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Cliente</span><p class="font-bold text-slate-800">${nome}</p></div>
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Cellulare</span><p>${ord.cliente_cellulare||'-'}</p></div>
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Emporio</span><p>${ord.citta||'-'}${ord.canale ? ' - ' + ord.canale : ''}</p></div>
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Operatore</span><p>${ord.operatore||'-'}</p></div>
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Data Ordine</span><p>${ord.data_ordine||'-'}</p></div>
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Data Evasione</span><p>${ord.data_evasione ? new Date(ord.data_evasione).toLocaleDateString('it-IT') : '-'}</p></div>
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Totale</span><p class="font-bold text-[#b75252]">€ ${parseFloat(ord.totale_ordine||0).toFixed(2)}</p></div>
                        <div><span class="text-[10px] text-slate-400 uppercase font-bold">Note</span><p class="italic text-slate-500">${ord.note||'-'}</p></div>
                    </div>
                    <div class="mt-4 border-t pt-4">
                        <p class="text-[10px] text-slate-400 uppercase font-bold mb-2">Articoli</p>
                        ${articoli}
                    </div>
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        async function ripristinaOrdine(id) {
            if (!confirm("Ripristinare questo ordine in Ordini in Corso?")) return;
            const ord = tuttiOrdini.find(o => o.id == id);
            if (!ord) return;

            const ordineDaRipristinare = { ...ord };
            delete ordineDaRipristinare.id;
            delete ordineDaRipristinare.data_evasione;
            ordineDaRipristinare.stato = 'Nuovo';

            const { error: errInsert } = await _supabase.from('ordini_incorso').insert([ordineDaRipristinare]);
            if (errInsert) { alert("Errore ripristino: " + errInsert.message); return; }

            const { error: errDelete } = await _supabase.from('ordini_archiviati').delete().eq('id', id);
            if (errDelete) { alert("Errore eliminazione archivio: " + errDelete.message); return; }

            alert("Ordine ripristinato in Ordini in Corso!");
            tuttiOrdini = tuttiOrdini.filter(o => o.id !== id);
            filtra();
        }

        function modificaOrdine(id) {
            window.location.href = `ordini_modifica.html?id=${id}&src=archivio`;
        }

        async function eliminaOrdine(id) {
            if (!confirm("Eliminare definitivamente questo ordine dall'archivio? L'operazione è irreversibile.")) return;
            const { error } = await _supabase.from('ordini_archiviati').delete().eq('id', id);
            if (error) { alert("Errore eliminazione: " + error.message); return; }
            tuttiOrdini = tuttiOrdini.filter(o => o.id !== id);
            filtra();
        }

        function chiudiModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) chiudiModal();
        });

        window.onload = caricaArchivio;
    </script>
    <script src="/nav-script.js"></script>
</body>
</html>
