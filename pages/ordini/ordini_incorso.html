<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="stylesheet" href="/nav-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Ordini in corso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding-bottom: 50px; }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .active-filter { background-color: #1e293b !important; color: white !important; }
        
        .ping-notify {
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
            background-color: #b75252;
        }
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        .card-completata { background-color: #f1f5f9 !important; border-color: #e2e8f0 !important; }
        .card-completata h2 { color: #64748b !important; }
    </style>
</head>
<body>

    <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logom361_rosso.jpg" alt="Logo" class="h-10">
                           <h1 class="font-bold text-xl border-l pl-4 ml-2 text-slate-700"Ordini in corso</h1>
        </div>
        <div class="flex gap-4">
            <a href="index.html" class="text-slate-500 px-4 py-2.5 text-xs font-bold uppercase hover:text-slate-800 transition-all flex items-center">
                <i class="fas fa-home mr-2"></i> Dashboard
            </a>
            <a href="ordini_nuovi.html" class="bg-[#b75252] text-white px-6 py-2.5 rounded-xl text-xs font-bold uppercase shadow-md hover:opacity-90 transition-all">
                + NUOVO ORDINE
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex flex-wrap gap-2" id="filter-group">
                <button onclick="caricaOrdini('tutti', this)" class="active-filter bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase transition-all">Tutti</button>
                <button onclick="caricaOrdini('da_ordinare', this)" class="bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase hover:border-slate-400">Da ordinare</button>
                <button onclick="caricaOrdini('merce_pronta', this)" class="bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase hover:border-slate-400">Merce Pronta</button>
                <button onclick="caricaOrdini('da_avvisare', this)" class="bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase hover:border-slate-400">Da Avvisare</button>
                <button onclick="caricaOrdini('avvisati', this)" class="bg-white border border-slate-200 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold uppercase hover:border-slate-400">Avvisati</button>
            </div>
            
            <div class="relative w-full md:w-96">
                <span class="absolute left-4 top-3 text-slate-400"><i class="fas fa-search"></i></span>
                <input type="text" oninput="filtraPerNome(this.value)" placeholder="Cerca cliente o emporio..." class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-slate-100 transition-all">
            </div>
        </div>

        <div class="space-y-4" id="orders-container">
            <p class="text-center text-slate-400 py-20 font-medium">Caricamento ordini...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function caricaOrdini(filtro = 'tutti', btn = null) {
            if(btn) {
                document.querySelectorAll('#filter-group button').forEach(b => b.classList.remove('active-filter'));
                btn.classList.add('active-filter');
            }

            const container = document.getElementById('orders-container');
            let query = _supabase.from('ordini_incorso').select('*').order('created_at', { ascending: false });

            if (filtro === 'da_ordinare') query = query.or('merce_pronta.eq.false,merce_pronta.is.null');
            else if (filtro === 'merce_pronta') query = query.eq('merce_pronta', true);
            else if (filtro === 'da_avvisare') query = query.eq('merce_pronta', true).eq('cliente_avvisato', false);
            else if (filtro === 'avvisati') query = query.eq('cliente_avvisato', true);

            const { data: ordini, error } = await query;
            if (error) { container.innerHTML = "<p class='text-center text-red-500'>Errore durante il caricamento.</p>"; return; }

            container.innerHTML = ordini.length === 0 ? `<p class="text-center text-slate-400 py-20">Nessun ordine trovato per questo filtro.</p>` : "";

            ordini.forEach(ord => {
                const cardId = `card-${ord.id}`;
                const nomeCliente = `${ord.cliente_nome || ''} ${ord.cliente_cognome || ''}`.trim().toUpperCase();
                
                // Gestione emporio + canale
const cittaLabel = ord.citta ? ord.citta.toUpperCase() : "EMPORIO NON SPECIFICATO";
const canaleLabel = (ord.canale && ord.canale.trim() !== "") ? ` - ${ord.canale}` : "";
const emporio = cittaLabel + canaleLabel;
                
                const isPronta = ord.merce_pronta === true;
                const isAvvisato = ord.cliente_avvisato === true;
                const daAvvisare = isPronta && !isAvvisato;
                const completato = isPronta && isAvvisato;

                container.insertAdjacentHTML('beforeend', `
                    <div class="ordine-card bg-white border border-slate-200 rounded-[2rem] p-8 flex flex-col md:flex-row items-center justify-between shadow-sm hover:shadow-md transition-all relative overflow-hidden ${completato ? 'card-completata' : ''}" id="${cardId}" data-search="${nomeCliente} ${emporio}">
                        
                        ${daAvvisare ? `<div class="absolute top-0 left-0 w-1.5 h-full bg-[#b75252]"></div>` : ''}

                        <div class="w-full md:w-1/3 mb-4 md:mb-0">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="status-badge ${isPronta ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                                    ${isPronta ? 'Merce Pronta' : 'Da Ordinare'}
                                </span>
                                <span class="text-[10px] text-slate-300 font-mono">#${ord.id.toString().slice(-5)}</span>
                                <div class="flex gap-4 ml-2 items-center">
                                    <a href="ordini_modifica.html?id=${ord.id}" class="text-slate-400 hover:text-blue-500 transition-colors">
                                        <i class="fas fa-edit text-lg"></i>
                                    </a>
                                    <button onclick="eliminaOrdine('${ord.id}', '${cardId}')" class="text-red-200 hover:text-red-500 transition-colors">
                                        <i class="fas fa-trash-alt text-lg"></i>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <h2 class="text-2xl font-[900] text-slate-800 tracking-tight leading-none">${nomeCliente || 'CLIENTE ANONIMO'}</h2>
                                <p class="text-[11px] font-bold text-[#b75252] mt-1 tracking-wider italic">${emporio}</p>
                                
                                ${daAvvisare ? `
                                    <div class="flex items-center gap-1.5 bg-red-50 px-2 py-1 rounded-md border border-red-100 mt-2 w-fit">
                                        <span class="relative flex h-2 w-2">
                                            <span class="ping-notify absolute inline-flex h-full w-full rounded-full opacity-75"></span>
                                            <span class="relative inline-flex rounded-full h-2 w-2 bg-[#b75252]"></span>
                                        </span>
                                        <span class="text-[9px] font-bold text-[#b75252] uppercase">Da Avvisare</span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <div class="w-full md:w-1/3 flex flex-col gap-3 justify-center border-l border-r border-slate-50 px-8">
                            <label class="flex items-center gap-4 cursor-pointer group">
                                <input type="checkbox" ${isPronta ? 'checked' : ''} onchange="aggiornaStato('${ord.id}', 'merce_pronta', this.checked)" class="w-6 h-6 rounded-lg border-slate-300 accent-emerald-600">
                                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest group-hover:text-slate-800">Merce Pronta</span>
                            </label>
                            <label class="flex items-center gap-4 cursor-pointer group">
                                <input type="checkbox" ${isAvvisato ? 'checked' : ''} onchange="aggiornaStato('${ord.id}', 'cliente_avvisato', this.checked)" class="w-6 h-6 rounded-lg border-slate-300 accent-blue-600">
                                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest group-hover:text-slate-800">Cliente Avvisato</span>
                            </label>
                        </div>

                        <div class="w-full md:w-1/3 text-right flex items-center justify-end">
                            <button onclick="evadiOrdine('${ord.id}', '${cardId}')" class="bg-[#2d3748] text-white px-10 py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-slate-900 shadow-lg active:scale-95 transition-all">
                                RITIRATO / SPEDITO
                            </button>
                        </div>
                    </div>
                `);
            });
        }

        async function aggiornaStato(id, campo, valore) {
            await _supabase.from('ordini_incorso').update({ [campo]: valore }).eq('id', id);
            const activeBtn = document.querySelector('.active-filter');
            // Ricarica con il filtro corrente
            caricaOrdini(activeBtn.innerText.toLowerCase().includes('tutti') ? 'tutti' : activeBtn.innerText.toLowerCase().includes('ordinare') ? 'da_ordinare' : activeBtn.innerText.toLowerCase().includes('pronta') ? 'merce_pronta' : activeBtn.innerText.toLowerCase().includes('avvisare') ? 'da_avvisare' : 'avvisati');
        }

        async function eliminaOrdine(id, elementId) {
            if (confirm("Eliminare definitivamente questo ordine?")) {
                const { error } = await _supabase.from('ordini_incorso').delete().eq('id', id);
                if (!error) document.getElementById(elementId).remove();
            }
        }

        async function evadiOrdine(id, elementId) {
            if (confirm(`Spostare in archivio come consegnato?`)) {
                const { data: ordine } = await _supabase.from('ordini_incorso').select('*').eq('id', id).single();
                
                // Rimuoviamo l'id originale per permettere a Supabase di generarne uno nuovo nell'archivio
                const ordinePerArchivio = { ...ordine };
                delete ordinePerArchivio.id;
                
                const { error: errInsert } = await _supabase.from('ordini_archiviati').insert([{ 
                    ...ordinePerArchivio, 
                    stato: 'Evaso', 
                    data_evasione: new Date() 
                }]);

                if (!errInsert) {
                    await _supabase.from('ordini_incorso').delete().eq('id', id);
                    document.getElementById(elementId).remove();
                } else {
                    alert("Errore durante l'archiviazione: " + errInsert.message);
                }
            }
        }

        function filtraPerNome(testo) {
            const query = testo.toLowerCase();
            document.querySelectorAll('.ordine-card').forEach(card => {
                const content = card.getAttribute('data-search').toLowerCase();
                card.style.display = content.includes(query) ? 'flex' : 'none';
            });
        }

        window.onload = () => caricaOrdini();
    </script>
    <script src="/nav-script.js"></script>
</body>
</html>
