        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentOrderId = null;
        let currentType = 'standard';
        let groupCount = 0;
        let ALL_EMPORI = ["Casalmaggiore", "Cremona", "Reggio Emilia", "Viadana"];

        const OPERATORI_DATA = {
            "Cremona": ["Chiara Monteverdi", "Emilio Mazzolari", "Giulia Galelli"],
            "Casalmaggiore": ["Alessandra Rivetti", "Barbara Araldi", "Carla Maffei", "Chiara Monteverdi", "Edoardo Pavesi", "Emilio Mazzolari", "Erica Bossi", "Francesco Lunardini", "Giovanna Raineri", "Giulia Frigeri", "Giuseppe Lunardini", "Ileana Galli", "Maria Marcella Scaravonati", "Matilde Chiarini", "Michele Marchini", "Roberta Vezzosi", "Teyssir Mabrouk", "Vittoria Lunardini"],
            "Viadana": ["Alessia Rovina", "Ave Aroldi", "Barbara Piotrowska", "Carla Bellelli", "Carla Chittolini", "Chiara Monteverdi", "Claudio Mortini", "Donatella Falugi", "Elena Ghelfi", "Emilio Mazzolari", "Franco Furlotti", "Giuseppina Amadini", "Manuela Scazza", "Marta Sanfelici", "Mariagrazia Bertolini", "Mirella Panato", "Roberta Alberini", "Sara Germani", "Tiziana Bortesi"],
            "Reggio Emilia": ["Alessia Bartolomei", "Elsa Scarpa", "Manuela Capanni", "Marica Pioli"]
        };

        // GET ORDER ID FROM URL
        function getOrderIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function getSrcFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('src'); // 'archivio' se viene da ordini_archiviati
        }

        // LOAD ORDER DATA
        async function loadOrderData() {
            const orderId = getOrderIdFromURL();
            const src = getSrcFromURL();
            const table = src === 'archivio' ? 'ordini_archiviati' : 'ordini_incorso';
            const backPage = src === 'archivio' ? 'ordini_archiviati.html' : 'ordini_incorso.html';

            if (!orderId) {
                alert('ID ordine mancante!');
                window.location.href = backPage;
                return;
            }

            currentOrderId = orderId;

            // Update back button destination
            const backBtn = document.getElementById('back-btn');
            if (backBtn) backBtn.onclick = () => window.location.href = backPage;

            try {
                const { data, error } = await _supabase
                    .from(table)
                    .select('*')
                    .eq('id', orderId)
                    .maybeSingle();

                if (error) throw error;
                if (!data) throw new Error('Ordine non trovato nella tabella ' + table);

                populateForm(data);

                document.getElementById('loading-overlay').remove();
            } catch (error) {
                console.error('Error loading order:', error);
                alert('Errore nel caricamento dell\'ordine: ' + error.message);
                window.location.href = backPage;
            }
        }
        async function generateNumeroOrdine(emporio, data) {
            // Get emporio abbreviation
            const emporioMap = {
                'Cremona': 'CR',
                'Casalmaggiore': 'CA',
                'Reggio Emilia': 'RE',
                'Viadana': 'VI'
            };
            
            const sigla = emporioMap[emporio] || 'XX';
            const dateStr = data.replace(/-/g, ''); // 2026-05-11 -> 20260511
            
            try {
                // Query database to find last order number for this emporio and date
                const { data: existingOrders, error } = await _supabase
                    .from('ordini_incorso')
                    .select('numero_ordine')
                    .like('numero_ordine', `${dateStr}${sigla}#%`)
                    .order('numero_ordine', { ascending: false })
                    .limit(1);
                
                let progressivo = 1;
                
                if (existingOrders && existingOrders.length > 0) {
                    // Extract progressive number from last order
                    const lastOrder = existingOrders[0].numero_ordine;
                    const match = lastOrder.match(/#(\d+)$/);
                    if (match) {
                        progressivo = parseInt(match[1]) + 1;
                    }
                }
                
                // Format: 20260511CR#01
                const numeroOrdine = `${dateStr}${sigla}#${String(progressivo).padStart(2, '0')}`;
                return numeroOrdine;
                
            } catch (error) {
                console.error('Error generating order number:', error);
                // Fallback to basic generation
                return `${dateStr}${sigla}#01`;
            }
        }
        
        // Auto-update order number when emporio or date changes
        async function updateNumeroOrdine() {
            const emporio = document.getElementById('select-emporio')?.value;
            const data = document.getElementById('order-date')?.value;
            const numeroField = document.getElementById('numero-ordine-preview');
            
            if (emporio && data && numeroField) {
                numeroField.value = await generateNumeroOrdine(emporio, data);
            }
        }

        // POPULATE FORM WITH ORDER DATA
        function populateForm(order) {
            currentType = order.tipo_ordine || 'standard';
            
            // Helper function for safe element value setting
            const setValueSafe = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.value = value || '';
            };
            
            // Emporio
            setValueSafe('select-emporio', order.emporio || order.citta);
            handleCittaChange();
            
            if (order.canale) {
                setValueSafe('select-canale', order.canale);
            }
            
            // Operatore
            setTimeout(() => {
                setValueSafe('select-operatore', order.operatore);
            }, 100);
            
            // Date
            if (order.data_ordine) {
                setValueSafe('order-date', order.data_ordine);
            }
            
            // Order number
            setValueSafe('numero-ordine-preview', order.numero_ordine);
            
            // Cliente
            setValueSafe('cust-nome', order.cliente_nome);
            setValueSafe('cust-cognome', order.cliente_cognome);
            setValueSafe('cust-cel', order.cliente_cellulare);
            setValueSafe('cust-email', order.cliente_email);
            
            // WhatsApp
            const waBtn = document.getElementById('btn-wa');
            if (waBtn && (order.wa_attivo || order.cliente_whatsapp)) {
                waBtn.classList.add('wa-active');
                waBtn.classList.remove('wa-inactive');
            } else if (waBtn) {
                waBtn.classList.add('wa-inactive');
                waBtn.classList.remove('wa-active');
            }
            
            // Modalità consegna
            const modConsegna = order.modalita_consegna || 'Ritiro';
            const modConsegnaEl = document.querySelector(`input[name="mod_consegna"][value="${modConsegna}"]`);
            if (modConsegnaEl) modConsegnaEl.checked = true;
            
            // Acconto
            const acconto = parseFloat(order.acconto) || 0;
            setValueSafe('acconto', '€ ' + acconto.toFixed(2).replace('.', ','));
            
            // Note
            setValueSafe('order-notes', order.note);

            // Titolo
            setValueSafe('titolo-ordine', order.titolo || '');

            // Show/hide bomboniere-specific UI
            if (currentType === 'bomboniere') {
                document.getElementById('add-group-container')?.classList.remove('hidden');
                document.getElementById('breakdown-container')?.classList.remove('hidden');
            }

            // Products
            if (order.articoli && Array.isArray(order.articoli)) {
                const groupIds = [...new Set(order.articoli.map(p => p.gruppo_id || 1))];

                groupIds.forEach(gid => {
                    const groupArticoli = order.articoli.filter(p => (p.gruppo_id || 1) === gid && !p.is_omaggio);
                    const omaggioArticolo = order.articoli.find(p => (p.gruppo_id || 1) === gid && p.is_omaggio);
                    const tipologiaNome = groupArticoli[0]?.tipologia || '';

                    addGroup(tipologiaNome);
                    const localGroupId = groupCount;

                    // Remove only product rows (preserve confez/omaggio sub-rows)
                    const tbody = document.getElementById(`rows-container-${localGroupId}`);
                    tbody.querySelectorAll('.product-row').forEach(r => r.remove());

                    groupArticoli.forEach(product => {
                        addRowWithData(localGroupId, product);
                    });

                    // Restore confezionamento fields
                    if (currentType === 'bomboniere' && groupArticoli[0]) {
                        const a = groupArticoli[0];
                        if (a.confez_costo != null) {
                            const costInp = document.getElementById(`confez-cost-inp-${localGroupId}`);
                            if (costInp) costInp.value = '€ ' + parseFloat(a.confez_costo || 3).toFixed(2).replace('.', ',');
                        }
                        const confezQtyEl = document.getElementById(`confez-qty-${localGroupId}`);
                        if (confezQtyEl) confezQtyEl.value = a.qta || 1;
                        if (a.confez_tipo) {
                            const tipoEl = document.querySelector(`input[name="confez-tipo-${localGroupId}"][value="${a.confez_tipo}"]`);
                            if (tipoEl) { tipoEl.checked = true; }
                        }
                        if (a.cartoncino_fronte) {
                            const fronteEl = document.getElementById(`cart-fronte-${localGroupId}`);
                            if (fronteEl) fronteEl.value = a.cartoncino_fronte;
                        }
                        if (a.cartoncino_interno) {
                            const internoEl = document.getElementById(`cart-interno-${localGroupId}`);
                            if (internoEl) internoEl.value = a.cartoncino_interno;
                        }
                        if (a.confezionamento) {
                            const checkConf = document.getElementById(`check-conf-${localGroupId}`);
                            if (checkConf) { checkConf.checked = true; toggleConfezOptions(localGroupId); }
                        }
                    }

                    // Restore omaggio row fields
                    if (currentType === 'bomboniere' && omaggioArticolo) {
                        const g = localGroupId;
                        const el = id => document.getElementById(id);
                        if (el(`omaggio-qty-${g}`))    el(`omaggio-qty-${g}`).value    = omaggioArticolo.qta || 1;
                        if (el(`omaggio-pronta-${g}`)) el(`omaggio-pronta-${g}`).value = omaggioArticolo.merce_pronta || 0;
                        if (el(`omaggio-forn-${g}`))   el(`omaggio-forn-${g}`).value   = omaggioArticolo.da_forn || 0;
                        if (el(`omaggio-emp-${g}`))    el(`omaggio-emp-${g}`).value    = omaggioArticolo.da_emporio_qta || 0;
                        if (el(`omaggio-altri-${g}`))  el(`omaggio-altri-${g}`).value  = omaggioArticolo.da_altri_qta || 0;
                        calcOmaggioDisp(g);
                    }

                    if (currentType === 'bomboniere') {
                        calcConfezOmaggio(localGroupId);
                    }
                });
            } else {
                addGroup('');
            }

            calcGrandTotal();
        }

        function handleCittaChange() {
            const citta = document.getElementById('select-emporio').value;
            const canaleContainer = document.getElementById('canale-cremona-container');

            canaleContainer.classList.toggle('hidden', citta !== 'Cremona');
            document.getElementById('select-canale').required = (citta === 'Cremona');
            
            opSelect.innerHTML = '<option value="">Seleziona Operatore *</option>';
            (OPERATORI_DATA[citta] || []).sort().forEach(op => {
                const opt = document.createElement('option');
                opt.value = op;
                opt.text = op;
                opSelect.add(opt);
            });
            
            updateAllEmporiDropdowns();
        }

        function getEmporioOptions() {
            const mainCitta = document.getElementById('select-emporio').value;
            let options = '<option value="">Dove?</option>';
            ALL_EMPORI.forEach(e => {
                if (e !== mainCitta) {
                    options += `<option value="${e}">${e}</option>`;
                }
            });
            return options;
        }

        function updateAllEmporiDropdowns() {
            document.querySelectorAll('.emporio-dropdown').forEach(select => {
                const currentVal = select.value;
                select.innerHTML = getEmporioOptions();
                select.value = currentVal;
            });
        }

        function removeGroup(groupId) {
            const g = document.getElementById(`group-${groupId}`);
            if (g) g.remove();

        function addRow(groupId) {
            addRowWithData(groupId, {
                codice: '',
                descrizione: '',
                prezzo: 0,
                qta: 1,
                merce_pronta: 0,
                da_forn: 0,
                da_emporio_qta: 0,
                da_emporio_nome: '',
                da_altri_qta: 0,
                da_altri_spec: ''
            });
        }

        function calcRow(rowId, groupId) {
            const row = document.getElementById(`row-${rowId}`);
            if (!row) return;
            
            const qty = parseInt(row.querySelector('.qty-input').value) || 0;
            const price = parseFloat(row.querySelector('.price-input').value.replace('€', '').replace(',', '.').trim()) || 0;
            const parte = parseInt(row.querySelector('.pronta-input').value) || 0;
            const forn = parseInt(row.querySelector('.forn-input').value) || 0;
            const empQ = parseInt(row.querySelector('.emp-q-input').value) || 0;
            const altriQ = parseInt(row.querySelector('.altri-q-input').value) || 0;
            
            const sumProv = parte + forn + empQ + altriQ;
            const daOrd = Math.max(0, qty - sumProv);
            
            row.classList.toggle('row-error', sumProv > qty);
            row.querySelector('.do-value').textContent = daOrd;

            const rowTotal = qty * price;
            row.querySelector('.row-total').textContent = rowTotal.toFixed(2).replace('.', ',');

            if (currentType === 'bomboniere') {
                calcSubtotal(groupId);
            }
            calcGrandTotal();
            validateGlobal();
        }

        function validateGlobal() {
            const hasErrors = document.querySelectorAll('.row-error').length > 0;
            const btn = document.getElementById('submit-btn');
            btn.disabled = hasErrors;
        }

        function calcGrandTotal() {
            let grand = 0;
            document.querySelectorAll('.row-total').forEach(el => {
                grand += parseFloat(el.textContent.replace(',', '.')) || 0;
            });
            document.querySelectorAll('.confez-total-cell').forEach(el => {
                grand += parseFloat(el.textContent.replace(',', '.')) || 0;
            });

            document.getElementById('grand-total').textContent = '€ ' + grand.toFixed(2).replace('.', ',');

            const accontoText = document.getElementById('acconto').value.replace('€', '').replace(',', '.').trim();
            const acconto = parseFloat(accontoText) || 0;
            const saldo = Math.max(0, grand - acconto);

            document.getElementById('saldo-finale').textContent = '€ ' + saldo.toFixed(2).replace('.', ',');

            if (currentType === 'bomboniere') calcBomboniereBreakdown();
        }

        function calcSubtotal(groupId) {
            let sub = 0;
            const container = document.getElementById(`rows-container-${groupId}`);
            if (container) {
                container.querySelectorAll('.row-total').forEach(el => {
                    sub += parseFloat(el.textContent.replace(',', '.')) || 0;
                });
                const confezTot = document.getElementById(`confez-total-${groupId}`);
                if (confezTot) sub += parseFloat(confezTot.textContent.replace(',', '.')) || 0;
                const subtotalEl = document.getElementById(`subtotal-${groupId}`);
                if (subtotalEl) subtotalEl.textContent = '€ ' + sub.toFixed(2).replace('.', ',');
            }
        }

        function calcBomboniereBreakdown() {
            let subtotBomb = 0, subtotConfez = 0;
            document.querySelectorAll('.product-row').forEach(row => {
                const qty = parseInt(row.querySelector('.qty-input')?.value) || 0;
                const price = parseFloat(row.querySelector('.price-input')?.value.replace('€','').replace(',','.').trim()) || 0;
                subtotBomb += qty * price;
            });
            document.querySelectorAll('[id^="confez-total-"]').forEach(el => {
                subtotConfez += parseFloat(el.textContent.replace(',', '.')) || 0;
            });
            const fmt = n => '€ ' + n.toFixed(2).replace('.', ',');
            const bEl = document.getElementById('breakdown-bomb');
            const cEl = document.getElementById('breakdown-confez');
            const tEl = document.getElementById('breakdown-total');
            if (bEl) bEl.textContent = fmt(subtotBomb);
            if (cEl) cEl.textContent = fmt(subtotConfez);
            if (tEl) tEl.textContent = fmt(subtotBomb + subtotConfez);
        }

        function clearCurrency(input) {
            const val = input.value.replace('€', '').replace(',', '.').trim();
            if (val === '0.00' || val === '0') {
                input.value = '';
            } else {
                input.value = val;
            }
        }

        function formatCurrency(input) {
            const val = parseFloat(input.value.replace('€', '').replace(',', '.').trim()) || 0;
            input.value = '€ ' + val.toFixed(2).replace('.', ',');
        }

        function removeRow(rowId, groupId) {
            const row = document.getElementById(`row-${rowId}`);
            if (row) {
                row.remove();
                calcGrandTotal();
                validateGlobal();
            }
        }

                                   id="confez-senza-${groupId}"
                                   onchange="toggleConfezTipo('${groupId}')">
                            <span style="font-size:11px;font-weight:700;color:#334155">Senza confetti</span>
                        </label>
                        <div class="confez-gusto-grp" id="confez-gusto-grp-${groupId}" style="display:flex">
                            <select class="confez-gusto-sel" id="confez-gusto-${groupId}"
                                    onchange="toggleGusto('${groupId}')">
                                <option value="mandorla">Mandorla</option>
                                <option value="mandorla-cioc">Mandorla e Cioccolato</option>
                                <option value="altro">Altro gusto…</option>
                            </select>
                            <input type="text" class="confez-gusto-altro" id="confez-gusto-altro-${groupId}"
                                   placeholder="Specifica gusto…">
                        </div>
                    </div>
                </td>`;
            tbody.appendChild(confOpsRow);

            // ── Riga ANTEPRIMA CARTONCINO ──
            const cartRow = document.createElement('tr');
            cartRow.id = `cartoncino-${groupId}`;
            cartRow.className = 'cartoncino-preview-sub-row';
            cartRow.style.display = 'none';
            cartRow.innerHTML = `
                <td colspan="12">
                    <div style="padding:8px 12px 12px;background:#f1f5f9">
                        <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:6px">
                            Anteprima Cartoncino
                        </div>
                        <div class="cartoncino-preview">
                            <div class="cartoncino-faccia">
                                <textarea id="cart-fronte-${groupId}" placeholder="Fronte…"></textarea>
                            </div>
                            <div class="cartoncino-faccia">
                                <textarea id="cart-interno-${groupId}" placeholder="Retro…"></textarea>
                            </div>
                        </div>
                    </div>
                </td>`;
            tbody.appendChild(cartRow);

            // ── Riga CARTONCINI OMAGGIO ──
            const omaggioRow = document.createElement('tr');
            omaggioRow.id = `omaggio-${groupId}`;
            omaggioRow.className = 'omaggio-sub-row';
            omaggioRow.innerHTML = `
                <td style="background:rgba(181,69,58,0.12);width:32px"></td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important">
                    <input type="text" value="CO" class="omaggio-inp-sm" style="width:60px">
                </td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important">
                    <span style="font-weight:700;font-size:11px">Cartoncini omaggio</span>
                </td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important;text-align:right">
                    <input type="text" value="€ 0,00" class="omaggio-inp-sm" style="width:80px;text-align:right"
                           id="omaggio-price-${groupId}"
                           onfocus="clearCurrency(this)" onblur="formatCurrency(this)">
                </td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important">
                    <input type="number" id="omaggio-qty-${groupId}" value="1" min="0"
                           oninput="calcOmaggioDisp(${groupId})"
                           class="omaggio-inp-sm" style="text-align:center">
                </td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important">
                    <input type="number" id="omaggio-pronta-${groupId}" value="0" min="0"
                           oninput="calcOmaggioDisp(${groupId})" class="omaggio-inp-sm" style="text-align:center">
                </td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important">
                    <input type="number" id="omaggio-forn-${groupId}" value="0" min="0"
                           oninput="calcOmaggioDisp(${groupId})" class="omaggio-inp-sm" style="text-align:center">
                </td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important">
                    <input type="number" id="omaggio-emp-${groupId}" value="0" min="0"
                           oninput="calcOmaggioDisp(${groupId})" class="omaggio-inp-sm" style="text-align:center">
                </td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important">
                    <input type="number" id="omaggio-altri-${groupId}" value="0" min="0"
                           oninput="calcOmaggioDisp(${groupId})" class="omaggio-inp-sm" style="text-align:center">
                </td>
                <td id="omaggio-daord-${groupId}"
                    style="background:rgba(155,53,48,0.25);padding:3px 4px !important;text-align:center;font-weight:800;color:#B5453A;font-family:'Inter',sans-serif">0</td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 16px 3px 4px !important;text-align:right;font-weight:700;color:#B5453A;font-family:'Inter',sans-serif">€ 0,00</td>
                <td style="background:rgba(181,69,58,0.12);padding:3px 4px !important"></td>`;
            tbody.appendChild(omaggioRow);
        }

        function syncConfezOmaggio(groupId) {
            const tbody = document.getElementById(`rows-container-${groupId}`);
            if (!tbody) return;
            const firstRow = tbody.querySelector('.product-row');
            const qty = firstRow ? (parseInt(firstRow.querySelector('.qty-input').value) || 1) : 1;
            const confezQty = document.getElementById(`confez-qty-${groupId}`);
            const omaggioQty = document.getElementById(`omaggio-qty-${groupId}`);
            if (confezQty) confezQty.value = qty;
            if (omaggioQty) omaggioQty.value = qty;
            calcConfezOmaggio(groupId);
        }

        function calcConfezOmaggio(groupId) {
            const qty = parseInt(document.getElementById(`confez-qty-${groupId}`)?.value) || 0;
            const cost = parseFloat(document.getElementById(`confez-cost-inp-${groupId}`)?.value.replace('€','').replace(',','.').trim()) || 0;
            const totalEl = document.getElementById(`confez-total-${groupId}`);
            if (totalEl) totalEl.textContent = (qty * cost).toFixed(2).replace('.', ',');
            calcOmaggioDisp(groupId);
            calcSubtotal(groupId);
            calcGrandTotal();
        }

        function calcOmaggioDisp(groupId) {
            const qty    = parseInt(document.getElementById(`omaggio-qty-${groupId}`)?.value) || 0;
            const pronta = parseInt(document.getElementById(`omaggio-pronta-${groupId}`)?.value) || 0;
            const forn   = parseInt(document.getElementById(`omaggio-forn-${groupId}`)?.value) || 0;
            const emp    = parseInt(document.getElementById(`omaggio-emp-${groupId}`)?.value) || 0;
            const altri  = parseInt(document.getElementById(`omaggio-altri-${groupId}`)?.value) || 0;
            const daOrd  = Math.max(0, qty - pronta - forn - emp - altri);
            const el = document.getElementById(`omaggio-daord-${groupId}`);
            if (el) el.textContent = daOrd;
        }

        function toggleConfezOptions(groupId) {
            const checked = document.getElementById(`check-conf-${groupId}`)?.checked;
            const optsRow = document.getElementById(`confez-opts-${groupId}`);
            const cartRow = document.getElementById(`cartoncino-${groupId}`);
            if (optsRow) optsRow.style.display = checked ? 'table-row' : 'none';
            if (!checked && cartRow) cartRow.style.display = 'none';
            if (checked) toggleConfezTipo(groupId);
        }

        function toggleConfezTipo(groupId) {
            const tipo = document.querySelector(`input[name="confez-tipo-${groupId}"]:checked`)?.value;
            const gustoGrp = document.getElementById(`confez-gusto-grp-${groupId}`);
            const cartRow  = document.getElementById(`cartoncino-${groupId}`);
            const costInp  = document.getElementById(`confez-cost-inp-${groupId}`);
            const flagChecked = document.getElementById(`check-conf-${groupId}`)?.checked;
            if (tipo === 'senza_confetti') {
                if (gustoGrp) gustoGrp.style.display = 'none';
                if (cartRow)  cartRow.style.display   = 'none';
                if (costInp) {
                    const curr = parseFloat(costInp.value.replace('€','').replace(',','.').trim());
                    if (!isNaN(curr) && curr !== 2) costInp.dataset.prevPrice = curr;
                    costInp.value = '€ 2,00';
                }
            } else {
                if (gustoGrp) gustoGrp.style.display = 'flex';
                if (flagChecked && cartRow) cartRow.style.display = 'table-row';
                if (costInp) {
                    const prev = parseFloat(costInp.dataset.prevPrice) || 3;
                    costInp.value = '€ ' + prev.toFixed(2).replace('.', ',');
                }
            }
            calcConfezOmaggio(groupId);
        }

        function toggleGusto(groupId) {
            const sel = document.getElementById(`confez-gusto-${groupId}`);
            const altroInp = document.getElementById(`confez-gusto-altro-${groupId}`);
            if (altroInp) altroInp.style.display = sel?.value === 'altro' ? 'inline-block' : 'none';
        }
        // ────────────────────────────────────────────────────────────────────────

        function spostaRiga(btn, direzione) {
            const riga = btn.closest('.product-row');
            const contenitore = riga.parentElement;
            const righe = [...contenitore.querySelectorAll('.product-row')];
            const index = righe.indexOf(riga);
            const nuovoIndex = index + direzione;
            if (nuovoIndex < 0 || nuovoIndex >= righe.length) return;
            if (direzione === -1) {
                contenitore.insertBefore(riga, righe[nuovoIndex]);
            } else {
                contenitore.insertBefore(righe[nuovoIndex], riga);
            }
        }

        // UPDATE ORDER
        function validaFormOrdine() {
            const campiObbligatori = [
                { id: 'select-emporio', label: 'Emporio' },
                { id: 'cust-nome',      label: 'Nome cliente' },
                { id: 'cust-cognome',   label: 'Cognome cliente' },
                { id: 'cust-cel',       label: 'Cellulare cliente' },
            ];
            for (const campo of campiObbligatori) {
                const el = document.getElementById(campo.id);
                if (!el || !el.value.trim()) {
                    el?.focus();
                    el?.classList.add('campo-errore');
                    alert('Campo obbligatorio: ' + campo.label);
                    return false;
                }
                el.classList.remove('campo-errore');
            }
            const righe = document.querySelectorAll('.product-row');
            if (!righe.length) {
                alert("Aggiungi almeno un prodotto all'ordine");
                return false;
            }
            return true;
        }

        async function validateUpdate(event) {
            event.preventDefault();
            if (!validaFormOrdine()) return;

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Aggiornamento...';
            
            try {
                const articoli = [];
                const groupsSavedOmaggio = new Set();
                document.querySelectorAll('.product-row').forEach(row => {
                    const gruppoId = parseInt(row.closest('[id^="group-"]').id.replace('group-', ''));
                    const tipologiaInput = document.getElementById(`tipologia-name-${gruppoId}`);
                    const tipologiaNome = tipologiaInput?.value || '';
                    const confezTipo = document.querySelector(`input[name="confez-tipo-${gruppoId}"]:checked`)?.value || 'completo';
                    const costInp = document.getElementById(`confez-cost-inp-${gruppoId}`);
                    const confezCosto = parseFloat(costInp?.value.replace('€','').replace(',','.').trim()) || 0;
                    const qta = parseInt(row.querySelector('.qty-input').value) || 0;

                    articoli.push({
                        gruppo_id: gruppoId,
                        tipologia: tipologiaNome,
                        codice: row.querySelector('.codice-input').value,
                        descrizione: row.querySelector('.desc-input').value,
                        prezzo: parseFloat(row.querySelector('.price-input').value.replace('€','').replace(',','.').trim()) || 0,
                        qta,
                        merce_pronta: parseInt(row.querySelector('.pronta-input').value) || 0,
                        da_forn: parseInt(row.querySelector('.forn-input').value) || 0,
                        da_emporio_qta: parseInt(row.querySelector('.emp-q-input').value) || 0,
                        da_emporio_nome: row.querySelector('.emporio-dropdown').value,
                        da_altri_qta: parseInt(row.querySelector('.altri-q-input').value) || 0,
                        da_altri_spec: row.querySelector('.altri-spec-input').value,
                        totale: parseFloat(row.querySelector('.row-total').textContent.replace(',', '.')) || 0,
                        confezionamento: document.getElementById(`check-conf-${gruppoId}`)?.checked || false,
                        confez_tipo: confezTipo,
                        confez_costo: confezCosto,
                        cartoncino_fronte: document.getElementById(`cart-fronte-${gruppoId}`)?.value || '',
                        cartoncino_interno: document.getElementById(`cart-interno-${gruppoId}`)?.value || ''
                    });

                    // Save omaggio once per group (bomboniere only)
                    if (currentType === 'bomboniere' && !groupsSavedOmaggio.has(gruppoId)) {
                        groupsSavedOmaggio.add(gruppoId);
                        const oQta    = parseInt(document.getElementById(`omaggio-qty-${gruppoId}`)?.value) || qta;
                        const oPronte = parseInt(document.getElementById(`omaggio-pronta-${gruppoId}`)?.value) || 0;
                        const oForn   = parseInt(document.getElementById(`omaggio-forn-${gruppoId}`)?.value) || 0;
                        const oEmp    = parseInt(document.getElementById(`omaggio-emp-${gruppoId}`)?.value) || 0;
                        const oAltri  = parseInt(document.getElementById(`omaggio-altri-${gruppoId}`)?.value) || 0;
                        articoli.push({
                            gruppo_id: gruppoId,
                            tipologia: tipologiaNome,
                            codice: 'CARTONCINI-OMAGGIO',
                            descrizione: 'Cartoncini omaggio',
                            prezzo: 0,
                            qta: oQta,
                            merce_pronta: oPronte,
                            da_forn: oForn,
                            da_emporio_qta: oEmp,
                            da_emporio_nome: '',
                            da_altri_qta: oAltri,
                            da_altri_spec: '',
                            totale: 0,
                            is_omaggio: true
                        });
                    }
                });

                const orderData = {
                    tipo_ordine: currentType,
                    emporio: document.getElementById('select-emporio').value,
                    canale: document.getElementById('select-canale')?.value || null,
                    operatore: document.getElementById('select-operatore').value,
                    data_ordine: document.getElementById('order-date').value,
                    cliente_nome: document.getElementById('cust-nome').value,
                    cliente_cognome: document.getElementById('cust-cognome').value,
                    cliente_cellulare: document.getElementById('cust-cel').value,
                    cliente_email: document.getElementById('cust-email').value,
                    wa_attivo: document.getElementById('btn-wa').classList.contains('wa-active'),
                    modalita_consegna: document.querySelector('input[name="mod_consegna"]:checked').value,
                    totale_ordine: parseFloat(document.getElementById('grand-total').textContent.replace('€', '').replace(',', '.').trim()),
                    acconto: parseFloat(document.getElementById('acconto').value.replace('€', '').replace(',', '.').trim()) || 0,
                    da_pagare: parseFloat(document.getElementById('saldo-finale').textContent.replace('€', '').replace(',', '.').trim()),
                    note: document.getElementById('order-notes').value,
                    titolo: document.getElementById('titolo-ordine')?.value || '',
                    articoli: articoli,
                    stato: articoli.length > 0 && articoli.every(a => (parseInt(a.merce_pronta) || 0) >= (parseInt(a.qta) || 0)) ? 'merce_pronta' : 'in_corso'
                };

                const src = getSrcFromURL();
                const table = src === 'archivio' ? 'ordini_archiviati' : 'ordini_incorso';
                const backPage = src === 'archivio' ? 'ordini_archiviati.html' : 'ordini_incorso.html';

                const { data, error } = await _supabase
                    .from(table)
                    .update(orderData)
                    .eq('id', currentOrderId);

                if (error) throw error;

                modificheNonSalvate = false;
                alert('Ordine aggiornato con successo!');
                window.location.href = backPage;
            } catch (error) {
                console.error('Error updating order:', error);
                alert('Errore nell\'aggiornamento: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt mr-2"></i> Aggiorna Ordine';
            }

            return false;
        }

        // ── BLOCCO 5: Avviso modifiche non salvate ──────────────────────────
        let modificheNonSalvate = false;
        let _uscitaUrl = null;

        window.addEventListener('beforeunload', function(e) {
            if (modificheNonSalvate) {
                e.preventDefault();
                return (e.returnValue = '');
            }
        });

        function _confermUscita() {
            modificheNonSalvate = false;
            document.getElementById('modal-uscita').classList.add('hidden');
            if (_uscitaUrl) window.location.href = _uscitaUrl;
            _uscitaUrl = null;
        }
        // ────────────────────────────────────────────────────────────────────

        // INITIALIZE
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('back-btn').addEventListener('click', () => {
                window.location.href = 'ordini_incorso.html';
            });
            
            document.getElementById('select-emporio').addEventListener('change', handleCittaChange);
            if (typeof inizializzaSelectEmporio === 'function') inizializzaSelectEmporio('select-emporio');
            document.getElementById('btn-wa').addEventListener('click', toggleWA);
            
            const accontoInput = document.getElementById('acconto');
            accontoInput.addEventListener('focus', () => clearCurrency(accontoInput));
            accontoInput.addEventListener('blur', () => formatCurrency(accontoInput));
            accontoInput.addEventListener('input', calcGrandTotal);
            
            document.getElementById('orderForm').addEventListener('submit', validateUpdate);

            // BLOCCO 5: track unsaved changes (after form load)
            document.getElementById('orderForm').addEventListener('input', () => { modificheNonSalvate = true; }, true);
            document.getElementById('orderForm').addEventListener('change', () => { modificheNonSalvate = true; }, true);

            loadOrderData();
        });
    </script>

    <script src="../../scripts/auth.js"></script>
    <script src="../../scripts/nav-script.js"></script>
</body>
