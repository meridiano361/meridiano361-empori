<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Nuovo Ordine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
        }
        .text-m361-red { color: #b75252; }
        .bg-m361-red { background-color: #b75252; }
        .border-m361-red { border-color: #b75252; }
        
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }
        
        .wa-active { color: #25D366; }
        .wa-inactive { color: #cbd5e1; }
        .row-error { 
            background-color: #fee2e2 !important; 
            border: 2px solid #ef4444 !important; 
        }

        /* RED BUTTON DESIGN */
        .btn-red-big {
            padding: 24px 40px;
            background-color: #b75252;
            color: white;
            border-radius: 16px;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 25px rgba(183, 82, 82, 0.3);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            border: none;
        }
        .btn-red-big:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(183, 82, 82, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background-color: #b75252;
            color: white;
            border-radius: 16px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 8px 20px rgba(183, 82, 82, 0.3);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-submit:hover:not(:disabled) {
            transform: scale(1.01);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .section-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            border: 1px solid #f1f5f9;
        }

        .section-title {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .section-title::before {
            content: '';
            display: block;
            width: 3px;
            height: 14px;
            background: #b75252;
            border-radius: 2px;
        }

        .form-input {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            color: #334155;
            background: #fff;
        }
        .form-input:focus {
            outline: none;
            border-color: #b75252;
        }

        .form-select {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            color: #334155;
            background: #fff;
        }
        .form-select:focus {
            outline: none;
            border-color: #b75252;
        }

        /* Product table styles */
        .product-table th {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding-bottom: 8px;
        }
        
        .product-table input, .product-table select {
            font-size: 12px;
            padding: 6px 8px;
            border-radius: 8px;
        }

        .total-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            min-width: 180px;
        }
        .total-box-label {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #94a3b8;
            display: block;
            margin-bottom: 8px;
        }
        .total-box-value {
            font-size: 24px;
            font-weight: 900;
            color: #1e293b;
            font-family: 'DM Mono', monospace;
        }

        .saldo-box {
            background: #b75252;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            min-width: 180px;
            box-shadow: 0 8px 20px rgba(183, 82, 82, 0.3);
        }
        .saldo-box-label {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            display: block;
            margin-bottom: 8px;
        }
        .saldo-box-value {
            font-size: 24px;
            font-weight: 900;
            color: white;
            font-family: 'DM Mono', monospace;
        }

        .add-row-btn {
            background: #f1f5f9;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .add-row-btn:hover {
            background: #e2e8f0;
        }

        .add-group-btn {
            background: #1e293b;
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.3);
            transition: all 0.15s;
        }
        .add-group-btn:hover {
            background: #334155;
        }
    </style>
</head>
<body class="pb-28">

    <header class="bg-white border-b p-4 px-6 md:px-8 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <img src="../../assets/images/logom361_rosso.jpg" alt="Logo" class="h-8" onerror="this.style.display='none'">
            <h1 id="header-title" class="font-bold text-lg border-l pl-4 text-slate-700">Nuovo Ordine</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="back-btn" class="hidden text-sm font-bold text-slate-500 hover:text-m361-red transition-colors flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Indietro
            </button>
            <a href="ordini_incorso.html" class="text-xs font-bold text-slate-500 hover:text-m361-red transition-colors px-3 py-2 rounded-lg border border-slate-200 hover:border-m361-red flex items-center gap-2">
                <i class="fas fa-clock"></i> In Corso
            </a>
            <a href="ordini_archiviati.html" class="text-xs font-bold text-slate-500 hover:text-slate-700 transition-colors px-3 py-2 rounded-lg border border-slate-200 hover:border-slate-400 flex items-center gap-2">
                <i class="fas fa-archive"></i> Archiviati
            </a>
        </div>
    </header>

    <!-- Quick Navigation Bar -->
    <div class="bg-white border-b px-6 md:px-8 py-3 flex items-center gap-3">
        <span class="text-xs font-bold text-slate-400 uppercase">Vai a:</span>
        <a href="ordini_incorso.html" class="text-sm font-bold text-red-600 hover:text-red-700 px-4 py-2 rounded-lg border-2 border-red-600 hover:bg-red-50 flex items-center gap-2 transition-all">
            <i class="fas fa-clock"></i> In Corso
        </a>
        <a href="ordini_archiviati.html" class="text-sm font-bold text-slate-600 hover:text-slate-800 px-4 py-2 rounded-lg border-2 border-slate-300 hover:bg-slate-50 flex items-center gap-2 transition-all">
            <i class="fas fa-archive"></i> Archiviati
        </a>
    </div>


    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        
        <!-- ORDER TYPE SELECTION -->
        <div id="order-type-selection" class="mb-8 text-center bg-white p-8 md:p-16 rounded-3xl shadow-sm border border-gray-100">
            <div class="flex flex-col md:flex-row justify-center gap-6">
                <button id="btn-standard" class="btn-red-big">
                    <i class="fas fa-shopping-bag"></i> Ordine Standard
                </button>
                <button id="btn-bomboniere" class="btn-red-big">
                    <i class="fas fa-gift"></i> Ordine Bomboniere
                </button>
            </div>
        </div>

        <!-- ORDER FORM -->
        <form id="orderForm" class="hidden space-y-6">
            
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                
                <!-- EMPORIO SECTION -->
                <div class="lg:col-span-1 section-card">
                    <h2 class="section-title">Emporio</h2>
                    <div class="space-y-4">
                        <div class="flex gap-2">
                            <select id="select-emporio" required class="form-select flex-1">
                                <option value="">Città *</option>
                                <option value="Casalmaggiore">Casalmaggiore</option>
                                <option value="Cremona">Cremona</option>
                                <option value="Reggio Emilia">Reggio Emilia</option>
                                <option value="Viadana">Viadana</option>
                            </select>
                            <button type="button" id="btn-add-city" class="bg-red-50 px-3 rounded-xl hover:bg-red-100 text-m361-red">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button type="button" id="btn-remove-city" class="bg-red-50 px-3 rounded-xl hover:bg-red-200 text-m361-red">
                                <i class="fas fa-trash-can"></i>
                            </button>
                        </div>

                        <div id="canale-cremona-container" class="hidden">
                            <select id="select-canale" class="form-select border-2 border-m361-red bg-red-50">
                                <option value="">Seleziona Canale *</option>
                                <option value="emporio">emporio</option>
                                <option value="meridiano361.it">meridiano361.it</option>
                                <option value="on-earth.it">on-earth.it</option>
                            </select>
                        </div>

                        <div class="flex gap-2">
                            <select id="select-operatore" required class="form-select flex-1">
                                <option value="">Seleziona Operatore *</option>
                            </select>
                            <button type="button" id="btn-add-operator" class="bg-red-50 px-3 rounded-xl hover:bg-red-100 text-m361-red">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button type="button" id="btn-remove-operator" class="bg-red-50 px-3 rounded-xl hover:bg-red-200 text-m361-red">
                                <i class="fas fa-trash-can"></i>
                            </button>
                        </div>

                        <input type="date" id="order-date" required class="form-input">
                        <input type="text" id="numero-ordine-preview" readonly class="form-input bg-slate-50 text-slate-500 font-mono text-xs" placeholder="Numero ordine">
                    </div>
                </div>

                <!-- CLIENTE SECTION -->
                <div class="lg:col-span-3 section-card">
                    <h2 class="section-title">Cliente</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
                        <input type="text" id="cust-nome" placeholder="Nome *" required class="form-input">
                        <input type="text" id="cust-cognome" placeholder="Cognome *" required class="form-input">
                        <div class="relative">
                            <input type="cel" id="cust-cel" placeholder="Cellulare *" required class="form-input pr-10">
                            <button type="button" id="btn-wa" class="absolute right-3 top-3 transition-colors wa-active">
                                <i class="fab fa-whatsapp fa-lg"></i>
                            </button>
                        </div>
                        <input type="email" id="cust-email" placeholder="Email" class="form-input">
                        <div class="flex gap-2 p-1 bg-gray-100 rounded-xl h-[46px] items-center">
                            <label class="flex-1 flex items-center justify-center text-xs font-bold cursor-pointer h-full rounded-lg has-[:checked]:bg-white transition-all">
                                <input type="radio" name="mod_consegna" value="Ritiro" checked class="hidden"> Ritiro
                            </label>
                            <label class="flex-1 flex items-center justify-center text-xs font-bold cursor-pointer h-full rounded-lg has-[:checked]:bg-white transition-all">
                                <input type="radio" name="mod_consegna" value="Spedizione" class="hidden"> Sped.
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GROUPS CONTAINER -->
            <div id="groups-container" class="space-y-8"></div>

            <!-- ADD GROUP BUTTON -->
            <div id="add-group-container" class="hidden flex justify-center">
                <button type="button" id="btn-add-group" class="add-group-btn">
                    <i class="fas fa-layer-group mr-2"></i> Aggiungi Tipologia Bomboniera
                </button>
            </div>

            <!-- TOTALS -->
            <div class="section-card">
                <div class="flex flex-col md:flex-row justify-end items-stretch gap-4">
                    <div class="total-box">
                        <span class="total-box-label">Totale Ordine</span>
                        <span id="grand-total" class="total-box-value">€ 0,00</span>
                    </div>
                    <div class="total-box">
                        <span class="total-box-label">Acconto</span>
                        <input type="text" id="acconto" class="w-full text-center text-slate-700 bg-transparent text-2xl outline-none font-bold" value="€ 0,00">
                    </div>
                    <div class="saldo-box">
                        <span class="saldo-box-label">Da Pagare</span>
                        <span id="saldo-finale" class="saldo-box-value">€ 0,00</span>
                    </div>
                </div>
            </div>

            <!-- NOTES -->
            <div class="section-card">
                <textarea id="order-notes" rows="2" class="form-input" placeholder="Note..."></textarea>
            </div>

            <!-- SUBMIT BUTTON -->
            <button type="submit" id="submit-btn" class="btn-submit">
                <i class="fas fa-save mr-2"></i> Salva Ordine
            </button>
        </form>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentType = 'standard';
        let groupCount = 0;
        let ALL_EMPORI = ["Casalmaggiore", "Cremona", "Reggio Emilia", "Viadana"];

        const OPERATORI_DATA = {
            "Cremona": ["Chiara Monteverdi", "Emilio Mazzolari", "Giulia Galelli"],
            "Casalmaggiore": ["Alessandra Rivetti", "Barbara Araldi", "Carla Maffei", "Chiara Monteverdi", "Edoardo Pavesi", "Emilio Mazzolari", "Erica Bossi", "Francesco Lunardini", "Giovanna Raineri", "Giulia Frigeri", "Giuseppe Lunardini", "Ileana Galli", "Maria Marcella Scaravonati", "Matilde Chiarini", "Michele Marchini", "Roberta Vezzosi", "Teyssir Mabrouk", "Vittoria Lunardini"],
            "Viadana": ["Alessia Rovina", "Ave Aroldi", "Barbara Piotrowska", "Carla Bellelli", "Carla Chittolini", "Chiara Monteverdi", "Claudio Mortini", "Donatella Falugi", "Elena Ghelfi", "Emilio Mazzolari", "Franco Furlotti", "Giuseppina Amadini", "Manuela Scazza", "Marta Sanfelici", "Mariagrazia Bertolini", "Mirella Panato", "Roberta Alberini", "Sara Germani", "Tiziana Bortesi"],
            "Reggio Emilia": ["Alessia Bartolomei", "Elsa Scarpa", "Manuela Capanni", "Marica Pioli"]
        };

        // ORDER NUMBER FUNCTIONS
        function emporioCode(citta) {
            const codes = {
                'Cremona': 'CR',
                'Casalmaggiore': 'CA',
                'Reggio Emilia': 'RE',
                'Viadana': 'VI'
            };
            return codes[citta] || 'XX';
        }

        function buildNumeroOrdine(dateStr, citta, progressivo) {
            const d = (dateStr || '').replace(/-/g, '');
            const empCode = emporioCode(citta);
            const prog = String(progressivo).padStart(2, '0');
            return `${d}${empCode}#${prog}`;
        }

        async function getProgressivoOrdine(dateStr, citta) {
            if (!dateStr || !citta) return 1;
            
            const dateFormatted = dateStr.replace(/-/g, '');
            const empCode = emporioCode(citta);
            
            try {
                const { data, error } = await _supabase
                    .from('ordini_incorso')
                    .select('numero_ordine')
                    .ilike('numero_ordine', `${dateFormatted}${empCode}#%`);
                
                if (error) throw error;
                
                return (data?.length || 0) + 1;
            } catch (error) {
                console.error('Error getting progressivo:', error);
                return 1;
            }
        }

        async function refreshNumeroOrdinePreview() {
            const date = document.getElementById('order-date')?.value;
            const citta = document.getElementById('select-emporio')?.value;
            
            if (date && citta) {
                const progressivo = await getProgressivoOrdine(date, citta);
                getValueSafe('numero-ordine-preview') = buildNumeroOrdine(date, citta, progressivo);
            } else {
                getValueSafe('numero-ordine-preview') = '';
            }
        }

        function goBack() {
            if (!document.getElementById('orderForm').classList.contains('hidden')) {
                document.getElementById('orderForm').classList.add('hidden');
                document.getElementById('order-type-selection').classList.remove('hidden');
                document.getElementById('header-title').innerText = 'Nuovo Ordine';
                document.getElementById('back-btn').classList.add('hidden');
                groupCount = 0;
                document.getElementById('groups-container').innerHTML = '';
            } else {
                window.location.href = 'ordini_incorso.html';
            }
        }

        function initOrder(type) {
            currentType = type;
            const today = new Date().toISOString().split("T")[0];
            document.getElementById("order-date").value = today;
            document.getElementById('order-type-selection').classList.add('hidden');
            document.getElementById('orderForm').classList.remove('hidden');
            document.getElementById('header-title').innerText = type === 'bomboniere' ? 'Ordine Bomboniere' : 'Ordine Standard';
            document.getElementById('back-btn').classList.remove('hidden');
            
            if (type === 'bomboniere') {
                document.getElementById('add-group-container').classList.remove('hidden');
            }
            
            addGroup();
            
            const today = new Date().toISOString().split('T')[0];
            getValueSafe('order-date') = today;
            
            refreshNumeroOrdinePreview();
        }

        function handleCittaChange() {
            const citta = getValueSafe('select-emporio');
            const canaleContainer = document.getElementById('canale-cremona-container');
            const opSelect = document.getElementById('select-operatore');
            
            canaleContainer.classList.toggle('hidden', citta !== 'Cremona');
            document.getElementById('select-canale').required = (citta === 'Cremona');
            
            opSelect.innerHTML = '<option value="">Seleziona Operatore *</option>';
            (OPERATORI_DATA[citta] || []).sort().forEach(op => {
                const opt = document.createElement('option');
                opt.value = op;
                opt.text = op;
                opSelect.add(opt);
            });
            
            updateAllEmporiDropdowns();
            refreshNumeroOrdinePreview();
        }

        function getEmporioOptions() {
            const mainCitta = getValueSafe('select-emporio');
            let options = '<option value="">Dove?</option>';
            ALL_EMPORI.forEach(e => {
                if (e !== mainCitta) {
                    options += `<option value="${e}">${e}</option>`;
                }
            });
            return options;
        }

        function updateAllEmporiDropdowns() {
            document.querySelectorAll('.emporio-dropdown').forEach(select => {
                const currentVal = select.value;
                select.innerHTML = getEmporioOptions();
                select.value = currentVal;
            });
        }

        function addNewCityPrompt() {
            const nuovaCitta = prompt("Inserisci il nome della nuova città:");
            if (nuovaCitta && nuovaCitta.trim() !== "") {
                const nome = nuovaCitta.trim();
                if (!ALL_EMPORI.includes(nome)) {
                    ALL_EMPORI.push(nome);
                    const select = document.getElementById('select-emporio');
                    const opt = document.createElement('option');
                    opt.value = nome;
                    opt.text = nome;
                    select.add(opt);
                    select.value = nome;
                    handleCittaChange();
                }
            }
        }

        function removeCurrentCity() {
            const select = document.getElementById('select-emporio');
            if (select.selectedIndex > 0 && confirm("Rimuovere la città selezionata?")) {
                ALL_EMPORI = ALL_EMPORI.filter(c => c !== select.value);
                select.remove(select.selectedIndex);
                handleCittaChange();
            }
        }

        function addNewOperatorPrompt() {
            const nome = prompt("Nuovo operatore:");
            if (nome && nome.trim() !== "") {
                const opSelect = document.getElementById('select-operatore');
                const opt = document.createElement('option');
                opt.value = nome.trim();
                opt.text = nome.trim();
                opSelect.add(opt);
                opSelect.value = opt.value;
                refreshNumeroOrdinePreview();
            }
        }

        function removeCurrentOperator() {
            const opSelect = document.getElementById('select-operatore');
            if (opSelect.selectedIndex > 0 && confirm("Rimuovere operatore?")) {
                opSelect.remove(opSelect.selectedIndex);
            }
            refreshNumeroOrdinePreview();
        }

        function toggleWA() {
            const btn = document.getElementById('btn-wa');
            btn.classList.toggle('wa-active');
            btn.classList.toggle('wa-inactive');
        }

        // GROUP MANAGEMENT WITH DETAILED PRODUCT TABLE
        function addGroup() {
            groupCount++;
            const groupId = groupCount;
            const container = document.getElementById('groups-container');
            const groupTitle = currentType === 'bomboniere' ? `Bomboniera Tipologia ${groupId}` : 'Prodotti';
            const subtotalSection = currentType === 'bomboniere' ? `
                <div class="mt-4 flex justify-end border-t pt-4">
                    <div class="text-right">
                        <span class="text-[10px] font-bold text-slate-400 uppercase block">Subtotale Tipologia</span>
                        <span id="subtotal-${groupId}" class="text-xl font-bold text-slate-600">€ 0,00</span>
                    </div>
                </div>
            ` : '';

            const groupDiv = document.createElement('div');
            groupDiv.id = `group-${groupId}`;
            groupDiv.className = 'section-card';
            groupDiv.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h3 class="section-title">${groupTitle}</h3>
                    <button type="button" class="add-row-btn" data-group="${groupId}">
                        <i class="fas fa-plus mr-1"></i> Aggiungi
                    </button>
                </div>
                <div class="overflow-x-auto text-xs">
                    <table class="w-full text-left border-separate border-spacing-y-2 product-table">
                        <thead>
                            <tr class="text-gray-400 text-center">
                                <th class="pb-2 pl-4 text-left">Codice *</th>
                                <th class="pb-2 text-left">Descrizione *</th>
                                <th class="pb-2 w-24">Prezzo</th>
                                <th class="pb-2 w-16">Qtà</th>
                                <th class="pb-2 w-16 bg-green-50 text-green-700">Merce pronta</th>
                                <th class="pb-2 w-16 bg-slate-50">Da forn.</th>
                                <th class="pb-2 w-32 bg-slate-50">Da empori</th>
                                <th class="pb-2 w-32 bg-slate-50">Da altri</th>
                                <th class="pb-2 w-16 bg-red-50 text-m361-red">Da Ord</th>
                                <th class="pb-2 w-24 text-right pr-4">Totale</th>
                                <th class="pb-2 w-8"></th>
                            </tr>
                        </thead>
                        <tbody id="rows-container-${groupId}"></tbody>
                    </table>
                </div>
                ${subtotalSection}
            `;

            container.appendChild(groupDiv);
            
            groupDiv.querySelector('.add-row-btn').addEventListener('click', function() {
                addRow(groupId);
            });
            
            addRow(groupId);
        }

        function addRow(groupId) {
            const tbody = document.getElementById(`rows-container-${groupId}`);
            const rowId = Date.now() + Math.random();
            const row = document.createElement('tr');
            row.className = "product-row transition-all";
            row.id = `row-${rowId}`;
            row.innerHTML = `
                <td class="p-1 pl-4"><input type="text" placeholder="Codice" required class="w-full border-gray-200 border rounded-lg p-2 codice-input"></td>
                <td class="p-1"><input type="text" placeholder="Descrizione" required class="w-full border-gray-200 border rounded-lg p-2 desc-input"></td>
                <td class="p-1"><input type="text" class="price-input w-full border-gray-200 border rounded-lg p-2 text-right" value="€ 0,00"></td>
                <td class="p-1"><input type="number" required class="qty-input w-full border-gray-200 border rounded-lg p-2 text-center" value="1" min="1"></td>
                <td class="p-1 bg-green-50"><input type="number" class="pronta-input w-full border-green-200 border rounded-lg p-2 text-center" value="0" min="0"></td>
                <td class="p-1 bg-slate-50"><input type="number" class="forn-input w-full border-slate-200 border rounded-lg p-2 text-center" value="0" min="0"></td>
                <td class="p-1 bg-slate-50">
                    <div class="flex flex-col gap-1">
                        <input type="number" class="emp-q-input w-full border-slate-200 border rounded-lg p-1 text-center" value="0" min="0">
                        <select class="emporio-dropdown w-full border-slate-200 border rounded-lg p-1 text-[9px] bg-white">${getEmporioOptions()}</select>
                    </div>
                </td>
                <td class="p-1 bg-slate-50">
                    <div class="flex flex-col gap-1">
                        <input type="number" class="altri-q-input w-full border-slate-200 border rounded-lg p-1 text-center" value="0" min="0">
                        <input type="text" placeholder="Specifica..." class="altri-spec-input w-full border-slate-200 border rounded-lg p-1 text-[9px] bg-white">
                    </div>
                </td>
                <td class="p-1 bg-red-50 text-center font-bold text-m361-red do-value">0</td>
                <td class="p-1 text-right pr-4 font-bold">€ <span class="row-total">0,00</span></td>
                <td class="p-1 text-center"><button type="button" class="delete-row-btn text-gray-300 hover:text-red-500">✕</button></td>
            `;
            
            tbody.appendChild(row);
            
            // Add event listeners to inputs
            row.querySelector('.price-input').addEventListener('focus', function() {
                clearCurrency(this);
            });
            row.querySelector('.price-input').addEventListener('blur', function() {
                formatCurrency(this);
            });
            row.querySelector('.price-input').addEventListener('input', () => calcRow(rowId, groupId));
            row.querySelector('.qty-input').addEventListener('input', () => calcRow(rowId, groupId));
            row.querySelector('.pronta-input').addEventListener('input', () => calcRow(rowId, groupId));
            row.querySelector('.forn-input').addEventListener('input', () => calcRow(rowId, groupId));
            row.querySelector('.emp-q-input').addEventListener('input', () => calcRow(rowId, groupId));
            row.querySelector('.altri-q-input').addEventListener('input', () => calcRow(rowId, groupId));
            row.querySelector('.delete-row-btn').addEventListener('click', () => removeRow(rowId, groupId));
        }

        function calcRow(rowId, groupId) {
            const row = document.getElementById(`row-${rowId}`);
            if (!row) return;
            
            const qty = parseInt(row.querySelector('.qty-input').value) || 0;
            const price = parseFloat(row.querySelector('.price-input').value.replace('€', '').replace(',', '.').trim()) || 0;
            const pronta = parseInt(row.querySelector('.pronta-input').value) || 0;
            const forn = parseInt(row.querySelector('.forn-input').value) || 0;
            const empQ = parseInt(row.querySelector('.emp-q-input').value) || 0;
            const altriQ = parseInt(row.querySelector('.altri-q-input').value) || 0;
            
            const sumProv = pronta + forn + empQ + altriQ;
            const daOrd = Math.max(0, qty - sumProv);
            
            // Toggle error class if sum > qty
            row.classList.toggle('row-error', sumProv > qty);
            
            // Update Da Ord
            row.querySelector('.do-value').textContent = daOrd;
            
            // Update row total
            const rowTotal = qty * price;
            row.querySelector('.row-total').textContent = rowTotal.toFixed(2).replace('.', ',');
            
            if (currentType === 'bomboniere') {
                calcSubtotal(groupId);
            }
            calcGrandTotal();
            validateGlobal();
        }

        function validateGlobal() {
            const hasErrors = document.querySelectorAll('.row-error').length > 0;
            const btn = document.getElementById('submit-btn');
            btn.disabled = hasErrors;
        }

        function calcSubtotal(groupId) {
            let sub = 0;
            const container = document.getElementById(`rows-container-${groupId}`);
            if (container) {
                container.querySelectorAll('.row-total').forEach(el => {
                    sub += parseFloat(el.textContent.replace(',', '.')) || 0;
                });
                const subtotalEl = document.getElementById(`subtotal-${groupId}`);
                if (subtotalEl) {
                    subtotalEl.textContent = '€ ' + sub.toFixed(2).replace('.', ',');
                }
            }
        }

        function calcGrandTotal() {
            let grand = 0;
            document.querySelectorAll('.row-total').forEach(el => {
                grand += parseFloat(el.textContent.replace(',', '.')) || 0;
            });
            
            document.getElementById('grand-total').textContent = '€ ' + grand.toFixed(2).replace('.', ',');
            
            const accontoText = document.getElementById('acconto').value.replace('€', '').replace(',', '.').trim();
            const acconto = parseFloat(accontoText) || 0;
            const saldo = Math.max(0, grand - acconto);
            
            document.getElementById('saldo-finale').textContent = '€ ' + saldo.toFixed(2).replace('.', ',');
        }

        function clearCurrency(input) {
            const val = input.value.replace('€', '').replace(',', '.').trim();
            if (val === '0.00' || val === '0') {
                input.value = '';
            } else {
                input.value = val;
            }
        }

        function formatCurrency(input) {
            const val = parseFloat(input.value.replace('€', '').replace(',', '.').trim()) || 0;
            input.value = '€ ' + val.toFixed(2).replace('.', ',');
        }

        function removeRow(rowId, groupId) {
            const row = document.getElementById(`row-${rowId}`);
            if (row) {
                row.remove();
                if (currentType === 'bomboniere') {
                    calcSubtotal(groupId);
                }
                calcGrandTotal();
                validateGlobal();
            }
        }

        // FORM SUBMISSION
        
        // Helper function for safe element value retrieval
        function getValueSafe(id, defaultValue = '') {
            const el = document.getElementById(id);
            return el ? el.value : defaultValue;
        }
        
        function getCheckedValueSafe(name) {
            const el = document.querySelector(`input[name="${name}"]:checked`);
            return el ? el.value : '';
        }
        
async function validateSubmission(event) {
            event.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Salvataggio...';
            
            try {
                const articoli = [];
                document.querySelectorAll('.product-row').forEach(row => {
                    const gruppoId = parseInt(row.closest('[id^="group-"]').id.replace('group-', ''));
                    articoli.push({
                        gruppo_id: gruppoId,
                        codice: row.querySelector('.codice-input').value,
                        descrizione: row.querySelector('.desc-input').value,
                        prezzo: parseFloat(row.querySelector('.price-input').value.replace('€', '').replace(',', '.').trim()) || 0,
                        qta: parseInt(row.querySelector('.qty-input').value) || 0,
                        merce_pronta: parseInt(row.querySelector('.pronta-input').value) || 0,
                        da_forn: parseInt(row.querySelector('.forn-input').value) || 0,
                        da_emporio_qta: parseInt(row.querySelector('.emp-q-input').value) || 0,
                        da_emporio_nome: row.querySelector('.emporio-dropdown').value,
                        da_altri_qta: parseInt(row.querySelector('.altri-q-input').value) || 0,
                        da_altri_spec: row.querySelector('.altri-spec-input').value,
                        totale: parseFloat(row.querySelector('.row-total').textContent.replace(',', '.')) || 0
                    });
                });

                const orderData = {
                    numero_ordine: getValueSafe('numero-ordine-preview'),
                    tipo_ordine: currentType,
                    emporio: getValueSafe('select-emporio'),
                    canale: document.getElementById('select-canale')?.value || null,
                    operatore: getValueSafe('select-operatore'),
                    data_ordine: getValueSafe('order-date'),
                    cliente_nome: getValueSafe('cust-nome'),
                    cliente_cognome: getValueSafe('cust-cognome'),
                    cliente_cellulare: getValueSafe('cust-cel'),
                    cliente_email: getValueSafe('cust-email'),
                    wa_attivo: document.getElementById('btn-wa').classList.contains('wa-active'),
                    modalita_consegna: getCheckedValueSafe('mod_consegna'),
                    totale_ordine: parseFloat((document.getElementById('grand-total')?.textContent || '0').replace('€', '').replace(',', '.').trim()) || 0,
                    acconto: parseFloat((getValueSafe('acconto') || '0').replace('€', '').replace(',', '.').trim()) || 0,
                    da_pagare: parseFloat((document.getElementById('saldo-finale')?.textContent || '0').replace('€', '').replace(',', '.').trim()) || 0,
                    note: getValueSafe('order-notes'),
                    articoli: articoli,
                    stato: 'in_corso',
                    data_creazione: new Date().toISOString()
                };

                const { data, error } = await _supabase
                    .from('ordini_incorso')
                    .insert([orderData]);

                if (error) throw error;

                alert('Ordine salvato con successo!');
                window.location.href = 'ordini_incorso.html';
            } catch (error) {
                console.error('Error saving order:', error);
                alert('Errore nel salvataggio: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> Salva Ordine';
            }

            return false;
        }

        // INITIALIZE EVENT LISTENERS
        document.addEventListener('DOMContentLoaded', function() {
            // Order type buttons
            document.getElementById('btn-standard').addEventListener('click', () => initOrder('standard'));
            document.getElementById('btn-bomboniere').addEventListener('click', () => initOrder('bomboniere'));
            
            // Back button
            document.getElementById('back-btn').addEventListener('click', goBack);
            
            // Emporio management
            document.getElementById('select-emporio').addEventListener('change', handleCittaChange);
            document.getElementById('select-canale').addEventListener('change', refreshNumeroOrdinePreview);
            document.getElementById('select-operatore').addEventListener('change', refreshNumeroOrdinePreview);
            document.getElementById('order-date').addEventListener('change', refreshNumeroOrdinePreview);
            
            document.getElementById('btn-add-city').addEventListener('click', addNewCityPrompt);
            document.getElementById('btn-remove-city').addEventListener('click', removeCurrentCity);
            document.getElementById('btn-add-operator').addEventListener('click', addNewOperatorPrompt);
            document.getElementById('btn-remove-operator').addEventListener('click', removeCurrentOperator);
            
            // Customer fields
            document.getElementById('cust-nome').addEventListener('input', refreshNumeroOrdinePreview);
            document.getElementById('cust-cognome').addEventListener('input', refreshNumeroOrdinePreview);
            document.getElementById('btn-wa').addEventListener('click', toggleWA);
            
            // Acconto
            const accontoInput = document.getElementById('acconto');
            accontoInput.addEventListener('focus', () => clearCurrency(accontoInput));
            accontoInput.addEventListener('blur', () => formatCurrency(accontoInput));
            accontoInput.addEventListener('input', calcGrandTotal);
            
            // Add group button
            document.getElementById('btn-add-group').addEventListener('click', addGroup);
            
            // Form submission
            document.getElementById('orderForm').addEventListener('submit', validateSubmission);
            
            // Set today's date
            const today = new Date().toISOString().split('T')[0];
            getValueSafe('order-date') = today;
        });
    </script>
    <script src="../../scripts/nav-script.js"></script>
</body>
</html>
