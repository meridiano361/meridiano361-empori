<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Nuovo Ordine</title>
    
    <!-- CSS Standard dell'App -->
    <link rel="stylesheet" href="../../assets/style/nav-style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Stili specifici per la logica del form ordini */
        .wa-active { color: #25D366; }
        .wa-inactive { color: #cbd5e1; }
        .row-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; }
        
        /* Personalizzazione input per uniformarli a nav-style.css */
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Sovrascrittura per gli stati della selezione iniziale */
        .order-type-card {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .order-type-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--red);
        }
    </style>
    
    <link rel="icon" type="image/png" href="../../assets/images/faviconm361.png">
</head>
<body>

    <!-- Il tag <header> e <nav> verranno iniettati automaticamente da nav-script.js -->

    <main class="page-main">
        
        <!-- SELEZIONE INIZIALE (Stile Cards come Index) -->
        <div id="order-type-selection" class="py-12">
            <h2 class="m361-sec-title">Cosa vuoi creare oggi?</h2>
            <div class="grid-2">
                <div onclick="initOrder('standard')" class="m361-card card-pad flex flex-col items-center gap-4 text-center order-type-card">
                    <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center text-m361-red text-3xl">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold">Ordine Standard</h3>
                        <p class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Vendita prodotti emporio</p>
                    </div>
                </div>

                <div onclick="initOrder('bomboniere')" class="m361-card card-pad flex flex-col items-center gap-4 text-center order-type-card">
                    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-700 text-3xl">
                        <i class="fas fa-gift"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold">Ordine Bomboniere</h3>
                        <p class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Gestione cerimonie e gruppi</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- FORM ORDINE (Nascosto inizialmente) -->
        <form id="orderForm" class="hidden space-y" onsubmit="return validateSubmission(event)">
            
            <div class="grid-2">
                <!-- Sezione Emporio -->
                <section class="card card-pad">
                    <h2 class="group-label">Emporio</h2>
                    <div class="space-y">
                        <div>
                            <label class="field-label">Città *</label>
                            <div class="flex gap-2">
                                <select id="select-emporio" onchange="handleCittaChange(this)" required class="select-input">
                                    <option value="">Seleziona...</option>
                                    <option value="Casalmaggiore">Casalmaggiore</option>
                                    <option value="Cremona">Cremona</option>
                                    <option value="Reggio Emilia">Reggio Emilia</option>
                                    <option value="Viadana">Viadana</option>
                                </select>
                            </div>
                        </div>
                        
                        <div id="canale-cremona-container" class="hidden">
                            <label class="field-label">Canale Vendita *</label>
                            <select id="select-canale" onchange="refreshNumeroOrdinePreview()" class="select-input border-2 border-m361-red bg-red-50">
                                <option value="">Scegli canale...</option>
                                <option value="emporio">Emporio</option>
                                <option value="meridiano361.it">meridiano361.it</option>
                                <option value="on-earth.it">on-earth.it</option>
                            </select>
                        </div>

                        <div>
                            <label class="field-label">Operatore e Data</label>
                            <div class="grid-2">
                                <select id="select-operatore" onchange="refreshNumeroOrdinePreview()" required class="select-input"></select>
                                <input type="date" id="order-date" onchange="refreshNumeroOrdinePreview()" required class="input">
                            </div>
                        </div>
                        
                        <input type="text" id="numero-ordine-preview" readonly class="input input-mono bg-slate-50 text-[11px]" placeholder="ID ORDINE GENERATO">
                    </div>
                </section>

                <!-- Sezione Cliente -->
                <section class="card card-pad">
                    <h2 class="group-label">Dati Cliente</h2>
                    <div class="space-y">
                        <div class="grid-2">
                            <input type="text" id="cust-nome" placeholder="Nome *" oninput="refreshNumeroOrdinePreview()" required class="input">
                            <input type="text" id="cust-cognome" placeholder="Cognome *" oninput="refreshNumeroOrdinePreview()" required class="input">
                        </div>
                        <div class="relative">
                            <input type="tel" id="cust-tel" placeholder="Cellulare *" required class="input pr-12">
                            <button type="button" id="wa-btn" onclick="toggleWA(this)" class="absolute right-3 top-2.5 wa-active">
                                <i class="fab fa-whatsapp fa-lg"></i>
                            </button>
                        </div>
                        <input type="email" id="cust-email" placeholder="Email" class="input">
                        
                        <div>
                            <label class="field-label">Modalità Consegna</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 text-xs font-bold uppercase cursor-pointer">
                                    <input type="radio" name="mod_consegna" value="Ritiro" checked class="accent-m361-red"> Ritiro
                                </label>
                                <label class="flex items-center gap-2 text-xs font-bold uppercase cursor-pointer">
                                    <input type="radio" name="mod_consegna" value="Spedizione" class="accent-m361-red"> Spedizione
                                </label>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Contenitore Righe Ordine -->
            <div id="groups-container" class="space-y"></div>

            <div id="add-group-container" class="hidden flex justify-center py-4">
                <button type="button" onclick="addGroup()" class="btn btn-secondary">
                    <i class="fas fa-plus"></i> Aggiungi Tipologia
                </button>
            </div>

            <!-- Riepilogo Totali -->
            <div class="card card-pad">
                <div class="flex flex-col md:flex-row justify-end items-center gap-6">
                    <div class="text-right">
                        <span class="field-label">Totale Prodotti</span>
                        <span id="grand-total" class="text-2xl font-mono font-bold">€ 0,00</span>
                    </div>
                    <div class="text-right">
                        <span class="field-label">Acconto</span>
                        <input type="text" id="acconto" onfocus="clearCurrency(this)" onblur="formatCurrency(this)" oninput="calcGrandTotal()" class="input input-mono text-xl w-32" value="€ 0,00">
                    </div>
                    <div class="bg-m361-red text-white p-4 rounded-xl text-right min-w-[160px]">
                        <span class="text-[9px] font-black uppercase opacity-80">Saldo da Versare</span>
                        <div id="saldo-finale" class="text-2xl font-mono font-bold">€ 0,00</div>
                    </div>
                </div>
            </div>

            <textarea id="order-notes" class="textarea-input" placeholder="Note interne o istruzioni speciali..."></textarea>

            <button type="submit" id="submit-btn" class="btn btn-primary w-full justify-center text-sm py-5 shadow-lg">
                <i class="fas fa-save"></i> Registra Ordine nel Sistema
            </button>
        </form>

    </main>

    <!-- Script di Navigazione (Gestisce Header e Nav) -->
    <script src="../../scripts/nav-script.js"></script>
    
    <!-- Supabase e Logica -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // La tua logica JS rimane qui (initOrder, buildNumeroOrdine, Supabase config, ecc.)
        // Ricorda di usare le classi CSS di nav-style dove possibile (es. btn, card, input)
    </script>
</body>
</html>
