<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prenotazioni</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--red:#B5453A;--red-dark:#8c362d;--red-light:#fdf1f0;--green:#6b8d53;--green-light:#ecfdf5;
      --s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;
      --s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b}
    *{box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#f0f2f5;padding-bottom:80px}

    /* Empori selector */
    .sel-wrap{padding:24px 16px 32px;max-width:1100px;margin:0 auto}
    .emp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    @media(max-width:600px){.emp-grid{grid-template-columns:repeat(3,1fr)}}
    .emp-btn{padding:20px 12px;border-radius:16px;border:2px solid var(--s200);background:#fff;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px}
    .emp-btn:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 4px 12px rgba(181,69,58,.12)}
    .emp-btn img{width:48px;height:48px;object-fit:contain;border-radius:12px}
    .emp-btn span{font-size:12px;font-weight:800;color:var(--s700)}

    /* Page layout */
    .page-wrap{max-width:1100px;margin:0 auto;padding:16px}
    .page-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .page-title{font-size:18px;font-weight:900;color:var(--s800);flex:1}
    .page-subtitle{font-size:12px;font-weight:600;color:var(--s400);margin-top:2px}
    .back-btn{width:36px;height:36px;border:2px solid var(--s200);border-radius:10px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--s500);flex-shrink:0;transition:all .15s}
    .back-btn:hover{border-color:var(--red);color:var(--red)}

    /* Campaign cards */
    .camp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:8px}
    .camp-card{background:#fff;border:2px solid var(--s200);border-radius:16px;padding:16px;cursor:pointer;transition:all .15s}
    .camp-card:hover{border-color:var(--red);box-shadow:0 4px 12px rgba(181,69,58,.1)}
    .camp-card.camp-open{border-left:4px solid var(--green)}
    .camp-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
    .camp-title{font-size:15px;font-weight:900;color:var(--s800)}
    .camp-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:6px;flex-shrink:0}
    .badge-open{background:#dcfce7;color:#166534}
    .badge-closed{background:var(--s100);color:var(--s400)}
    .camp-desc{font-size:12px;color:var(--s500);margin-bottom:10px}
    .camp-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;font-weight:600;color:var(--s500);margin-bottom:12px}
    .camp-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

    /* Tabs */
    .tab-bar{display:flex;gap:4px;background:#fff;padding:6px;border-radius:16px;border:1px solid var(--s200);flex-wrap:wrap;margin-bottom:16px}
    .tab-btn{padding:10px 18px;border-radius:12px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;border:none;background:transparent;color:var(--s400);transition:all .15s;white-space:nowrap;font-family:'Nunito',sans-serif}
    .tab-btn:hover{color:var(--s700);background:var(--s50)}
    .tab-btn.active{background:var(--red);color:#fff}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    /* Filter */
    .filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .filter-input{border:2px solid var(--s200);border-radius:12px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--s700);background:#fff;outline:none;transition:all .15s;flex:1;min-width:200px}
    .filter-input:focus{border-color:var(--red)}

    /* Card / table */
    .card-r{background:#fff;border-radius:20px;border:1px solid var(--s200);box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden}
    .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .pren-table{width:100%;border-collapse:collapse;font-size:12px}
    .pren-table th{background:var(--s50);padding:8px 10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--s400);border-bottom:2px solid var(--s200);white-space:nowrap;text-align:left}
    .pren-table th.prod-header{background:var(--red-light);color:var(--red);min-width:70px;text-align:center}
    .pren-table td{padding:8px 10px;border-bottom:1px solid var(--s100);vertical-align:middle}
    .pren-table tbody tr:hover{background:#fffbf5}
    .pren-table tfoot td{background:var(--s50);padding:8px 10px;font-weight:800;border-top:2px solid var(--s200)}
    .col-total{font-size:14px;text-align:center;color:var(--red);font-weight:800}
    .prod-info{display:flex;flex-direction:column;align-items:center;gap:2px}
    .prod-desc{font-size:10px;font-weight:800;color:var(--red)}
    .prod-code{font-size:8px;font-weight:600;color:var(--s400)}
    .prod-price{font-size:9px;font-weight:700;color:var(--s500)}
    .stato-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}

    /* Riepilogo */
    .sint-table{width:100%;border-collapse:collapse}
    .sint-table th,.sint-table td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--s100)}
    .sint-table thead th{background:var(--s800);color:#fff;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em}
    .sint-table thead th:first-child{text-align:left}
    .sint-table tfoot td{background:var(--red);color:#fff;font-weight:900;font-size:15px}
    .sint-table tfoot td:first-child{text-align:left}
    .rie-emp-name{font-weight:800;text-align:left;color:var(--s700);font-size:13px}
    .rie-cell{font-weight:700;font-size:14px}
    .rie-current{background:var(--red-light)}

    /* Buttons */
    .btn-primary{background:var(--red);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
    .btn-primary:hover{background:var(--red-dark)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-secondary{background:var(--s100);color:var(--s600);border:none;border-radius:10px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
    .btn-secondary:hover{background:var(--s200)}
    .btn-danger{background:#fee2e2;color:#dc2626;border:none;border-radius:10px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
    .btn-danger:hover{background:#fecaca}
    .btn-green{background:var(--green-light);color:var(--green);border:none;border-radius:10px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
    .btn-green:hover{background:#bbf7d0}
    .btn-sm{padding:6px 10px;font-size:11px;border-radius:8px}
    .icon-btn{background:none;border:none;cursor:pointer;color:var(--s300);padding:4px;transition:color .15s}
    .icon-btn:hover{color:var(--red)}
    .icon-btn-danger:hover{color:#ef4444}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:9999}
    @media(min-width:640px){.modal-overlay{align-items:center;padding:16px}}
    .modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
    @media(min-width:640px){.modal-box{border-radius:20px;max-height:88vh}}
    .modal-box-lg{max-width:620px}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid var(--s100)}
    .modal-title{font-size:16px;font-weight:900;color:var(--s800)}
    .modal-close{background:var(--s100);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--s500);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .modal-close:hover{background:var(--s200)}
    .modal-body{padding:16px 20px}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px 20px;border-top:1px solid var(--s100)}

    /* Forms */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.form-row{grid-template-columns:1fr}}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-size:11px;font-weight:800;color:var(--s500);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
    .form-input{width:100%;border:2px solid var(--s200);border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--s800);background:#fff;outline:none;transition:all .15s}
    .form-input:focus{border-color:var(--red)}
    textarea.form-input{resize:vertical}
    .form-input-sm{border:1.5px solid var(--s200);border-radius:8px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--s800);background:#fff;outline:none;transition:all .15s}
    .form-input-sm:focus{border-color:var(--red)}

    /* Product rows in modal-pren */
    .pren-prods-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
    .pren-prod-row{display:flex;align-items:center;gap:10px;background:var(--s50);border-radius:10px;padding:10px 12px}
    .pren-prod-info{flex:1;min-width:0}
    .pren-prod-desc{display:block;font-size:13px;font-weight:800;color:var(--s800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pren-prod-sub{display:block;font-size:10px;font-weight:600;color:var(--s400);margin-top:1px}
    .pren-qty-input{width:64px;border:2px solid var(--s200);border-radius:8px;padding:6px 4px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;text-align:center;outline:none;flex-shrink:0;transition:all .15s}
    .pren-qty-input:focus{border-color:var(--red)}
    .pren-total-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;font-size:13px;font-weight:700;color:var(--s600);padding:6px 0;border-top:1px solid var(--s100)}
    .pren-total-row strong{font-size:16px;font-weight:900;color:var(--red)}

    /* Product rows in modal-camp */
    .camp-prod-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}

    .empty-state{text-align:center;padding:48px 16px;color:var(--s400);font-size:14px;font-weight:600}
  </style>
</head>
<body>
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<!-- Screen 1: Empori -->
<div id="screen-empori" style="display:none">
  <div class="sel-wrap">
    <div class="sec-t">Seleziona emporio</div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>
</div>

<!-- Screen 2: Campagne -->
<div id="screen-campagne" style="display:none">
  <div class="page-wrap">
    <div class="page-header">
      <button onclick="goBack('empori')" class="back-btn"><i class="fas fa-arrow-left"></i></button>
      <div class="page-title" id="page-title-campagne"></div>
      <button id="btn-nuova-campagna" onclick="openModalCampagna(null)" style="display:none" class="btn-primary btn-sm"><i class="fas fa-plus"></i> Nuova prenotazione</button>
    </div>
    <div id="campagne-list"></div>
  </div>
</div>

<!-- Screen 3: Prenotazioni -->
<div id="screen-prenotazioni" style="display:none">
  <div class="page-wrap">
    <div class="page-header">
      <button onclick="goBack('campagne')" class="back-btn"><i class="fas fa-arrow-left"></i></button>
      <div style="flex:1;min-width:0">
        <div class="page-title" id="camp-title-display"></div>
        <div class="page-subtitle" id="camp-dates-display"></div>
      </div>
      <a id="btn-stampa" href="#" target="_blank" class="btn-secondary btn-sm" style="text-decoration:none"><i class="fas fa-print"></i> Stampa</a>
      <button onclick="openModalPrenotazione(null)" class="btn-primary btn-sm"><i class="fas fa-plus"></i> Nuova</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="pren-tab-pren" onclick="switchTab(this)">Prenotazioni</button>
      <button class="tab-btn" id="tab-riepilogo" data-tab="pren-tab-riepilogo" onclick="switchTab(this)" style="display:none">Riepilogo</button>
    </div>

    <!-- Tab: Prenotazioni -->
    <div id="pren-tab-pren" class="tab-panel active">
      <div class="filter-row">
        <input type="text" id="filtro-cliente" placeholder="Cerca cliente o telefono..." oninput="renderPrenTable()" class="filter-input">
      </div>
      <div class="card-r">
        <div class="table-scroll">
          <table class="pren-table">
            <thead id="pren-thead"></thead>
            <tbody id="pren-tbody"></tbody>
            <tfoot id="pren-tfoot"></tfoot>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab: Riepilogo -->
    <div id="pren-tab-riepilogo" class="tab-panel">
      <div class="card-r">
        <div class="table-scroll" id="riepilogo-container"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Prenotazione -->
<div id="modal-pren" class="modal-overlay" style="display:none" onclick="if(event.target.id==='modal-pren')closeModalPren()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-pren-title">Nuova prenotazione</div>
      <button onclick="closeModalPren()" class="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="f-nome" class="form-input" placeholder="Nome cliente" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label>Cognome</label>
          <input type="text" id="f-cognome" class="form-input" placeholder="Cognome cliente" autocomplete="family-name">
        </div>
      </div>
      <div class="form-group">
        <label>Telefono</label>
        <input type="tel" id="f-telefono" class="form-input" placeholder="Es: 338 1234567" autocomplete="tel">
      </div>
      <div id="f-prodotti-list"></div>
      <div class="form-group">
        <label>Note</label>
        <textarea id="f-note" class="form-input" rows="2" placeholder="Note aggiuntive..."></textarea>
      </div>
      <div class="form-group">
        <label>Stato</label>
        <select id="f-stato" class="form-input">
          <option value="attesa">In attesa</option>
          <option value="pronto">Pronto</option>
          <option value="avvisato">Avvisato</option>
          <option value="consegnato">Consegnato</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModalPren()" class="btn-secondary">Annulla</button>
      <button onclick="savePrenotazione()" class="btn-primary" id="btn-save-pren">Salva</button>
    </div>
  </div>
</div>

<!-- Modal: Campagna (admin) -->
<div id="modal-camp" class="modal-overlay" style="display:none" onclick="if(event.target.id==='modal-camp')closeModalCamp()">
  <div class="modal-box modal-box-lg">
    <div class="modal-header">
      <div class="modal-title" id="modal-camp-title">Nuova campagna</div>
      <button onclick="closeModalCamp()" class="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Titolo *</label>
        <input type="text" id="fc-titolo" class="form-input" placeholder="Es: Natale 2025">
      </div>
      <div class="form-group">
        <label>Descrizione</label>
        <textarea id="fc-desc" class="form-input" rows="2" placeholder="Descrizione opzionale..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Data apertura</label>
          <input type="date" id="fc-apertura" class="form-input">
        </div>
        <div class="form-group">
          <label>Data chiusura</label>
          <input type="date" id="fc-chiusura" class="form-input">
        </div>
      </div>
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <label style="margin:0">Prodotti</label>
          <button onclick="addProdottoCampagna()" class="btn-green btn-sm"><i class="fas fa-plus"></i> Aggiungi prodotto</button>
        </div>
        <div id="fc-prodotti"></div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;font-size:13px;font-weight:700;letter-spacing:0">
          <input type="checkbox" id="fc-attiva" checked> Campagna attiva
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModalCamp()" class="btn-secondary">Annulla</button>
      <button onclick="saveCampagna()" class="btn-primary" id="btn-save-camp">Salva campagna</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient} = supabase;
const _db = createClient(
  'https://hsalynvxazxqtmsvjrzc.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
);

const EMPORI_LIST = [
  {nome:'Casalmaggiore', img:'../../assets/images/logo_casalmaggiore.png'},
  {nome:'Cremona',       img:'../../assets/images/logo_cremona.png'},
  {nome:'Mantova',       img:'../../assets/images/logo_mantova.png'},
  {nome:'Reggio Emilia', img:'../../assets/images/logo_reggio_emilia.png'},
  {nome:'Viadana',       img:'../../assets/images/logo_viadana.png'},
];

const STATI = {attesa:'In attesa', pronto:'Pronto', avvisato:'Avvisato', consegnato:'Consegnato'};
const STATI_COLORS = {attesa:'#f59e0b', pronto:'#3b82f6', avvisato:'#6366f1', consegnato:'#22c55e'};

let _u = null, _canAdmin = false, _canRiepilogo = false;
let _emporio = null;
let _campagna = null, _campagne = [];
let _prenotazioni = [], _allPren = [];
let _editingPrenId = null, _editingCampId = null;
let _campProdotti = [];

// ─── INIT ───
function init() {
  _u = JSON.parse(localStorage.getItem('m361_user') || 'null');
  if (!_u) { window.location.href = '/login.html'; return; }
  _canAdmin = _u.ruolo === 'admin' || _u.ruolo === 'dipendente' || !!_u.is_resp_acquisti;
  _canRiepilogo = _canAdmin || !!_u.is_resp_negozio;

  const empori = [_u.emporio, ...(_u.empori_aggiuntivi || [])].filter(Boolean);
  const uniq = [...new Set(empori)];

  if (_u.ruolo === 'admin') {
    buildEmpiGrid(null);
    showScreen('empori');
  } else if (uniq.length === 1) {
    selezionaEmporio(uniq[0]);
  } else {
    buildEmpiGrid(uniq.length > 0 ? uniq : null);
    showScreen('empori');
  }
}

function buildEmpiGrid(filtro) {
  const g = document.getElementById('emp-grid');
  g.innerHTML = '';
  const lista = filtro
    ? EMPORI_LIST.filter(e => filtro.some(f => f.toLowerCase() === e.nome.toLowerCase()))
    : EMPORI_LIST;
  lista.forEach(e => {
    const c = document.createElement('div');
    c.className = 'emp-btn';
    c.innerHTML = `<img src="${e.img}" alt="${e.nome}"><span>${e.nome}</span>`;
    c.onclick = () => selezionaEmporio(e.nome);
    g.appendChild(c);
  });
}

// ─── SCREENS ───
function showScreen(s) {
  ['empori','campagne','prenotazioni'].forEach(id =>
    document.getElementById('screen-' + id).style.display = id === s ? 'block' : 'none'
  );
}

function goBack(screen) {
  showScreen(screen);
  if (screen === 'empori') { _emporio = null; _campagna = null; }
}

// ─── EMPORIO ───
async function selezionaEmporio(nome) {
  _emporio = nome;
  document.getElementById('page-title-campagne').textContent = nome;
  document.getElementById('btn-nuova-campagna').style.display = _canAdmin ? '' : 'none';
  showScreen('campagne');
  await loadCampagne();
}

// ─── CAMPAGNE ───
async function loadCampagne() {
  document.getElementById('campagne-list').innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div>';
  const {data, error} = await _db.from('campagne_prenotazione').select('*').order('created_at', {ascending: false});
  if (error) {
    document.getElementById('campagne-list').innerHTML = `<div class="empty-state" style="color:#ef4444"><i class="fas fa-triangle-exclamation"></i><br><br>Errore: ${error.message}</div>`;
    return;
  }
  _campagne = data || [];
  renderCampagne();
}

function renderCampagne() {
  const el = document.getElementById('campagne-list');
  if (_campagne.length === 0) {
    el.innerHTML = `<div class="empty-state">Nessuna campagna disponibile.${_canAdmin ? '<br><br>Clicca "+ Nuova campagna" per iniziare.' : ''}</div>`;
    return;
  }
  const attive = _campagne.filter(c => c.attiva !== false);
  const inattive = _campagne.filter(c => c.attiva === false);
  let html = '';
  if (attive.length > 0) {
    html += '<div class="sec-t" style="margin-bottom:12px">Campagne attive</div>';
    html += '<div class="camp-grid">' + attive.map(campCard).join('') + '</div>';
  }
  if (inattive.length > 0 && _canAdmin) {
    html += '<div class="sec-t" style="margin-top:28px;margin-bottom:12px">Campagne chiuse</div>';
    html += '<div class="camp-grid">' + inattive.map(campCard).join('') + '</div>';
  }
  if (!html) el.innerHTML = '<div class="empty-state">Nessuna campagna disponibile.</div>';
  else el.innerHTML = html;
}

function campCard(c) {
  const prod = c.prodotti || [];
  const fmt = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('it', {day:'2-digit', month:'short'}) : '—';
  const now = new Date();
  const isOpen = (c.data_apertura && c.data_chiusura)
    ? now >= new Date(c.data_apertura + 'T00:00:00') && now <= new Date(c.data_chiusura + 'T23:59:59')
    : c.attiva !== false;

  const adminBtns = _canAdmin ? `
    <button onclick="event.stopPropagation();editCampagna('${c.id}')" class="btn-secondary btn-sm"><i class="fas fa-pen"></i></button>
    <button onclick="event.stopPropagation();deleteCampagna('${c.id}')" class="btn-danger btn-sm"><i class="fas fa-trash"></i></button>
  ` : '';

  return `
    <div class="camp-card${isOpen ? ' camp-open' : ''}" onclick="apriCampagna('${c.id}')">
      <div class="camp-header">
        <div class="camp-title">${escHtml(c.titolo || 'Campagna')}</div>
        <span class="camp-badge ${isOpen ? 'badge-open' : 'badge-closed'}">${isOpen ? 'Aperta' : 'Chiusa'}</span>
      </div>
      ${c.descrizione ? `<div class="camp-desc">${escHtml(c.descrizione)}</div>` : ''}
      <div class="camp-meta">
        <span><i class="fas fa-calendar" style="margin-right:4px"></i>${fmt(c.data_apertura)} → ${fmt(c.data_chiusura)}</span>
        <span><i class="fas fa-box" style="margin-right:4px"></i>${prod.length} prodott${prod.length === 1 ? 'o' : 'i'}</span>
      </div>
      <div class="camp-footer">
        <button class="btn-primary btn-sm" onclick="event.stopPropagation();apriCampagna('${c.id}')"><i class="fas fa-list"></i> Apri</button>
        ${adminBtns}
      </div>
    </div>`;
}

function apriCampagna(id) {
  _campagna = _campagne.find(c => c.id === id);
  if (!_campagna) return;
  document.getElementById('camp-title-display').textContent = _campagna.titolo || 'Campagna';
  const fmt = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('it', {day:'2-digit', month:'long', year:'numeric'}) : '—';
  document.getElementById('camp-dates-display').textContent = `${fmt(_campagna.data_apertura)} — ${fmt(_campagna.data_chiusura)}`;
  document.getElementById('tab-riepilogo').style.display = _canRiepilogo ? '' : 'none';
  document.getElementById('btn-stampa').href = `stampa.html?campagna=${_campagna.id}&emporio=${encodeURIComponent(_emporio)}`;
  switchTabById('pren-tab-pren');
  showScreen('prenotazioni');
  loadPrenotazioni();
}

// ─── PRENOTAZIONI ───
async function loadPrenotazioni() {
  document.getElementById('pren-tbody').innerHTML =
    `<tr><td colspan="99" style="text-align:center;padding:32px;color:#94a3b8"><i class="fas fa-spinner fa-spin"></i></td></tr>`;

  const [r1, r2] = await Promise.all([
    _db.from('prenotazioni').select('*').eq('campagna_id', _campagna.id).eq('emporio', _emporio).order('created_at', {ascending: true}),
    _canRiepilogo
      ? _db.from('prenotazioni').select('*').eq('campagna_id', _campagna.id)
      : Promise.resolve({data: [], error: null})
  ]);

  if (r1.error) { showToastM361('Errore caricamento prenotazioni', 'error'); return; }
  _prenotazioni = r1.data || [];
  _allPren = r2.data || [];
  renderPrenTable();
}

function renderPrenTable() {
  const filtro = (document.getElementById('filtro-cliente')?.value || '').toLowerCase().trim();
  let rows = _prenotazioni;
  if (filtro) {
    rows = rows.filter(r => {
      const n = ((r.cliente_nome || '') + ' ' + (r.cliente_cognome || '')).toLowerCase();
      return n.includes(filtro) || (r.cliente_telefono || '').includes(filtro);
    });
  }

  const prod = _campagna.prodotti || [];

  document.getElementById('pren-thead').innerHTML = `<tr>
    <th style="min-width:120px">Cliente</th>
    <th style="min-width:90px">Telefono</th>
    ${prod.map(p => `<th class="prod-header"><div class="prod-info">
      <span class="prod-desc">${escHtml(p.descrizione || '')}</span>
      <span class="prod-code">${escHtml(p.codice || '')}</span>
      <span class="prod-price">${p.prezzo ? '€' + Number(p.prezzo).toFixed(2) : ''}</span>
    </div></th>`).join('')}
    <th style="min-width:70px;text-align:right">Totale</th>
    <th style="min-width:80px">Stato</th>
    <th style="min-width:80px">Operatore</th>
    <th style="width:64px"></th>
  </tr>`;

  const colSums = prod.map(() => 0);
  let grandTotal = 0;

  const tbody = rows.map(r => {
    const art = r.articoli || {};
    const cells = prod.map((p, pi) => {
      const qty = art[String(pi)] || 0;
      colSums[pi] += qty;
      return `<td style="text-align:center;font-weight:700;color:${qty > 0 ? '#334155' : '#cbd5e1'}">${qty || '—'}</td>`;
    }).join('');
    const total = prod.reduce((s, p, pi) => s + (art[String(pi)] || 0) * (Number(p.prezzo) || 0), 0);
    grandTotal += total;
    const sc = STATI_COLORS[r.stato] || '#94a3b8';
    const sl = STATI[r.stato] || r.stato || '—';
    return `<tr>
      <td style="font-weight:700;color:#1e293b">${escHtml(((r.cliente_cognome || '') + ' ' + (r.cliente_nome || '')).trim())}</td>
      <td style="color:#64748b;font-size:12px">${escHtml(r.cliente_telefono || '—')}</td>
      ${cells}
      <td style="text-align:right;font-weight:700">€ ${total.toFixed(2)}</td>
      <td><span class="stato-badge" style="background:${sc}20;color:${sc}">${sl}</span></td>
      <td style="font-size:11px;color:#94a3b8">${escHtml(r.operatore_nome || '—')}</td>
      <td style="text-align:center;white-space:nowrap">
        <button onclick="openModalPrenotazione('${r.id}')" class="icon-btn" title="Modifica"><i class="fas fa-pen" style="font-size:11px"></i></button>
        <button onclick="deletePrenotazione('${r.id}')" class="icon-btn icon-btn-danger" title="Elimina"><i class="fas fa-trash" style="font-size:11px"></i></button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('pren-tbody').innerHTML = tbody ||
    `<tr><td colspan="99" style="text-align:center;color:#94a3b8;padding:40px;font-size:13px">
      Nessuna prenotazione.<br>Clicca "+ Nuova" per aggiungere.
    </td></tr>`;

  document.getElementById('pren-tfoot').innerHTML = `<tr>
    <td colspan="2" style="text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#64748b">Totali</td>
    ${colSums.map(s => `<td class="col-total">${s}</td>`).join('')}
    <td class="col-total" style="text-align:right">€ ${grandTotal.toFixed(2)}</td>
    <td colspan="3"></td>
  </tr>`;
}

function renderRiepilogo() {
  const prod = _campagna.prodotti || [];
  if (prod.length === 0) {
    document.getElementById('riepilogo-container').innerHTML =
      '<p style="text-align:center;color:#94a3b8;padding:32px">Nessun prodotto in questa campagna.</p>';
    return;
  }
  const empRows = EMPORI_LIST.map(e => {
    const prenEmp = _allPren.filter(r => r.emporio === e.nome);
    if (prenEmp.length === 0) return null;
    const cells = prod.map((p, pi) => {
      const sum = prenEmp.reduce((s, r) => s + ((r.articoli || {})[String(pi)] || 0), 0);
      return `<td class="rie-cell" style="${sum > 0 ? 'color:#1e293b;font-weight:800' : 'color:#e2e8f0'}">${sum || '—'}</td>`;
    }).join('');
    const rt = prod.reduce((s, p, pi) => s + prenEmp.reduce((rs, r) => rs + ((r.articoli || {})[String(pi)] || 0), 0), 0);
    return `<tr class="${e.nome === _emporio ? 'rie-current' : ''}">
      <td class="rie-emp-name">${escHtml(e.nome)}</td>
      ${cells}
      <td class="rie-cell" style="font-weight:900;color:#1e293b">${rt}</td>
    </tr>`;
  }).filter(Boolean).join('');

  const totCells = prod.map((p, pi) => {
    const s = _allPren.reduce((acc, r) => acc + ((r.articoli || {})[String(pi)] || 0), 0);
    return `<td>${s}</td>`;
  }).join('');
  const gt = prod.reduce((s, p, pi) => s + _allPren.reduce((rs, r) => rs + ((r.articoli || {})[String(pi)] || 0), 0), 0);

  document.getElementById('riepilogo-container').innerHTML = `
    <table class="sint-table">
      <thead><tr>
        <th style="text-align:left">Emporio</th>
        ${prod.map(p => `<th>${escHtml(p.descrizione || p.codice || '—')}</th>`).join('')}
        <th>Totale</th>
      </tr></thead>
      <tbody>${empRows || `<tr><td colspan="99" style="text-align:center;color:#94a3b8;padding:24px">Nessuna prenotazione ancora.</td></tr>`}</tbody>
      <tfoot><tr>
        <td>TOTALE GENERALE</td>
        ${totCells}
        <td>${gt}</td>
      </tr></tfoot>
    </table>`;
}

// ─── MODAL PRENOTAZIONE ───
function openModalPrenotazione(id) {
  _editingPrenId = id || null;
  const r = id ? _prenotazioni.find(p => p.id === id) : null;
  document.getElementById('modal-pren-title').textContent = r ? 'Modifica prenotazione' : 'Nuova prenotazione';
  document.getElementById('f-nome').value = r?.cliente_nome || '';
  document.getElementById('f-cognome').value = r?.cliente_cognome || '';
  document.getElementById('f-telefono').value = r?.cliente_telefono || '';
  document.getElementById('f-note').value = r?.note || '';
  document.getElementById('f-stato').value = r?.stato || 'attesa';

  const prod = _campagna.prodotti || [];
  const art = r?.articoli || {};
  document.getElementById('f-prodotti-list').innerHTML = prod.length === 0
    ? '<p style="color:#94a3b8;font-size:13px;margin-bottom:12px">Nessun prodotto in questa campagna.</p>'
    : `<div class="form-group">
        <label>Quantità prodotti</label>
        <div class="pren-prods-grid">
          ${prod.map((p, i) => `
            <div class="pren-prod-row">
              <div class="pren-prod-info">
                <span class="pren-prod-desc">${escHtml(p.descrizione || 'Prodotto ' + (i + 1))}</span>
                <span class="pren-prod-sub">${p.codice ? escHtml(p.codice) : ''}${p.codice && p.prezzo ? ' · ' : ''}${p.prezzo ? '€' + Number(p.prezzo).toFixed(2) : ''}</span>
              </div>
              <input type="number" min="0" value="${art[String(i)] || 0}" id="pf-qty-${i}" class="pren-qty-input" oninput="updatePrenTotal()">
            </div>`).join('')}
        </div>
        <div class="pren-total-row"><span>Totale:</span><strong id="pren-modal-total">€ 0.00</strong></div>
      </div>`;

  updatePrenTotal();
  document.getElementById('modal-pren').style.display = 'flex';
  setTimeout(() => document.getElementById('f-nome').focus(), 80);
}

function updatePrenTotal() {
  const prod = _campagna?.prodotti || [];
  const t = prod.reduce((s, p, i) => {
    const qty = parseInt(document.getElementById('pf-qty-' + i)?.value || '0') || 0;
    return s + qty * (Number(p.prezzo) || 0);
  }, 0);
  const el = document.getElementById('pren-modal-total');
  if (el) el.textContent = '€ ' + t.toFixed(2);
}

function closeModalPren() { document.getElementById('modal-pren').style.display = 'none'; }

async function savePrenotazione() {
  const nome = document.getElementById('f-nome').value.trim();
  const cognome = document.getElementById('f-cognome').value.trim();
  if (!nome && !cognome) { showToastM361('Inserisci nome o cognome del cliente', 'warning'); return; }

  const prod = _campagna.prodotti || [];
  const art = {};
  prod.forEach((_, i) => {
    const qty = parseInt(document.getElementById('pf-qty-' + i)?.value || '0') || 0;
    if (qty > 0) art[String(i)] = qty;
  });

  const payload = {
    campagna_id: _campagna.id,
    emporio: _emporio,
    cliente_nome: nome,
    cliente_cognome: cognome,
    cliente_telefono: document.getElementById('f-telefono').value.trim(),
    articoli: art,
    note: document.getElementById('f-note').value.trim() || null,
    stato: document.getElementById('f-stato').value,
    operatore_nome: [_u.nome, _u.cognome].filter(Boolean).join(' '),
  };

  const btn = document.getElementById('btn-save-pren');
  btn.disabled = true; btn.textContent = 'Salvataggio...';

  const {error} = _editingPrenId
    ? await _db.from('prenotazioni').update(payload).eq('id', _editingPrenId)
    : await _db.from('prenotazioni').insert(payload);

  btn.disabled = false; btn.textContent = 'Salva';
  if (error) { showToastM361('Errore: ' + error.message, 'error'); return; }
  showToastM361(_editingPrenId ? 'Prenotazione aggiornata' : 'Prenotazione salvata', 'success');
  closeModalPren();
  loadPrenotazioni();
}

async function deletePrenotazione(id) {
  if (!confirm('Eliminare questa prenotazione?')) return;
  const {error} = await _db.from('prenotazioni').delete().eq('id', id);
  if (error) { showToastM361('Errore eliminazione', 'error'); return; }
  showToastM361('Prenotazione eliminata', 'success');
  loadPrenotazioni();
}

// ─── MODAL CAMPAGNA ───
function openModalCampagna(id) {
  _editingCampId = id || null;
  const c = id ? _campagne.find(c => c.id === id) : null;
  document.getElementById('modal-camp-title').textContent = c ? 'Modifica campagna' : 'Nuova campagna';
  document.getElementById('fc-titolo').value = c?.titolo || '';
  document.getElementById('fc-desc').value = c?.descrizione || '';
  document.getElementById('fc-apertura').value = c?.data_apertura || '';
  document.getElementById('fc-chiusura').value = c?.data_chiusura || '';
  document.getElementById('fc-attiva').checked = c ? c.attiva !== false : true;
  _campProdotti = c?.prodotti ? JSON.parse(JSON.stringify(c.prodotti)) : [];
  renderCampProdotti();
  document.getElementById('modal-camp').style.display = 'flex';
  setTimeout(() => document.getElementById('fc-titolo').focus(), 80);
}

function closeModalCamp() { document.getElementById('modal-camp').style.display = 'none'; }

function addProdottoCampagna() {
  _campProdotti.push({descrizione: '', codice: '', prezzo: ''});
  renderCampProdotti();
  setTimeout(() => {
    const rows = document.querySelectorAll('#fc-prodotti .form-input-sm');
    if (rows.length >= 3) rows[rows.length - 3].focus();
  }, 50);
}

function removeProdottoCampagna(i) {
  _campProdotti.splice(i, 1);
  renderCampProdotti();
}

function renderCampProdotti() {
  document.getElementById('fc-prodotti').innerHTML = _campProdotti.length === 0
    ? '<p style="color:#94a3b8;font-size:12px;margin:4px 0 8px">Nessun prodotto. Clicca "Aggiungi prodotto".</p>'
    : _campProdotti.map((p, i) => `
      <div class="camp-prod-row">
        <input type="text" placeholder="Descrizione" value="${escAttr(p.descrizione || '')}"
          oninput="_campProdotti[${i}].descrizione=this.value" class="form-input-sm" style="flex:2">
        <input type="text" placeholder="Codice" value="${escAttr(p.codice || '')}"
          oninput="_campProdotti[${i}].codice=this.value" class="form-input-sm" style="flex:1">
        <input type="number" placeholder="€" step="0.01" min="0" value="${escAttr(String(p.prezzo || ''))}"
          oninput="_campProdotti[${i}].prezzo=this.value" class="form-input-sm" style="width:72px;text-align:right">
        <button onclick="removeProdottoCampagna(${i})" class="btn-danger btn-sm" title="Rimuovi"><i class="fas fa-times"></i></button>
      </div>`).join('');
}

async function saveCampagna() {
  const titolo = document.getElementById('fc-titolo').value.trim();
  if (!titolo) { showToastM361('Inserisci un titolo per la campagna', 'warning'); return; }

  // Leggi prodotti direttamente dal DOM
  const prodotti = [];
  document.querySelectorAll('#fc-prodotti .camp-prod-row').forEach(row => {
    const inp = row.querySelectorAll('input');
    prodotti.push({
      descrizione: inp[0]?.value.trim() || '',
      codice:      inp[1]?.value.trim() || '',
      prezzo:      parseFloat(inp[2]?.value) || 0,
    });
  });

  const payload = {
    titolo,
    descrizione: document.getElementById('fc-desc').value.trim() || null,
    data_apertura: document.getElementById('fc-apertura').value || null,
    data_chiusura: document.getElementById('fc-chiusura').value || null,
    attiva: document.getElementById('fc-attiva').checked,
    prodotti,
  };

  const btn = document.getElementById('btn-save-camp');
  btn.disabled = true; btn.textContent = 'Salvataggio...';

  const {error} = _editingCampId
    ? await _db.from('campagne_prenotazione').update(payload).eq('id', _editingCampId)
    : await _db.from('campagne_prenotazione').insert(payload);

  btn.disabled = false; btn.textContent = 'Salva campagna';
  if (error) { showToastM361('Errore: ' + error.message, 'error'); return; }
  showToastM361(_editingCampId ? 'Campagna aggiornata' : 'Campagna creata', 'success');
  closeModalCamp();
  loadCampagne();
}

function editCampagna(id) { openModalCampagna(id); }

async function deleteCampagna(id) {
  if (!confirm('Eliminare questa campagna?\nLe prenotazioni associate NON verranno eliminate.')) return;
  const {error} = await _db.from('campagne_prenotazione').delete().eq('id', id);
  if (error) { showToastM361('Errore eliminazione', 'error'); return; }
  showToastM361('Campagna eliminata', 'success');
  loadCampagne();
}

// ─── TABS ───
function switchTab(btn) {
  const tabId = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
  if (tabId === 'pren-tab-riepilogo') renderRiepilogo();
}

function switchTabById(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === tabId));
}

// ─── UTIL ───
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ─── START ───
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>

</html>
