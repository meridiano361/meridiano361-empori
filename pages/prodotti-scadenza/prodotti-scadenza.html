<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prodotti in Scadenza — M361</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --rosso:#B5453A; --rosso-l:rgba(181,69,58,.08);
      --scuro:#1e293b; --scuro-mid:#334155; --scuro-l:#475569;
      --grigio:#94a3b8; --grigio-l:#e2e8f0;
      --sfondo:#f1f5f9;
      --f-base:15px; --f-sm:13px; --f-xs:11px;
      --r:#B5453A; --r-bg:#fef2f2;
      --o:#d97706; --o-bg:#fffbeb;
      --y:#b45309; --y-bg:#fefce8;
      --g:#059669; --g-bg:#f0fdf4;
      --n:#64748b; --n-bg:#f8fafc;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--sfondo);font-size:var(--f-base);color:var(--scuro);padding-bottom:110px}

    /* ── Header scuro stile turni ── */
    .pg-header{background:var(--scuro);padding:16px 18px 14px;display:flex;align-items:center;gap:12px}
    .pg-header h1{font-size:18px;font-weight:900;color:#fff;flex:1;letter-spacing:-.01em}
    .btn-aggiungi{background:var(--rosso);color:#fff;border:none;border-radius:10px;padding:9px 15px;font-size:var(--f-xs);font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:background .15s}
    .btn-aggiungi:hover{background:#8c362d}

    /* ── Emporio bar (admin) ── */
    .emp-bar{display:flex;gap:3px;padding:10px 14px 0;flex-wrap:wrap;background:#fff;border-bottom:1px solid var(--grigio-l)}
    .emp-tab{padding:7px 13px;border-radius:8px 8px 0 0;font-size:var(--f-xs);font-weight:800;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;border:none;background:transparent;color:var(--grigio);transition:all .12s;font-family:inherit;border-bottom:2px solid transparent}
    .emp-tab.on{color:var(--rosso);border-bottom-color:var(--rosso);background:var(--r-bg)}

    /* ── Statistiche ── */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#fff;border-bottom:1px solid var(--grigio-l)}
    .stat-item{padding:12px 8px;text-align:center;cursor:pointer;transition:background .12s;border-right:1px solid var(--grigio-l);position:relative}
    .stat-item:last-child{border-right:none}
    .stat-item.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
    .stat-num{font-size:22px;font-weight:900;line-height:1}
    .stat-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-top:3px;color:var(--grigio)}

    /* ── Filter bar stile turni month-bar ── */
    .filter-wrap{background:#fff;border-bottom:1px solid var(--grigio-l);padding:8px 12px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
    .filter-wrap::-webkit-scrollbar{display:none}
    .f-btn{padding:6px 13px;border-radius:8px;font-size:var(--f-xs);font-weight:900;letter-spacing:.06em;cursor:pointer;border:none;background:transparent;color:var(--grigio);transition:all .12s;white-space:nowrap;font-family:inherit}
    .f-btn:hover:not(.on){background:var(--sfondo);color:var(--scuro-l)}
    .f-btn.on{color:#fff}
    .f-btn[data-f="tutti"].on{background:var(--scuro)}
    .f-btn[data-f="r7"].on{background:var(--r)}
    .f-btn[data-f="r14"].on{background:var(--o)}
    .f-btn[data-f="r30"].on{background:var(--y)}
    .f-btn[data-f="r90"].on{background:var(--g)}
    .f-btn[data-f="promo"].on{background:#7c3aed}

    /* ── Sezione titolo stile turni ── */
    .sec-t{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--grigio);display:flex;align-items:center;gap:10px;padding:16px 16px 8px}
    .sec-t::before{content:'';width:3px;height:16px;background:var(--rosso);border-radius:2px;flex-shrink:0}

    /* ── Card prodotto stile giorno-turno ── */
    .prod-list{display:flex;flex-direction:column;gap:12px;padding:0 14px}
    .prod-card{background:#fff;border:1px solid var(--grigio-l);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}

    .card-header{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--scuro);color:#fff}
    .card-header.r{background:var(--r)}
    .card-header.o{background:var(--o)}
    .card-header.y{background:var(--y)}
    .card-header.g{background:var(--g)}
    .card-header.n{background:#475569}

    .card-desc{font-size:15px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card-codice{font-size:var(--f-xs);opacity:.7;font-weight:600}
    .card-days{font-size:22px;font-weight:900;white-space:nowrap;line-height:1}
    .card-days-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;opacity:.8;text-align:right}

    .card-body{padding:12px 16px}
    .card-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
    .meta{display:flex;align-items:center;gap:5px;font-size:var(--f-sm);color:var(--scuro-l);font-weight:600}
    .meta i{font-size:11px;color:var(--grigio);width:14px;text-align:center}

    /* Sconto badge */
    .sconto-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:var(--f-sm);font-weight:900;margin-bottom:10px}
    .sconto-badge i{font-size:10px}

    /* Tag chips */
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:var(--f-xs);font-weight:800}
    .chip-promo{background:#f5f3ff;color:#7c3aed;border:1.5px solid #ddd6fe}
    .chip-solo{background:#f0f9ff;color:#0369a1;border:1.5px solid #bae6fd}

    .card-actions{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--sfondo)}
    .act-btn{flex:1;padding:7px;border-radius:8px;border:1.5px solid var(--grigio-l);background:#fff;font-size:var(--f-xs);font-weight:800;cursor:pointer;font-family:inherit;color:var(--scuro-l);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s}
    .act-btn:hover{border-color:var(--rosso);color:var(--rosso)}
    .act-btn.promo-on{background:#f5f3ff;border-color:#7c3aed;color:#7c3aed}
    .act-btn.del:hover{border-color:#ef4444;color:#ef4444}

    /* ── Empty ── */
    .empty{text-align:center;padding:52px 20px;color:var(--grigio)}
    .empty i{font-size:44px;display:block;margin-bottom:14px;opacity:.35}
    .empty p{font-size:var(--f-base);font-weight:700}
    .empty small{display:block;margin-top:4px;font-size:var(--f-sm);opacity:.7}

    /* ── Overlay ── */
    #overlay{position:fixed;inset:0;z-index:9400;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .25s}
    #overlay.open{opacity:1;pointer-events:auto}

    /* ── Bottom panel ── */
    .bottom-panel{position:fixed;bottom:0;left:0;right:0;z-index:9500;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 28px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:93vh;display:flex;flex-direction:column;max-width:640px;margin:0 auto}
    .bottom-panel.open{transform:translateY(0)}
    .panel-drag{width:36px;height:4px;background:var(--grigio-l);border-radius:2px;margin:12px auto 0;flex-shrink:0}
    .panel-scroll{overflow-y:auto;flex:1;padding:16px 20px calc(24px + env(safe-area-inset-bottom,0px))}
    .panel-title{font-size:17px;font-weight:900;color:var(--scuro);margin:0 0 18px}

    /* ── Form ── */
    .f-lbl{font-size:var(--f-xs);font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--grigio);margin-bottom:5px;display:block}
    .f-inp{width:100%;padding:11px 13px;border:1.5px solid var(--grigio-l);border-radius:10px;font-size:var(--f-base);font-family:inherit;outline:none;color:var(--scuro);transition:border-color .15s}
    .f-inp:focus{border-color:var(--rosso)}
    .f-row{margin-bottom:14px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    .chk-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--sfondo);border-radius:10px;border:1.5px solid var(--grigio-l);cursor:pointer;margin-bottom:10px;transition:border-color .15s}
    .chk-row:hover{border-color:#cbd5e1}
    .chk-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--rosso);flex-shrink:0;cursor:pointer}
    .chk-lbl{font-size:var(--f-base);font-weight:700;color:var(--scuro)}
    .chk-sub{font-size:var(--f-xs);color:var(--grigio);margin-top:1px}

    .sconto-box{background:var(--sfondo);border:1.5px solid var(--grigio-l);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
    .sconto-num{font-size:26px;font-weight:900;min-width:60px}
    .sconto-txt{font-size:var(--f-sm);color:var(--scuro-l);font-weight:600;line-height:1.45}

    .btn-row{display:flex;gap:10px;margin-top:6px}
    .btn-p{background:var(--rosso);color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;cursor:pointer;font-family:inherit;font-size:var(--f-base);flex:1;transition:background .15s}
    .btn-p:hover{background:#8c362d}
    .btn-s{background:#fff;color:var(--scuro-l);border:1.5px solid var(--grigio-l);border-radius:10px;padding:13px;font-weight:700;cursor:pointer;font-family:inherit;font-size:var(--f-base);flex:1}

    /* ── Spinner ── */
    .spin{width:28px;height:28px;border:3px solid var(--grigio-l);border-top-color:var(--rosso);border-radius:50%;animation:rot .8s linear infinite;margin:44px auto;display:block}
    @keyframes rot{to{transform:rotate(360deg)}}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;right:16px;background:var(--scuro);color:#fff;padding:10px 18px;border-radius:12px;font-size:var(--f-sm);font-weight:700;z-index:99999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
    .toast.show{opacity:1;transform:none}
    .toast.ok{background:#166534}
    .toast.err{background:#991b1b}

    @media(max-width:380px){.two-col{grid-template-columns:1fr}.card-days{font-size:18px}}
  </style>
</head>
<body>
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<!-- Header -->
<div class="pg-header">
  <div>
    <h1>Prodotti in Scadenza</h1>
  </div>
  <button class="btn-aggiungi" onclick="apriForm()"><i class="fas fa-plus"></i> Aggiungi</button>
</div>

<!-- Emporio bar (admin only) -->
<div class="emp-bar" id="emp-bar" style="display:none"></div>

<!-- Statistiche -->
<div class="stats-bar" id="stats-bar">
  <div class="stat-item" onclick="setFiltro('r7',this)" data-f="r7">
    <div class="stat-num" id="cnt-r7" style="color:var(--r)">—</div>
    <div class="stat-lbl">≤7 giorni</div>
  </div>
  <div class="stat-item" onclick="setFiltro('r14',this)" data-f="r14">
    <div class="stat-num" id="cnt-r14" style="color:var(--o)">—</div>
    <div class="stat-lbl">≤14 giorni</div>
  </div>
  <div class="stat-item" onclick="setFiltro('r30',this)" data-f="r30">
    <div class="stat-num" id="cnt-r30" style="color:var(--y)">—</div>
    <div class="stat-lbl">≤30 giorni</div>
  </div>
  <div class="stat-item" onclick="setFiltro('r90',this)" data-f="r90">
    <div class="stat-num" id="cnt-r90" style="color:var(--g)">—</div>
    <div class="stat-lbl">≤90 giorni</div>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-wrap">
  <button class="f-btn on" data-f="tutti" onclick="setFiltro('tutti',this)">Tutti</button>
  <button class="f-btn" data-f="r7"   onclick="setFiltro('r7',this)">− 7 g</button>
  <button class="f-btn" data-f="r14"  onclick="setFiltro('r14',this)">− 14 g</button>
  <button class="f-btn" data-f="r30"  onclick="setFiltro('r30',this)">− 30 g</button>
  <button class="f-btn" data-f="r90"  onclick="setFiltro('r90',this)">− 90 g</button>
  <button class="f-btn" data-f="promo" onclick="setFiltro('promo',this)"><i class="fas fa-tag"></i> Promo</button>
</div>

<!-- Titoletto sezione -->
<p class="sec-t" id="sec-label">Prodotti registrati</p>

<!-- Lista -->
<div class="prod-list" id="prod-list">
  <div class="spin"></div>
</div>

<!-- Overlay -->
<div id="overlay" onclick="chiudiPanel()"></div>

<!-- Form panel -->
<div class="bottom-panel" id="form-panel">
  <div class="panel-drag"></div>
  <div class="panel-scroll">
    <p class="panel-title" id="form-title">Aggiungi prodotto</p>

    <div class="f-row">
      <label class="f-lbl">Descrizione *</label>
      <input type="text" class="f-inp" id="f-desc" placeholder="es. Biscotti al miele">
    </div>
    <div class="two-col">
      <div class="f-row">
        <label class="f-lbl">Codice</label>
        <input type="text" class="f-inp" id="f-codice" placeholder="opzionale">
      </div>
      <div class="f-row">
        <label class="f-lbl">Quantità *</label>
        <input type="number" class="f-inp" id="f-qty" min="1" value="1">
      </div>
    </div>
    <div class="f-row">
      <label class="f-lbl">Data di scadenza *</label>
      <input type="date" class="f-inp" id="f-scad">
    </div>

    <label class="chk-row">
      <input type="checkbox" id="f-solo">
      <div>
        <div class="chk-lbl">Solo alcuni hanno questa scadenza</div>
        <div class="chk-sub">es. 3 su 10 biscotti scadono prima degli altri</div>
      </div>
    </label>

    <label class="chk-row">
      <input type="checkbox" id="f-promo">
      <div>
        <div class="chk-lbl">Già messo in promo a scaffale</div>
        <div class="chk-sub">prodotto già scontato e visibile al cliente</div>
      </div>
    </label>

    <div class="sconto-box" id="sconto-box">
      <div class="sconto-num" id="sconto-val" style="color:var(--grigio)">—</div>
      <div class="sconto-txt">Sconto consigliato<br>in base a quantità e giorni alla scadenza</div>
    </div>

    <div class="btn-row">
      <button class="btn-s" onclick="chiudiPanel()">Annulla</button>
      <button class="btn-p" onclick="salva()"><i class="fas fa-check"></i> Salva</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
const db = supabase.createClient(SB_URL, SB_KEY);

let user = null, _admin = false, emporio = null;
let filtro = 'tutti', prodotti = [], editId = null;

/* ── Sconto matrix (5% step, max 50%) ─────────────────────────────── */
const MTX = [
  { d:  7, s:[30,40,45,50] },
  { d: 14, s:[20,25,35,40] },
  { d: 30, s:[15,20,25,30] },
  { d: 90, s:[10,10,15,20] },
];
function sconto(qty, gg) {
  const q = qty<=1?0:qty<=3?1:qty<=10?2:3;
  for (const r of MTX) if (gg<=r.d) return r.s[q];
  return qty>10?5:0;
}

/* ── Urgenza ──────────────────────────────────────────────────────── */
function urg(gg) {
  if (gg<0)   return {cls:'n',color:'var(--n)',bg:'var(--n-bg)'};
  if (gg<=7)  return {cls:'r',color:'var(--r)',bg:'var(--r-bg)'};
  if (gg<=14) return {cls:'o',color:'var(--o)',bg:'var(--o-bg)'};
  if (gg<=30) return {cls:'y',color:'var(--y)',bg:'var(--y-bg)'};
  if (gg<=90) return {cls:'g',color:'var(--g)',bg:'var(--g-bg)'};
  return {cls:'n',color:'var(--n)',bg:'var(--n-bg)'};
}
function ggAlla(s) {
  const t=new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(s+'T00:00:00')-t)/86400000);
}
function fmtData(s) {
  return new Date(s+'T00:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtGg(gg) {
  if (gg<0)  return 'Scaduto';
  if (gg===0) return 'Scade oggi';
  if (gg===1) return 'Scade domani';
  return `${gg} giorni`;
}

/* ── Init ─────────────────────────────────────────────────────────── */
async function init() {
  user   = JSON.parse(localStorage.getItem('m361_user')||'null');
  if (!user) return;
  _admin  = typeof isAdmin==='function' && isAdmin();
  emporio = user.emporio||null;

  if (_admin) {
    const {data} = await db.from('operatori').select('emporio').eq('attivo',true).not('emporio','is',null);
    const emps = [...new Set((data||[]).map(r=>r.emporio).filter(Boolean))].sort();
    buildEmpBar(emps);
  }
  await carica();
}

function buildEmpBar(emps) {
  const bar = document.getElementById('emp-bar');
  bar.style.display = 'flex';
  const mk = (label, emp) => {
    const b = document.createElement('button');
    b.className = 'emp-tab' + (emporio===emp?' on':'');
    b.textContent = label;
    b.onclick = () => { emporio=emp; bar.querySelectorAll('.emp-tab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); carica(); };
    bar.appendChild(b);
  };
  mk('Tutti', null);
  emps.forEach(e => mk(e, e));
}

async function carica() {
  document.getElementById('prod-list').innerHTML = '<div class="spin"></div>';
  let q = db.from('prodotti_scadenza').select('*').order('scadenza',{ascending:true});
  if (!_admin || emporio) q = q.eq('emporio', emporio||user.emporio);
  const {data,error} = await q;
  if (error) {
    document.getElementById('prod-list').innerHTML =
      `<div class="empty"><i class="fas fa-circle-exclamation"></i><p>Errore caricamento</p><small>${esc(error.message)}</small></div>`;
    return;
  }
  prodotti = (data||[]).map(p => ({...p, _gg:ggAlla(p.scadenza), _sc:sconto(p.quantita,ggAlla(p.scadenza))}));
  renderStats();
  renderList();
}

function renderStats() {
  const cnt = (a,b) => prodotti.filter(p=>p._gg>=0&&p._gg>=a&&p._gg<=b).length;
  document.getElementById('cnt-r7').textContent  = prodotti.filter(p=>p._gg>=0&&p._gg<=7).length;
  document.getElementById('cnt-r14').textContent = prodotti.filter(p=>p._gg>7&&p._gg<=14).length;
  document.getElementById('cnt-r30').textContent = prodotti.filter(p=>p._gg>14&&p._gg<=30).length;
  document.getElementById('cnt-r90').textContent = prodotti.filter(p=>p._gg>30&&p._gg<=90).length;
}

function renderList() {
  const lista = filtra();
  const el    = document.getElementById('prod-list');
  const lab   = document.getElementById('sec-label');
  lab.textContent = `${lista.length} prodott${lista.length===1?'o':'i'}${filtro!=='tutti'?' nel filtro selezionato':''}`;

  if (!lista.length) {
    el.innerHTML = `<div class="empty"><i class="fas fa-box-open"></i><p>Nessun prodotto</p><small>${filtro==='tutti'?'Aggiungi il primo prodotto con il tasto + in alto':'Nessun prodotto in questo intervallo'}</small></div>`;
    return;
  }

  el.innerHTML = lista.map(p => {
    const u  = urg(p._gg);
    const sc = p._sc;
    const scColor = sc>=40?'var(--r)':sc>=25?'var(--o)':sc>=15?'var(--y)':'var(--g)';
    const scBg    = sc>=40?'var(--r-bg)':sc>=25?'var(--o-bg)':sc>=15?'var(--y-bg)':'var(--g-bg)';

    return `<div class="prod-card">
      <div class="card-header ${u.cls}">
        <div style="flex:1;min-width:0">
          <div class="card-desc">${esc(p.descrizione)}</div>
          ${p.codice?`<div class="card-codice">${esc(p.codice)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="card-days">${p._gg<0?'—':p._gg}</div>
          <div class="card-days-lbl">${p._gg<0?'scaduto':'giorni'}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-row">
          <div class="meta"><i class="fas fa-boxes-stacked"></i> ${p.quantita} pz</div>
          <div class="meta"><i class="fas fa-calendar-day"></i> ${fmtData(p.scadenza)}</div>
          ${_admin?`<div class="meta"><i class="fas fa-store"></i> ${esc(p.emporio)}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          ${sc>0?`<div class="sconto-badge" style="color:${scColor};background:${scBg};border:1.5px solid ${scColor}44"><i class="fas fa-tag"></i> Sconto consigliato: −${sc}%</div>`:''}
          ${p.in_promo?`<span class="chip chip-promo"><i class="fas fa-tag" style="font-size:9px"></i> In promo</span>`:''}
          ${p.solo_alcuni?`<span class="chip chip-solo"><i class="fas fa-circle-info" style="font-size:9px"></i> Solo alcuni</span>`:''}
        </div>
        <div class="card-actions">
          <button class="act-btn ${p.in_promo?'promo-on':''}" onclick="togglePromo('${p.id}',${p.in_promo})">
            <i class="fas fa-tag"></i> ${p.in_promo?'In promo':'Promo'}
          </button>
          <button class="act-btn" onclick="apriModifica('${p.id}')"><i class="fas fa-pen"></i> Modifica</button>
          <button class="act-btn del" onclick="elimina('${p.id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filtra() {
  return prodotti.filter(p => {
    if (filtro==='r7')   return p._gg>=0 && p._gg<=7;
    if (filtro==='r14')  return p._gg>7  && p._gg<=14;
    if (filtro==='r30')  return p._gg>14 && p._gg<=30;
    if (filtro==='r90')  return p._gg>30 && p._gg<=90;
    if (filtro==='promo') return p.in_promo;
    return true;
  });
}

function setFiltro(f, el) {
  filtro = f;
  document.querySelectorAll('.f-btn,.stat-item').forEach(b=>b.classList.remove('on'));
  // attiva sia il filtro bar che la stat card se coincidono
  document.querySelectorAll(`[data-f="${f}"]`).forEach(b=>b.classList.add('on'));
  renderList();
}

/* ── Toggle promo ─────────────────────────────────────────────────── */
async function togglePromo(id, attuale) {
  const {error} = await db.from('prodotti_scadenza').update({in_promo:!attuale,updated_at:new Date().toISOString()}).eq('id',id);
  if (error){toast('Errore: '+error.message,'err');return;}
  toast(!attuale?'Segnato in promo ✓':'Promo rimossa','ok');
  await carica();
}

/* ── Form ─────────────────────────────────────────────────────────── */
function apriForm() {
  editId=null;
  document.getElementById('form-title').textContent='Aggiungi prodotto';
  ['f-desc','f-codice'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-qty').value='1';
  document.getElementById('f-scad').value='';
  document.getElementById('f-solo').checked=false;
  document.getElementById('f-promo').checked=false;
  aggSconto();
  apriPanel();
}

function apriModifica(id) {
  const p=prodotti.find(x=>x.id===id); if(!p)return;
  editId=id;
  document.getElementById('form-title').textContent='Modifica prodotto';
  document.getElementById('f-desc').value  =p.descrizione||'';
  document.getElementById('f-codice').value =p.codice||'';
  document.getElementById('f-qty').value   =p.quantita||1;
  document.getElementById('f-scad').value  =p.scadenza||'';
  document.getElementById('f-solo').checked =!!p.solo_alcuni;
  document.getElementById('f-promo').checked=!!p.in_promo;
  aggSconto();
  apriPanel();
}

function aggSconto() {
  const qty  = parseInt(document.getElementById('f-qty').value)||1;
  const scad = document.getElementById('f-scad').value;
  const el   = document.getElementById('sconto-val');
  const box  = document.getElementById('sconto-box');
  if (!scad){el.textContent='—';el.style.color='var(--grigio)';box.style.borderColor='var(--grigio-l)';return;}
  const gg=ggAlla(scad), sc=sconto(qty,gg);
  if (sc<=0){el.textContent='Nessuno';el.style.color='var(--grigio)';box.style.borderColor='var(--grigio-l)';}
  else{
    const c=sc>=40?'var(--r)':sc>=25?'var(--o)':sc>=15?'var(--y)':'var(--g)';
    el.textContent=`−${sc}%`; el.style.color=c; box.style.borderColor=c;
  }
}

async function salva() {
  const desc=document.getElementById('f-desc').value.trim();
  const scad=document.getElementById('f-scad').value;
  const qty =parseInt(document.getElementById('f-qty').value)||1;
  if(!desc){document.getElementById('f-desc').focus();return;}
  if(!scad){document.getElementById('f-scad').focus();return;}

  const gg=ggAlla(scad);
  const payload={
    emporio:         emporio||user.emporio,
    codice:          document.getElementById('f-codice').value.trim()||null,
    descrizione:     desc, quantita:qty, scadenza:scad,
    solo_alcuni:     document.getElementById('f-solo').checked,
    in_promo:        document.getElementById('f-promo').checked,
    sconto_suggerito:sconto(qty,gg),
    operatore_nome:  user.nome||null,
    updated_at:      new Date().toISOString(),
  };

  const {error}=editId
    ? await db.from('prodotti_scadenza').update(payload).eq('id',editId)
    : await db.from('prodotti_scadenza').insert({...payload,notif_30g_at:null,notif_14g_at:null,notif_1g_at:null});

  if(error){toast('Errore: '+error.message,'err');return;}
  toast(editId?'Aggiornato ✓':'Aggiunto ✓','ok');
  chiudiPanel(); await carica();
}

async function elimina(id) {
  if(!confirm('Eliminare questo prodotto?'))return;
  const {error}=await db.from('prodotti_scadenza').delete().eq('id',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Eliminato','ok'); await carica();
}

/* ── Panel ────────────────────────────────────────────────────────── */
function apriPanel(){document.getElementById('form-panel').classList.add('open');document.getElementById('overlay').classList.add('open');}
function chiudiPanel(){document.getElementById('form-panel').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

/* ── Live sconto ─────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{
  ['f-qty','f-scad'].forEach(id=>{
    const el=document.getElementById(id);
    el?.addEventListener('input',aggSconto);
    el?.addEventListener('change',aggSconto);
  });
});

/* ── Toast ────────────────────────────────────────────────────────── */
function toast(msg,tipo=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show${tipo?' '+tipo:''}`;
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
</html>
