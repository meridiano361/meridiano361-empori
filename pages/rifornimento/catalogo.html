<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo Rifornimento — M361</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }

    .toolbar {
      position: sticky; top: 56px; z-index: 20; background: white;
      border-bottom: 1px solid #e2e8f0; padding: 8px 14px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }

    /* ── FORNITORE CARD ── */
    .forn-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; }
    .forn-header {
      display: flex; align-items: center; gap: 10px;
      background: #1e293b; color: white; padding: 12px 16px;
      cursor: pointer; user-select: none;
    }
    .forn-header:hover { background: #263549; }
    .forn-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; flex: 1; }
    .forn-count { background: #334155; color: #94a3b8; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }

    /* ── CATEGORIA ── */
    .cat-header {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
      cursor: pointer; user-select: none; font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .06em; color: #475569;
    }
    .cat-header:hover { background: #f1f5f9; }
    .cat-count { margin-left: auto; color: #94a3b8; font-weight: 700; }

    /* ── PRODOTTO ROW ── */
    .prod-row {
      display: grid;
      grid-template-columns: 80px 1fr 70px 50px 100px auto;
      align-items: center; gap: 8px;
      padding: 6px 16px; border-bottom: 1px solid #f1f5f9; font-size: 12px;
    }
    .prod-row:last-child { border-bottom: none; }
    .prod-row:hover { background: #f8fafc; }
    .prod-code { color: #94a3b8; font-family: monospace; font-size: 11px; }
    .prod-desc { font-weight: 500; color: #1e293b; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prod-pvp  { text-align: right; color: #374151; }
    .prod-conf { text-align: center; color: #6b7280; }
    .ass-dots  { display: flex; gap: 3px; align-items: center; }
    .ass-dot   { width: 10px; height: 10px; border-radius: 50%; font-size: 8px; display: flex; align-items: center; justify-content: center; }
    .ass-si    { background: #dcfce7; color: #16a34a; }
    .ass-no    { background: #fee2e2; color: #dc2626; }
    .ass-null  { background: #f1f5f9; color: #94a3b8; }

    .btn-icon {
      width: 28px; height: 28px; border-radius: 8px; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; background: white;
      font-size: 13px;
    }
    .btn-edit { color: #3b82f6; }
    .btn-edit:hover { background: #eff6ff; border-color: #bfdbfe; }
    .btn-del  { color: #ef4444; }
    .btn-del:hover { background: #fef2f2; border-color: #fecaca; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-box {
      background: white; border-radius: 20px; padding: 24px;
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
    }
    .form-label { display: block; font-size: 11px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    .form-input {
      width: 100%; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 7px 10px; font-size: 13px; font-family: 'Inter', sans-serif;
      background: white;
    }
    .form-input:focus { outline: none; border-color: #94a3b8; }
    .form-row { margin-bottom: 14px; }

    .ass-toggle {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .ass-btn {
      padding: 4px 12px; border-radius: 8px; border: 1px solid #e2e8f0;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s;
      background: white; color: #64748b;
    }
    .ass-btn.on  { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
    .ass-btn.off { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
    .ass-btn.nat { background: #fff7ed; color: #d97706; border-color: #fed7aa; }

    select.form-input { appearance: auto; }

    @media (max-width: 600px) {
      .prod-row { grid-template-columns: 70px 1fr 60px auto; }
      .col-conf, .col-ass { display: none; }
    }
  </style>
</head>
<body class="bg-slate-50">
<script src="../../scripts/nav-script.js"></script>
<script src="../../scripts/auth.js"></script>

<div class="toolbar">
  <a href="index.html" class="text-slate-400 hover:text-slate-600">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <span class="font-bold text-slate-700 text-sm flex-shrink-0">Catalogo prodotti</span>

  <input type="search" id="f-cerca" placeholder="Cerca..." autocomplete="off"
    class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm flex-1 min-w-0 max-w-xs"
    oninput="renderAll()">

  <div class="flex-1"></div>

  <button onclick="apriModaleProdotto(null)"
    class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 transition-colors flex-shrink-0">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/>
    </svg>
    Nuovo prodotto
  </button>
</div>

<main class="max-w-5xl mx-auto p-4 md:p-6 space-y-4" id="main">
  <div class="text-center py-12 text-slate-400 text-sm">Caricamento...</div>
</main>

<!-- MODAL PRODOTTO -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modal-title" class="font-bold text-slate-800 text-lg mb-5">Nuovo prodotto</h2>

    <div class="form-row">
      <label class="form-label">Fornitore / Marchio</label>
      <input list="dl-fornitori" id="m-fornitore" class="form-input" placeholder="es. Altromercato" autocomplete="off">
      <datalist id="dl-fornitori"></datalist>
    </div>
    <div class="form-row">
      <label class="form-label">Categoria</label>
      <input list="dl-categorie" id="m-categoria" class="form-input" placeholder="es. BEVANDE ALCOLICHE" autocomplete="off">
      <datalist id="dl-categorie"></datalist>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" class="form-row">
      <div>
        <label class="form-label">Codice</label>
        <input type="text" id="m-codice" class="form-input" placeholder="es. 851" autocomplete="off">
      </div>
      <div>
        <label class="form-label">PVP (€)</label>
        <input type="number" id="m-pvp" class="form-input" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Descrizione</label>
      <input type="text" id="m-desc" class="form-input" placeholder="Nome prodotto" autocomplete="off">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" class="form-row">
      <div>
        <label class="form-label">Confezione (pz)</label>
        <input type="number" id="m-conf" class="form-input" placeholder="es. 6" min="1">
      </div>
      <div>
        <label class="form-label">Ordine (sort)</label>
        <input type="number" id="m-sort" class="form-input" placeholder="0">
      </div>
    </div>

    <!-- ASSORTIMENTO -->
    <div class="form-row">
      <label class="form-label">Assortimento Cremona</label>
      <div class="ass-toggle">
        <button class="ass-btn on"  onclick="setAss('cr','si',this)">SI</button>
        <button class="ass-btn off" onclick="setAss('cr','no',this)">NO</button>
        <button class="ass-btn nat" onclick="setAss('cr','nat',this)">Stagionale</button>
      </div>
      <input type="hidden" id="m-ass-cr" value="si">
    </div>
    <div class="form-row">
      <label class="form-label">Assortimento Casalmaggiore</label>
      <div class="ass-toggle">
        <button class="ass-btn on"  onclick="setAss('cas','si',this)">SI</button>
        <button class="ass-btn off" onclick="setAss('cas','no',this)">NO</button>
        <button class="ass-btn nat" onclick="setAss('cas','nat',this)">Stagionale</button>
      </div>
      <input type="hidden" id="m-ass-cas" value="si">
    </div>
    <div class="form-row">
      <label class="form-label">Assortimento Viadana</label>
      <div class="ass-toggle">
        <button class="ass-btn on"  onclick="setAss('via','si',this)">SI</button>
        <button class="ass-btn off" onclick="setAss('via','no',this)">NO</button>
        <button class="ass-btn nat" onclick="setAss('via','nat',this)">Stagionale</button>
      </div>
      <input type="hidden" id="m-ass-via" value="si">
    </div>

    <div id="modal-err" class="text-red-500 text-xs mt-1 hidden"></div>

    <div class="flex gap-3 mt-6">
      <button onclick="chiudiModale()"
        class="flex-1 border border-slate-200 text-slate-600 font-semibold py-2 rounded-xl text-sm hover:bg-slate-50">
        Annulla
      </button>
      <button id="modal-save" onclick="salvaProdotto()"
        class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded-xl text-sm transition-colors">
        Salva
      </button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const user  = JSON.parse(localStorage.getItem('m361_user') || 'null');
const admin = ['admin','dipendente'].includes(user?.ruolo?.toLowerCase());

let catalogo = [];
let editingId = null;

// ── LOAD ──────────────────────────────────────────────────────────
async function load() {
  const { data, error } = await db
    .from('rifornimento_catalogo')
    .select('*')
    .order('fornitore').order('category').order('sort_order');
  if (error) {
    document.getElementById('main').innerHTML =
      `<div class="text-center py-12 text-red-500 text-sm">Errore: ${error.message}</div>`;
    return;
  }
  catalogo = data || [];
  populateDatalist();
  renderAll();
}

function populateDatalist() {
  const fornitori  = [...new Set(catalogo.map(p => p.fornitore).filter(Boolean))].sort();
  const categorie  = [...new Set(catalogo.map(p => p.category).filter(Boolean))].sort();
  document.getElementById('dl-fornitori').innerHTML = fornitori.map(f => `<option value="${escH(f)}">`).join('');
  document.getElementById('dl-categorie').innerHTML = categorie.map(c => `<option value="${escH(c)}">`).join('');
}

// ── RENDER ────────────────────────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderAll() {
  const cerca = (document.getElementById('f-cerca')?.value || '').toLowerCase().trim();

  const filtered = catalogo.filter(p => {
    if (!cerca) return true;
    return (p.product_code + ' ' + p.description + ' ' + p.category + ' ' + p.fornitore)
      .toLowerCase().includes(cerca);
  });

  // Raggruppa per fornitore → categoria
  const byForn = {};
  filtered.forEach(p => {
    const forn = p.fornitore || '(Senza fornitore)';
    const cat  = p.category  || '(Senza categoria)';
    if (!byForn[forn]) byForn[forn] = {};
    if (!byForn[forn][cat]) byForn[forn][cat] = [];
    byForn[forn][cat].push(p);
  });

  const main = document.getElementById('main');
  if (!Object.keys(byForn).length) {
    main.innerHTML = `<div class="text-center py-12 text-slate-400 text-sm">Nessun prodotto trovato.</div>`;
    return;
  }

  main.innerHTML = Object.entries(byForn).map(([forn, byCat]) => {
    const totProd = Object.values(byCat).reduce((s, arr) => s + arr.length, 0);
    const catsHtml = Object.entries(byCat).map(([cat, prods]) => `
      <div class="cat-header" onclick="toggleCat(this)">
        <svg class="w-3 h-3 cat-chev transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/>
        </svg>
        ${escH(cat)}
        <span class="cat-count">${prods.length}</span>
        ${admin ? `<button onclick="event.stopPropagation();apriModaleProdotto(null,'${escH(forn)}','${escH(cat)}')"
          class="ml-2 text-xs text-amber-500 hover:text-amber-700 font-semibold">+ prodotto</button>` : ''}
      </div>
      <div class="cat-body">
        ${prods.map(p => renderProdRow(p)).join('')}
      </div>
    `).join('');

    return `
    <div class="forn-card">
      <div class="forn-header" onclick="toggleForn(this)">
        <svg class="w-4 h-4 forn-chev transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/>
        </svg>
        <span class="forn-title">${escH(forn)}</span>
        <span class="forn-count">${totProd} prodotti</span>
        ${admin ? `<button onclick="event.stopPropagation();apriModaleProdotto(null,'${escH(forn)}','')"
          class="ml-3 text-xs bg-amber-500 text-white px-3 py-1 rounded-lg font-semibold hover:bg-amber-600">
          + prodotto
        </button>` : ''}
      </div>
      <div class="forn-body">${catsHtml}</div>
    </div>`;
  }).join('');
}

function renderProdRow(p) {
  const pvp  = p.pvp  != null ? `€ ${Number(p.pvp).toFixed(2)}`  : '—';
  const conf = p.pack_size != null ? `×${p.pack_size}` : '—';

  const assHtml = `<div class="ass-dots">
    ${assDot(p.assortment_cremona, 'CR')}
    ${assDot(p.assortment_casalmaggiore, 'CA')}
    ${assDot(p.assortment_viadana, 'VI')}
  </div>`;

  const btns = admin ? `
    <div style="display:flex;gap:4px">
      <button class="btn-icon btn-edit" onclick="apriModaleProdotto(${p.id})" title="Modifica">✏️</button>
      <button class="btn-icon btn-del"  onclick="eliminaProdotto(${p.id},'${escH(p.description)}')" title="Elimina">🗑️</button>
    </div>` : '';

  return `<div class="prod-row">
    <span class="prod-code">${escH(p.product_code)}</span>
    <span class="prod-desc" title="${escH(p.description)}">${escH(p.description)}</span>
    <span class="prod-pvp">${pvp}</span>
    <span class="prod-conf col-conf">${conf}</span>
    <span class="col-ass">${assHtml}</span>
    ${btns}
  </div>`;
}

function assDot(v, label) {
  const cls = v === true ? 'ass-si' : v === false ? 'ass-no' : 'ass-null';
  return `<span class="ass-dot ${cls}" title="${label}: ${v === true ? 'SI' : v === false ? 'NO' : 'Stagionale'}">${label[0]}</span>`;
}

// ── TOGGLE ────────────────────────────────────────────────────────
function toggleForn(header) {
  const body = header.closest('.forn-card').querySelector('.forn-body');
  const chev = header.querySelector('.forn-chev');
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  chev.style.transform = hidden ? '' : 'rotate(-90deg)';
}
function toggleCat(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.cat-chev');
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  chev.style.transform = hidden ? '' : 'rotate(-90deg)';
}

// ── ASSORTIMENTO TOGGLE ───────────────────────────────────────────
function setAss(campo, val, btn) {
  const hidden = document.getElementById('m-ass-' + campo);
  hidden.value = val;
  const container = btn.closest('.ass-toggle');
  container.querySelectorAll('.ass-btn').forEach(b => {
    b.classList.remove('on', 'off', 'nat');
  });
  btn.classList.add(val === 'si' ? 'on' : val === 'no' ? 'off' : 'nat');
}

function setAssValue(campo, val) {
  const map = { true: 'si', false: 'no', null: 'nat', undefined: 'nat' };
  const v = map[String(val)] || 'nat';
  const container = document.querySelector(`#m-ass-${campo}`).closest('.form-row').querySelector('.ass-toggle');
  container.querySelectorAll('.ass-btn').forEach(b => {
    const isTarget = (v === 'si' && b.classList.contains('on')) ||
                     (v === 'no' && b.classList.contains('off')) ||
                     (v === 'nat' && b.classList.contains('nat'));
    b.classList.remove('on','off','nat');
    if (isTarget) {
      b.classList.add(v === 'si' ? 'on' : v === 'no' ? 'off' : 'nat');
    }
  });
  document.getElementById('m-ass-' + campo).value = v;
}

// ── MODAL ─────────────────────────────────────────────────────────
function apriModaleProdotto(id, defaultForn = '', defaultCat = '') {
  editingId = id;
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  document.getElementById('modal-err').classList.add('hidden');

  if (id) {
    const p = catalogo.find(x => x.id === id);
    if (!p) return;
    title.textContent = 'Modifica prodotto';
    document.getElementById('m-fornitore').value = p.fornitore || '';
    document.getElementById('m-categoria').value = p.category  || '';
    document.getElementById('m-codice').value    = p.product_code || '';
    document.getElementById('m-desc').value      = p.description  || '';
    document.getElementById('m-pvp').value       = p.pvp  != null ? p.pvp  : '';
    document.getElementById('m-conf').value      = p.pack_size != null ? p.pack_size : '';
    document.getElementById('m-sort').value      = p.sort_order ?? '';
    setAssValue('cr',  p.assortment_cremona);
    setAssValue('cas', p.assortment_casalmaggiore);
    setAssValue('via', p.assortment_viadana);
  } else {
    title.textContent = 'Nuovo prodotto';
    document.getElementById('m-fornitore').value = defaultForn;
    document.getElementById('m-categoria').value = defaultCat;
    document.getElementById('m-codice').value    = '';
    document.getElementById('m-desc').value      = '';
    document.getElementById('m-pvp').value       = '';
    document.getElementById('m-conf').value      = '';
    document.getElementById('m-sort').value      = catalogo.length + 1;
    setAssValue('cr',  true);
    setAssValue('cas', true);
    setAssValue('via', true);
  }

  modal.classList.remove('hidden');
}

function chiudiModale() {
  document.getElementById('modal').classList.add('hidden');
  editingId = null;
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) chiudiModale();
});

function assValToDb(v) {
  if (v === 'si')  return true;
  if (v === 'no')  return false;
  return null;
}

async function salvaProdotto() {
  const fornitore = document.getElementById('m-fornitore').value.trim();
  const category  = document.getElementById('m-categoria').value.trim();
  const code      = document.getElementById('m-codice').value.trim();
  const desc      = document.getElementById('m-desc').value.trim();
  const pvp       = parseFloat(document.getElementById('m-pvp').value) || null;
  const conf      = parseInt(document.getElementById('m-conf').value)  || null;
  const sort      = parseInt(document.getElementById('m-sort').value)  || 0;
  const ass_cr    = assValToDb(document.getElementById('m-ass-cr').value);
  const ass_cas   = assValToDb(document.getElementById('m-ass-cas').value);
  const ass_via   = assValToDb(document.getElementById('m-ass-via').value);

  const errEl = document.getElementById('modal-err');
  if (!code || !desc) {
    errEl.textContent = 'Codice e descrizione sono obbligatori.';
    errEl.classList.remove('hidden'); return;
  }
  errEl.classList.add('hidden');

  const btn = document.getElementById('modal-save');
  btn.disabled = true; btn.textContent = 'Salvataggio…';

  const payload = {
    fornitore, category, product_code: code, description: desc,
    pvp, pack_size: conf, sort_order: sort,
    assortment_cremona: ass_cr,
    assortment_casalmaggiore: ass_cas,
    assortment_viadana: ass_via,
    source_sheet: '', active: true,
  };

  let error;
  if (editingId) {
    ({ error } = await db.from('rifornimento_catalogo').update(payload).eq('id', editingId));
  } else {
    ({ error } = await db.from('rifornimento_catalogo').insert(payload));
  }

  btn.disabled = false; btn.textContent = 'Salva';

  if (error) {
    errEl.textContent = 'Errore: ' + error.message;
    errEl.classList.remove('hidden'); return;
  }

  chiudiModale();
  await load();
}

// ── ELIMINA ───────────────────────────────────────────────────────
async function eliminaProdotto(id, desc) {
  if (!confirm(`Eliminare "${desc}"?`)) return;
  const { error } = await db.from('rifornimento_catalogo').delete().eq('id', id);
  if (error) { alert('Errore: ' + error.message); return; }
  await load();
}

// ── GUARD ADMIN ───────────────────────────────────────────────────
