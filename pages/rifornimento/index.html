<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifornimento — M361</title>

<body class="bg-slate-50">

<main class="max-w-3xl mx-auto p-6 md:p-8">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

    <!-- PROPOSTE RIFORNIMENTO -->
    <a href="proposte.html"
       class="hover-card group bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center mb-5
                  group-hover:bg-amber-500 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-white"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2

                   m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Proposte Rifornimento</h3>
      <p class="text-sm text-slate-500 mt-1">Crea e consulta le proposte d'ordine degli empori</p>
    </a>

    <!-- CATALOGO PRODOTTI (solo admin) -->
    <a href="catalogo.html" id="card-catalogo" style="display:none"
       class="hover-card group bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-5
                  group-hover:bg-slate-700 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-500 group-hover:text-white"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">

                d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Gestione Catalogo</h3>
      <p class="text-sm text-slate-500 mt-1">Aggiungi, modifica ed elimina prodotti e fornitori</p>
    </a>

  </div>
</main>
<script src="../../scripts/auth.js"></script>
<script>
  const _u = JSON.parse(localStorage.getItem('m361_user') || 'null');
  if (['admin','dipendente'].includes(_u?.ruolo?.toLowerCase())) {
    document.getElementById('card-catalogo').style.display = '';
  }
</script>
