<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposte Rifornimento — M361</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }

    .toolbar {
      position: sticky; top: 56px; z-index: 20;
      background: white; border-bottom: 1px solid #e2e8f0;
      padding: 8px 14px; display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }

    .status-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    }
    .sb-bozza    { background:#f1f5f9; color:#64748b; }
    .sb-inviata  { background:#eff6ff; color:#2563eb; }
    .sb-letta    { background:#f0fdf4; color:#16a34a; }
    .sb-archiviata { background:#f8fafc; color:#94a3b8; }

    .prop-card {
      background: white; border: 1px solid #e2e8f0; border-radius: 16px;
      padding: 16px 18px; cursor: pointer; transition: all .15s;
    }
    .prop-card:hover { border-color: #94a3b8; box-shadow: 0 2px 8px rgba(0,0,0,.07); }

    select, input[type=text] {
      border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 5px 10px; font-size: 13px; background: white;
      font-family: 'Inter', sans-serif;
    }
    select:focus, input[type=text]:focus { outline: none; border-color: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50">
<script src="../../scripts/nav-script.js"></script>
<script src="../../scripts/auth.js"></script>

<div class="toolbar">
  <a href="index.html" class="text-slate-400 hover:text-slate-600 mr-1">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <span class="font-bold text-slate-700 text-sm mr-2">Proposte</span>

  <select id="f-emporio" class="text-sm">
    <option value="">Tutti gli empori</option>
    <option value="Casalmaggiore">Casalmaggiore</option>
    <option value="Viadana">Viadana</option>
  </select>

  <select id="f-stato" class="text-sm">
    <option value="">Tutti gli stati</option>
    <option value="bozza">Bozza</option>
    <option value="inviata">Inviata</option>
    <option value="letta">Letta</option>
    <option value="archiviata">Archiviata</option>
  </select>

  <div class="flex-1"></div>

  <button id="btn-nuova"
    class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-1.5">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/>
    </svg>
    Nuova proposta
  </button>
</div>

<main class="max-w-3xl mx-auto p-4 md:p-6">
  <div id="lista" class="space-y-3">
    <div class="text-center py-12 text-slate-400 text-sm">Caricamento...</div>
  </div>
</main>

<!-- MODAL NUOVA PROPOSTA -->
<div id="modal-nuova" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
    <h2 class="font-bold text-slate-800 text-lg mb-4">Nuova proposta</h2>

    <div class="space-y-3">
      <div id="modal-emp-wrap">
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Emporio</label>
        <select id="modal-emporio" class="w-full mt-1">
          <option value="">Seleziona...</option>
          <option value="Casalmaggiore">Casalmaggiore</option>
          <option value="Viadana">Viadana</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Note (opzionale)</label>
        <input type="text" id="modal-note" placeholder="es. ordine di giugno" class="w-full mt-1">
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button id="modal-cancel"
        class="flex-1 border border-slate-200 text-slate-600 font-semibold py-2 rounded-xl text-sm hover:bg-slate-50">
        Annulla
      </button>
      <button id="modal-crea"
        class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded-xl text-sm transition-colors">
        Crea
      </button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://hsalynvxazxqtmsvjrzc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const user = JSON.parse(localStorage.getItem('m361_user') || 'null');
const admin = ['admin','dipendente'].includes(user?.ruolo);

function statusLabel(s) {
  const map = { bozza:'Bozza', inviata:'Inviata', letta:'Letta', archiviata:'Archiviata' };
  return map[s] || s;
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' });
}

async function carica() {
  const empFilter = document.getElementById('f-emporio').value;
  const statoFilter = document.getElementById('f-stato').value;

  let q = db.from('rifornimento_proposte')
    .select('id, emporio, status, created_by, created_at, submitted_at, note')
    .order('created_at', { ascending: false });

  if (!admin) q = q.eq('emporio', user?.emporio || '');
  else if (empFilter) q = q.eq('emporio', empFilter);
  if (statoFilter) q = q.eq('status', statoFilter);

  const { data, error } = await q;
  const lista = document.getElementById('lista');

  if (error) {
    lista.innerHTML = `<div class="text-center py-8 text-red-500 text-sm">Errore: ${error.message}</div>`;
    return;
  }
  if (!data?.length) {
    lista.innerHTML = `<div class="text-center py-12 text-slate-400 text-sm">Nessuna proposta trovata.</div>`;
    return;
  }

  lista.innerHTML = data.map(p => `
    <div class="prop-card" onclick="apri(${p.id})">
      <div class="flex items-start justify-between gap-2">
        <div>
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-bold text-slate-800">${p.emporio}</span>
            <span class="status-badge sb-${p.status}">${statusLabel(p.status)}</span>
          </div>
          <div class="text-xs text-slate-400 mt-1">
            ${fmtDate(p.created_at)} — ${p.created_by || '—'}
            ${p.submitted_at ? ' · inviata ' + fmtDate(p.submitted_at) : ''}
          </div>
          ${p.note ? `<div class="text-xs text-slate-500 mt-1 italic">${p.note}</div>` : ''}
        </div>
        <svg class="w-4 h-4 text-slate-300 flex-shrink-0 mt-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </div>
    </div>
  `).join('');
}

function apri(id) {
  window.location.href = `proposta.html?id=${id}`;
}

// Filtri
document.getElementById('f-emporio').addEventListener('change', carica);
document.getElementById('f-stato').addEventListener('change', carica);

// Blocca filtro emporio per non-admin
if (!admin) {
  const sel = document.getElementById('f-emporio');
  const emporio = user?.emporio || '';
  const opt = Array.from(sel.options).find(o => o.value === emporio);
  if (opt) sel.value = opt.value;
  sel.disabled = true;
}

// Modal nuova proposta
const modal = document.getElementById('modal-nuova');
document.getElementById('btn-nuova').addEventListener('click', () => {
  const sel = document.getElementById('modal-emporio');
  if (!admin) {
    sel.value = user?.emporio || '';
    sel.disabled = true;
    document.getElementById('modal-emp-wrap').querySelector('select+small')?.remove();
  }
  document.getElementById('modal-note').value = '';
  modal.classList.remove('hidden');
});
document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.add('hidden'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.add('hidden'); });

document.getElementById('modal-crea').addEventListener('click', async () => {
  const emporio = document.getElementById('modal-emporio').value;
  const note    = document.getElementById('modal-note').value.trim();
  if (!emporio) { alert('Seleziona un emporio.'); return; }

  const btn = document.getElementById('modal-crea');
  btn.disabled = true; btn.textContent = 'Creazione...';

  const { data, error } = await db.from('rifornimento_proposte').insert({
    emporio,
    note,
    created_by: user?.nome || user?.email || '',
    status: 'bozza',
  }).select('id').single();

  btn.disabled = false; btn.textContent = 'Crea';
  if (error) { alert('Errore: ' + error.message); return; }
  modal.classList.add('hidden');

  // La notifica viene inviata da proposta.html dopo il caricamento (evita race condition con la navigazione)
  const mittente = encodeURIComponent(user?.nome || '');
  window.location.href = `proposta.html?id=${data.id}&notify_ordine=1&notify_emp=${encodeURIComponent(emporio)}&notify_mitt=${mittente}`;
});

carica();
</script>
</body>
</html>
