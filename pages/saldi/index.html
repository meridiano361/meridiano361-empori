<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saldi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--red:#B5453A;--red-dark:#8c362d;--s200:#e2e8f0;--s400:#94a3b8;--s700:#334155}
    *{box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#f0f2f5}

    .sel-wrap{padding:24px 16px 32px;max-width:1100px;margin:0 auto}
    .emp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    @media(max-width:600px){.emp-grid{grid-template-columns:repeat(3,1fr)}}
    .emp-btn{padding:20px 12px;border-radius:16px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px;text-decoration:none;color:inherit}
    .emp-btn:hover{border-color:#B5453A;transform:translateY(-2px);box-shadow:0 4px 12px rgba(181,69,58,.12)}
    .emp-btn img{width:48px;height:48px;object-fit:contain;border-radius:12px}
    .emp-btn span{font-size:12px;font-weight:800;color:#334155}
  </style>
</head>
<body class="pb-24">
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<main>
  <div class="sel-wrap">
    <div class="sec-t">Seleziona emporio</div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>
</main>

<script>
const EMPORI = [
  {id:'cremona',       label:'Cremona',           img:'logo_cremona.png'},
  {id:'casalmaggiore', label:'Casalmaggiore',      img:'logo_casalmaggiore.png'},
  {id:'viadana',       label:'Viadana',            img:'logo_viadana.png'},
  {id:'reggioemilia',  label:'Reggio Emilia',      img:'logo_reggio_emilia.png'},
  {id:'mantova',       label:'On Earth Mantova',   img:'logo_mantova.png'},
];

function init(){
  const u = JSON.parse(localStorage.getItem('m361_user')||'null');
  if(!u){ window.location.href='/login.html'; return; }

  document.getElementById('emp-grid').innerHTML = EMPORI.map(e=>`
    <a class="emp-btn" href="saldi.html?emp=${e.id}">
      <img src="/assets/images/${e.img}" alt="${e.label}">
      <span>${e.label}</span>
    </a>
  `).join('');
}
init();
</script>
</body>
</html>
