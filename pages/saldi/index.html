<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M361 — Saldi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--red:#B5453A;--red-dark:#8c362d;--s200:#e2e8f0;--s400:#94a3b8;--s700:#334155}
    *{box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#f0f2f5}

    .sel-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:32px 16px 40px;
    }
    .sel-label{
      font-size:11px;font-weight:800;letter-spacing:.14em;
      text-transform:uppercase;color:var(--s400);
      margin-bottom:28px;
    }
    .emp-grid{
      display:grid;grid-template-columns:repeat(5,1fr);
      gap:16px;max-width:900px;
    }
    @media(max-width:600px){.emp-grid{grid-template-columns:repeat(3,1fr);}}
    .emp-card{
      background:#fff;border:1.5px solid var(--s200);border-radius:16px;
      padding:28px 20px 22px;text-align:center;cursor:pointer;
      transition:all .18s;display:flex;flex-direction:column;
      align-items:center;gap:16px;text-decoration:none;color:inherit;
      min-width:0;
    }
    .emp-card:hover{
      border-color:var(--red);
      transform:translateY(-4px);
      box-shadow:0 8px 28px rgba(181,69,58,.15);
    }
    .emp-logo-wrap{
      width:110px;height:110px;border-radius:50%;
      overflow:hidden;border:1.5px solid var(--s200);
      display:flex;align-items:center;justify-content:center;
      background:#fff;
    }
    .emp-logo-wrap img{width:100%;height:100%;object-fit:cover}
    .emp-lbl{
      font-size:14px;font-weight:800;color:var(--s700);
      line-height:1.3;
    }

    @media(max-width:480px){
      .emp-card{width:calc(50% - 8px)}
      .emp-logo-wrap{width:80px;height:80px}
    }
  </style>
</head>
<body class="pb-24">
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<main>
  <div class="sel-wrap">
    <div class="sel-label">Seleziona emporio</div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>
</main>

<script>
const EMPORI = [
  {id:'cremona',       label:'Cremona',           img:'logo_cremona.png'},
  {id:'casalmaggiore', label:'Casalmaggiore',      img:'logo_casalmaggiore.png'},
  {id:'viadana',       label:'Viadana',            img:'logo_viadana.png'},
  {id:'reggioemilia',  label:'Reggio Emilia',      img:'logo_reggio_emilia.png'},
  {id:'mantova',       label:'On Earth Mantova',   img:'logo_mantova.png'},
];

function init(){
  const u = JSON.parse(localStorage.getItem('m361_user')||'null');
  if(!u){ window.location.href='/login.html'; return; }

  document.getElementById('emp-grid').innerHTML = EMPORI.map(e=>`
    <a class="emp-card" href="saldi.html?emp=${e.id}">
      <div class="emp-logo-wrap">
        <img src="/assets/images/${e.img}" alt="${e.label}">
      </div>
      <div class="emp-lbl">${e.label}</div>
    </a>
  `).join('');
}
init();
</script>
</body>
</html>
