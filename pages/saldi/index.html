<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saldi — M361</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--red:#B5453A;--red-dark:#8c362d;--red-light:#fdf1f0;--s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b}
    *{box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#f0f2f5}
    .page-hd{font-size:22px;font-weight:900;color:var(--s800);margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .page-hd i{color:var(--red);font-size:20px}
    .emp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(min-width:600px){.emp-grid{grid-template-columns:repeat(5,1fr)}}
    .emp-card{background:#fff;border:2px solid var(--s200);border-radius:20px;padding:22px 14px;text-align:center;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none;color:inherit}
    .emp-card:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 6px 20px rgba(181,69,58,.14)}
    .emp-card img{width:54px;height:54px;object-fit:contain;border-radius:12px}
    .emp-lbl{font-size:13px;font-weight:800;color:var(--s700);line-height:1.3}
  </style>
</head>
<body class="pb-24">
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<main class="max-w-4xl mx-auto p-4 md:p-6">
  <div class="page-hd"><i class="fas fa-percent"></i> Saldi</div>
  <div class="emp-grid" id="emp-grid"></div>
</main>

<script>
const EMPORI = [
  {id:'cremona',       label:'Cremona',           img:'logo_cremona.png'},
  {id:'casalmaggiore', label:'Casalmaggiore',      img:'logo_casalmaggiore.png'},
  {id:'viadana',       label:'Viadana',            img:'logo_viadana.png'},
  {id:'reggioemilia',  label:'Reggio Emilia',      img:'logo_reggio_emilia.png'},
  {id:'mantova',       label:'On Earth Mantova',   img:'logo_mantova.png'},
];

function init(){
  const u = JSON.parse(localStorage.getItem('m361_user')||'null');
  if(!u){ window.location.href='/login.html'; return; }

  // resp_emporio non-admin: vai direttamente al proprio emporio
  const isGlobal = u.is_full_admin || u.ruolo==='admin';
  if(!isGlobal && u.is_resp_emporio && u.emporio){
    const empId = (u.emporio||'').toLowerCase().replace(/\s+/g,'');
    window.location.href = `saldi.html?emp=${empId}`;
    return;
  }

  const grid = document.getElementById('emp-grid');
  grid.innerHTML = EMPORI.map(e=>`
    <a class="emp-card" href="saldi.html?emp=${e.id}">
      <img src="/assets/images/${e.img}" alt="${e.label}">
      <div class="emp-lbl">${e.label}</div>
    </a>
  `).join('');
}
init();
</script>
</body>
</html>
