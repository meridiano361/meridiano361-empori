<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M361 — Saldi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--red:#B5453A;--red-dark:#8c362d;--red-lt:#fdf1f0;--green:#059669;--green-lt:#dcfce7;--green-tx:#166534;--blue:#3b82f6;--blue-lt:#dbeafe;--blue-tx:#1d4ed8;--amber:#f59e0b;--amber-lt:#fef3c7;--amber-tx:#92400e;--s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b}
    *{box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#f0f2f5;font-size:15px}

    /* Header */
    .emp-hd{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .emp-hd-left{display:flex;align-items:center;gap:12px}
    .emp-hd img{width:44px;height:44px;object-fit:contain;border-radius:10px}
    .emp-hd-name{font-size:20px;font-weight:900;color:var(--s800)}
    .emp-hd-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

    /* Buttons */
    .btn-prim{background:var(--red);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
    .btn-prim:hover{background:var(--red-dark)}
    .btn-sec{background:#fff;color:var(--s600);border:1.5px solid var(--s200);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
    .btn-sec:hover{border-color:var(--s400);color:var(--s800)}
    .btn-sm{padding:6px 12px;font-size:12px}
    .btn-danger{background:#fee2e2;color:#B5453A;border:1px solid #fca5a5;border-radius:9px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:6px}
    .btn-danger:hover{background:#B5453A;color:#fff;border-color:#B5453A}

    /* Layout */
    .saldi-layout{display:flex;gap:14px;align-items:flex-start}

    /* Campagne sidebar */
    .camp-panel{width:195px;flex-shrink:0;background:#fff;border:1px solid var(--s200);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .camp-panel-head{padding:10px 14px;border-bottom:1px solid var(--s100);display:flex;align-items:center;justify-content:space-between}
    .camp-panel-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--s400)}
    .camp-new-btn{background:var(--red);color:#fff;border:none;border-radius:6px;width:22px;height:22px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:'Nunito',sans-serif;transition:background .12s}
    .camp-new-btn:hover{background:var(--red-dark)}
    .camp-item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .12s;border-bottom:1px solid var(--s50);min-height:0}
    .camp-item:last-child{border-bottom:none}
    .camp-item:hover{background:var(--s50)}
    .camp-item.active{background:var(--red-lt);border-left:3px solid var(--red);padding-left:9px}
    .camp-item.active .camp-nome{color:var(--red);font-weight:800}
    .camp-nome{font-size:13px;font-weight:600;color:var(--s700);flex:1;line-height:1.3;word-break:break-word}
    .camp-btns{display:none;gap:2px;flex-shrink:0}
    .camp-item:hover .camp-btns,.camp-item.active .camp-btns{display:flex}
    .camp-icon-btn{background:none;border:none;cursor:pointer;color:var(--s300);padding:3px 5px;border-radius:5px;font-size:11px;transition:all .1s}
    .camp-icon-btn:hover{background:var(--s100);color:var(--s600)}
    .camp-icon-btn.del:hover{background:#fee2e2;color:#ef4444}
    .camp-empty{padding:20px 14px;text-align:center;color:var(--s400);font-size:12px;line-height:1.5}

    /* Mobile tabs */
    .camp-tabs{display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:8px;padding-bottom:10px;margin-bottom:12px;scrollbar-width:none}
    .camp-tabs::-webkit-scrollbar{display:none}
    .camp-tab{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--s200);background:#fff;color:var(--s600);transition:all .15s;flex-shrink:0;display:inline-block}
    .camp-tab.active{background:var(--red);color:#fff;border-color:var(--red)}

    /* Table area */
    .tbl-area{flex:1;min-width:0}
    .tbl-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
    .tbl-topbar-title{font-size:16px;font-weight:800;color:var(--s800)}
    .tbl-topbar-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--s200);border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .sld-tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:840px}

    /* Headers */
    .sld-tbl thead th{padding:8px 10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--s500);background:var(--s50);border-bottom:1px solid var(--s200);white-space:nowrap;text-align:left}
    .sld-tbl thead th.sortable{cursor:pointer;user-select:none;position:sticky;top:0;z-index:2}
    .sld-tbl thead th.sortable:hover{background:var(--s100)}
    .sld-tbl thead tr.flt-row th{padding:4px 8px;background:#fff;border-bottom:2px solid var(--s200);position:sticky;top:34px;z-index:2}
    .flt-inp{width:100%;border:1.5px solid var(--s200);border-radius:6px;padding:3px 8px;font-size:12px;font-family:'Nunito',sans-serif;outline:none;color:var(--s700)}
    .flt-inp:focus{border-color:var(--red)}
    .flt-sel{width:100%;border:1.5px solid var(--s200);border-radius:6px;padding:3px 6px;font-size:11px;font-family:'Nunito',sans-serif;outline:none;color:var(--s700);background:#fff}

    /* Cells */
    .sld-tbl td{padding:6px 10px;border-bottom:1px solid var(--s100);vertical-align:middle}
    .sld-tbl tr:last-child td{border-bottom:none}
    .sld-tbl tr:hover td{background:#fefce8}
    .td-codice{font-size:12px;color:var(--s500);min-width:80px}
    .td-nome{min-width:160px}
    .td-num{text-align:right;white-space:nowrap;min-width:62px}
    .td-ctr{text-align:center;min-width:70px}
    .td-saldo{text-align:right;font-weight:800;color:var(--green);min-width:80px}
    .td-act{text-align:center;min-width:50px}

    /* Inline inputs */
    .td-inp{border:1.5px solid transparent;border-radius:6px;padding:3px 7px;font-size:13px;font-family:'Nunito',sans-serif;background:transparent;width:100%;outline:none;color:var(--s800);transition:border .12s}
    .td-inp:hover{border-color:var(--s200);background:#fff}
    .td-inp:focus{border-color:var(--red);background:#fff}
    .td-inp-nome{font-weight:700;min-width:130px}
    .td-inp-num{text-align:right;max-width:75px}

    /* Prezzato */
    .chk-prez{width:17px;height:17px;cursor:pointer;accent-color:var(--green)}

    /* Badges */
    .badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:5px;white-space:nowrap}
    .badge-green{background:var(--green-lt);color:var(--green-tx)}
    .badge-blue{background:var(--blue-lt);color:var(--blue-tx)}
    .badge-grey{background:var(--s100);color:var(--s500)}

    /* Icon buttons */
    .icon-btn{border:none;background:none;cursor:pointer;color:var(--s300);padding:4px 6px;border-radius:6px;transition:all .12s;font-size:13px}
    .icon-btn:hover{background:var(--s100);color:var(--s600)}
    .icon-btn.del:hover{background:#fee2e2;color:#ef4444}
    .icon-btn.cal:hover{background:var(--blue-lt);color:var(--blue-tx)}

    /* Empty */
    .empty{text-align:center;padding:40px 20px;color:var(--s400)}
    .empty i{font-size:30px;margin-bottom:10px;display:block}
    .empty p{font-weight:600;font-size:14px;margin:0 0 4px}
    .empty small{font-size:12px}

    /* Modal */
    .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9998;align-items:flex-start;justify-content:center;padding:16px;padding-top:50px;overflow-y:auto}
    .modal-ov.show{display:flex}
    .modal-box{background:#fff;border-radius:18px;width:100%;max-width:520px;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--s100)}
    .modal-title{font-size:15px;font-weight:800;color:var(--s800)}
    .modal-sub{font-size:12px;color:var(--s400);font-weight:600;margin-top:2px}
    .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--s400);padding:2px 6px;border-radius:6px}
    .modal-close:hover{background:var(--s100);color:var(--s700)}
    .modal-body{padding:14px 18px;max-height:60vh;overflow-y:auto}
    .modal-foot{padding:10px 18px;border-top:1px solid var(--s100);display:flex;gap:8px;justify-content:flex-end}

    /* Period list */
    .per-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--s100)}
    .per-row:last-child{border-bottom:none}
    .per-info{flex:1}
    .per-date{font-size:13px;font-weight:700;color:var(--s700)}
    .per-vals{font-size:12px;color:var(--s500);margin-top:2px}
    .add-per-form{background:var(--s50);border-radius:12px;padding:14px;margin-top:14px}
    .f-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .f-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--s400);margin-bottom:3px}
    .f-inp{border:1.5px solid var(--s200);border-radius:8px;padding:8px 10px;font-size:14px;font-family:'Nunito',sans-serif;outline:none;width:100%;background:#fff;transition:border .15s}
    .f-inp:focus{border-color:var(--red)}

    /* Import */
    .imp-table{width:100%;border-collapse:collapse;font-size:13px}
    .imp-table th{padding:6px 8px;font-size:10px;font-weight:800;text-transform:uppercase;color:var(--s500);background:var(--s50);border-bottom:1px solid var(--s200);text-align:left}
    .imp-table td{padding:6px 8px;border-bottom:1px solid var(--s100)}
    .imp-table tr:last-child td{border-bottom:none}
    .imp-info{background:var(--amber-lt);color:var(--amber-tx);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

    @media(max-width:700px){
      .camp-panel{display:none}
      .camp-tabs{display:flex}
      .saldi-layout{display:block}
      .emp-hd{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body class="pb-24">
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<main class="max-w-6xl mx-auto p-4 md:p-6">
  <div class="emp-hd">
    <div class="emp-hd-left">
      <img id="emp-logo" src="" alt="">
      <div class="emp-hd-name" id="emp-name"></div>
    </div>
    <div class="emp-hd-btns" id="emp-hd-btns" style="display:none">
      <label class="btn-sec btn-sm" style="cursor:pointer">
        <i class="fas fa-file-import"></i> Importa CSV / XLSX
        <input type="file" id="file-input" accept=".csv,.xls,.xlsx" style="display:none" onchange="onFileSelected(this)">
      </label>
      <button class="btn-danger" onclick="pulisciTabella()">
        <i class="fas fa-trash"></i> Pulisci tabella
      </button>
    </div>
  </div>

  <!-- Mobile: campagne tabs -->
  <div class="camp-tabs" id="camp-tabs"></div>

  <div class="saldi-layout">
    <!-- Sidebar campagne (desktop) -->
    <div class="camp-panel">
      <div class="camp-panel-head">
        <span class="camp-panel-title">Tabelle saldi</span>
        <button class="camp-new-btn" id="camp-new-btn" onclick="newCampagna()" title="Nuova tabella" style="display:none">+</button>
      </div>
      <div id="camp-list"></div>
    </div>

    <!-- Area tabella -->
    <div class="tbl-area">
      <div class="tbl-topbar">
        <div class="tbl-topbar-title" id="camp-title"></div>
        <div class="tbl-topbar-btns">
          <button class="btn-prim btn-sm" id="add-row-btn" onclick="addRow()" style="display:none">
            <i class="fas fa-plus"></i> Aggiungi riga
          </button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="sld-tbl">
          <thead>
            <tr>
              <th class="sortable" onclick="sortBy('codice')" id="th-codice">Codice</th>
              <th class="sortable" onclick="sortBy('nome_prodotto')" id="th-nome">Nome Prodotto</th>
              <th class="sortable" style="text-align:right" onclick="sortBy('qta')" id="th-qta">Qtà</th>
              <th class="sortable" style="text-align:right" onclick="sortBy('prezzo')" id="th-prezzo">Prezzo</th>
              <th style="text-align:center">Sconto</th>
              <th class="sortable" style="text-align:right" onclick="sortBy('_saldo')" id="th-saldo">Saldo</th>
              <th class="sortable" style="text-align:center" onclick="sortBy('prezzato')" id="th-prez">Prezzato</th>
              <th></th>
            </tr>
            <tr class="flt-row">
              <th><input class="flt-inp" placeholder="Filtra..." oninput="setFilter('codice',this.value)"></th>
              <th><input class="flt-inp" placeholder="Filtra..." oninput="setFilter('nome_prodotto',this.value)"></th>
              <th></th><th></th>
              <th><select class="flt-sel" onchange="setFilter('sconto',this.value)">
                <option value="">Tutti</option>
                <option value="si">Con sconto</option>
                <option value="no">Senza sconto</option>
              </select></th>
              <th></th>
              <th><select class="flt-sel" onchange="setFilter('prezzato',this.value)">
                <option value="">Tutti</option>
                <option value="si">Prezzato</option>
                <option value="no">Non prezzato</option>
              </select></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-body">
            <tr><td colspan="8" class="empty"><i class="fas fa-tags"></i><p>Seleziona o crea una tabella saldi</p></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Modal periodi -->
<div class="modal-ov" id="modal-periodi">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-title">Periodi di sconto</div>
        <div class="modal-sub" id="m-nome-sub"></div>
      </div>
      <button class="modal-close" onclick="closePeriodi()">×</button>
    </div>
    <div class="modal-body">
      <div id="m-periodi-list"></div>
      <div id="m-add-form" style="display:none">
        <div class="add-per-form">
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--s500);margin-bottom:10px"><i class="fas fa-plus"></i> Nuovo periodo</div>
          <div class="f-row">
            <div><div class="f-lbl">Dal</div><input class="f-inp" type="date" id="m-dal"></div>
            <div><div class="f-lbl">Al</div><input class="f-inp" type="date" id="m-al"></div>
          </div>
          <div style="max-width:150px">
            <div class="f-lbl">Sconto %</div>
            <input class="f-inp" type="number" id="m-pct" min="1" max="99" step="0.5" placeholder="es. 20">
          </div>
          <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
            <button class="btn-prim" onclick="addPeriodo()" style="font-size:13px;padding:8px 14px"><i class="fas fa-plus"></i> Aggiungi</button>
            <div id="m-saldo-preview" style="display:none;font-size:14px;font-weight:700;color:var(--green)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal import -->
<div class="modal-ov" id="modal-import">
  <div class="modal-box" style="max-width:640px">
    <div class="modal-head">
      <div>
        <div class="modal-title">Anteprima importazione</div>
        <div class="modal-sub" id="imp-sub"></div>
      </div>
      <button class="modal-close" onclick="closeImport()">×</button>
    </div>
    <div class="modal-body">
      <div class="imp-info"><i class="fas fa-triangle-exclamation"></i><span id="imp-warn"></span></div>
      <div style="overflow-x:auto">
        <table class="imp-table">
          <thead><tr><th>Codice</th><th>Nome Prodotto</th><th>Qtà</th><th>Prezzo</th></tr></thead>
          <tbody id="imp-body"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="closeImport()">Annulla</button>
      <button class="btn-prim" onclick="confirmImport()"><i class="fas fa-check"></i> Importa</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const db = supabase.createClient(
  'https://hsalynvxazxqtmsvjrzc.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
);

const EMPORI_MAP = {
  cremona:       {label:'Cremona',          img:'logo_cremona.png'},
  casalmaggiore: {label:'Casalmaggiore',    img:'logo_casalmaggiore.png'},
  viadana:       {label:'Viadana',          img:'logo_viadana.png'},
  reggioemilia:  {label:'Reggio Emilia',    img:'logo_reggio_emilia.png'},
  mantova:       {label:'On Earth Mantova', img:'logo_mantova.png'},
};

const EMP     = new URLSearchParams(location.search).get('emp') || '';
const TODAY   = new Date().toISOString().split('T')[0];

let _u          = null;
let _canEdit    = false;
let _campagne   = [];
let _selCampId  = null;
let _prodotti   = [];
let _periodi    = {};
let _activeProd = null;
let _importRows = [];
let _sortCol    = 'nome_prodotto';
let _sortDir    = 'asc';
let _filter     = {};

// ── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  _u = JSON.parse(localStorage.getItem('m361_user')||'null');
  if(!_u){ window.location.href='/login.html'; return; }
  if(!EMPORI_MAP[EMP]){ history.back(); return; }

  const info = EMPORI_MAP[EMP];
  document.getElementById('emp-logo').src = `/assets/images/${info.img}`;
  document.getElementById('emp-name').textContent = info.label;
  document.title = `M361 — Saldi ${info.label}`;

  const isGlobal  = _u.is_full_admin || _u.ruolo === 'admin';
  const isOwnEmp  = _u.is_resp_emporio && (_u.emporio||'').toLowerCase().replace(/\s+/g,'') === EMP;
  _canEdit = isGlobal || isOwnEmp;

  if(_canEdit){
    document.getElementById('emp-hd-btns').style.display  = '';
    document.getElementById('add-row-btn').style.display   = '';
    document.getElementById('camp-new-btn').style.display  = '';
  }

  loadCampagne();
}

// ── CAMPAGNE ──────────────────────────────────────────────────────────────────
async function loadCampagne(){
  const {data} = await db.from('saldi_campagne').select('*').eq('emporio',EMP).order('created_at');
  _campagne = data || [];
  renderCampagne();
  if(_campagne.length) await selectCampagna(_campagne[0].id);
  else { _prodotti=[]; renderTable(); }
}

async function selectCampagna(id){
  _selCampId = id;
  const c = _campagne.find(c=>c.id===id);
  document.getElementById('camp-title').textContent = c?.nome || '';
  renderCampagne();
  await loadData();
}

function renderCampagne(){
  // Sidebar
  const list = document.getElementById('camp-list');
  if(!_campagne.length){
    list.innerHTML = `<div class="camp-empty">${_canEdit?'Clicca + per creare<br>la prima tabella saldi':'Nessuna tabella disponibile'}</div>`;
  } else {
    list.innerHTML = _campagne.map(c=>`
      <div class="camp-item${c.id===_selCampId?' active':''}" onclick="selectCampagna(${c.id})">
        <span class="camp-nome">${escH(c.nome)}</span>
        ${_canEdit?`<div class="camp-btns">
          <button class="camp-icon-btn" onclick="event.stopPropagation();renameCampagna(${c.id})" title="Rinomina"><i class="fas fa-pen"></i></button>
          <button class="camp-icon-btn del" onclick="event.stopPropagation();deleteCampagna(${c.id})" title="Elimina"><i class="fas fa-trash"></i></button>
        </div>`:''}
      </div>
    `).join('');
  }

  // Mobile tabs
  const tabs = document.getElementById('camp-tabs');
  let tabHtml = _campagne.map(c=>`
    <div class="camp-tab${c.id===_selCampId?' active':''}" onclick="selectCampagna(${c.id})">${escH(c.nome)}</div>
  `).join('');
  if(_canEdit) tabHtml += `<div class="camp-tab" onclick="newCampagna()" style="border-style:dashed;color:var(--red)">+ Nuova</div>`;
  tabs.innerHTML = tabHtml;
}

async function newCampagna(){
  const nome = prompt('Nome tabella saldi (es. Saldi PE26, Saldi Casa):','');
  if(!nome?.trim()) return;
  const {data,error} = await db.from('saldi_campagne').insert({emporio:EMP,nome:nome.trim()}).select().single();
  if(error){alert('Errore: '+error.message);return;}
  _campagne.push(data);
  await selectCampagna(data.id);
}

async function renameCampagna(id){
  const c = _campagne.find(c=>c.id===id);
  const nome = prompt('Nuovo nome:',c.nome);
  if(!nome?.trim()||nome.trim()===c.nome) return;
  const {error} = await db.from('saldi_campagne').update({nome:nome.trim()}).eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  c.nome = nome.trim();
  if(_selCampId===id) document.getElementById('camp-title').textContent = c.nome;
  renderCampagne();
}

async function deleteCampagna(id){
  const c = _campagne.find(c=>c.id===id);
  if(!confirm(`Eliminare la tabella "${c.nome}" con tutti i prodotti e periodi di sconto?\nQuesta operazione non è reversibile.`)) return;
  const {error} = await db.from('saldi_campagne').delete().eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  _campagne = _campagne.filter(x=>x.id!==id);
  if(_selCampId===id){
    _selCampId = _campagne[0]?.id||null;
    document.getElementById('camp-title').textContent = _campagne[0]?.nome||'';
  }
  renderCampagne();
  await loadData();
}

// ── DATA ─────────────────────────────────────────────────────────────────────
async function loadData(){
  if(!_selCampId){ _prodotti=[]; _periodi={}; renderTable(); return; }
  const {data:prods} = await db.from('saldi_prodotti').select('*').eq('campagna_id',_selCampId);
  _prodotti = prods || [];
  _periodi  = {};
  if(_prodotti.length){
    const ids = _prodotti.map(p=>p.id);
    const {data:prs} = await db.from('saldi_periodi').select('*').in('prodotto_id',ids).order('data_inizio');
    for(const p of prs||[]){
      if(!_periodi[p.prodotto_id]) _periodi[p.prodotto_id]=[];
      _periodi[p.prodotto_id].push(p);
    }
  }
  renderTable();
}

// ── SORT & FILTER ─────────────────────────────────────────────────────────────
function sortBy(col){
  _sortDir = (_sortCol===col && _sortDir==='asc') ? 'desc' : 'asc';
  _sortCol = col;
  renderTable();
}

function setFilter(col,val){
  _filter[col]=val;
  renderTable();
}

function getActivePeriod(prodId){
  return (_periodi[prodId]||[]).find(p=>p.data_inizio<=TODAY&&p.data_fine>=TODAY)||null;
}

function getFilteredSorted(){
  let rows=[..._prodotti];
  const fc=(_filter.codice||'').toLowerCase();
  const fn=(_filter.nome_prodotto||'').toLowerCase();
  if(fc) rows=rows.filter(r=>(r.codice||'').toLowerCase().includes(fc));
  if(fn) rows=rows.filter(r=>r.nome_prodotto.toLowerCase().includes(fn));
  if(_filter.sconto==='si')  rows=rows.filter(r=>!!getActivePeriod(r.id));
  if(_filter.sconto==='no')  rows=rows.filter(r=>!getActivePeriod(r.id));
  if(_filter.prezzato==='si') rows=rows.filter(r=>r.prezzato);
  if(_filter.prezzato==='no') rows=rows.filter(r=>!r.prezzato);

  rows.sort((a,b)=>{
    let va,vb;
    if(_sortCol==='_saldo'){
      const apa=getActivePeriod(a.id),apb=getActivePeriod(b.id);
      va=apa?parseFloat(a.prezzo)*(1-parseFloat(apa.sconto_pct)/100):0;
      vb=apb?parseFloat(b.prezzo)*(1-parseFloat(apb.sconto_pct)/100):0;
    } else {
      va=a[_sortCol]??'';
      vb=b[_sortCol]??'';
    }
    if(typeof va==='number'||typeof vb==='number'){va=Number(va)||0;vb=Number(vb)||0;}
    else if(typeof va==='boolean'){va=va?1:0;vb=vb?1:0;}
    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    if(va<vb) return _sortDir==='asc'?-1:1;
    if(va>vb) return _sortDir==='asc'?1:-1;
    return 0;
  });
  return rows;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const SORT_LABELS = {
  codice:'Codice',nome_prodotto:'Nome Prodotto',
  qta:'Qtà',prezzo:'Prezzo',_saldo:'Saldo',prezzato:'Prezzato'
};
const SORT_IDS = {
  codice:'th-codice',nome_prodotto:'th-nome',
  qta:'th-qta',prezzo:'th-prezzo',_saldo:'th-saldo',prezzato:'th-prez'
};

function renderTable(){
  Object.entries(SORT_LABELS).forEach(([col,label])=>{
    const el=document.getElementById(SORT_IDS[col]);
    if(!el) return;
    const arrow=_sortCol===col?(_sortDir==='asc'?' ↑':' ↓'):'';
    const color=_sortCol===col?'color:var(--red)':'opacity:.4';
    el.innerHTML=label+(arrow
      ?`<span style="${color};font-size:10px">${arrow}</span>`
      :`<span style="opacity:.25;font-size:10px"> ⇅</span>`);
  });

  const tbody=document.getElementById('tbl-body');
  if(!_selCampId){
    tbody.innerHTML=`<tr><td colspan="8" class="empty"><i class="fas fa-tags"></i><p>Seleziona o crea una tabella saldi</p></td></tr>`;
    return;
  }
  const rows=getFilteredSorted();
  if(!rows.length){
    const isFiltered=Object.values(_filter).some(v=>v);
    tbody.innerHTML=`<tr><td colspan="8" class="empty"><i class="fas fa-${isFiltered?'filter':'tags'}"></i><p>${isFiltered?'Nessun prodotto corrisponde ai filtri':'Nessun prodotto'}</p>${_canEdit&&!isFiltered?`<small>Importa un file o clicca "Aggiungi riga"</small>`:''}</td></tr>`;
    return;
  }

  let html='';
  for(const p of rows){
    const ap=getActivePeriod(p.id);
    const nPer=(_periodi[p.id]||[]).length;
    let scontoBadge=`<span style="color:var(--s300)">—</span>`;
    let saldoTxt=`<span style="color:var(--s300)">—</span>`;
    if(ap){
      const pct=parseFloat(ap.sconto_pct);
      const saldo=parseFloat(p.prezzo)*(1-pct/100);
      scontoBadge=`<span class="badge badge-green">${pct.toFixed(pct%1?1:0)}%</span><div style="font-size:10px;color:var(--s400);margin-top:2px">${fmtDate(ap.data_inizio)} → ${fmtDate(ap.data_fine)}</div>`;
      saldoTxt=`<strong style="color:var(--green)">${fmtEur(saldo)}</strong>`;
    }
    const perInfo=nPer?`<div style="font-size:10px;font-weight:700;color:var(--blue-tx);margin-top:3px">${nPer} periodo${nPer===1?'':'i'}</div>`:'';
    const delBtn=_canEdit?`<button class="icon-btn del" onclick="deleteProd(${p.id})" title="Elimina prodotto"><i class="fas fa-trash"></i></button>`:'';
    const prezChk=`<input type="checkbox" class="chk-prez" ${p.prezzato?'checked':''} onchange="togglePrezzato(${p.id},this.checked)" title="Segna come prezzato">`;

    if(_canEdit){
      html+=`<tr data-id="${p.id}">
        <td class="td-codice"><input class="td-inp" value="${escH(p.codice||'')}" onblur="saveProd(${p.id},'codice',this.value)" placeholder="—"></td>
        <td class="td-nome"><input class="td-inp td-inp-nome" value="${escH(p.nome_prodotto)}" onblur="saveProd(${p.id},'nome_prodotto',this.value||'Prodotto')" placeholder="Nome prodotto"></td>
        <td class="td-num"><input class="td-inp td-inp-num" type="number" min="0" value="${p.qta}" onblur="saveProd(${p.id},'qta',Math.max(0,parseInt(this.value)||0))"></td>
        <td class="td-num"><input class="td-inp td-inp-num" type="number" min="0" step="0.01" value="${parseFloat(p.prezzo).toFixed(2)}" onblur="saveProd(${p.id},'prezzo',parseFloat(this.value)||0)"></td>
        <td class="td-ctr" style="min-width:110px">
          <button class="icon-btn cal" onclick="openPeriodi(${p.id})" title="Gestisci periodi"><i class="fas fa-calendar-days"></i></button>
          ${scontoBadge}${perInfo}
        </td>
        <td class="td-saldo" id="saldo-${p.id}">${saldoTxt}</td>
        <td class="td-ctr">${prezChk}</td>
        <td class="td-act">${delBtn}</td>
      </tr>`;
    } else {
      html+=`<tr data-id="${p.id}">
        <td class="td-codice">${escH(p.codice||'—')}</td>
        <td class="td-nome" style="font-weight:700;color:var(--s800)">${escH(p.nome_prodotto)}</td>
        <td class="td-num">${p.qta}</td>
        <td class="td-num">${fmtEur(p.prezzo)}</td>
        <td class="td-ctr" style="min-width:110px">
          <button class="icon-btn cal" onclick="openPeriodi(${p.id})" title="Periodi di sconto"><i class="fas fa-calendar-days"></i></button>
          ${scontoBadge}${perInfo}
        </td>
        <td class="td-saldo" id="saldo-${p.id}">${saldoTxt}</td>
        <td class="td-ctr">${prezChk}</td>
        <td></td>
      </tr>`;
    }
  }
  tbody.innerHTML=html;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtEur(v){return '€ '+parseFloat(v||0).toFixed(2).replace('.',',')}
function fmtDate(d){if(!d)return '';const[y,m,g]=d.split('-');return`${g}/${m}/${y}`}

// ── INLINE EDIT ───────────────────────────────────────────────────────────────
async function saveProd(id, field, value){
  let v=value;
  if(field==='qta')    v=Math.max(0,parseInt(value)||0);
  if(field==='prezzo') v=parseFloat(value)||0;
  const {error}=await db.from('saldi_prodotti').update({[field]:v}).eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  const prod=_prodotti.find(p=>p.id===id);
  if(prod){
    prod[field]=v;
    if(field==='prezzo') updateSaldoCell(id);
  }
}

function updateSaldoCell(prodId){
  const prod=_prodotti.find(p=>p.id===prodId);
  const ap=getActivePeriod(prodId);
  const cell=document.getElementById(`saldo-${prodId}`);
  if(!cell||!prod) return;
  if(ap){
    const pct=parseFloat(ap.sconto_pct);
    cell.innerHTML=`<strong style="color:var(--green)">${fmtEur(parseFloat(prod.prezzo)*(1-pct/100))}</strong>`;
  } else {
    cell.innerHTML=`<span style="color:var(--s300)">—</span>`;
  }
}

async function togglePrezzato(id,val){
  const {error}=await db.from('saldi_prodotti').update({prezzato:val}).eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  const prod=_prodotti.find(p=>p.id===id);
  if(prod) prod.prezzato=val;
}

async function deleteProd(id){

  const {error}=await db.from('saldi_prodotti').delete().eq('id',id);
  if(error){alert('Errore: '+error.message);return;}

async function pulisciTabella(){
  const c=_campagne.find(c=>c.id===_selCampId);
  if(!c){alert('Nessuna tabella selezionata.');return;}
  if(!confirm(`Eliminare TUTTI i prodotti della tabella "${c.nome}"?\nQuesta operazione non è reversibile.`)) return;
  if(_prodotti.length){
    await db.from('saldi_periodi').delete().in('prodotto_id',_prodotti.map(p=>p.id));
    await db.from('saldi_prodotti').delete().eq('campagna_id',_selCampId);
  }
  _prodotti=[];_periodi={};

}

  _activeProd=prodId;
  const prod=_prodotti.find(p=>p.id===prodId);
  document.getElementById('m-nome-sub').textContent=`${prod.nome_prodotto} · ${fmtEur(prod.prezzo)}`;
  document.getElementById('m-add-form').style.display=_canEdit?'':'none';
  renderPeriodi();
  document.getElementById('modal-periodi').classList.add('show');
}

function closePeriodi(){
  document.getElementById('modal-periodi').classList.remove('show');
  _activeProd=null;
}

function renderPeriodi(){
  const list=document.getElementById('m-periodi-list');
  const prs=[...(_periodi[_activeProd]||[])].sort((a,b)=>a.data_inizio.localeCompare(b.data_inizio));
  const prod=_prodotti.find(p=>p.id===_activeProd);
  if(!prs.length){
    list.innerHTML=`<div style="text-align:center;padding:20px;color:var(--s400);font-size:14px"><i class="fas fa-calendar-xmark" style="font-size:24px;display:block;margin-bottom:8px"></i>Nessun periodo definito</div>`;
    return;
  }
  list.innerHTML=prs.map(per=>{
    const isActive=per.data_inizio<=TODAY&&per.data_fine>=TODAY;
    const isFuture=per.data_inizio>TODAY;
    const badgeCls=isActive?'badge-green':isFuture?'badge-blue':'badge-grey';
    const badgeLbl=isActive?'Attivo':isFuture?'Futuro':'Scaduto';
    const pct=parseFloat(per.sconto_pct);
    const saldo=parseFloat(prod.prezzo)*(1-pct/100);
    const del=_canEdit?`<button class="icon-btn del" onclick="deletePeriodo(${per.id})" title="Elimina"><i class="fas fa-trash"></i></button>`:'';

        <div class="per-vals">Sconto: <strong>${pct.toFixed(pct%1?1:0)}%</strong> &nbsp;·&nbsp; Saldo: <strong style="color:var(--green)">${fmtEur(saldo)}</strong></div>
      </div>${del}</div>`;

  if(!dal||!al||!pct||pct<=0||pct>100){alert('Compila tutti i campi (sconto 1–100%).');return;}
  if(al<dal){alert('La data fine deve essere successiva alla data inizio.');return;}
  const {error}=await db.from('saldi_periodi').insert({prodotto_id:_activeProd,data_inizio:dal,data_fine:al,sconto_pct:pct});

  document.getElementById('m-saldo-preview').style.display='none';
  renderPeriodi();

  // aggiorna badge sconto nella riga
  const ap=getActivePeriod(_activeProd);
  const row=document.querySelector(`tr[data-id="${_activeProd}"]`);
  if(row&&ap){
    const ctr=row.querySelector('.td-ctr');

    }
  }

async function deletePeriodo(id){
  if(!confirm('Eliminare questo periodo di sconto?')) return;
  await db.from('saldi_periodi').delete().eq('id',id);

// ── FILE IMPORT ────────────────────────────────────────────────────────────────
function stripBom(s){return typeof s==='string'?s.replace(/^﻿/,''):s}
function normalizeHdr(h){return stripBom((h||'').toString()).toLowerCase().replace(/\s+/g,' ').trim()}
function detectColumns(headers){
  const hl=headers.map(normalizeHdr);
  const find=(...keys)=>{
    for(const k of keys){const i=hl.findIndex(h=>h===k);if(i!==-1)return i;}
    for(const k of keys){const i=hl.findIndex(h=>h.startsWith(k));if(i!==-1)return i;}
    for(const k of keys){const i=hl.findIndex(h=>h.includes(k));if(i!==-1)return i;}
    return -1;
  };
  return {
    codice:find('codice','cod','sku','art','articolo','riferimento','ref','item code','cod.art'),
    nome:  find('descrizione','nome prodotto','nome','prodotto','desc','articolo','denominazione','titolo','item'),
    qta:   find('quantita','quantità','qta','qty','pezzi','pz','disponibilita','disponib','quantit'),
    prezzo:find('prezzo','price','pvp','pvl','listino','costo','importo','prezzo vendita'),
  };
}
function parseNum(v){
  if(v===undefined||v===null||v==='')return 0;
  let s=String(v).trim().replace(/\s/g,'');
  if(s.includes('.')&&s.includes(','))s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(','))s=s.replace(',','.');
  s=s.replace(/[^\d.-]/g,'');
  return parseFloat(s)||0;
}
function rowsFromSheet(ws){
  const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!json.length)return{headers:[],rows:[]};
  let hdrIdx=0;
  for(let i=0;i<Math.min(json.length,8);i++){if(json[i].filter(c=>String(c).trim()!=='').length>=2){hdrIdx=i;break;}}
  return{headers:json[hdrIdx].map(h=>String(h)),rows:json.slice(hdrIdx+1).filter(r=>r.some(c=>String(c).trim()!==''))};
}
function parseCSV(text){
  const clean=stripBom(text);
  const lines=clean.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{headers:[],rows:[]};
  const sep=lines[0].includes(';')?';':lines[0].includes('\t')?'\t':',';
  const split=l=>l.split(sep).map(c=>c.replace(/^["'\s]+|["'\s]+$/g,''));
  return{headers:split(lines[0]),rows:lines.slice(1).map(split).filter(r=>r.some(c=>c!==''))};
}

function onFileSelected(input){
  if(!_selCampId){alert('Seleziona prima una tabella saldi in cui importare i prodotti.');input.value='';return;}
  const file=input.files[0];
  if(!file)return;
  input.value='';
  const ext=file.name.toLowerCase().split('.').pop();
  const isCsv=ext==='csv';
  const reader=new FileReader();
  reader.onerror=()=>alert('Errore nella lettura del file.');
  reader.onload=(e)=>{
    try{
      let headers,rows;
      if(isCsv){({headers,rows}=parseCSV(e.target.result||''));}
      else{
        if(typeof XLSX==='undefined')throw new Error('Libreria XLSX non caricata. Ricarica la pagina.');
        const wb=XLSX.read(e.target.result,{type:'array'});
        if(!wb.SheetNames.length)throw new Error('Il file non contiene fogli.');
        ({headers,rows}=rowsFromSheet(wb.Sheets[wb.SheetNames[0]]));
      }
      if(!headers.length)throw new Error('Nessuna intestazione trovata.');
      const cols=detectColumns(headers);
      if(cols.nome===-1){
        alert('Colonna "Descrizione / Nome" non trovata.\n\nIntestazioni rilevate:\n'+headers.map((h,i)=>`  [${i}] "${h}"`).join('\n')+'\n\nAssicurati che una colonna si chiami "descrizione", "nome" o "prodotto".');
        return;
      }
      _importRows=rows.map(r=>({
        codice:cols.codice!==-1?String(r[cols.codice]??'').trim():'',
        nome_prodotto:String(r[cols.nome]??'').trim(),
        qta:cols.qta!==-1?Math.max(0,Math.round(parseNum(r[cols.qta]))):0,
        prezzo:cols.prezzo!==-1?parseNum(r[cols.prezzo]):0,
      })).filter(r=>r.nome_prodotto);
      if(!_importRows.length){alert('Nessuna riga valida trovata.');return;}
      document.getElementById('imp-body').innerHTML=_importRows.slice(0,50).map(r=>
        `<tr><td>${escH(r.codice||'—')}</td><td>${escH(r.nome_prodotto)}</td><td style="text-align:right">${r.qta}</td><td style="text-align:right">${fmtEur(r.prezzo)}</td></tr>`
      ).join('');
      const campNome=_campagne.find(c=>c.id===_selCampId)?.nome||'';
      document.getElementById('imp-sub').textContent=_importRows.length+' prodotti trovati';
      document.getElementById('imp-warn').textContent=`I prodotti saranno aggiunti a quelli già presenti nella tabella "${campNome}". I periodi di sconto non saranno modificati.`;
      document.getElementById('modal-import').classList.add('show');
    }catch(err){alert('Errore elaborazione file:\n'+err.message);}
  };
  if(isCsv)reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

async function confirmImport(){
  if(!_importRows.length)return;
  const rows=_importRows.map(r=>({...r,emporio:EMP,campagna_id:_selCampId,prezzato:false}));
  closeImport();
  let errMsg=null;
  for(let i=0;i<rows.length;i+=500){
    const {error}=await db.from('saldi_prodotti').insert(rows.slice(i,i+500));
    if(error){errMsg=error.message;break;}
  }
  if(errMsg){alert('Errore importazione:\n'+errMsg);return;}
  _importRows=[];
  await loadData();
}

function closeImport(){
  document.getElementById('modal-import').classList.remove('show');
  _importRows=[];
}

document.getElementById('modal-periodi').addEventListener('click',function(e){if(e.target===this)closePeriodi();});
document.getElementById('modal-import').addEventListener('click',function(e){if(e.target===this)closeImport();});

init();
</script>
</body>
</html>
