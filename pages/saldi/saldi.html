<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saldi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--red:#B5453A;--red-dark:#8c362d;--red-lt:#fdf1f0;--green:#059669;--green-lt:#dcfce7;--green-tx:#166534;--blue:#3b82f6;--blue-lt:#dbeafe;--blue-tx:#1d4ed8;--amber:#f59e0b;--amber-lt:#fef3c7;--amber-tx:#92400e;--s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#f0f2f5;font-size:14px}

    /* ── Buttons ── */
    .btn-prim{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:background .15s;box-shadow:0 1px 3px rgba(181,69,58,.25)}
    .btn-prim:hover{background:var(--red-dark)}
    .btn-sec{background:#fff;color:var(--s600);border:1.5px solid var(--s200);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
    .btn-sec:hover{border-color:var(--s400);color:var(--s800)}
    .btn-sm{padding:7px 13px;font-size:12px}
    .btn-danger{background:#fff;color:#B5453A;border:1.5px solid #fca5a5;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
    .btn-danger:hover{background:#fee2e2;border-color:var(--red)}

    /* ── Camp bar (sostituisce sidebar) ── */
    .camp-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
    .camp-bar-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--s400);white-space:nowrap;flex-shrink:0}
    .camp-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;flex:1;scrollbar-width:none;min-width:0}
    .camp-tabs::-webkit-scrollbar{display:none}
    .camp-tab{
      white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;
      cursor:pointer;border:2px solid var(--s200);background:#fff;color:var(--s600);
      transition:all .15s;flex-shrink:0;display:inline-flex;align-items:center;gap:6px;
    }
    .camp-tab.active{background:var(--red);color:#fff;border-color:var(--red)}
    .camp-tab-acts{display:none;gap:1px}
    .camp-tab:hover .camp-tab-acts,.camp-tab.active .camp-tab-acts{display:flex}
    .camp-tab-btn{background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px;font-size:10px;line-height:1;color:var(--s400);transition:all .1s}
    .camp-tab.active .camp-tab-btn{color:rgba(255,255,255,.7)}
    .camp-tab-btn:hover{background:rgba(0,0,0,.12);color:var(--s700)}
    .camp-tab.active .camp-tab-btn:hover{color:#fff}
    .camp-tab-btn.del:hover{background:#fecaca!important;color:#ef4444!important}

    /* ── Table area ── */
    .tbl-area{min-width:0}
    .tbl-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
    .tbl-topbar-title{font-size:18px;font-weight:900;color:var(--s800);letter-spacing:-.01em}
    .tbl-topbar-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .tbl-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--s200);border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);max-height:calc(100vh - 210px)}
    .sld-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:1100px}

    /* ── Table headers ── */
    .sld-tbl thead th{
      padding:7px 8px;font-size:9px;font-weight:800;text-transform:uppercase;
      letter-spacing:.07em;color:var(--s500);background:#fff;
      border-bottom:2px solid var(--s100);white-space:normal;text-align:left;
      vertical-align:bottom;
      position:sticky;top:0;z-index:3;
    }
    .sld-tbl thead th.sortable{cursor:pointer;user-select:none;transition:color .12s}
    .sld-tbl thead th.sortable:hover{color:var(--s700)}

    /* ── Filter row ── */
    .sld-tbl thead tr.flt-row th{
      padding:4px 6px;background:var(--s50);
      border-bottom:2px solid var(--s200);
      position:sticky;top:0;z-index:2;
    }
    .flt-inp{
      width:100%;border:1.5px solid var(--s200);border-radius:6px;
      padding:4px 7px;font-size:11px;font-family:'Nunito',sans-serif;
      outline:none;color:var(--s700);background:#fff;transition:border .12s;
    }
    .flt-inp:focus{border-color:var(--red)}
    .flt-sel{
      width:100%;border:1.5px solid var(--s200);border-radius:6px;
      padding:3px 5px;font-size:10px;font-family:'Nunito',sans-serif;
      outline:none;color:var(--s600);background:#fff;
    }

    /* ── Table cells ── */
    .sld-tbl td{padding:6px 8px;border-bottom:1px solid var(--s100);vertical-align:middle}
    .sld-tbl tr:last-child td{border-bottom:none}
    .sld-tbl tbody tr:hover td{background:#fffbeb}
    .td-codice{font-size:11px;color:var(--s500);font-weight:700;min-width:130px;letter-spacing:.01em;white-space:nowrap}
    .td-nome{min-width:180px;max-width:none;word-break:break-word}
    .td-num{text-align:right;white-space:nowrap;min-width:86px;color:var(--s700)}
    .td-flag{text-align:center;min-width:46px}
    .td-act{text-align:center;min-width:32px;white-space:nowrap}

    /* ── Inline inputs ── */
    .td-inp{
      border:1.5px solid transparent;border-radius:6px;
      padding:3px 6px;font-size:12px;font-family:'Nunito',sans-serif;
      background:transparent;width:100%;outline:none;
      color:var(--s800);transition:border .12s,background .12s;
    }
    .td-inp:hover{border-color:var(--s200);background:#f8fafc}
    .td-inp:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(181,69,58,.08)}
    .td-inp-nome{font-weight:700;min-width:120px}
    .td-inp-num{text-align:right;max-width:60px}

    /* ── Custom checkboxes ── */
    .chk-flag{
      appearance:none;-webkit-appearance:none;
      width:18px;height:18px;
      border:2px solid var(--s200);border-radius:5px;
      cursor:pointer;position:relative;
      transition:all .15s;background:#fff;display:inline-block;vertical-align:middle;
    }
    .chk-flag:hover{border-color:var(--green)}
    .chk-flag:checked{background:var(--green);border-color:var(--green)}
    .chk-flag:checked::after{
      content:'';position:absolute;
      left:4px;top:1px;width:6px;height:10px;
      border:2px solid #fff;border-top:none;border-left:none;
      transform:rotate(45deg);
    }

    /* ── Row selection checkboxes ── */
    .chk-row{
      appearance:none;-webkit-appearance:none;
      width:16px;height:16px;
      border:2px solid var(--s300);border-radius:4px;
      cursor:pointer;position:relative;flex-shrink:0;
      transition:all .15s;background:#fff;display:inline-block;vertical-align:middle;
    }
    .chk-row:hover{border-color:var(--red)}
    .chk-row:checked{background:var(--red);border-color:var(--red)}
    .chk-row:checked::after{
      content:'';position:absolute;
      left:3px;top:0px;width:6px;height:10px;
      border:2px solid #fff;border-top:none;border-left:none;
      transform:rotate(45deg);
    }
    .sld-tbl tbody tr.row-sel td{background:#fef9f9!important}

    /* ── Badges ── */
    .badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:6px;white-space:nowrap}
    .badge-green{background:var(--green-lt);color:var(--green-tx)}
    .badge-blue{background:var(--blue-lt);color:var(--blue-tx)}
    .badge-grey{background:var(--s100);color:var(--s500)}

    /* ── Icon buttons ── */
    .icon-btn{border:none;background:none;cursor:pointer;color:var(--s300);padding:5px 6px;border-radius:7px;transition:all .12s;font-size:13px;line-height:1}
    .icon-btn:hover{background:var(--s100);color:var(--s600)}
    .icon-btn.del:hover{background:#fee2e2;color:#ef4444}
    .icon-btn.cal:hover{background:var(--blue-lt);color:var(--blue-tx)}

    /* ── Period header controls ── */
    .per-date-inp{font-size:9px;border:1px solid var(--s200);border-radius:4px;padding:1px 4px;font-family:'Nunito',sans-serif;color:var(--s600);width:90px;outline:none;transition:border .12s}
    .per-date-inp:focus{border-color:var(--red)}
    .per-add-btn{background:none;border:1.5px dashed var(--s300);border-radius:6px;width:20px;height:20px;cursor:pointer;color:var(--s400);font-size:14px;font-weight:700;line-height:1;padding:0;font-family:'Nunito',sans-serif;transition:all .15s}
    .per-add-btn:hover{border-color:var(--red);color:var(--red)}
    .per-del-btn{background:none;border:none;cursor:pointer;color:var(--s300);padding:1px 3px;border-radius:3px;font-size:9px;line-height:1;transition:color .12s}
    .per-del-btn:hover{color:#ef4444}

    /* ── Empty state ── */
    .empty{text-align:center;padding:56px 20px;color:var(--s300)}
    .empty i{font-size:32px;margin-bottom:12px;display:block}
    .empty p{font-weight:700;font-size:14px;color:var(--s400);margin-bottom:4px}
    .empty small{font-size:12px;color:var(--s300)}

    /* ── Modal ── */
    .modal-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:9998;align-items:flex-start;justify-content:center;padding:16px;padding-top:60px;overflow-y:auto}
    .modal-ov.show{display:flex}
    .modal-box{background:#fff;border-radius:20px;width:100%;max-width:520px;box-shadow:0 16px 48px rgba(0,0,0,.18);overflow:hidden}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--s100)}
    .modal-title{font-size:15px;font-weight:800;color:var(--s800)}
    .modal-sub{font-size:12px;color:var(--s400);font-weight:600;margin-top:2px}
    .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--s400);padding:2px 7px;border-radius:7px;line-height:1}
    .modal-close:hover{background:var(--s100);color:var(--s700)}
    .modal-body{padding:16px 20px;max-height:60vh;overflow-y:auto}
    .modal-foot{padding:12px 20px;border-top:1px solid var(--s100);display:flex;gap:8px;justify-content:flex-end}

    /* Period list */
    .per-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--s100)}
    .per-row:last-child{border-bottom:none}
    .per-info{flex:1}
    .per-date{font-size:13px;font-weight:700;color:var(--s700)}
    .per-vals{font-size:12px;color:var(--s500);margin-top:3px}
    .add-per-form{background:var(--s50);border-radius:12px;padding:16px;margin-top:16px}
    .f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .f-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--s400);margin-bottom:4px}
    .f-inp{border:1.5px solid var(--s200);border-radius:9px;padding:9px 12px;font-size:14px;font-family:'Nunito',sans-serif;outline:none;width:100%;background:#fff;transition:border .15s}
    .f-inp:focus{border-color:var(--red)}

    /* Import */
    .imp-table{width:100%;border-collapse:collapse;font-size:13px}
    .imp-table th{padding:8px 10px;font-size:10px;font-weight:800;text-transform:uppercase;color:var(--s500);background:var(--s50);border-bottom:1px solid var(--s200);text-align:left}
    .imp-table td{padding:7px 10px;border-bottom:1px solid var(--s100)}
    .imp-table tr:last-child td{border-bottom:none}
    .imp-info{background:var(--amber-lt);color:var(--amber-tx);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}

    @media(max-width:700px){
      .camp-bar{gap:6px}
    }
  </style>
</head>
<body class="pb-24">
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<!-- honeypot: impedisce a Chrome di autofillare i filtri con dati salvati -->
<div style="display:none" aria-hidden="true">
  <input type="text" name="username" tabindex="-1">
  <input type="email" name="email" tabindex="-1">
</div>

<main class="mx-auto p-4 md:p-6">

  <!-- Barra tabelle + azioni: larghezza piena -->
  <div class="camp-bar">
    <span class="camp-bar-label">Tabelle saldi</span>
    <div class="camp-tabs" id="camp-tabs"></div>
    <div class="tbl-topbar-btns" id="edit-btns" style="display:none;flex-shrink:0">
      <button class="btn-prim btn-sm" onclick="addRow()">
        <i class="fas fa-plus"></i> Aggiungi riga
      </button>
      <label class="btn-sec btn-sm" style="cursor:pointer">
        <i class="fas fa-file-import"></i> Importa CSV / XLSX / TXT
        <input type="file" id="file-input" accept=".csv,.xls,.xlsx,.txt" style="display:none" onchange="onFileSelected(this)">
      </label>
      <button class="btn-danger" onclick="pulisciTabella()">
        <i class="fas fa-trash"></i> Pulisci tabella
      </button>
    </div>
  </div>

  <!-- Barra azioni selezione multipla -->
  <div id="sel-bar" style="display:none;background:var(--red-lt);border:1.5px solid #fca5a5;border-radius:12px;padding:10px 16px;margin-bottom:12px;align-items:center;gap:12px;flex-wrap:wrap">
    <span id="sel-count" style="font-size:13px;font-weight:800;color:var(--red);white-space:nowrap"></span>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1">
      <select id="sel-period-sel" style="border:1.5px solid #fca5a5;border-radius:8px;padding:5px 8px;font-size:12px;font-family:'Nunito',sans-serif;color:var(--s700);background:#fff;outline:none;max-width:170px;cursor:pointer"></select>
      <input type="number" id="sel-pct-inp" min="0" max="100" step="0.5" placeholder="Sconto %"
             style="border:1.5px solid #fca5a5;border-radius:8px;padding:5px 8px;font-size:12px;font-family:'Nunito',sans-serif;color:var(--s700);background:#fff;outline:none;width:90px;text-align:right">
      <button class="btn-prim btn-sm" onclick="applyDiscountToSelected()">
        <i class="fas fa-percent"></i> Applica sconto
      </button>
      <span style="width:1px;height:22px;background:#fca5a5;display:inline-block;flex-shrink:0"></span>
      <button class="btn-danger" id="btn-delete-sel" onclick="deleteSelected()">
        <i class="fas fa-trash"></i> <span id="btn-delete-sel-txt">Elimina</span>
      </button>
    </div>
    <button onclick="clearSelection()" style="background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--s500);font-family:'Nunito',sans-serif;white-space:nowrap;padding:4px 8px;border-radius:8px;transition:all .12s" onmouseover="this.style.background='rgba(0,0,0,.06)'" onmouseout="this.style.background='none'">
      <i class="fas fa-times"></i> Deseleziona
    </button>
  </div>

  <!-- Area tabella: larghezza piena -->
  <div class="tbl-area">
      <span id="camp-title" style="display:none"></span>
      <div id="period-toggle-bar" style="display:flex;justify-content:flex-end;margin-bottom:6px;min-height:24px"></div>
      <div class="tbl-wrap">
        <table class="sld-tbl">
          <thead id="tbl-head"></thead>
          <tbody id="tbl-body">
            <tr><td colspan="10" class="empty"><i class="fas fa-tags"></i><p>Seleziona o crea una tabella saldi</p></td></tr>
          </tbody>
        </table>
      </div>
    </div>
</main>

<!-- Modal import -->
<div class="modal-ov" id="modal-import">
  <div class="modal-box" style="max-width:640px">
    <div class="modal-head">
      <div>
        <div class="modal-title">Anteprima importazione</div>
        <div class="modal-sub" id="imp-sub"></div>
      </div>
      <button class="modal-close" onclick="closeImport()">×</button>
    </div>
    <div class="modal-body">
      <div class="imp-info"><i class="fas fa-triangle-exclamation"></i><span id="imp-warn"></span></div>
      <div style="overflow-x:auto">
        <table class="imp-table">
          <thead><tr><th>Codice</th><th>Nome Prodotto</th><th>Qtà</th><th>Prezzo</th></tr></thead>
          <tbody id="imp-body"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="closeImport()">Annulla</button>
      <button class="btn-prim" onclick="confirmImport()"><i class="fas fa-check"></i> Importa</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const db = supabase.createClient(
  'https://hsalynvxazxqtmsvjrzc.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
);

const EMPORI_MAP = {
  cremona:       {label:'Cremona',          img:'logo_cremona.png'},
  casalmaggiore: {label:'Casalmaggiore',    img:'logo_casalmaggiore.png'},
  viadana:       {label:'Viadana',          img:'logo_viadana.png'},
  reggioemilia:  {label:'Reggio Emilia',    img:'logo_reggio_emilia.png'},
  mantova:       {label:'On Earth Mantova', img:'logo_mantova.png'},
};

const EMP   = new URLSearchParams(location.search).get('emp') || '';
const TODAY = new Date().toISOString().split('T')[0];

let _u               = null;
let _canEdit         = false;
let _campagne        = [];
let _selCampId       = null;
let _prodotti        = [];
let _campagnaPeriodi = []; // [{id, campagna_id, numero, data_inizio, data_fine}]
let _sconti          = {}; // { prodotto_id: { campagna_periodo_id: sconto_pct } }
let _showAllPeriods  = false;
let _selected        = new Set();
let _importRows      = [];
let _sortCol         = 'nome_prodotto';
let _sortDir         = 'asc';
let _filter          = {};

// ── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  _u = JSON.parse(localStorage.getItem('m361_user')||'null');
  if(!_u){ window.location.href='/login.html'; return; }
  if(!EMPORI_MAP[EMP]){ history.back(); return; }

  document.title = 'Saldi';

  const isGlobal = _u.is_full_admin || _u.ruolo === 'admin';
  const isOwnEmp = _u.is_resp_emporio && (_u.emporio||'').toLowerCase().replace(/\s+/g,'') === EMP;
  _canEdit = isGlobal || isOwnEmp;

  if(_canEdit){
    document.getElementById('edit-btns').style.display = 'flex';
  }

  loadCampagne();
}

// ── CAMPAGNE ──────────────────────────────────────────────────────────────────
async function loadCampagne(){
  const {data} = await db.from('saldi_campagne').select('*').eq('emporio',EMP).order('created_at');
  _campagne = data || [];
  renderCampagne();
  if(_campagne.length) await selectCampagna(_campagne[0].id);
  else { _prodotti=[]; renderTable(); }
}

async function selectCampagna(id){
  _selCampId = id;
  const c = _campagne.find(c=>c.id===id);
  document.getElementById('camp-title').textContent = c?.nome || '';
  renderCampagne();
  await loadData();
}

function renderCampagne(){
  const tabs = document.getElementById('camp-tabs');
  let tabHtml = '';
  if(!_campagne.length){
    tabHtml = `<span style="font-size:12px;color:var(--s400);padding:6px 0">${_canEdit?'Nessuna tabella — clicca + Nuova':'Nessuna tabella disponibile'}</span>`;
  } else {
    tabHtml = _campagne.map(c=>`
      <div class="camp-tab${c.id===_selCampId?' active':''}" onclick="selectCampagna(${c.id})">
        <span>${escH(c.nome)}</span>
        ${_canEdit?`<span class="camp-tab-acts" onclick="event.stopPropagation()">
          <button class="camp-tab-btn" onclick="renameCampagna(${c.id})" title="Rinomina"><i class="fas fa-pen"></i></button>
          <button class="camp-tab-btn del" onclick="deleteCampagna(${c.id})" title="Elimina"><i class="fas fa-trash"></i></button>
        </span>`:''}
      </div>`).join('');
  }
  if(_canEdit) tabHtml += `<div class="camp-tab" onclick="newCampagna()" style="border-style:dashed;color:var(--red)"><i class="fas fa-plus"></i> Nuova</div>`;
  tabs.innerHTML = tabHtml;
}

async function newCampagna(){
  const nome = prompt('Nome tabella saldi (es. Saldi PE26, Saldi Casa):','');
  if(!nome?.trim()) return;
  const {data,error} = await db.from('saldi_campagne').insert({emporio:EMP,nome:nome.trim()}).select().single();
  if(error){alert('Errore: '+error.message);return;}
  _campagne.push(data);
  await selectCampagna(data.id);
}

async function renameCampagna(id){
  const c = _campagne.find(c=>c.id===id);
  const nome = prompt('Nuovo nome:',c.nome);
  if(!nome?.trim()||nome.trim()===c.nome) return;
  const {error} = await db.from('saldi_campagne').update({nome:nome.trim()}).eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  c.nome = nome.trim();
  if(_selCampId===id) document.getElementById('camp-title').textContent = c.nome;
  renderCampagne();
}

async function deleteCampagna(id){
  const c = _campagne.find(c=>c.id===id);
  if(!confirm(`Eliminare la tabella "${c.nome}" con tutti i prodotti e periodi?\nQuesta operazione non è reversibile.`)) return;
  const {error} = await db.from('saldi_campagne').delete().eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  _campagne = _campagne.filter(x=>x.id!==id);
  if(_selCampId===id){
    _selCampId = _campagne[0]?.id||null;
    document.getElementById('camp-title').textContent = _campagne[0]?.nome||'';
  }
  renderCampagne();
  await loadData();
}

// ── DATA ─────────────────────────────────────────────────────────────────────
async function loadData(){
  _selected.clear();
  if(!_selCampId){ _prodotti=[]; _campagnaPeriodi=[]; _sconti={}; renderTable(); return; }

  const {data:cps} = await db.from('saldi_campagna_periodi')
    .select('*').eq('campagna_id',_selCampId).order('numero');
  _campagnaPeriodi = cps || [];

  // Auto-crea 3 periodi vuoti per nuove campagne (solo admin)
  if(!_campagnaPeriodi.length && _canEdit){
    const defs = [1,2,3].map(n=>({campagna_id:_selCampId,numero:n,data_inizio:null,data_fine:null}));
    const {data:ins} = await db.from('saldi_campagna_periodi').insert(defs).select().order('numero');
    _campagnaPeriodi = ins || [];
  }

  const {data:prods} = await db.from('saldi_prodotti').select('*').eq('campagna_id',_selCampId);
  _prodotti = prods || [];
  _sconti   = {};

  if(_prodotti.length){
    const ids = _prodotti.map(p=>p.id);
    const {data:scs} = await db.from('saldi_sconti').select('*').in('prodotto_id',ids);
    for(const s of scs||[]){
      if(!_sconti[s.prodotto_id]) _sconti[s.prodotto_id]={};
      _sconti[s.prodotto_id][s.campagna_periodo_id] = parseFloat(s.sconto_pct);
    }
  }

  renderTable();
}

// ── SORT & FILTER ─────────────────────────────────────────────────────────────
function sortBy(col){
  _sortDir = (_sortCol===col && _sortDir==='asc') ? 'desc' : 'asc';
  _sortCol = col;
  renderTable();
}

function setFilter(col,val){
  _filter[col]=val;
  renderBody();
}

function getFilteredSorted(){
  let rows=[..._prodotti];
  const fc=(_filter.codice||'').toLowerCase();
  const fn=(_filter.nome_prodotto||'').toLowerCase();
  if(fc) rows=rows.filter(r=>(r.codice||'').toLowerCase().includes(fc));
  if(fn) rows=rows.filter(r=>r.nome_prodotto.toLowerCase().includes(fn));
  ['prezzato_negozio','prezzato_online','non_presente_online'].forEach(f=>{
    if(_filter[f]==='si') rows=rows.filter(r=>r[f]);
    if(_filter[f]==='no') rows=rows.filter(r=>!r[f]);
  });

  rows.sort((a,b)=>{
    let va=a[_sortCol]??'', vb=b[_sortCol]??'';
    if(typeof va==='number'||typeof vb==='number'){va=Number(va)||0;vb=Number(vb)||0;}
    else if(typeof va==='boolean'){va=va?1:0;vb=vb?1:0;}
    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    if(va<vb) return _sortDir==='asc'?-1:1;
    if(va>vb) return _sortDir==='asc'?1:-1;
    return 0;
  });
  return rows;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const SORT_META = {
  codice:              {id:'th-codice', label:'Codice'},
  nome_prodotto:       {id:'th-nome',   label:'Nome Prodotto'},
  qta:                 {id:'th-qta',    label:'Qtà'},
  prezzo:              {id:'th-prezzo', label:'Prezzo'},
  non_presente_online: {id:'th-pnop',   label:'Non presente online'},
};

function visiblePeriods(){
  if(_showAllPeriods) return _campagnaPeriodi;
  // Mostra solo periodi non ancora terminati (correnti + futuri + senza date)
  const relevant = _campagnaPeriodi.filter(cp => !cp.data_fine || cp.data_fine >= TODAY);
  return relevant.length ? relevant : _campagnaPeriodi;
}

function togglePeriods(){
  _showAllPeriods = !_showAllPeriods;
  renderTable();
}

function updatePeriodToggle(){
  const bar = document.getElementById('period-toggle-bar');
  if(!bar) return;
  const BTN = (onclick,ico,lbl) =>
    `<button onclick="${onclick}" style="display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--s200);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--s500);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.borderColor='var(--s200)';this.style.color='var(--s500)'"><i class="fas ${ico}"></i> ${lbl}</button>`;
  let html = '';
  if(_selCampId) html += BTN('printSaldi()','fa-print','Stampa PDF');
  const hasPast = _campagnaPeriodi.some(cp => cp.data_fine && cp.data_fine < TODAY);
  if(hasPast && _campagnaPeriodi.length){
    const ico = _showAllPeriods ? 'fa-eye-slash' : 'fa-eye';
    const lbl = _showAllPeriods ? 'Nascondi periodi passati' : 'Mostra tutti i periodi';
    html += BTN('togglePeriods()',ico,lbl);
  }
  bar.innerHTML = html;
}

async function addPeriodCol(){
  if(!_selCampId||!_canEdit) return;
  const nextNum = _campagnaPeriodi.length + 1;
  const {data,error} = await db.from('saldi_campagna_periodi')
    .insert({campagna_id:_selCampId,numero:nextNum,data_inizio:null,data_fine:null})
    .select().single();
  if(error){alert('Errore: '+error.message);return;}
  _campagnaPeriodi.push(data);
  renderTable();
}

async function deletePeriodCol(periodoId){
  if(!confirm('Eliminare questo periodo? Gli sconti associati verranno rimossi.')) return;
  await db.from('saldi_campagna_periodi').delete().eq('id',periodoId);
  _campagnaPeriodi = _campagnaPeriodi.filter(p=>p.id!==periodoId);
  Object.values(_sconti).forEach(s=>{ delete s[periodoId]; });
  renderTable();
}

async function savePeriodDate(periodoId, field, value){
  await db.from('saldi_campagna_periodi').update({[field]:value||null}).eq('id',periodoId);
  const p = _campagnaPeriodi.find(p=>p.id===periodoId);
  if(p) p[field]=value||null;
}

async function saveSconto(prodId, periodoId, rawVal){
  const pct = Math.min(100,Math.max(0,parseFloat(rawVal)||0));
  await db.from('saldi_sconti')
    .upsert({prodotto_id:prodId,campagna_periodo_id:periodoId,sconto_pct:pct},
            {onConflict:'prodotto_id,campagna_periodo_id'});
  if(!_sconti[prodId]) _sconti[prodId]={};
  _sconti[prodId][periodoId]=pct;
  const prod=_prodotti.find(p=>p.id===prodId);
  const el=document.getElementById(`sld-${prodId}-${periodoId}`);
  if(el&&prod){
    const s=parseFloat(prod.prezzo||0)*(1-pct/100);
    el.textContent=pct>0?fmtEur(s):'—';
    el.style.color=pct>0?'var(--red)':'var(--s300)';
    el.style.fontWeight=pct>0?'800':'normal';
  }
}

function buildThead(){
  const PB = 'border-left:2px solid var(--s200)';

  // ── Riga 1: header gruppi ──
  let h1 = _canEdit
    ? `<th style="width:32px;text-align:center;padding:4px 6px"><input type="checkbox" class="chk-row" id="chk-all" onchange="selectAll(this.checked)" title="Seleziona tutto"></th>`
    : '';
  h1 += `
    <th class="sortable" onclick="sortBy('codice')" id="th-codice">Codice</th>
    <th class="sortable" onclick="sortBy('nome_prodotto')" id="th-nome">Nome Prodotto</th>
    <th class="sortable" style="text-align:right" onclick="sortBy('qta')" id="th-qta">Qtà</th>
    <th class="sortable" style="text-align:right" onclick="sortBy('prezzo')" id="th-prezzo">Prezzo</th>
  `;

  for(const cp of visiblePeriods()){
    const dal = cp.data_inizio ? fmtDate(cp.data_inizio) : '—';
    const al  = cp.data_fine   ? fmtDate(cp.data_fine)   : '—';
    const dateBlock = _canEdit
      ? `<div style="display:flex;align-items:center;gap:3px;margin-top:4px;justify-content:center;flex-wrap:wrap">
           <input type="date" value="${cp.data_inizio||''}" class="per-date-inp" onchange="savePeriodDate(${cp.id},'data_inizio',this.value)" title="Dal">
           <span style="color:var(--s400);font-size:10px;flex-shrink:0">→</span>
           <input type="date" value="${cp.data_fine||''}" class="per-date-inp" onchange="savePeriodDate(${cp.id},'data_fine',this.value)" title="Al">
           <button onclick="deletePeriodCol(${cp.id})" class="per-del-btn" title="Rimuovi periodo"><i class="fas fa-times"></i></button>
         </div>`
      : `<div style="font-size:10px;color:var(--s500);margin-top:3px;font-weight:600;white-space:nowrap">${dal} → ${al}</div>`;
    h1 += `<th colspan="2" style="text-align:center;${PB};background:var(--s50);padding:6px 8px;min-width:${_canEdit?'210px':'150px'}">
      <div style="font-size:9px;font-weight:800;letter-spacing:.06em;color:var(--s600);text-transform:uppercase">PERIODO ${cp.numero}</div>
      ${dateBlock}
    </th>`;
  }

  if(_canEdit){
    h1 += `<th style="text-align:center;width:34px;background:var(--s50)">
      <button onclick="addPeriodCol()" class="per-add-btn" title="Aggiungi periodo">+</button>
    </th>`;
  }

  h1 += `
    <th colspan="2" style="text-align:center;${PB};background:var(--s50);font-size:10px;font-weight:800;letter-spacing:.06em;color:var(--s600)">PREZZATO</th>
    <th class="sortable" style="text-align:center;${PB}" onclick="sortBy('non_presente_online')" id="th-pnop">Non presente online</th>
    <th></th>
  `;

  // ── Riga 2: filtri + sotto-etichette ──
  let h2 = _canEdit ? `<th style="width:32px;background:var(--s50)"></th>` : '';
  h2 += `
    <th><input class="flt-inp" type="text" placeholder="Filtra..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly')" oninput="setFilter('codice',this.value)"></th>
    <th><input class="flt-inp" type="text" placeholder="Filtra..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly')" oninput="setFilter('nome_prodotto',this.value)"></th>
    <th></th><th></th>
  `;
  for(const cp of visiblePeriods()){
    h2 += `
      <th style="${PB};padding:4px 6px;text-align:center">
        <div style="font-size:9px;font-weight:800;color:var(--s500)">SCONTO %</div>
      </th>
      <th style="padding:4px 6px;text-align:right">
        <div style="font-size:9px;font-weight:800;color:var(--s500)">€ SALDO</div>
      </th>
    `;
  }
  if(_canEdit) h2 += `<th></th>`;
  h2 += `
    <th style="${PB};padding:4px 6px">
      <div style="font-size:9px;font-weight:800;color:var(--s500);text-align:center;margin-bottom:2px">In negozio</div>
      <select class="flt-sel" onchange="setFilter('prezzato_negozio',this.value)">
        <option value="">Tutti</option><option value="si">Sì</option><option value="no">No</option>
      </select>
    </th>
    <th style="padding:4px 6px">
      <div style="font-size:9px;font-weight:800;color:var(--s500);text-align:center;margin-bottom:2px">Online</div>
      <select class="flt-sel" onchange="setFilter('prezzato_online',this.value)">
        <option value="">Tutti</option><option value="si">Sì</option><option value="no">No</option>
      </select>
    </th>
    <th style="${PB}">
      <select class="flt-sel" onchange="setFilter('non_presente_online',this.value)">
        <option value="">Tutti</option><option value="si">Sì</option><option value="no">No</option>
      </select>
    </th>
    <th></th>
  `;

  document.getElementById('tbl-head').innerHTML=`<tr>${h1}</tr><tr class="flt-row">${h2}</tr>`;

  // Calcola top riga filtri = altezza effettiva riga 1 (sticky relativo al tbl-wrap)
  requestAnimationFrame(()=>{
    const row1 = document.querySelector('#tbl-head tr:first-child');
    if(!row1) return;
    const top = Math.round(row1.getBoundingClientRect().height);
    document.querySelectorAll('#tbl-head tr.flt-row th').forEach(th => th.style.top = top+'px');
  });

  // Aggiorna frecce sort
  Object.entries(SORT_META).forEach(([col,{id,label}])=>{
    const el=document.getElementById(id);
    if(!el) return;
    const arrow=_sortCol===col?(_sortDir==='asc'?' ↑':' ↓'):'';
    el.innerHTML=label+(arrow
      ?`<span style="color:var(--red);font-size:10px">${arrow}</span>`
      :`<span style="opacity:.25;font-size:10px"> ⇅</span>`);
  });
}

function buildPerCells(p){
  const PBL='border-left:2px solid var(--s100)';
  let html='';
  for(const cp of visiblePeriods()){
    const pct=(_sconti[p.id]||{})[cp.id]||0;
    const saldo=parseFloat(p.prezzo||0)*(1-pct/100);
    if(_canEdit){
      html+=`
        <td style="${PBL};padding:4px 6px;text-align:center">
          <div style="display:inline-flex;align-items:center;gap:1px">
            <input type="number" min="0" max="100" step="0.5" value="${pct||''}"
                   placeholder="—" class="td-inp td-inp-num"
                   onblur="saveSconto(${p.id},${cp.id},this.value)"
                   style="max-width:44px;text-align:right;color:${pct?'var(--s800)':'inherit'};font-weight:${pct?'700':'normal'}">
            <span style="font-size:11px;font-weight:800;color:var(--s600);line-height:1">%</span>
          </div>
        </td>
        <td id="sld-${p.id}-${cp.id}" style="text-align:right;font-weight:${pct?'800':'normal'};color:${pct?'var(--red)':'var(--s300)'};white-space:nowrap;padding:4px 6px">${pct>0?fmtEur(saldo):'—'}</td>`;
    } else {
      html+=`
        <td style="${PBL};text-align:center;font-weight:700;color:${pct?'var(--s800)':'var(--s200)'};padding:4px 6px">${pct?pct.toFixed(pct%1?1:0)+'%':'—'}</td>
        <td id="sld-${p.id}-${cp.id}" style="text-align:right;font-weight:${pct?'800':'normal'};color:${pct?'var(--red)':'var(--s200)'};white-space:nowrap;padding:4px 6px">${pct>0?fmtEur(saldo):'—'}</td>`;
    }
  }
  return html;
}

function renderTable(){
  updatePeriodToggle();
  buildThead();
  renderBody();
}

function renderBody(){
  const tbody=document.getElementById('tbl-body');
  if(!tbody) return;
  const COLS=4+2*visiblePeriods().length+(_canEdit?2:0)+2+1+1;

  if(!_selCampId){
    tbody.innerHTML=`<tr><td colspan="${COLS}" class="empty"><i class="fas fa-tags"></i><p>Seleziona o crea una tabella saldi</p></td></tr>`;
    return;
  }
  const rows=getFilteredSorted();
  if(!rows.length){
    const isFiltered=Object.values(_filter).some(v=>v);
    tbody.innerHTML=`<tr><td colspan="${COLS}" class="empty"><i class="fas fa-${isFiltered?'filter':'tags'}"></i><p>${isFiltered?'Nessun prodotto corrisponde ai filtri':'Nessun prodotto'}</p>${_canEdit&&!isFiltered?`<small>Importa un file o clicca "Aggiungi riga"</small>`:''}</td></tr>`;
    return;
  }

  const flagCell=(id,field)=>
    `<td class="td-flag"><input type="checkbox" class="chk-flag" ${_prodotti.find(p=>p.id===id)?.[field]?'checked':''} onchange="toggleFlag(${id},'${field}',this.checked)"></td>`;

  let html='';
  for(const p of rows){
    const perCells=buildPerCells(p);
    const delBtn=_canEdit?`<button class="icon-btn del" onclick="deleteProd(${p.id})" title="Elimina"><i class="fas fa-trash"></i></button>`:'';
    const plusTd=_canEdit?`<td></td>`:'';

    const isSel = _selected.has(p.id);
    if(_canEdit){
      html+=`<tr data-id="${p.id}"${isSel?' class="row-sel"':''}>
        <td class="td-act"><input type="checkbox" class="chk-row chk-row-item" ${isSel?'checked':''} onchange="toggleSelect(${p.id},this.checked)"></td>
        <td class="td-codice"><input class="td-inp" value="${escH(p.codice||'')}" autocomplete="off" onblur="saveProd(${p.id},'codice',this.value)" placeholder="—"></td>
        <td class="td-nome"><input class="td-inp td-inp-nome" value="${escH(p.nome_prodotto)}" autocomplete="off" onblur="saveProd(${p.id},'nome_prodotto',this.value||'Prodotto')" placeholder="Nome prodotto"></td>
        <td class="td-num"><input class="td-inp td-inp-num" type="number" min="0" value="${p.qta}" onblur="saveProd(${p.id},'qta',Math.max(0,parseInt(this.value)||0))"></td>
        <td class="td-num"><input class="td-inp td-inp-num" type="number" min="0" step="0.01" value="${parseFloat(p.prezzo||0).toFixed(2)}" onblur="saveProd(${p.id},'prezzo',parseFloat(this.value)||0)" style="min-width:70px"></td>
        ${perCells}${plusTd}
        ${flagCell(p.id,'prezzato_negozio')}
        ${flagCell(p.id,'prezzato_online')}
        ${flagCell(p.id,'non_presente_online')}
        <td class="td-act">${delBtn}</td>
      </tr>`;
    } else {
      html+=`<tr data-id="${p.id}">
        <td class="td-codice">${escH(p.codice||'—')}</td>
        <td class="td-nome" style="font-weight:700;color:var(--s800)">${escH(p.nome_prodotto)}</td>
        <td class="td-num">${p.qta}</td>
        <td class="td-num">${fmtEur(p.prezzo)}</td>
        ${perCells}
        ${flagCell(p.id,'prezzato_negozio')}
        ${flagCell(p.id,'prezzato_online')}
        ${flagCell(p.id,'non_presente_online')}
        <td class="td-act"></td>
      </tr>`;
    }
  }
  tbody.innerHTML=html;
  updateSelectionUI();
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtEur(v){return '€ '+parseFloat(v||0).toFixed(2).replace('.',',')}
function fmtDate(d){if(!d)return '';const[y,m,g]=d.split('-');return`${g}/${m}/${y}`}

// ── INLINE EDIT ───────────────────────────────────────────────────────────────
async function saveProd(id, field, value){
  let v=value;
  if(field==='qta')    v=Math.max(0,parseInt(value)||0);
  if(field==='prezzo') v=parseFloat(value)||0;
  const {error}=await db.from('saldi_prodotti').update({[field]:v}).eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  const prod=_prodotti.find(p=>p.id===id);
  if(prod){ prod[field]=v; if(field==='prezzo') renderTable(); }
}

async function toggleFlag(id, field, val){
  const {error}=await db.from('saldi_prodotti').update({[field]:val}).eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  const prod=_prodotti.find(p=>p.id===id);
  if(prod) prod[field]=val;
}

// ── MULTI-SELECT ──────────────────────────────────────────────────────────────
function toggleSelect(id, checked){
  if(checked) _selected.add(id);
  else _selected.delete(id);
  updateSelectionUI();
}

function selectAll(checked){
  const rows = getFilteredSorted();
  if(checked) rows.forEach(p => _selected.add(p.id));
  else _selected.clear();
  document.querySelectorAll('.chk-row-item').forEach(cb => cb.checked = checked);
  updateSelectionUI();
}

function updateSelectionUI(){
  const n = _selected.size;
  const bar = document.getElementById('sel-bar');
  if(bar) bar.style.display = n ? 'flex' : 'none';

  const cnt = document.getElementById('sel-count');
  if(cnt) cnt.textContent = `${n} prodotto${n===1?'':'i'} selezionato${n===1?'':'i'}`;

  const txt = document.getElementById('btn-delete-sel-txt');
  if(txt) txt.textContent = `Elimina ${n===1?'selezionato':'selezionati'}`;

  // Popola dropdown periodi nella sel-bar
  const ps = document.getElementById('sel-period-sel');
  if(ps){
    const vps = visiblePeriods();
    ps.innerHTML = vps.length
      ? vps.map(cp=>{
          const dal = cp.data_inizio ? fmtDate(cp.data_inizio) : '—';
          const al  = cp.data_fine   ? fmtDate(cp.data_fine)   : '—';
          return `<option value="${cp.id}">Periodo ${cp.numero} (${dal}→${al})</option>`;
        }).join('')
      : '<option value="">Nessun periodo</option>';
  }

  const chkAll = document.getElementById('chk-all');
  if(chkAll){
    const rows = getFilteredSorted();
    const allChecked = rows.length > 0 && rows.every(p => _selected.has(p.id));
    const someChecked = rows.some(p => _selected.has(p.id));
    chkAll.checked = allChecked;
    chkAll.indeterminate = someChecked && !allChecked;
  }
  document.querySelectorAll('#tbl-body tr[data-id]').forEach(tr => {
    const id = parseInt(tr.dataset.id);
    if(_selected.has(id)) tr.classList.add('row-sel');
    else tr.classList.remove('row-sel');
  });
}

function clearSelection(){
  _selected.clear();
  document.querySelectorAll('.chk-row-item').forEach(cb => cb.checked = false);
  updateSelectionUI();
}

async function applyDiscountToSelected(){
  if(!_selected.size) return;
  const periodoId = parseInt(document.getElementById('sel-period-sel')?.value);
  const pctRaw = document.getElementById('sel-pct-inp')?.value;
  if(!periodoId){ alert('Seleziona un periodo.'); return; }
  if(pctRaw === '' || pctRaw === null){ alert('Inserisci una percentuale di sconto.'); return; }
  const pct = Math.min(100, Math.max(0, parseFloat(pctRaw) || 0));

  const ids = [..._selected];
  const upsertRows = ids.map(prodId => ({
    prodotto_id: prodId,
    campagna_periodo_id: periodoId,
    sconto_pct: pct,
  }));
  const {error} = await db.from('saldi_sconti')
    .upsert(upsertRows, {onConflict:'prodotto_id,campagna_periodo_id'});
  if(error){ alert('Errore: '+error.message); return; }
  for(const prodId of ids){
    if(!_sconti[prodId]) _sconti[prodId] = {};
    _sconti[prodId][periodoId] = pct;
  }
  renderTable();
}

async function deleteSelected(){
  if(!_selected.size) return;
  const n = _selected.size;
  if(!confirm(`Eliminare ${n} prodotto${n===1?'':'i'} selezionato${n===1?'':'i'} e i relativi sconti?\nQuesta operazione non è reversibile.`)) return;
  const ids = [..._selected];
  const {error} = await db.from('saldi_prodotti').delete().in('id', ids);
  if(error){ alert('Errore: '+error.message); return; }
  _prodotti = _prodotti.filter(p => !ids.includes(p.id));
  ids.forEach(id => delete _sconti[id]);
  _selected.clear();
  renderTable();
}

// ── ADD / DELETE ──────────────────────────────────────────────────────────────
async function addRow(){
  if(!_selCampId){alert('Seleziona prima una tabella saldi.');return;}
  const {data,error}=await db.from('saldi_prodotti').insert({
    emporio:EMP,campagna_id:_selCampId,
    codice:'',nome_prodotto:'',qta:0,prezzo:0,
    prezzato_negozio:false,prezzato_online:false,non_presente_online:false,
  }).select().single();
  if(error){alert('Errore: '+error.message);return;}
  _prodotti.push(data);
  renderTable();
  setTimeout(()=>{
    const inp=document.querySelector(`tr[data-id="${data.id}"] .td-inp-nome`);
    inp?.focus(); inp?.select();
  },60);
}

async function deleteProd(id){
  if(!confirm('Eliminare questo prodotto e i suoi sconti?')) return;
  const {error}=await db.from('saldi_prodotti').delete().eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  _prodotti=_prodotti.filter(p=>p.id!==id);
  delete _sconti[id];
  renderTable();
}

async function pulisciTabella(){
  const c=_campagne.find(c=>c.id===_selCampId);
  if(!c){alert('Nessuna tabella selezionata.');return;}
  if(!confirm(`Eliminare TUTTI i prodotti della tabella "${c.nome}"?\nQuesta operazione non è reversibile.`)) return;
  if(_prodotti.length){
    await db.from('saldi_prodotti').delete().eq('campagna_id',_selCampId);
  }
  _prodotti=[];_sconti={};
  renderTable();
}

// ── FILE IMPORT ────────────────────────────────────────────────────────────────
function stripBom(s){return typeof s==='string'?s.replace(/^﻿/,''):s}
function normalizeHdr(h){return stripBom((h||'').toString()).toLowerCase().replace(/\s+/g,' ').trim()}
function detectColumns(headers){
  const hl=headers.map(normalizeHdr);
  const find=(...keys)=>{
    for(const k of keys){const i=hl.findIndex(h=>h===k);if(i!==-1)return i;}
    for(const k of keys){const i=hl.findIndex(h=>h.startsWith(k));if(i!==-1)return i;}
    for(const k of keys){const i=hl.findIndex(h=>h.includes(k));if(i!==-1)return i;}
    return -1;
  };
  return {
    codice:find('codice','cod','sku','art','articolo','riferimento','ref','item code','cod.art'),
    nome:  find('descrizione','nome prodotto','nome','prodotto','desc','articolo','denominazione','titolo','item'),
    qta:   find('quantita','quantità','qta','qty','pezzi','pz','disponibilita','disponib','quantit'),
    prezzo:find('prezzo','price','pvp','pvl','listino','costo','importo','prezzo vendita'),
  };
}
function parseNum(v){
  if(v===undefined||v===null||v==='')return 0;
  let s=String(v).trim().replace(/\s/g,'');
  if(s.includes('.')&&s.includes(','))s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(','))s=s.replace(',','.');
  s=s.replace(/[^\d.-]/g,'');
  return parseFloat(s)||0;
}
function rowsFromSheet(ws){
  const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!json.length)return{headers:[],rows:[]};
  let hdrIdx=0;
  for(let i=0;i<Math.min(json.length,8);i++){if(json[i].filter(c=>String(c).trim()!=='').length>=2){hdrIdx=i;break;}}
  return{headers:json[hdrIdx].map(h=>String(h)),rows:json.slice(hdrIdx+1).filter(r=>r.some(c=>String(c).trim()!==''))};
}
function parseCSV(text){
  const clean=stripBom(text);
  const lines=clean.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{headers:[],rows:[]};
  const l0=lines[0];
  const sep=l0.includes(';')?';':l0.includes('\t')?'\t':l0.includes('|')?'|':',';
  const split=l=>l.split(sep).map(c=>c.replace(/^["'\s]+|["'\s]+$/g,''));
  return{headers:split(lines[0]),rows:lines.slice(1).map(split).filter(r=>r.some(c=>c!==''))};
}

function onFileSelected(input){
  if(!_selCampId){alert('Seleziona prima una tabella saldi.');input.value='';return;}
  const file=input.files[0];
  if(!file)return;
  input.value='';
  const ext=file.name.toLowerCase().split('.').pop();
  const isCsv=ext==='csv'||ext==='txt';
  const reader=new FileReader();
  reader.onerror=()=>alert('Errore nella lettura del file.');
  reader.onload=(e)=>{
    try{
      let headers,rows;
      if(isCsv){({headers,rows}=parseCSV(e.target.result||''));}
      else{
        if(typeof XLSX==='undefined')throw new Error('Libreria XLSX non caricata. Ricarica la pagina.');
        const wb=XLSX.read(e.target.result,{type:'array'});
        if(!wb.SheetNames.length)throw new Error('Il file non contiene fogli.');
        ({headers,rows}=rowsFromSheet(wb.Sheets[wb.SheetNames[0]]));
      }
      if(!headers.length)throw new Error('Nessuna intestazione trovata.');
      const cols=detectColumns(headers);
      if(cols.nome===-1){
        alert('Colonna "Descrizione / Nome" non trovata.\n\nIntestazioni rilevate:\n'+headers.map((h,i)=>`  [${i}] "${h}"`).join('\n')+'\n\nAssicurati che una colonna si chiami "descrizione", "nome" o "prodotto".');
        return;
      }
      _importRows=rows.map(r=>({
        codice:       cols.codice!==-1?String(r[cols.codice]??'').trim():'',
        nome_prodotto:String(r[cols.nome]??'').trim(),
        qta:          cols.qta!==-1?Math.max(0,Math.round(parseNum(r[cols.qta]))):0,
        prezzo:       cols.prezzo!==-1?parseNum(r[cols.prezzo]):0,
      })).filter(r=>r.nome_prodotto);
      if(!_importRows.length){alert('Nessuna riga valida trovata.');return;}
      document.getElementById('imp-body').innerHTML=_importRows.slice(0,50).map(r=>
        `<tr><td>${escH(r.codice||'—')}</td><td>${escH(r.nome_prodotto)}</td><td style="text-align:right">${r.qta}</td><td style="text-align:right">${fmtEur(r.prezzo)}</td></tr>`
      ).join('');
      const campNome=_campagne.find(c=>c.id===_selCampId)?.nome||'';
      document.getElementById('imp-sub').textContent=_importRows.length+' prodotti trovati';
      document.getElementById('imp-warn').textContent=`I prodotti saranno aggiunti alla tabella "${campNome}". I periodi di sconto non saranno modificati.`;
      document.getElementById('modal-import').classList.add('show');
    }catch(err){alert('Errore elaborazione file:\n'+err.message);}
  };
  if(isCsv)reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

async function confirmImport(){
  if(!_importRows.length)return;
  const rows=_importRows.map(r=>({
    ...r,emporio:EMP,campagna_id:_selCampId,
    prezzato_negozio:false,prezzato_online:false,non_presente_online:false,
  }));
  closeImport();
  let errMsg=null;
  for(let i=0;i<rows.length;i+=500){
    const {error}=await db.from('saldi_prodotti').insert(rows.slice(i,i+500));
    if(error){errMsg=error.message;break;}
  }
  if(errMsg){alert('Errore importazione:\n'+errMsg);return;}
  _importRows=[];
  await loadData();
}

function closeImport(){
  document.getElementById('modal-import').classList.remove('show');
  _importRows=[];
}

document.getElementById('modal-import').addEventListener('click',function(e){if(e.target===this)closeImport();});
