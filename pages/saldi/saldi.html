<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" href="/faviconm361.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../../assets/style/nav-style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M361 — Saldi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--red:#B5453A;--red-dark:#8c362d;--red-light:#fdf1f0;--green:#059669;--green-lt:#dcfce7;--green-tx:#166534;--blue:#3b82f6;--blue-lt:#dbeafe;--blue-tx:#1d4ed8;--amber:#f59e0b;--amber-lt:#fef3c7;--amber-tx:#92400e;--s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b}
    *{box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#f0f2f5;font-size:15px}

    /* Back + header */
    .bk{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:var(--s500);background:none;border:none;cursor:pointer;padding:8px 0;margin-bottom:10px;transition:color .15s}
    .bk:hover{color:var(--red)}
    .emp-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .emp-hd img{width:44px;height:44px;object-fit:contain;border-radius:10px}
    .emp-hd-name{font-size:20px;font-weight:900;color:var(--s800)}
    .emp-hd-sub{font-size:12px;color:var(--s400);font-weight:600;margin-top:1px}

    /* Toolbar */
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
    .btn-prim{background:var(--red);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
    .btn-prim:hover{background:var(--red-dark)}
    .btn-sec{background:#fff;color:var(--s600);border:1.5px solid var(--s200);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
    .btn-sec:hover{border-color:var(--s400);color:var(--s800)}
    .btn-danger{background:#fee2e2;color:#B5453A;border:1px solid #fca5a5;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px}
    .btn-danger:hover{background:#B5453A;color:#fff;border-color:#B5453A}

    /* Table */
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--s200);border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .sld-tbl{width:100%;border-collapse:collapse;font-size:14px;min-width:780px}
    .sld-tbl thead th{padding:9px 12px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--s500);background:var(--s50);border-bottom:2px solid var(--s200);white-space:nowrap;text-align:left;position:sticky;top:0;z-index:2}
    .sld-tbl td{padding:10px 12px;border-bottom:1px solid var(--s100);vertical-align:middle}
    .sld-tbl tr:last-child td{border-bottom:none}
    .sld-tbl tr:hover td{background:#fefce8}
    .td-codice{font-family:'Nunito',sans-serif;font-size:12px;color:var(--s500);white-space:nowrap;min-width:80px}
    .td-nome{font-weight:700;color:var(--s800);min-width:180px;line-height:1.3}
    .td-num{text-align:right;white-space:nowrap;min-width:60px}
    .td-pct{text-align:center;font-weight:800;min-width:70px}
    .td-saldo{text-align:right;font-weight:800;color:var(--green);min-width:80px}
    .td-azioni{text-align:center;white-space:nowrap;min-width:80px}

    /* Status badges */
    .badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:6px;white-space:nowrap}
    .badge-green{background:var(--green-lt);color:var(--green-tx)}
    .badge-blue{background:var(--blue-lt);color:var(--blue-tx)}
    .badge-grey{background:var(--s100);color:var(--s500)}
    .badge-amber{background:var(--amber-lt);color:var(--amber-tx)}

    /* Icon buttons */
    .icon-btn{border:none;background:none;cursor:pointer;color:var(--s300);padding:4px 6px;border-radius:6px;transition:all .12s;font-size:14px}
    .icon-btn:hover{background:var(--s100);color:var(--s600)}
    .icon-btn.del:hover{background:#fee2e2;color:#ef4444}
    .icon-btn.cal:hover{background:var(--blue-lt);color:var(--blue-tx)}

    /* Empty state */
    .empty{text-align:center;padding:50px 20px;color:var(--s400)}
    .empty i{font-size:36px;margin-bottom:12px;display:block}
    .empty p{font-weight:600;font-size:15px;margin:0 0 4px}
    .empty small{font-size:13px}

    /* Modal overlay */
    .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9998;align-items:flex-start;justify-content:center;padding:16px;padding-top:50px;overflow-y:auto}
    .modal-ov.show{display:flex}
    .modal-box{background:#fff;border-radius:18px;width:100%;max-width:520px;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--s100)}
    .modal-title{font-size:16px;font-weight:800;color:var(--s800)}
    .modal-sub{font-size:12px;color:var(--s400);font-weight:600;margin-top:2px}
    .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--s400);padding:2px 6px;border-radius:6px;transition:all .12s}
    .modal-close:hover{background:var(--s100);color:var(--s700)}
    .modal-body{padding:16px 20px;max-height:60vh;overflow-y:auto}
    .modal-foot{padding:12px 20px;border-top:1px solid var(--s100);display:flex;gap:8px;justify-content:flex-end}

    /* Period list */
    .per-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--s100)}
    .per-row:last-child{border-bottom:none}
    .per-info{flex:1}
    .per-date{font-size:13px;font-weight:700;color:var(--s700)}
    .per-vals{font-size:12px;color:var(--s500);margin-top:2px}

    /* Add period form */
    .add-per-form{background:var(--s50);border-radius:12px;padding:14px;margin-top:14px}
    .add-per-form .f-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .add-per-form .f-row-3{display:grid;grid-template-columns:1fr 1fr 100px;gap:8px;margin-bottom:8px}
    .f-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--s400);margin-bottom:3px}
    .f-inp{border:1.5px solid var(--s200);border-radius:8px;padding:8px 10px;font-size:14px;font-family:'Nunito',sans-serif;outline:none;width:100%;background:#fff;transition:border .15s}
    .f-inp:focus{border-color:var(--red)}

    /* Import modal */
    .imp-table{width:100%;border-collapse:collapse;font-size:13px}
    .imp-table th{padding:6px 8px;font-size:10px;font-weight:800;text-transform:uppercase;color:var(--s500);background:var(--s50);border-bottom:1px solid var(--s200);text-align:left}
    .imp-table td{padding:6px 8px;border-bottom:1px solid var(--s100)}
    .imp-table tr:last-child td{border-bottom:none}
    .imp-info{background:var(--amber-lt);color:var(--amber-tx);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  </style>
</head>
<body class="pb-24">
<script src="../../scripts/auth.js"></script>
<script src="../../scripts/nav-script.js"></script>

<main class="max-w-5xl mx-auto p-4 md:p-6">
  <div class="emp-hd">
    <img id="emp-logo" src="" alt="">
    <div>
      <div class="emp-hd-name" id="emp-name"></div>
      <div class="emp-hd-sub">Gestione saldi e sconti</div>
    </div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <label class="btn-prim" style="cursor:pointer">
      <i class="fas fa-file-import"></i> Importa CSV / XLSX
      <input type="file" id="file-input" accept=".csv,.xls,.xlsx" style="display:none" onchange="onFileSelected(this)">
    </label>
    <button class="btn-danger" onclick="pulisciTutto()">
      <i class="fas fa-trash"></i> Pulisci tutto
    </button>
  </div>

  <div class="tbl-wrap">
    <table class="sld-tbl">
      <thead>
        <tr>
          <th>Codice</th>
          <th>Nome Prodotto</th>
          <th style="text-align:right">Qtà</th>
          <th style="text-align:right">Prezzo</th>
          <th style="text-align:center">Sconto attivo</th>
          <th style="text-align:right">Saldo</th>
          <th style="text-align:center">Periodi</th>
          <th id="th-del" style="text-align:center;display:none"></th>
        </tr>
      </thead>
      <tbody id="tbl-body">
        <tr><td colspan="8" class="empty"><i class="fas fa-tags"></i><p>Nessun prodotto</p><small>Importa un file CSV o XLSX per iniziare</small></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Modal periodi -->
<div class="modal-ov" id="modal-periodi">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-title">Periodi di sconto</div>
        <div class="modal-sub" id="m-nome-sub"></div>
      </div>
      <button class="modal-close" onclick="closePeriodi()">×</button>
    </div>
    <div class="modal-body">
      <div id="m-periodi-list"></div>
      <div id="m-add-form" style="display:none">
        <div class="add-per-form">
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--s500);margin-bottom:10px"><i class="fas fa-plus"></i> Nuovo periodo</div>
          <div class="add-per-form f-row">
            <div>
              <div class="f-lbl">Dal</div>
              <input class="f-inp" type="date" id="m-dal">
            </div>
            <div>
              <div class="f-lbl">Al</div>
              <input class="f-inp" type="date" id="m-al">
            </div>
          </div>
          <div style="max-width:160px">
            <div class="f-lbl">Sconto %</div>
            <input class="f-inp" type="number" id="m-pct" min="1" max="99" step="0.5" placeholder="es. 20">
          </div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="btn-prim" onclick="addPeriodo()" style="font-size:13px;padding:8px 14px">
              <i class="fas fa-plus"></i> Aggiungi
            </button>
            <div id="m-saldo-preview" style="display:none;align-items:center;font-size:14px;font-weight:700;color:var(--green)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal import preview -->
<div class="modal-ov" id="modal-import">
  <div class="modal-box" style="max-width:640px">
    <div class="modal-head">
      <div>
        <div class="modal-title">Anteprima importazione</div>
        <div class="modal-sub" id="imp-sub"></div>
      </div>
      <button class="modal-close" onclick="closeImport()">×</button>
    </div>
    <div class="modal-body">
      <div class="imp-info"><i class="fas fa-triangle-exclamation"></i><span id="imp-warn"></span></div>
      <div style="overflow-x:auto">
        <table class="imp-table" id="imp-table">
          <thead><tr><th>Codice</th><th>Nome Prodotto</th><th>Qtà</th><th>Prezzo</th></tr></thead>
          <tbody id="imp-body"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="closeImport()">Annulla</button>
      <button class="btn-prim" onclick="confirmImport()"><i class="fas fa-check"></i> Importa</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const db = supabase.createClient(
  'https://hsalynvxazxqtmsvjrzc.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYWx5bnZ4YXp4cXRtc3ZqcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQ3MjcsImV4cCI6MjA5MzMwMDcyN30.JW4nsMrrfuI8BTg4bn2v74seVJ-_prfxZ1PQp5T18a8'
);

const EMPORI_MAP = {
  cremona:       {label:'Cremona',          img:'logo_cremona.png'},
  casalmaggiore: {label:'Casalmaggiore',    img:'logo_casalmaggiore.png'},
  viadana:       {label:'Viadana',          img:'logo_viadana.png'},
  reggioemilia:  {label:'Reggio Emilia',    img:'logo_reggio_emilia.png'},
  mantova:       {label:'On Earth Mantova', img:'logo_mantova.png'},
};

const EMP = new URLSearchParams(location.search).get('emp') || '';
const TODAY = new Date().toISOString().split('T')[0];

let _u = null;
let _canEdit = false;
let _prodotti = [];
let _periodi = {};  // prodotto_id → []
let _activeProdId = null;  // for period modal
let _importRows = [];       // pending import

// ── INIT ────────────────────────────────────────────────────────────────────
function init(){
  _u = JSON.parse(localStorage.getItem('m361_user')||'null');
  if(!_u){ window.location.href='/login.html'; return; }

  if(!EMPORI_MAP[EMP]){ history.back(); return; }

  const info = EMPORI_MAP[EMP];
  document.getElementById('emp-logo').src = `/assets/images/${info.img}`;
  document.getElementById('emp-name').textContent = info.label;
  document.title = `M361 — Saldi ${info.label}`;

  const isGlobal = _u.is_full_admin || _u.ruolo === 'admin';
  const isOwnEmp = _u.is_resp_emporio && (_u.emporio||'').toLowerCase().replace(/\s+/g,'') === EMP;
  _canEdit = isGlobal || isOwnEmp;

  if(_canEdit){
    document.getElementById('toolbar').style.display = '';
    document.getElementById('th-del').style.display = '';
  }

  loadData();
}

// ── DATA ────────────────────────────────────────────────────────────────────
async function loadData(){
  const {data:prods} = await db.from('saldi_prodotti').select('*').eq('emporio',EMP).order('nome_prodotto');
  _prodotti = prods || [];

  _periodi = {};
  if(_prodotti.length){
    const ids = _prodotti.map(p=>p.id);
    const {data:prs} = await db.from('saldi_periodi').select('*').in('prodotto_id',ids).order('data_inizio');
    for(const p of prs||[]){
      if(!_periodi[p.prodotto_id]) _periodi[p.prodotto_id] = [];
      _periodi[p.prodotto_id].push(p);
    }
  }
  renderTable();
}

// ── RENDER TABLE ─────────────────────────────────────────────────────────────
function getActivePeriod(prodId){
  return (_periodi[prodId]||[]).find(p => p.data_inizio<=TODAY && p.data_fine>=TODAY) || null;
}

function fmtEur(v){ return '€ '+parseFloat(v).toFixed(2).replace('.',',') }
function fmtDate(d){ if(!d) return ''; const [y,m,g]=d.split('-'); return `${g}/${m}/${y}` }

function renderTable(){
  const tbody = document.getElementById('tbl-body');
  if(!_prodotti.length){
    tbody.innerHTML = `<tr><td colspan="8" class="empty"><i class="fas fa-tags"></i><p>Nessun prodotto</p><small>Importa un file CSV o XLSX per iniziare</small></td></tr>`;
    return;
  }

  let html = '';
  for(const p of _prodotti){
    const ap = getActivePeriod(p.id);
    const nPeriodi = (_periodi[p.id]||[]).length;
    let scontoBadge = '<span style="color:var(--s300)">—</span>';
    let saldoTxt = '<span style="color:var(--s300)">—</span>';

    if(ap){
      const pct = parseFloat(ap.sconto_pct);
      const saldo = parseFloat(p.prezzo) * (1 - pct/100);
      scontoBadge = `<span class="badge badge-green">${pct.toFixed(pct%1?1:0)}%</span>
        <div style="font-size:10px;color:var(--s400);margin-top:3px">${fmtDate(ap.data_inizio)} → ${fmtDate(ap.data_fine)}</div>`;
      saldoTxt = `<strong style="color:var(--green)">${fmtEur(saldo)}</strong>`;
    }

    const perLabel = nPeriodi
      ? `<span style="font-size:11px;font-weight:700;color:var(--blue-tx)">${nPeriodi} period${nPeriodi===1?'o':'i'}</span>`
      : `<span style="color:var(--s300);font-size:12px">nessuno</span>`;

    const delBtn = _canEdit
      ? `<button class="icon-btn del" onclick="deleteProd(${p.id})" title="Elimina prodotto"><i class="fas fa-trash"></i></button>`
      : '';

    html += `<tr>
      <td class="td-codice">${escH(p.codice||'—')}</td>
      <td class="td-nome">${escH(p.nome_prodotto)}</td>
      <td class="td-num">${p.qta}</td>
      <td class="td-num">${fmtEur(p.prezzo)}</td>
      <td class="td-pct">${scontoBadge}</td>
      <td class="td-saldo">${saldoTxt}</td>
      <td class="td-azioni">
        <button class="icon-btn cal" onclick="openPeriodi(${p.id})" title="Gestisci periodi">
          <i class="fas fa-calendar-days"></i>
        </button>
        ${perLabel}
      </td>
      <td class="td-azioni">${delBtn}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ── DELETE PRODUCT ───────────────────────────────────────────────────────────
async function deleteProd(id){
  if(!confirm('Eliminare questo prodotto e tutti i suoi periodi di sconto?')) return;
  await db.from('saldi_prodotti').delete().eq('id',id);
  await loadData();
}

// ── PULISCI TUTTO ────────────────────────────────────────────────────────────
async function pulisciTutto(){
  if(!confirm(`Eliminare TUTTI i prodotti di ${EMPORI_MAP[EMP]?.label} e i relativi periodi?\nQuesta operazione non è reversibile.`)) return;
  const ids = _prodotti.map(p=>p.id);
  if(ids.length){
    await db.from('saldi_periodi').delete().in('prodotto_id',ids);
    await db.from('saldi_prodotti').delete().eq('emporio',EMP);
  }
  await loadData();
}

// ── PERIOD MODAL ─────────────────────────────────────────────────────────────
function openPeriodi(prodId){
  _activeProdId = prodId;
  const prod = _prodotti.find(p=>p.id===prodId);
  document.getElementById('m-nome-sub').textContent = `${prod.nome_prodotto} · ${fmtEur(prod.prezzo)}`;

  if(_canEdit) document.getElementById('m-add-form').style.display = '';
  else document.getElementById('m-add-form').style.display = 'none';

  renderPeriodi();
  document.getElementById('modal-periodi').classList.add('show');
}

function closePeriodi(){
  document.getElementById('modal-periodi').classList.remove('show');
  _activeProdId = null;
}

function renderPeriodi(){
  const list = document.getElementById('m-periodi-list');
  const prs = [...(_periodi[_activeProdId]||[])].sort((a,b)=>a.data_inizio.localeCompare(b.data_inizio));
  const prod = _prodotti.find(p=>p.id===_activeProdId);

  if(!prs.length){
    list.innerHTML = `<div style="text-align:center;padding:20px;color:var(--s400);font-size:14px"><i class="fas fa-calendar-xmark" style="font-size:24px;display:block;margin-bottom:8px"></i>Nessun periodo definito</div>`;
    return;
  }

  let html = '';
  for(const per of prs){
    const isActive = per.data_inizio<=TODAY && per.data_fine>=TODAY;
    const isFuture = per.data_inizio > TODAY;
    const isPast   = per.data_fine   < TODAY;

    const badgeCls = isActive ? 'badge-green' : isFuture ? 'badge-blue' : 'badge-grey';
    const badgeLbl = isActive ? 'Attivo'       : isFuture ? 'Futuro'      : 'Scaduto';

    const pct   = parseFloat(per.sconto_pct);
    const saldo = parseFloat(prod.prezzo) * (1 - pct/100);

    const delBtn = _canEdit
      ? `<button class="icon-btn del" onclick="deletePeriodo(${per.id})" title="Elimina periodo"><i class="fas fa-trash"></i></button>`
      : '';

    html += `<div class="per-row">
      <div class="per-info">
        <div class="per-date">
          <span class="badge ${badgeCls}">${badgeLbl}</span>
          &nbsp; ${fmtDate(per.data_inizio)} → ${fmtDate(per.data_fine)}
        </div>
        <div class="per-vals">
          Sconto: <strong>${pct.toFixed(pct%1?1:0)}%</strong> &nbsp;·&nbsp;
          Saldo: <strong style="color:var(--green)">${fmtEur(saldo)}</strong>
        </div>
      </div>
      ${delBtn}
    </div>`;
  }
  list.innerHTML = html;
}

async function addPeriodo(){
  const dal = document.getElementById('m-dal').value;
  const al  = document.getElementById('m-al').value;
  const pct = parseFloat(document.getElementById('m-pct').value);

  if(!dal||!al||!pct||pct<=0||pct>100){ alert('Compila tutti i campi correttamente (sconto tra 1 e 100%).'); return; }
  if(al<dal){ alert('La data di fine deve essere successiva alla data di inizio.'); return; }

  const {error} = await db.from('saldi_periodi').insert({
    prodotto_id: _activeProdId,
    data_inizio: dal,
    data_fine:   al,
    sconto_pct:  pct,
  });

  if(error){ alert('Errore: '+error.message); return; }

  // reload periodi for this product
  const {data:prs} = await db.from('saldi_periodi').select('*').eq('prodotto_id',_activeProdId).order('data_inizio');
  _periodi[_activeProdId] = prs || [];

  // reset form
  ['m-dal','m-al','m-pct'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('m-saldo-preview').style.display='none';

  renderPeriodi();
  renderTable();
}

async function deletePeriodo(id){
  if(!confirm('Eliminare questo periodo di sconto?')) return;
  await db.from('saldi_periodi').delete().eq('id',id);
  const {data:prs} = await db.from('saldi_periodi').select('*').eq('prodotto_id',_activeProdId).order('data_inizio');
  _periodi[_activeProdId] = prs || [];
  renderPeriodi();
  renderTable();
}

// Calcola anteprima saldo mentre si inserisce il %
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('m-pct')?.addEventListener('input', function(){
    const prod = _prodotti.find(p=>p.id===_activeProdId);
    const pct = parseFloat(this.value);
    const preview = document.getElementById('m-saldo-preview');
    if(prod && pct>0 && pct<100){
      const saldo = parseFloat(prod.prezzo)*(1-pct/100);
      preview.textContent = `→ Saldo: ${fmtEur(saldo)}`;
      preview.style.display = 'flex';
    } else {
      preview.style.display = 'none';
    }
  });
});

// ── FILE IMPORT ──────────────────────────────────────────────────────────────

function stripBom(s){ return typeof s==='string' ? s.replace(/^﻿/,'') : s; }

function normalizeHdr(h){
  return stripBom((h||'').toString()).toLowerCase().replace(/\s+/g,' ').trim();
}

function detectColumns(headers){
  const hl = headers.map(normalizeHdr);
  const find = (...keys) => {
    for(const k of keys){ const i=hl.findIndex(h=>h===k);          if(i!==-1)return i; }
    for(const k of keys){ const i=hl.findIndex(h=>h.startsWith(k)); if(i!==-1)return i; }
    for(const k of keys){ const i=hl.findIndex(h=>h.includes(k));   if(i!==-1)return i; }
    return -1;
  };
  return {
    codice: find('codice','cod','sku','art','articolo','riferimento','ref','item code','cod.art'),
    nome:   find('descrizione','nome prodotto','nome','prodotto','desc','articolo','denominazione','titolo','item'),
    qta:    find('quantita','quantità','qta','qty','pezzi','pz','disponibilita','disponib','quantit'),
    prezzo: find('prezzo','price','pvp','pvl','listino','costo','importo','prezzo vendita'),
  };
}

function parseNum(v){
  if(v===undefined||v===null||v==='') return 0;
  let s = String(v).trim().replace(/\s/g,'');
  if(s.includes('.')&&s.includes(',')) s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(','))             s=s.replace(',','.');
  s=s.replace(/[^\d.-]/g,'');
  return parseFloat(s)||0;
}

function rowsFromSheet(ws){
  const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!json.length) return {headers:[],rows:[]};
  let hdrIdx=0;
  for(let i=0;i<Math.min(json.length,8);i++){
    if(json[i].filter(c=>String(c).trim()!=='').length>=2){hdrIdx=i;break;}
  }
  return {
    headers: json[hdrIdx].map(h=>String(h)),
    rows:    json.slice(hdrIdx+1).filter(r=>r.some(c=>String(c).trim()!=='')),
  };
}

function parseCSV(text){
  const clean=stripBom(text);
  const lines=clean.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return {headers:[],rows:[]};
  const f=lines[0];
  const sep=f.includes(';')?';':f.includes('\t')?'\t':',';
  const split=l=>l.split(sep).map(c=>c.replace(/^["'\s]+|["'\s]+$/g,''));
  return {headers:split(lines[0]),rows:lines.slice(1).map(split).filter(r=>r.some(c=>c!==''))};
}

function onFileSelected(input){
  const file=input.files[0];
  if(!file)return;
  input.value='';

  const ext=file.name.toLowerCase().split('.').pop();
  const isCsv=ext==='csv';
  const reader=new FileReader();

  reader.onerror=()=>alert('Errore nella lettura del file. Riprova o usa un formato diverso.');

  reader.onload=(e)=>{
    try{
      let headers,rows;
      if(isCsv){
        ({headers,rows}=parseCSV(e.target.result||''));
      } else {
        if(typeof XLSX==='undefined') throw new Error('Libreria XLSX non caricata. Ricarica la pagina.');
        const wb=XLSX.read(e.target.result,{type:'array'});
        if(!wb.SheetNames.length) throw new Error('Il file non contiene fogli.');
        ({headers,rows}=rowsFromSheet(wb.Sheets[wb.SheetNames[0]]));
      }

      if(!headers.length) throw new Error('Nessuna intestazione trovata nel file.');

      const cols=detectColumns(headers);
      if(cols.nome===-1){
        alert(
          'Colonna "Descrizione / Nome" non trovata.\n\n'+
          'Intestazioni rilevate:\n'+headers.map((h,i)=>'  ['+i+'] "'+h+'"').join('\n')+
          '\n\nAssicurati che una colonna si chiami "descrizione", "nome" o "prodotto".'
        );
        return;
      }

      _importRows=rows.map(r=>({
        codice:        cols.codice!==-1?String(r[cols.codice]??'').trim():'',
        nome_prodotto: String(r[cols.nome]??'').trim(),
        qta:           cols.qta!==-1?Math.max(0,Math.round(parseNum(r[cols.qta]))):0,
        prezzo:        cols.prezzo!==-1?parseNum(r[cols.prezzo]):0,
      })).filter(r=>r.nome_prodotto);

      if(!_importRows.length){
        alert('Nessuna riga valida trovata.\nControlla che il file non sia vuoto e che la colonna "descrizione" contenga dati.');
        return;
      }

      document.getElementById('imp-body').innerHTML=_importRows.slice(0,50).map(r=>
        '<tr><td>'+escH(r.codice||'—')+'</td><td>'+escH(r.nome_prodotto)+'</td>'+
        '<td style="text-align:right">'+r.qta+'</td>'+
        '<td style="text-align:right">'+fmtEur(r.prezzo)+'</td></tr>'
      ).join('');

      document.getElementById('imp-sub').textContent=_importRows.length+' prodotti trovati';
      document.getElementById('imp-warn').textContent=
        'I prodotti saranno aggiunti a quelli già presenti. I periodi di sconto non verranno modificati.';
      document.getElementById('modal-import').classList.add('show');

    }catch(err){
      alert('Errore elaborazione file:\n'+err.message);
    }
  };

  if(isCsv) reader.readAsText(file,'UTF-8');
  else       reader.readAsArrayBuffer(file);
}

async function confirmImport(){
  if(!_importRows.length)return;
  closeImport();
  const rows=_importRows.map(r=>({...r,emporio:EMP}));
  let errMsg=null;
  for(let i=0;i<rows.length;i+=500){
    const {error}=await db.from('saldi_prodotti').insert(rows.slice(i,i+500));
    if(error){errMsg=error.message;break;}
  }
  if(errMsg){alert('Errore durante l\'importazione:\n'+errMsg);return;}
  _importRows=[];
  await loadData();
}

function closeImport(){
  document.getElementById('modal-import').classList.remove('show');
  _importRows=[];
}

// close modals on overlay click
document.getElementById('modal-periodi').addEventListener('click',function(e){ if(e.target===this) closePeriodi(); });
document.getElementById('modal-import').addEventListener('click',function(e){ if(e.target===this) closeImport(); });

init();
</script>
