<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1A1A1A;padding-bottom:100px}
.mono{font-family:'DM Mono',monospace}
.main{max-width:1400px;margin:0 auto;padding:20px 12px}
.sec-t{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:#94a3b8;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-t::before{content:'';width:3px;height:16px;background:#B5453A;border-radius:2px}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.emp-card{background:#fff;border-radius:20px;border:1px solid #f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .15s;text-align:center}
.emp-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(181,69,58,.14)}
.emp-card img{width:72px;height:72px;border-radius:50%;object-fit:contain;padding:6px}
.emp-card .name{font-weight:700;font-size:15px;color:#334155}
.btn-p{background:#B5453A;color:#fff;border:none;border-radius:11px;padding:10px 18px;font-weight:800;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-p:hover{background:#8c362d}
.btn-s{background:#fff;color:#64748b;border:1.5px solid #e2e8f0;border-radius:11px;padding:10px 16px;font-weight:800;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-s:hover{border-color:#94a3b8;background:#f8fafc}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:20px}
.f-grp{display:flex;flex-direction:column;gap:4px}
.f-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8}
.f-sel{border:1px solid #e2e8f0;border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;color:#334155;background:#fff;min-width:140px}
.f-sel:focus{outline:none;border-color:#B5453A}
.view-tabs{display:flex;gap:4px;background:#fff;padding:4px;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:16px}
.v-tab{flex:1;padding:8px;border-radius:9px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:none;background:transparent;color:#94a3b8;transition:all .12s;text-align:center}
.v-tab.on{background:#1e293b;color:#fff}
.month-bar{display:flex;gap:3px;flex-wrap:wrap;background:#fff;padding:4px;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:16px}
.m-btn{padding:6px 10px;border-radius:8px;font-size:9px;font-weight:800;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:#94a3b8;transition:all .12s;flex:1;text-align:center;min-width:44px}
.m-btn.on{background:#B5453A;color:#fff}
.m-btn:hover:not(.on){background:#f1f5f9;color:#475569}
.cal-table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
.cal-table thead th{padding:7px 6px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8;background:#f8fafc;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:5;white-space:nowrap;text-align:left}
.cal-table tbody td{padding:6px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.cal-table tbody tr:hover{background:#fefce8}
.cal-table tbody tr.festivo{background:#fff8f8}
.cal-table tbody tr.festivo td:first-child{color:#B5453A;font-weight:900}
.date-cell{white-space:nowrap;font-weight:800;color:#1e293b;min-width:80px}
.date-cell .dn{font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase}
.op-list{display:flex;flex-direction:column;gap:3px;min-width:120px}
.op-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;max-width:fit-content;white-space:nowrap}
.op-chip .rm{font-size:9px;color:#cbd5e1;cursor:pointer;margin-left:2px}
.op-chip .rm:hover{color:#ef4444}
.c-dip{background:#fce4ec;color:#7f1d1d}
.c-vol{background:#e8f5e9;color:#1b5e20}
.c-scu{background:#e3f2fd;color:#0d47a1}
.op-add{font-size:10px;color:#94a3b8;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:2px 6px;border-radius:6px;transition:color .12s}
.op-add:hover{color:#B5453A}
.st-btn{font-size:8px;font-weight:900;text-transform:uppercase;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid;transition:all .12s}
.st-open{background:#dcfce7;color:#166534;border-color:#86efac}
.st-closed{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.ass-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:3px;cursor:pointer;white-space:nowrap}
.ass-ferie{background:#dbeafe;color:#1e40af}
.ass-malattia{background:#fef9c3;color:#854d0e}
.ass-permesso{background:#fce7f3;color:#9d174d}
.note-cell{min-width:80px}
.note-cell textarea{width:100%;min-height:28px;border:1px solid transparent;border-radius:6px;padding:3px 6px;font-size:11px;font-family:inherit;resize:vertical;background:transparent;transition:border .15s}
.note-cell textarea:focus{border-color:#B5453A;background:#fff;outline:none}
.ore-inp{width:48px;border:1px solid #e2e8f0;border-radius:6px;padding:2px 4px;font-size:11px;font-family:'DM Mono',monospace;text-align:center;font-weight:700}
.ore-inp:focus{border-color:#B5453A;outline:none}
.hrs-table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.hrs-table th{padding:8px 10px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#fff;background:#1e293b;white-space:nowrap;text-align:center}
.hrs-table th:first-child{text-align:left;border-radius:12px 0 0 0}
.hrs-table th:last-child{border-radius:0 12px 0 0}
.hrs-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;text-align:center;font-family:'DM Mono',monospace;font-weight:700}
.hrs-table td:first-child{text-align:left;font-family:inherit;font-weight:800;color:#334155}
.hrs-table tbody tr:hover{background:#f8fafc}
.hrs-table tfoot td{background:#B5453A;color:#fff;font-weight:900}
.hrs-table tfoot td:first-child{border-radius:0 0 0 12px}
.hrs-table tfoot td:last-child{border-radius:0 0 12px 0}
.yr-table{width:100%;border-collapse:collapse;font-size:11px;min-width:900px}
.yr-table th{padding:6px 8px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:#fff;background:#1e293b;white-space:nowrap;text-align:center}
.yr-table th:first-child{text-align:left}
.yr-table td{padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center;font-family:'DM Mono',monospace;font-weight:600;font-size:12px}
.yr-table td:first-child{text-align:left;font-family:inherit;font-weight:800;color:#334155;font-size:11px}
.yr-table tbody tr:hover{background:#fefce8}
.yr-table tfoot td{background:#f8fafc;font-weight:900;border-top:2px solid #e2e8f0;color:#B5453A}
.card-r{background:#fff;border-radius:18px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:12px}
.modal-bg.show{display:flex}
.modal-box{background:#fff;border-radius:18px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;padding:20px}
.modal-box h3{font-size:16px;font-weight:900;color:#1e293b;margin-bottom:12px}
.store-hrs{background:#f8fafc;border-radius:12px;padding:12px;margin-bottom:16px;border:1px solid #e2e8f0}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:12px;font-size:12px;font-weight:700;z-index:99999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#166534}
.toast.err{background:#991b1b}
@media(max-width:768px){
  .main{padding:12px 8px}
  .cal-table{font-size:11px}
  .op-chip{font-size:10px;padding:2px 6px}
  .filters{gap:6px}
  .f-sel{min-width:100px;font-size:12px;padding:8px}
  .month-bar{gap:2px;padding:3px}
  .m-btn{padding:5px 4px;font-size:8px;min-width:38px}
}

/* ── MODIFICA 2: Font aumentato nei turni ───────────────────────────── */
.turni-container,.turni-container *{font-size:15px}
.data-turno,.turno-data-label{font-size:20px!important;font-weight:800!important;color:#1e293b!important;letter-spacing:.02em}
.turno-fascia-label{font-size:17px!important;font-weight:700!important;text-transform:uppercase;letter-spacing:.05em}
.turno-negozio-label{font-size:15px!important;font-weight:600!important}
.turno-operatore-nome{font-size:15px!important}
.btn-aggiungi-op-turno{font-size:14px!important}
input[type="time"]{font-size:15px!important}

/* ── MODIFICA 3: Layout card giornaliero ────────────────────────────── */
.giorno-turno{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:16px;overflow:hidden}
.giorno-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#1e293b;color:#fff;gap:12px}
.giorno-azioni{display:flex;gap:6px;flex-shrink:0}
.fascia-turno{padding:16px 20px;border-top:1px solid #f1f5f9}
.fascia-header{margin-bottom:12px}
.turno-sezione{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:10px}
.negozio-stato{display:flex;gap:20px;margin-bottom:10px;flex-wrap:wrap}
.radio-stato{display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600}
.radio-label.aperto{color:#16A34A}
.radio-label.chiuso{color:#B5453A}
.negozio-orari{display:flex;gap:16px;flex-wrap:wrap}
.negozio-orari.nascosto{display:none!important}
.orario-campo{display:flex;flex-direction:column;gap:4px}
.orario-campo label{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.orario-campo input[type="time"]{padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:16px;font-weight:600;color:#1e293b;width:120px}
.operatori-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:8px}
.chip-operatore{display:inline-flex;align-items:center;gap:6px;background:#1e293b;color:#fff;padding:5px 10px;border-radius:20px;font-size:13px;font-weight:600}
.chip-operatore .chip-remove{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:16px;padding:0;line-height:1;min-height:auto;display:inline-flex;align-items:center}
.chip-operatore .chip-remove:hover{color:#fff}
.btn-aggiungi-op-turno{background:#f1f5f9;border:1px dashed #94a3b8;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;min-height:auto;transition:all .12s}
.btn-aggiungi-op-turno:hover{background:#B5453A;color:#fff;border-color:#B5453A}

/* ── MODIFICA 4: Tab operatori predefiniti ──────────────────────────── */
.operatori-turni-section{padding:4px 0}
.card-turno-operatore{background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:10px;overflow:hidden}
.card-op-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .12s}
.card-op-header:hover{background:#f8fafc}
.op-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.op-avatar-small{width:32px;height:32px;border-radius:50%;background:#1e293b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.op-nome-turno{font-size:14px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-emporio-badge{font-size:10px;font-weight:700;background:#f1f5f9;color:#64748b;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.riepilogo-turno-default{font-size:11px;color:#94a3b8;flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.freccia-op{font-size:11px;color:#94a3b8;flex-shrink:0}
.card-op-corpo{padding:16px;border-top:1px solid #f1f5f9}
.turni-default-griglia{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.riga-giorno-default{display:grid;grid-template-columns:100px 1fr 1fr 1fr;align-items:center;gap:8px;padding:8px 12px;background:#f8fafc;border-radius:6px;font-size:14px}
.giorno-label{font-weight:700;color:#1e293b}
.check-fascia{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px}
.check-fascia input{width:18px;height:18px;min-height:18px;accent-color:#B5453A}
@media(max-width:600px){
  .riga-giorno-default{grid-template-columns:62px 1fr 1fr 1fr;font-size:12px;padding:6px 8px}
  .giorno-header{padding:12px 14px}
  .fascia-turno{padding:12px 14px}
  .negozio-orari{gap:10px}
  .orario-campo input[type="time"]{width:100%}
}
</style>
</head>

<div class="main" id="app">

  <div id="step-emp">
    <div class="sec-t">Seleziona Emporio</div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>

  <div id="step-turni" class="hidden">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <button class="btn-s" onclick="backToEmp()"><i class="fas fa-arrow-left"></i></button>
      <h2 style="font-size:18px;font-weight:900;color:#1e293b" id="emp-title"></h2>
    </div>
    <div class="store-hrs" id="store-hrs-display"></div>
    <div class="view-tabs">
      <button class="v-tab on" data-view="mese" onclick="setView('mese')"><i class="fas fa-table"></i> Mensile</button>
      <button class="v-tab" data-view="ore" onclick="setView('ore')"><i class="fas fa-clock"></i> Ore</button>
      <button class="v-tab" data-view="anno" onclick="setView('anno')"><i class="fas fa-calendar"></i> Annuale</button>
      <button class="v-tab" data-view="giornaliero" onclick="setView('giornaliero')"><i class="fas fa-calendar-day"></i> Giorni</button>
      <button class="v-tab" data-view="operatori" onclick="setView('operatori')"><i class="fas fa-users"></i> Operatori</button>
    </div>
    <div class="month-bar" id="month-bar-top"></div>
    <div class="filters">
      <div class="f-grp">
        <span class="f-lbl">Anno</span>
        <select class="f-sel" id="filter-anno" onchange="reload()">
          <option value="2025">2025</option>
          <option value="2026" selected>2026</option>
          <option value="2027">2027</option>
        </select>
      </div>
      <a href="orari_emporio.html" class="btn-s" style="text-decoration:none"><i class="fas fa-calendar-alt"></i> Gestione Orari</a>
      <button class="btn-s" onclick="showOperatorsModal()"><i class="fas fa-users"></i> Operatori</button>
    </div>
    <div id="view-content"></div>
    <div class="month-bar" id="month-bar-bottom" style="margin-top:16px"></div>
  </div>
</div>

<!-- MODAL: Add Operator -->
<div class="modal-bg" id="modal-add" onclick="if(event.target===this)closeModal('modal-add')">
  <div class="modal-box">
    <h3 id="modal-add-title">Aggiungi Operatore</h3>
    <div id="modal-add-list"></div>
    <button onclick="closeModal('modal-add')" class="btn-s" style="margin-top:12px;width:100%;justify-content:center">Chiudi</button>
  </div>
</div>

<!-- MODAL: Assenza -->
<div class="modal-bg" id="modal-ass" onclick="if(event.target===this)closeModal('modal-ass')">
  <div class="modal-box">
    <h3>Segna Assenza</h3>
    <div id="modal-ass-list"></div>
    <button onclick="closeModal('modal-ass')" class="btn-s" style="margin-top:12px;width:100%;justify-content:center">Chiudi</button>
  </div>
</div>

<!-- MODAL: Copia Giorno -->
<div class="modal-bg" id="modal-copia" onclick="if(event.target===this)closeModal('modal-copia')">
  <div class="modal-box">
    <h3>Copia Turno</h3>
    <input type="hidden" id="modal-copia-src">
    <div id="modal-copia-content"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button onclick="eseguiCopiaGiorno()" class="btn-p" style="flex:1;justify-content:center"><i class="fas fa-copy"></i> Copia</button>
      <button onclick="closeModal('modal-copia')" class="btn-s" style="flex:1;justify-content:center">Annulla</button>
    </div>
  </div>
</div>

async function reload() {

  renderMonthBars();
  await loadData();
  render();
}

async function loadData() {
  if (!db) { showToast('DB non disponibile','err'); return; }
  turniData = {}; assenzeData = {}; noteData = {};
  try {
    const { data, error } = await db.from('turni').select('*')
      .eq('emporio', currentEmporio)
      .eq('anno', currentAnno)
      .eq('mese', currentMese + 1);
    if (error) { showToast('Errore caricamento: ' + error.message,'err'); return; }
    (data||[]).forEach(r => {
      const key = `${r.emporio}|${r.anno}|${r.mese}|${r.giorno}|${r.turno}`;
      turniData[key] = {aperto: r.aperto, operatori: r.operatori||[]};
      const dayKey = `${r.emporio}|${r.anno}|${r.mese}|${r.giorno}`;
      if (r.assenze) Object.assign(assenzeData, r.assenze);
      if (r.note) noteData[dayKey] = r.note;
    });
  } catch(e) { showToast('Errore: '+e.message,'err'); }
  try {
    const { data } = await db.from('turni_orari').select('orari').eq('emporio', currentEmporio).maybeSingle();
    storeHoursData = data?.orari ? {...DEFAULTHOURS,...data.orari} : {...DEFAULTHOURS};
  } catch(e) { storeHoursData = {...DEFAULTHOURS}; }
}

async function saveTurno(key, turnoObj) {
  if (!db) { showToast('DB non connesso','err'); return; }
  const parts = key.split('|');
  const emporio=parts[0], anno=parseInt(parts[1]), mese=parseInt(parts[2]),
        giorno=parseInt(parts[3]), turno=parts[4];
  const dayKey = `${emporio}|${anno}|${mese}|${giorno}`;
  const dayAssenze = Object.fromEntries(Object.entries(assenzeData).filter(([k])=>k.startsWith(dayKey+'|')));
  const dayNote = noteData[dayKey] ?? null;
  try {
    const payload = {
      emporio, anno, mese, giorno, turno,
      aperto: turnoObj.aperto,
      operatori: turnoObj.operatori,
      assenze: dayAssenze,
      note: dayNote
    };
    console.log('[saveTurno] payload:', JSON.stringify(payload));
    const { data, error } = await db.from('turni').upsert(payload, {onConflict:'emporio,anno,mese,giorno,turno'}).select();
    if (error) {
      console.error('[saveTurno] ERROR:', JSON.stringify(error));
      showToast('Errore: '+error.message,'err');
    } else {
      console.log('[saveTurno] OK:', data);
      showToast('Salvato ✓','ok');
    }
  } catch(e) { console.error('[saveTurno] EXCEPTION:', e); showToast('Errore: '+e.message,'err'); }
}

      </div>
      <div style="background:#fff;border-radius:8px;padding:8px 12px;border:1px solid #f1f5f9">

        <div style="font-size:15px;font-weight:900;color:#1e293b;font-family:'DM Mono',monospace">${h.pom_open||'15:00'} – ${h.pom_close||'19:00'}</div>
      </div>
    </div>`;
}

function calcShiftHours(shift) {
  const h = storeHoursData;
  const times = shift==='mattina' ? [h.mat_open||'09:15',h.mat_close||'13:00'] : [h.pom_open||'15:00',h.pom_close||'19:00'];
  const [h1,m1]=times[0].split(':').map(Number);
  const [h2,m2]=times[1].split(':').map(Number);
  // Il dipendente inizia 15 minuti prima dell'apertura
  return (h2*60+m2-(h1*60+m1-15))/60;
}

// ── RENDER MESE ────────────────────────────────────────────────────────────
function renderMonth() {
  const days = new Date(currentAnno, currentMese+1, 0).getDate();
  let rows = [];
  for (let d=1; d<=days; d++) {
    const dow = new Date(currentAnno, currentMese, d).getDay();
    const isSun = dow===0;
    const mk = `${currentEmporio}|${currentAnno}|${currentMese+1}|${d}|mattina`;
    const pk = `${currentEmporio}|${currentAnno}|${currentMese+1}|${d}|pomeriggio`;
    const mD = turniData[mk] || {aperto:!isSun, operatori:[]};
    const pD = turniData[pk] || {aperto:!isSun, operatori:[]};
    const dayKey = `${currentEmporio}|${currentAnno}|${currentMese+1}|${d}`;
    const dayAssenze = Object.entries(assenzeData).filter(([k])=>k.startsWith(dayKey+'|')).map(([k,v])=>({nome:k.split('|').slice(4).join('|'),tipo:v}));
    const note = noteData[dayKey]||'';

    const renderOps = (key, td) => {
      if (!td.aperto) return '';
      return (td.operatori||[]).map((o,i)=>`
        <span class="op-chip ${o.ruolo==='dipendente'?'c-dip':o.ruolo==='serviziocivile'?'c-scu':'c-vol'}">
          ${o.nome.split(' ')[0]}
          ${o.oremanuali!=null?`<input class="ore-inp" value="${o.oremanuali}" onchange="setOre('${key}',${i},this.value)" onclick="event.stopPropagation()" title="Ore manuali">`:''}
          <i class="fas fa-times rm" onclick="removeOp('${key}',${i})"></i>
        </span>`).join('')
        +`<span class="op-add" onclick="openAddModal('${key}','${td===mD?'Mattina':'Pomeriggio'} ${d} ${MESISHORT[currentMese]}')"><i class="fas fa-plus"></i> Aggiungi</span>`;
    };

    rows.push(`
      <tr class="${isSun?'festivo':''}">
        <td class="date-cell"><span class="dn">${GIORNI[dow]}</span><span style="font-size:16px;margin-left:6px">${d}</span></td>
        <td><span class="st-btn ${mD.aperto?'st-open':'st-closed'}" onclick="toggleShift('${mk}')">${mD.aperto?'APERTO':'CHIUSO'}</span></td>
        <td><div class="op-list">${renderOps(mk,mD)}</div></td>
        <td><span class="st-btn ${pD.aperto?'st-open':'st-closed'}" onclick="toggleShift('${pk}')">${pD.aperto?'APERTO':'CHIUSO'}</span></td>
        <td><div class="op-list">${renderOps(pk,pD)}</div></td>
        <td>
          <div style="display:flex;flex-direction:column;gap:2px">
            ${dayAssenze.map(a=>`<span class="ass-badge ass-${a.tipo}" onclick="removeAssenza('${dayKey}','${a.nome}','${a.tipo}')">${a.tipo.charAt(0).toUpperCase()+a.tipo.slice(1)} – ${a.nome.split(' ')[0]} <i class="fas fa-times" style="font-size:8px"></i></span>`).join('')}
            <span class="op-add" onclick="openAssenzaModal('${dayKey}')"><i class="fas fa-plus"></i> Assenza</span>
          </div>
        </td>
        <td class="note-cell"><textarea placeholder="..." onblur="saveNote('${dayKey}',this.value)">${note}</textarea></td>
      </tr>`);
  }
  return `<div class="card-r"><div class="tscroll"><table class="cal-table">
    <thead><tr><th>Data</th><th>Mat.</th><th>Mattina Operatori</th><th>Pom.</th><th>Pomeriggio Operatori</th><th>Assenze</th><th>Note</th></tr></thead>
    <tbody>${rows.join('')}</tbody></table></div></div>`;
}

// ── RENDER ORE MESE ────────────────────────────────────────────────────────
function renderHours() {
  const pers = PERSONALE[currentEmporio]||[];
  const days = new Date(currentAnno, currentMese+1, 0).getDate();
  const matH = calcShiftHours('mattina'), pomH = calcShiftHours('pomeriggio');
  const stats = pers.map(p => {
    let oreLavoro=0,oreFerie=0,oreMalattia=0,orePermesso=0,oreSCU=0;
    for(let d=1;d<=days;d++){
      const mk=`${currentEmporio}|${currentAnno}|${currentMese+1}|${d}|mattina`;
      const pk=`${currentEmporio}|${currentAnno}|${currentMese+1}|${d}|pomeriggio`;
      const dayKey=`${currentEmporio}|${currentAnno}|${currentMese+1}|${d}`;
      const assKey=`${dayKey}|${p.nome}`;
      if(assenzeData[assKey]){
        const tipo=assenzeData[assKey];
        if(tipo==='ferie') oreFerie+=matH+pomH;
        else if(tipo==='malattia') oreMalattia+=matH+pomH;
        else if(tipo==='permesso') orePermesso+=matH+pomH;
        continue;
      }
      const mD=turniData[mk]; const pD=turniData[pk];
      const inMat=mD?.aperto&&mD.operatori.find(o=>o.nome===p.nome);
      const inPom=pD?.aperto&&pD.operatori.find(o=>o.nome===p.nome);
      if(inMat) oreLavoro+=inMat.oremanuali!=null?parseFloat(inMat.oremanuali):matH;
      if(inPom) oreLavoro+=inPom.oremanuali!=null?parseFloat(inPom.oremanuali):pomH;
      if(p.ruolo==='serviziocivile'){
        if(inMat) oreSCU+=inMat.oremanuali!=null?parseFloat(inMat.oremanuali):matH;
        if(inPom) oreSCU+=inPom.oremanuali!=null?parseFloat(inPom.oremanuali):pomH;
      }
    }
    return {nome:p.nome,ruolo:p.ruolo,oreLavoro,oreFerie,oreMalattia,orePermesso,oreSCU};
  });
  const fmt=n=>n>0?n.toFixed(1):'–';
  const cc=r=>r==='dipendente'?'c-dip':r==='serviziocivile'?'c-scu':'c-vol';
  const rows=stats.map(s=>`<tr>
    <td><span class="op-chip ${cc(s.ruolo)}" style="font-size:11px">${s.nome}</span></td>
    <td style="font-weight:900;color:#1e293b">${fmt(s.oreLavoro)}</td>
    <td style="color:#1e40af">${fmt(s.oreFerie)}</td>
    <td style="color:#854d0e">${fmt(s.oreMalattia)}</td>
    <td style="color:#9d174d">${fmt(s.orePermesso)}</td>
    <td style="color:#0d47a1">${fmt(s.oreSCU)}</td>
  </tr>`).join('');
  return `<div class="card-r"><div class="tscroll"><table class="hrs-table">
    <thead><tr><th style="text-align:left">Operatore</th><th>Ore Lavoro</th><th>Ferie</th><th>Malattia</th><th>Permessi</th><th>Ore SCU</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td>TOTALE</td><td>${fmt(stats.reduce((s,x)=>s+x.oreLavoro,0))}</td><td>${fmt(stats.reduce((s,x)=>s+x.oreFerie,0))}</td><td>${fmt(stats.reduce((s,x)=>s+x.oreMalattia,0))}</td><td>${fmt(stats.reduce((s,x)=>s+x.orePermesso,0))}</td><td>${fmt(stats.reduce((s,x)=>s+x.oreSCU,0))}</td></tr></tfoot>
  </table></div></div>`;
}

// ── RENDER ANNO ────────────────────────────────────────────────────────────
async function loadYearData() {
  if (!db) return;
  document.getElementById('view-content').innerHTML = `<div style="padding:40px;text-align:center;color:#94a3b8"><i class="fas fa-spinner fa-spin" style="font-size:24px"></i><div style="margin-top:8px;font-size:13px">Caricamento anno ${currentAnno}…</div></div>`;
  yearData={}; yearAssenzeData={}; yearNoteData={};
  try {
    const {data,error} = await db.from('turni').select('*').eq('emporio',currentEmporio).eq('anno',currentAnno);
    if(error){showToast('Errore anno: '+error.message,'err');return;}
    (data||[]).forEach(r=>{
      const key=`${r.emporio}|${r.anno}|${r.mese}|${r.giorno}|${r.turno}`;
      if(!yearData[r.mese]) yearData[r.mese]={};
      yearData[r.mese][key]={aperto:r.aperto,operatori:r.operatori||[]};
      if(r.assenze) Object.assign(yearAssenzeData,r.assenze);
      const dayKey=`${r.emporio}|${r.anno}|${r.mese}|${r.giorno}`;
      if(r.note) yearNoteData[dayKey]=r.note;
    });
  } catch(e){showToast('Errore: '+e.message,'err');return;}
  document.getElementById('view-content').innerHTML = renderYear();
}

function renderYear() {
  const pers=PERSONALE[currentEmporio]||[];
  const matH=calcShiftHours('mattina'), pomH=calcShiftHours('pomeriggio');
  const fmt=n=>n>0?n.toFixed(0):'–';
  const cc=r=>r==='dipendente'?'c-dip':r==='serviziocivile'?'c-scu':'c-vol';
  const statsPerMese=pers.map(p=>{
    const mesiOre=Array(12).fill(0);
    for(let m=1;m<=12;m++){
      const days=new Date(currentAnno,m,0).getDate();
      const mT=yearData[m]||{};
      for(let d=1;d<=days;d++){
        const mk=`${currentEmporio}|${currentAnno}|${m}|${d}|mattina`;
        const pk=`${currentEmporio}|${currentAnno}|${m}|${d}|pomeriggio`;
        const dayKey=`${currentEmporio}|${currentAnno}|${m}|${d}`;
        if(yearAssenzeData[`${dayKey}|${p.nome}`]) continue;
        const mD=mT[mk]; const pD=mT[pk];
        const inMat=mD?.aperto&&mD.operatori.find(o=>o.nome===p.nome);
        const inPom=pD?.aperto&&pD.operatori.find(o=>o.nome===p.nome);
        if(inMat) mesiOre[m-1]+=inMat.oremanuali!=null?parseFloat(inMat.oremanuali):matH;
        if(inPom) mesiOre[m-1]+=inPom.oremanuali!=null?parseFloat(inPom.oremanuali):pomH;
      }
    }
    return {nome:p.nome,ruolo:p.ruolo,mesiOre,totAnno:mesiOre.reduce((a,b)=>a+b,0)};
  });
  const ferieAnno=pers.map(p=>{
    let tot=0;
    for(let m=1;m<=12;m++){
      const days=new Date(currentAnno,m,0).getDate();
      for(let d=1;d<=days;d++){
        const dayKey=`${currentEmporio}|${currentAnno}|${m}|${d}`;
        if(yearAssenzeData[`${dayKey}|${p.nome}`]==='ferie') tot+=matH+pomH;
      }
    }
    return tot;
  });
  const totMesi=Array(12).fill(0).map((_,i)=>statsPerMese.reduce((s,x)=>s+x.mesiOre[i],0));
  const rows=statsPerMese.map((s,idx)=>`<tr>
    <td><span class="op-chip ${cc(s.ruolo)}" style="font-size:10px">${s.nome}</span></td>
    ${s.mesiOre.map(h=>`<td>${fmt(h)}</td>`).join('')}
    <td style="font-weight:900;color:#B5453A">${fmt(s.totAnno)}</td>
    <td style="color:#1e40af;font-weight:800">${fmt(ferieAnno[idx])}</td>
  </tr>`).join('');
  return `<div class="card-r"><div class="tscroll"><table class="yr-table">
    <thead><tr><th style="text-align:left">Operatore</th>${MESISHORT.map(m=>`<th>${m}</th>`).join('')}<th style="background:#B5453A">Tot.</th><th style="background:#1e40af">Ferie</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td>TOTALE</td>${totMesi.map(h=>`<td>${fmt(h)}</td>`).join('')}<td>${fmt(statsPerMese.reduce((s,x)=>s+x.totAnno,0))}</td><td>${fmt(ferieAnno.reduce((a,b)=>a+b,0))}</td></tr></tfoot>
  </table></div></div>`;
}

function render() {
  renderStoreHoursDisplay();
  const vc=document.getElementById('view-content');
  if(currentView==='mese') vc.innerHTML=renderMonth();
  else if(currentView==='ore') vc.innerHTML=renderHours();
  else if(currentView==='giornaliero') vc.innerHTML=renderGiornaliero();
  else if(currentView==='operatori') { vc.innerHTML=renderOperatoriView(); caricaOperatoriEmporio(''); }
  else loadYearData();
}

// ── AZIONI ─────────────────────────────────────────────────────────────────
function toggleShift(key) {
  if(!turniData[key]) turniData[key]={aperto:true,operatori:[]};
  turniData[key].aperto=!turniData[key].aperto;
  saveTurno(key,turniData[key]);
  render();
}

function openAddModal(key,title) {
  document.getElementById('modal-add-title').textContent='Aggiungi a '+title;
  const current=(turniData[key]?.operatori||[]).map(o=>o.nome);
  const available=(PERSONALE[currentEmporio]||[]).filter(p=>!current.includes(p.nome));
  document.getElementById('modal-add-list').innerHTML=available.length
    ?available.map(p=>`
      <div style="padding:8px 12px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
        <span class="op-chip ${p.ruolo==='dipendente'?'c-dip':p.ruolo==='serviziocivile'?'c-scu':'c-vol'}" style="font-size:11px">${p.nome}</span>
        <div style="display:flex;gap:4px">
          <button onclick="addOp('${key}','${p.nome}','${p.ruolo}',false)" class="btn-p" style="padding:5px 10px;font-size:9px">Aggiungi</button>
          <button onclick="addOp('${key}','${p.nome}','${p.ruolo}',true)" class="btn-s" style="padding:5px 8px;font-size:8px" title="Con ore manuali">+ Ore</button>
        </div>
      </div>`).join('')
    :'<p style="padding:16px;text-align:center;color:#94a3b8;font-size:12px">Tutti gli operatori sono già assegnati</p>';
  document.getElementById('modal-add').classList.add('show');
}

function addOp(key,nome,ruolo,withManualHrs) {
  if(!turniData[key]) turniData[key]={aperto:true,operatori:[]};
  const newOp={nome,ruolo};
  if(withManualHrs) newOp.oremanuali=calcShiftHours(key.includes('mattina')?'mattina':'pomeriggio');
  turniData[key].operatori.push(newOp);
  saveTurno(key,turniData[key]);
  closeModal('modal-add');
  render();
}

function removeOp(key,idx) {
  turniData[key].operatori.splice(idx,1);
  saveTurno(key,turniData[key]);
  render();
}

function setOre(key,idx,val) {
  turniData[key].operatori[idx].oremanuali=parseFloat(val)||null;
  saveTurno(key,turniData[key]);
}

function openAssenzaModal(dayKey) {
  const pers=PERSONALE[currentEmporio]||[];
  document.getElementById('modal-ass-list').innerHTML=pers.map(p=>{
    const assKey=`${dayKey}|${p.nome}`;
    const current=assenzeData[assKey]||null;
    return `<div style="padding:8px 12px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;font-weight:700">${p.nome}</span>
      <div style="display:flex;gap:3px">
        <button onclick="setAssenza('${assKey}','ferie')" class="ass-badge ass-ferie" style="${current==='ferie'?'outline:2px solid #3b82f6':''}">Ferie</button>

  return `${currentEmporio}|${parseInt(y)}|${parseInt(m)}|${parseInt(d)}|${fascia}`;

function aggiornaNegozio(data, fascia, stato) {
  const key = dateToTurnoKey(data, fascia);
  if (!turniData[key]) turniData[key] = {aperto:true, operatori:[]};
  turniData[key].aperto = (stato === 'aperto');
  const orariDiv = document.getElementById(`orari-${fascia}-${data}`);
  if (orariDiv) orariDiv.classList.toggle('nascosto', !turniData[key].aperto);
  saveTurno(key, turniData[key]);
}

function salvaOrario(data, fascia, campo, valore) {
  dayHoursData[`${data}_${fascia}_${campo}`] = valore;
}

function aggiungiOperatoreTurno(data, fascia) {
  const key = dateToTurnoKey(data, fascia);
  const parts = key.split('|');
  const label = `${fascia==='mattina'?'Mattina':'Pomeriggio'} ${parts[3]} ${MESISHORT[parseInt(parts[2])-1]}`;
  openAddModal(key, label);
}

function rimuoviChipOp(key, idx) {
  if (!turniData[key]) return;
  turniData[key].operatori.splice(idx, 1);
  saveTurno(key, turniData[key]);
  const parts = key.split('|');
  const fascia = parts[4];
  const ds = `${parts[1]}-${parts[2].padStart(2,'0')}-${parts[3].padStart(2,'0')}`;
  const chipsDiv = document.getElementById(`ops-${fascia}-${ds}`);
  if (chipsDiv) {
    chipsDiv.innerHTML = (turniData[key].operatori||[]).map((o,i)=>`
      <span class="chip-operatore">${o.nome.split(' ').slice(0,2).join(' ')}
        <button class="chip-remove" onclick="rimuoviChipOp('${key}',${i})" title="Rimuovi">×</button>
      </span>`).join('');
  }
}

function aggiungiChipOperatore(data, fascia, opId, opNome) {
  const key = dateToTurnoKey(data, fascia);
  if (!turniData[key]) turniData[key] = {aperto:true, operatori:[]};
  if (turniData[key].operatori.find(o => o.nome === opNome)) return;
  const pers = (PERSONALE[currentEmporio]||[]).find(p => p.nome === opNome);
  const ruolo = pers?.ruolo || 'volontario';
  turniData[key].operatori.push({nome:opNome, ruolo});
  saveTurno(key, turniData[key]);
  const chipsDiv = document.getElementById(`ops-${fascia}-${data}`);
  if (chipsDiv) {
    const idx = turniData[key].operatori.length - 1;
    const chip = document.createElement('span');
    chip.className = 'chip-operatore';
    chip.innerHTML = `${opNome.split(' ').slice(0,2).join(' ')}<button class="chip-remove" onclick="rimuoviChipOp('${key}',${idx})" title="Rimuovi">×</button>`;
    chipsDiv.appendChild(chip);
  }
}

function copiaGiorno(data) {
  const [y,m,d] = data.split('-');
  const days = new Date(currentAnno, currentMese+1, 0).getDate();
  const FG = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  let options = '';
  for (let dd=1; dd<=days; dd++) {
    if (dd === parseInt(d)) continue;
    const dow = new Date(currentAnno, currentMese, dd).getDay();
    const ds2 = `${y}-${m}-${String(dd).padStart(2,'0')}`;
    options += `<label style="display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;font-size:13px;border-radius:6px;transition:background .1s" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
      <input type="checkbox" value="${ds2}" style="width:16px;height:16px;accent-color:#B5453A"> ${FG[dow]} ${dd}
    </label>`;
  }
  document.getElementById('modal-copia-content').innerHTML = `
    <p style="font-size:13px;color:#64748b;margin-bottom:10px">Copia il turno del <strong>${parseInt(d)} ${MESI[parseInt(m)-1]}</strong> su:</p>
    <div style="max-height:280px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:6px">${options}</div>`;
  document.getElementById('modal-copia-src').value = data;
  document.getElementById('modal-copia').classList.add('show');
}

function eseguiCopiaGiorno() {
  const src = document.getElementById('modal-copia-src').value;
  const [sy,sm,sd] = src.split('-');
  const srcMk = `${currentEmporio}|${parseInt(sy)}|${parseInt(sm)}|${parseInt(sd)}|mattina`;
  const srcPk = `${currentEmporio}|${parseInt(sy)}|${parseInt(sm)}|${parseInt(sd)}|pomeriggio`;
  const srcMd = turniData[srcMk] ? {...turniData[srcMk], operatori:[...(turniData[srcMk].operatori||[])]} : null;
  const srcPd = turniData[srcPk] ? {...turniData[srcPk], operatori:[...(turniData[srcPk].operatori||[])]} : null;
  const selected = [...document.querySelectorAll('#modal-copia-content input:checked')].map(cb=>cb.value);
  if (!selected.length) { showToast('Seleziona almeno un giorno','err'); return; }
  selected.forEach(target => {
    const [ty,tm,td2] = target.split('-');
    if (srcMd) { const mk=`${currentEmporio}|${parseInt(ty)}|${parseInt(tm)}|${parseInt(td2)}|mattina`; turniData[mk]={...srcMd,operatori:[...srcMd.operatori]}; saveTurno(mk,turniData[mk]); }
    if (srcPd) { const pk=`${currentEmporio}|${parseInt(ty)}|${parseInt(tm)}|${parseInt(td2)}|pomeriggio`; turniData[pk]={...srcPd,operatori:[...srcPd.operatori]}; saveTurno(pk,turniData[pk]); }
  });
  closeModal('modal-copia');
  showToast(`✓ Turno copiato su ${selected.length} giorni`,'ok');
  render();
}

let operatoriDbCache = [];
let turniPredefiniti = {};
const GIORNI_SETT = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];

async function caricaOperatoriEmporio(emporio) {
  if (!db) { showToast('DB non connesso','err'); return; }
  const container = document.getElementById('lista-operatori-turni');
  if (container) container.innerHTML = '<p style="padding:20px;text-align:center;color:#94a3b8;font-size:13px"><i class="fas fa-spinner fa-spin"></i> Caricamento...</p>';
  try {
    let query = db.from('operatori').select('id,nome,emporio,ruolo').eq('attivo', true);
    if (emporio) query = query.eq('emporio', emporio);
    else if (currentEmporio) query = query.eq('emporio', currentEmporio);
    const { data, error } = await query.order('nome');
    if (error) throw error;
    operatoriDbCache = data || [];
    renderOperatoriDefaults();
  } catch(e) { showToast('Errore: '+e.message,'err'); }
}

function renderOperatoriDefaults() {
  const container = document.getElementById('lista-operatori-turni');
  if (!container) return;
  if (!operatoriDbCache.length) {
    container.innerHTML = '<p style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">Nessun operatore trovato.</p>';
    return;
  }
  container.innerHTML = operatoriDbCache.map(op => {
    const iniziali = op.nome.split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const grigliaHtml = GIORNI_SETT.map(g => `

        <span class="giorno-label">${g.substring(0,3)}</span>
        <label class="check-fascia">

        </label>
        <label class="check-fascia">
          <input type="checkbox" id="td-${op.id}-${g}-pom"

          <span>Pomeriggio</span>
        </label>
        <label class="check-fascia">
          <input type="checkbox" id="td-${op.id}-${g}-nd"

          <span style="color:#B5453A">Non disp.</span>
        </label>
      </div>`).join('');
    return `
    <div class="card-turno-operatore">

          <div class="op-avatar-small">${iniziali}</div>

        </div>
        <span class="riepilogo-turno-default" id="riepilogo-${op.id}">—</span>
        <span class="freccia-op" id="freccia-${op.id}">▶</span>

          <label style="font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:4px">Note turno</label>

                    style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;resize:vertical;min-height:56px"></textarea>

          <i class="fas fa-check"></i> Salva turno predefinito
        </button>
      </div>
    </div>`;
  }).join('');
  operatoriDbCache.forEach(op => caricaTurniPredefinitiOp(op.id));

async function caricaTurniPredefinitiOp(opId) {
  if (!db) return;
  try {
    const { data } = await db.from('turni_predefiniti').select('*').eq('operatore_id', opId);
    turniPredefiniti[opId] = data || [];
    (data||[]).forEach(row => {
      const cbMat = document.getElementById(`td-${opId}-${row.giorno}-mat`);
      const cbPom = document.getElementById(`td-${opId}-${row.giorno}-pom`);
      const cbNd  = document.getElementById(`td-${opId}-${row.giorno}-nd`);
      if (cbMat) cbMat.checked = row.mattina || false;
      if (cbPom) cbPom.checked = row.pomeriggio || false;
      if (cbNd)  cbNd.checked  = row.non_disponibile || false;
    });
    const noteEl = document.getElementById(`note-op-${opId}`);
    if (noteEl && data?.length) noteEl.value = data.find(r=>r.note)?.note || '';
    aggiornaRiepilogoOp(opId);
  } catch(e) { console.error('Errore turni predefiniti:', e); }
}

function aggiornaRiepilogoOp(opId) {
  const rows = turniPredefiniti[opId] || [];
  const BR = {Lunedì:'Lun',Martedì:'Mar',Mercoledì:'Mer',Giovedì:'Gio',Venerdì:'Ven',Sabato:'Sab',Domenica:'Dom'};
  const matG = rows.filter(r=>r.mattina&&!r.non_disponibile).map(r=>BR[r.giorno]||r.giorno.substring(0,3));
  const pomG = rows.filter(r=>r.pomeriggio&&!r.non_disponibile).map(r=>BR[r.giorno]||r.giorno.substring(0,3));
  let sum = '';
  if (matG.length) sum += 'Mat: '+matG.join(',');
  if (pomG.length) sum += (sum?'  •  ':'')+'Pom: '+pomG.join(',');
  const el = document.getElementById(`riepilogo-${opId}`);
  if (el) el.textContent = sum || 'Nessun turno';
}

async function aggiornaTurnoDefault(opId, giorno, fascia, valore) {
  if (!db) { showToast('DB non connesso','err'); return; }
  try {
    const existing = (turniPredefiniti[opId]||[]).find(r=>r.giorno===giorno);
    const payload = { operatore_id:opId, giorno, [fascia]:valore,
      ...(!existing ? {mattina:false, pomeriggio:false, non_disponibile:false} : {}) };
    const { data, error } = await db.from('turni_predefiniti').upsert(payload, {onConflict:'operatore_id,giorno'}).select();
    if (error) throw error;
    if (!turniPredefiniti[opId]) turniPredefiniti[opId] = [];
    const idx = turniPredefiniti[opId].findIndex(r=>r.giorno===giorno);
    if (idx>=0) turniPredefiniti[opId][idx] = {...turniPredefiniti[opId][idx], [fascia]:valore};
    else turniPredefiniti[opId].push(data?.[0]||{...payload});
    aggiornaRiepilogoOp(opId);
  } catch(e) { showToast('Errore: '+e.message,'err'); }
}

async function salvaTurnoDefaultCompleto(opId) {
  if (!db) { showToast('DB non connesso','err'); return; }
  const nota = document.getElementById(`note-op-${opId}`)?.value || '';
  try {
    const updates = GIORNI_SETT.map(g => ({
      operatore_id: opId, giorno: g, note: nota,
      mattina:         document.getElementById(`td-${opId}-${g}-mat`)?.checked || false,
      pomeriggio:      document.getElementById(`td-${opId}-${g}-pom`)?.checked || false,
      non_disponibile: document.getElementById(`td-${opId}-${g}-nd`)?.checked  || false,
    }));
    const { error } = await db.from('turni_predefiniti').upsert(updates, {onConflict:'operatore_id,giorno'});
    if (error) throw error;
    turniPredefiniti[opId] = updates;
    aggiornaRiepilogoOp(opId);
    showToast('Turno predefinito salvato ✓','ok');
  } catch(e) { showToast('Errore: '+e.message,'err'); }
}

function toggleTurnoOp(opId) {
  const corpo = document.getElementById(`corpo-op-${opId}`);
  const freccia = document.getElementById(`freccia-${opId}`);
  if (!corpo) return;
  const isOpen = corpo.style.display !== 'none';
  corpo.style.display = isOpen ? 'none' : 'block';
  if (freccia) freccia.textContent = isOpen ? '▶' : '▼';
}

// ── MODIFICA 6: APPLICA TURNO PREDEFINITO AL GIORNO ───────────────────────
async function applicaTurnoDefault(data) {
  if (!db) { showToast('DB non connesso','err'); return; }
  const [y,m,d] = data.split('-');
  const dow = new Date(parseInt(y), parseInt(m)-1, parseInt(d)).getDay();
  const FULL = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const nomeGiorno = FULL[dow];
  try {
    const { data: pred, error } = await db.from('turni_predefiniti')
      .select('*, operatori(nome, ruolo)')
      .eq('giorno', nomeGiorno)
      .eq('non_disponibile', false);
    if (error) throw error;
    if (!pred?.length) { showToast('Nessun predefinito per '+nomeGiorno,'err'); return; }
    let count = 0;
    pred.forEach(p => {
      if (!p.operatori) return;
      if (p.mattina)    { aggiungiChipOperatore(data,'mattina',p.operatore_id,p.operatori.nome); count++; }
      if (p.pomeriggio) { aggiungiChipOperatore(data,'pomeriggio',p.operatore_id,p.operatori.nome); count++; }
    });
    showToast(`✓ Predefiniti applicati per ${nomeGiorno} (${count} turni)`,'ok');
  } catch(e) { showToast('Errore: '+e.message,'err'); }
}
