<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="stylesheet" href="../../assets/style/nav-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Turni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f0f2f5; color:#1e293b; }
        .bg-m361-red { background-color:#b75252; }
        .text-m361-red { color:#b75252; }

        /* CARD GIORNO */
        .day-card {
            background:#fff; border-radius:20px; box-shadow:0 1px 4px rgba(0,0,0,.07);
            overflow:hidden; transition:box-shadow .15s; margin-bottom:10px;
        }
        .day-card:hover { box-shadow:0 4px 18px rgba(0,0,0,.1); }

        .day-date-col {
            min-width:88px; width:88px; display:flex; flex-direction:column;
            align-items:center; justify-content:center; padding:16px 10px;
            background:#fff; border-right:1px solid #f1f5f9;
        }
        .day-weekday  { font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase; }
        .day-num      { font-size:52px;font-weight:900;line-height:1; margin:2px 0; }
        .day-month    { font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase; }
        
        .col-normale .day-weekday { color:#475569; }
        .col-normale .day-num     { color:#1e293b; }
        .col-normale .day-month   { color:#94a3b8; }
        .col-festivo { background:#fff8f8 !important; }
        .col-festivo .day-weekday { color:#b75252; }
        .col-festivo .day-num     { color:#b75252; }
        .col-festivo .day-month   { color:#e8a0a0; }
        .col-oggi    .day-weekday { color:#b75252; }
        .col-oggi    .day-num     { color:#b75252; }
        .col-oggi    .day-month   { color:#b75252; }

        /* SEZIONI TURNO */
        .turno-mat-bg { background:linear-gradient(160deg,#fff5f5 0%,#fef0f0 100%); border-left:3px solid #f0c0c0; }
        .turno-pom-bg { background:linear-gradient(160deg,#f8fafc 0%,#eef2f7 100%); border-left:3px solid #c8d4e3; }
        .turno-chiuso-bg { background:repeating-linear-gradient(45deg,#f8fafc,#f8fafc 6px,#f1f5f9 6px,#f1f5f9 12px); }

        .chip { display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;
                padding:5px 13px;border-radius:999px;cursor:pointer;transition:opacity .15s; }
        .chip-mat-dip { background:#fac8c8;color:#7f1d1d; }
        .chip-pom-dip { background:#dce6f4;color:#1e3a5f; }
        .chip-ferie { background:#dbeafe;color:#1e40af; }
        .chip-malattia { background:#fef9c3;color:#854d0e; }

        .btn-lock { display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
                    padding:3px 9px;border-radius:7px;border:1.5px solid #e2e8f0;
                    color:#94a3b8;background:#fff;cursor:pointer; }
        .btn-lock.on { border-color:#fca5a5;color:#dc2626;background:#fff1f1; }

        .day-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:3px; }
        .day-btn { width:28px;height:22px;border-radius:5px;border:1.5px solid #e2e8f0;
                   font-size:9px;font-weight:700;color:#cbd5e1;background:white;
                   cursor:pointer;display:flex;align-items:center;justify-content:center; }
        .day-btn.on-mat { background:#fac8c8;border-color:#f0b8b8;color:#991b1b; }
        .day-btn.on-pom { background:#dce6f4;border-color:#94a3b8;color:#1e3a5f; }
        
        .card-hover { transition:all .15s;cursor:pointer; }
        .card-hover:hover { transform:translateY(-2px);box-shadow:0 4px 20px rgba(183,82,82,.15); }
    </style>
</head>
<body class="pb-28">

<header class="bg-white border-b border-gray-100 px-5 py-3.5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
    <div class="flex items-center gap-4">
        <img src="../../assets/images/logom361_rosso.jpg" alt="Logo" class="h-8">
        <h1 id="header-title" class="font-bold text-xl border-l pl-4 text-slate-700">Turni</h1>
    </div>
    <div id="header-controls" class="flex items-center gap-2 flex-wrap justify-end"></div>
</header>

<main class="max-w-4xl mx-auto p-4 md:p-6">
    <div id="view-empori"></div>
    <div id="view-anni" class="hidden"></div>
    <div id="view-mesi" class="hidden"></div>
    <div id="view-mese" class="hidden"></div>
</main>

<script>
const EMPORI = ['Cremona', 'Casalmaggiore', 'Viadana', 'Reggio Emilia'];
const ANNI = [2026, 2027, 2028, 2029];
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GIORNI = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

// DATABASE SIMULATO
let dataStore = {
    emporio: null,
    anno: null,
    meseIdx: null,
    turni: {}, // 'YYYY-MM-DD' : { mat: { chiusa, staff }, pom: { chiusa, staff } }
    assenze: {}, // 'YYYY-MM-DD' : [ { nome, tipo } ]
    dipendenti: [
        { nome: 'Marco Rossi', predefiniti: [1,2,3,4,5] }, // Lun-Ven
        { nome: 'Anna Bianchi', predefiniti: [2,4] }       // Mar, Gio
    ]
};

function init() {
    renderEmpori();
}

function resetHeader(title, callbackIndietro) {
    document.getElementById('header-title').innerText = title;
    const ctrls = document.getElementById('header-controls');
    ctrls.innerHTML = '';
    if(callbackIndietro) {
        const btn = document.createElement('button');
        btn.className = "px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-bold transition-colors";
        btn.innerText = "← Indietro";
        btn.onclick = callbackIndietro;
        ctrls.appendChild(btn);
    }
}

function showView(id) {
    ['view-empori','view-anni','view-mesi','view-mese'].forEach(v => {
        document.getElementById(v).classList.toggle('hidden', v !== id);
    });
}

// 1. SELEZIONE EMPORIO
function renderEmpori() {
    resetHeader("Seleziona Emporio");
    showView('view-empori');
    const container = document.getElementById('view-empori');
    container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        ${EMPORI.map(e => `
            <div onclick="selectEmporio('${e}')" class="card-hover bg-white p-8 rounded-3xl text-center border border-slate-100">
                <div class="text-3xl mb-2">🏪</div>
                <div class="text-xl font-extrabold text-slate-800">${e}</div>
            </div>
        `).join('')}
    </div>`;
}

function selectEmporio(e) {
    dataStore.emporio = e;
    renderAnni();
}

// 2. SELEZIONE ANNO
function renderAnni() {
    resetHeader(`Turni ${dataStore.emporio}`, renderEmpori);
    showView('view-anni');
    const container = document.getElementById('view-anni');
    container.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        ${ANNI.map(a => `
            <div onclick="selectAnno(${a})" class="card-hover bg-white p-6 rounded-2xl text-center border border-slate-100">
                <div class="text-2xl font-black text-slate-700">${a}</div>
            </div>
        `).join('')}
    </div>`;
}

function selectAnno(a) {
    dataStore.anno = a;
    renderMesi();
}

// 3. SELEZIONE MESE
function renderMesi() {
    resetHeader(`${dataStore.emporio} - ${dataStore.anno}`, renderAnni);
    showView('view-mesi');
    const container = document.getElementById('view-mesi');
    container.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        ${MESI.map((m, i) => `
            <div onclick="selectMese(${i})" class="card-hover bg-white p-5 rounded-2xl text-center border border-slate-100">
                <div class="text-lg font-bold text-slate-700">${m}</div>
            </div>
        `).join('')}
    </div>`;
}

function selectMese(i) {
    dataStore.meseIdx = i;
    renderCalendario();
}

// 4. CALENDARIO DETTAGLIATO
function renderCalendario() {
    const meseNome = MESI[dataStore.meseIdx];
    resetHeader(`${dataStore.emporio} - ${meseNome} ${dataStore.anno}`, renderMesi);
    showView('view-mese');
    
    const container = document.getElementById('view-mese');
    container.innerHTML = '';

    const numGiorni = new Date(dataStore.anno, dataStore.meseIdx + 1, 0).getDate();
    const oggi = new Date();

    for (let d = 1; d <= numGiorni; d++) {
        const dateObj = new Date(dataStore.anno, dataStore.meseIdx, d);
        const iso = dateObj.toISOString().split('T')[0];
        const isDomenica = dateObj.getDay() === 0;
        const isOggi = dateObj.toDateString() === oggi.toDateString();
        
        // Inizializza dati se mancano
        if(!dataStore.turni[iso]) {
            dataStore.turni[iso] = { 
                mat: { chiusa: isDomenica, staff: [] }, 
                pom: { chiusa: isDomenica, staff: [] } 
            };
        }

        const card = document.createElement('div');
        card.className = `day-card flex ${isDomenica ? 'col-festivo' : ''}`;
        
        const dayClass = isOggi ? 'col-oggi' : (isDomenica ? 'col-festivo' : 'col-normale');

        card.innerHTML = `
            <div class="day-date-col ${dayClass}">
                <div class="day-weekday">${GIORNI[dateObj.getDay()]}</div>
                <div class="day-num">${d}</div>
                <div class="day-month">${meseNome.substring(0,3)}</div>
                ${isOggi ? '<div class="day-oggi-badge">OGGI</div>' : ''}
            </div>
            <div class="flex-1 flex flex-col sm:flex-row">
                <!-- MATTINA -->
                <div class="flex-1 p-4 ${dataStore.turni[iso].mat.chiusa ? 'turno-chiuso-bg' : 'turno-mat-bg'}">
                    <div class="flex justify-between items-start mb-3">
                        <span class="turno-lbl turno-lbl-mat">Mattina</span>
                        <button onclick="toggleChiuso('${iso}','mat')" class="btn-lock ${dataStore.turni[iso].mat.chiusa ? 'on' : ''}">
                            ${dataStore.turni[iso].mat.chiusa ? '🔒 CHIUSO' : '🔓 APERTO'}
                        </button>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${renderStaff(iso, 'mat')}
                        <span class="add-link">+ Aggiungi</span>
                    </div>
                </div>
                <!-- POMERIGGIO -->
                <div class="flex-1 p-4 ${dataStore.turni[iso].pom.chiusa ? 'turno-chiuso-bg' : 'turno-pom-bg'}">
                    <div class="flex justify-between items-start mb-3">
                        <span class="turno-lbl turno-lbl-pom">Pomeriggio</span>
                        <button onclick="toggleChiuso('${iso}','pom')" class="btn-lock ${dataStore.turni[iso].pom.chiusa ? 'on' : ''}">
                            ${dataStore.turni[iso].pom.chiusa ? '🔒 CHIUSO' : '🔓 APERTO'}
                        </button>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${renderStaff(iso, 'pom')}
                        <span class="add-link">+ Aggiungi</span>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(card);
    }
}

function renderStaff(iso, fascia) {
    const staff = dataStore.turni[iso][fascia].staff;
    if(dataStore.turni[iso][fascia].chiusa) return `<span class="text-xs text-slate-400 font-medium italic">Nessun turno</span>`;
    return staff.map(s => `<div class="chip ${fascia === 'mat' ? 'chip-mat-dip' : 'chip-pom-dip'}">${s}</div>`).join('');
}

function toggleChiuso(iso, fascia) {
    dataStore.turni[iso][fascia].chiusa = !dataStore.turni[iso][fascia].chiusa;
    renderCalendario();
}

// Avvio
window.onload = init;
</script>
</body>
</html>
