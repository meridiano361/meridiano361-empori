<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="stylesheet" href="/nav-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M361 - Turni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .bg-m361-red { background-color: #b75252; }
        .text-m361-red { color: #b75252; }

        /* Chip persona per ruolo */
        .chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600;
                padding: 3px 8px; border-radius: 999px; cursor: pointer; transition: opacity 0.15s; }
        .chip:hover { opacity: 0.75; }
        .chip-dip  { background: #fee2e2; color: #991b1b; }
        .chip-vol  { background: #dcfce7; color: #166534; }
        .chip-sc   { background: #f1f5f9; color: #475569; }

        /* Cella turno */
        .turno-cell { min-height: 44px; }

        /* Sticky colonna giorno */
        .col-giorno { min-width: 80px; }
    </style>
</head>
<body class="pb-28">

<!-- ── HEADER ───────────────────────────────────────────────── -->
<header class="bg-white border-b p-4 px-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
    <div class="flex items-center gap-4">
        <img src="logom361_rosso.jpg" alt="Logo" class="h-8" onerror="this.style.display='none'">
        <h1 id="header-title" class="font-bold text-lg border-l pl-4 text-slate-700">Turni</h1>
    </div>
    <div id="header-controls" class="flex items-center gap-3"></div>
</header>

<main class="max-w-6xl mx-auto p-4 md:p-6">

    <!-- ── SELEZIONE EMPORIO ─────────────────────────────────── -->
    <div id="view-empori" class="grid grid-cols-2 md:grid-cols-4 gap-5 mt-2">
    </div>

    <!-- ── VISTA MESE ────────────────────────────────────────── -->
    <div id="view-mese" class="hidden space-y-3"></div>

</main>

<!-- ── MODAL AGGIUNTA PERSONA ───────────────────────────────── -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-7 space-y-4">
        <h2 class="font-bold text-slate-700 text-base" id="modal-title">Aggiungi al turno</h2>
        <input id="modal-search" type="text" placeholder="Cerca nome..." oninput="filterModalList()"
            class="w-full border border-gray-200 rounded-xl p-3 text-sm">
        <div id="modal-list" class="space-y-1 max-h-64 overflow-y-auto"></div>
        <button onclick="closeModal()" class="w-full py-3 rounded-xl border border-gray-200 text-sm font-bold text-slate-500 hover:bg-gray-50">Annulla</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── DATI ────────────────────────────────────────────────────────
const EMPORI = ['Cremona', 'Casalmaggiore', 'Viadana', 'Reggio Emilia'];

const PERSONALE = {
    'Cremona': [
        { nome: 'Emilio Mazzolari',  ruolo: 'dipendente' },
        { nome: 'Chiara Monteverdi', ruolo: 'dipendente' },
        { nome: 'Noemi Capobianco',  ruolo: 'servizio_civile' },
        { nome: 'Jacopo Denti',      ruolo: 'servizio_civile' },
        { nome: 'Elena Cattani',     ruolo: 'volontario' },
        { nome: 'Barbara Machetti',  ruolo: 'volontario' },
        { nome: 'Giulia Galelli',    ruolo: 'volontario' },
        { nome: 'Ileana Galli',      ruolo: 'volontario' },
    ],
    'Casalmaggiore': [
        { nome: 'Barbara Araldi',         ruolo: 'volontario' },
        { nome: 'Erica Bossi',            ruolo: 'volontario' },
        { nome: 'Matilde Chiarini',       ruolo: 'volontario' },
        { nome: 'Miriam Federici',        ruolo: 'volontario' },
        { nome: 'Giulia Frigeri',         ruolo: 'volontario' },
        { nome: 'Piero Gatti',            ruolo: 'volontario' },
        { nome: 'Francesco Lunardini',    ruolo: 'volontario' },
        { nome: 'Giuseppe Lunardini',     ruolo: 'volontario' },
        { nome: 'Vittoria Lunardini',     ruolo: 'volontario' },
        { nome: 'Teyssir Mabrouk',        ruolo: 'volontario' },
        { nome: 'Carla Maffei',           ruolo: 'volontario' },
        { nome: 'Michele Marchini',       ruolo: 'volontario' },
        { nome: 'Edoardo Pavesi',         ruolo: 'volontario' },
        { nome: 'Giovanna Raineri',       ruolo: 'volontario' },
        { nome: 'Alessandra Rivetti',     ruolo: 'volontario' },
        { nome: 'Maria Marcella Scaravonati', ruolo: 'volontario' },
        { nome: 'Roberta Vezzosi',        ruolo: 'volontario' },
    ],
    'Viadana': [
        { nome: 'Roberta Alberini',   ruolo: 'volontario' },
        { nome: 'Giuseppina Amadini', ruolo: 'volontario' },
        { nome: 'Ave Aroldi',         ruolo: 'volontario' },
        { nome: 'Carla Bellelli',     ruolo: 'volontario' },
        { nome: 'Mariagrazia Bertolini', ruolo: 'volontario' },
        { nome: 'Tiziana Bortesi',    ruolo: 'volontario' },
        { nome: 'Carla Chittolini',   ruolo: 'volontario' },
        { nome: 'Donatella Falugi',   ruolo: 'volontario' },
        { nome: 'Franco Furlotti',    ruolo: 'volontario' },
        { nome: 'Sara Germani',       ruolo: 'volontario' },
        { nome: 'Elena Ghelfi',       ruolo: 'volontario' },
        { nome: 'Claudio Mortini',    ruolo: 'volontario' },
        { nome: 'Mirella Panato',     ruolo: 'volontario' },
        { nome: 'Barbara Piotrowska', ruolo: 'volontario' },
        { nome: 'Alessia Rovina',     ruolo: 'volontario' },
        { nome: 'Marta Sanfelici',    ruolo: 'volontario' },
        { nome: 'Manuela Scazza',     ruolo: 'volontario' },
    ],
    'Reggio Emilia': [
        { nome: 'Elsa Scarpa',       ruolo: 'dipendente' },
        { nome: 'Marica Pioli',      ruolo: 'dipendente' },
        { nome: 'Manuela Capanni',   ruolo: 'dipendente' },
        { nome: 'Alessia Bartolomei',ruolo: 'dipendente' },
    ],
};

// turni[emporio][dateStr][turno] = [{nome, ruolo}]
const turni = {};

let activeEmporio = null;
let activeYear, activeMonth;
let modalContext = null; // { emporio, dateStr, turno }

// ── INIT ─────────────────────────────────────────────────────
window.onload = () => {
    const now = new Date();
    activeYear  = now.getFullYear();
    activeMonth = now.getMonth(); // 0-based
    renderEmpori();
};

// ── VISTA EMPORI ─────────────────────────────────────────────
function renderEmpori() {
    document.getElementById('view-empori').classList.remove('hidden');
    document.getElementById('view-mese').classList.add('hidden');
    document.getElementById('header-title').innerText = 'Turni';
    document.getElementById('header-controls').innerHTML = '';

    const container = document.getElementById('view-empori');
    container.innerHTML = EMPORI.map(e => `
        <div onclick="openEmporio('${e}')"
            class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 flex flex-col items-center justify-center gap-3 cursor-pointer hover:border-[#b75252] hover:shadow-md transition-all group">
            <div class="w-14 h-14 rounded-2xl bg-red-50 flex items-center justify-center group-hover:bg-red-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="#b75252" class="w-7 h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                </svg>
            </div>
            <span class="font-bold text-slate-700 text-base text-center">${e}</span>
        </div>
    `).join('');
}

// ── APRI EMPORIO ─────────────────────────────────────────────
function openEmporio(emporio) {
    activeEmporio = emporio;
    document.getElementById('view-empori').classList.add('hidden');
    document.getElementById('view-mese').classList.remove('hidden');
    document.getElementById('header-title').innerText = emporio;
    renderHeaderControls();
    renderMese();
}

function renderHeaderControls() {
    document.getElementById('header-controls').innerHTML = `
        <button onclick="changeMonth(-1)" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-sm">‹</button>
        <span id="mese-label" class="font-bold text-slate-700 text-sm min-w-[120px] text-center"></span>
        <button onclick="changeMonth(1)" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-sm">›</button>
        <button onclick="renderEmpori()" class="ml-2 px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-sm">← Empori</button>
    `;
    updateMeseLabel();
}

function updateMeseLabel() {
    const label = new Date(activeYear, activeMonth, 1).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
    const el = document.getElementById('mese-label');
    if (el) el.innerText = label.charAt(0).toUpperCase() + label.slice(1);
}

function changeMonth(dir) {
    activeMonth += dir;
    if (activeMonth > 11) { activeMonth = 0; activeYear++; }
    if (activeMonth < 0)  { activeMonth = 11; activeYear--; }
    updateMeseLabel();
    renderMese();
}

// ── VISTA MESE ───────────────────────────────────────────────
const GIORNI_SETTIMANA = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function renderMese() {
    const container = document.getElementById('view-mese');
    const daysInMonth = new Date(activeYear, activeMonth + 1, 0).getDate();
    const oggi = new Date().toISOString().split('T')[0];

    let html = '';
    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(activeYear, activeMonth, d);
        const dateStr = date.toISOString().split('T')[0];
        const giorno = GIORNI_SETTIMANA[date.getDay()];
        const isFestivo = date.getDay() === 0;
        const isOggi = dateStr === oggi;

        const matList  = getTurno(activeEmporio, dateStr, 'mat');
        const pomList  = getTurno(activeEmporio, dateStr, 'pom');

        html += `
        <div class="bg-white rounded-2xl border ${isOggi ? 'border-[#b75252] shadow-md' : 'border-gray-100 shadow-sm'} overflow-hidden">
            <!-- Intestazione giorno -->
            <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-50 ${isFestivo ? 'bg-red-50' : 'bg-slate-50'}">
                <div class="text-center min-w-[44px]">
                    <div class="text-[10px] font-bold uppercase tracking-wider ${isFestivo ? 'text-m361-red' : 'text-slate-400'}">${giorno}</div>
                    <div class="text-xl font-bold ${isOggi ? 'text-m361-red' : isFestivo ? 'text-m361-red' : 'text-slate-700'}">${d}</div>
                </div>
                ${isOggi ? '<span class="text-[9px] font-bold bg-m361-red text-white px-2 py-0.5 rounded-full uppercase tracking-wider">Oggi</span>' : ''}
            </div>
            <!-- Turni -->
            <div class="grid grid-cols-2 divide-x divide-gray-100">
                <!-- MATTINO -->
                <div class="p-3 turno-cell">
                    <div class="text-[9px] font-bold uppercase tracking-widest text-amber-500 mb-2">☀️ Mattino</div>
                    <div class="flex flex-wrap gap-1 mb-2" id="mat-${dateStr}">
                        ${renderChips(matList, dateStr, 'mat')}
                    </div>
                    <button onclick="openModal('${dateStr}', 'mat')"
                        class="text-[10px] text-slate-400 hover:text-m361-red font-semibold flex items-center gap-1 transition-colors">
                        <span class="text-base leading-none">+</span> aggiungi
                    </button>
                </div>
                <!-- POMERIGGIO -->
                <div class="p-3 turno-cell">
                    <div class="text-[9px] font-bold uppercase tracking-widest text-blue-400 mb-2">🌙 Pomeriggio</div>
                    <div class="flex flex-wrap gap-1 mb-2" id="pom-${dateStr}">
                        ${renderChips(pomList, dateStr, 'pom')}
                    </div>
                    <button onclick="openModal('${dateStr}', 'pom')"
                        class="text-[10px] text-slate-400 hover:text-m361-red font-semibold flex items-center gap-1 transition-colors">
                        <span class="text-base leading-none">+</span> aggiungi
                    </button>
                </div>
            </div>
        </div>`;
    }

    container.innerHTML = html;
}

function renderChips(list, dateStr, turno) {
    return list.map((p, i) => `
        <span class="chip ${chipClass(p.ruolo)}" title="Rimuovi ${p.nome}"
            onclick="removePersona('${dateStr}', '${turno}', ${i})">
            ${p.nome} <span class="opacity-50">×</span>
        </span>
    `).join('');
}

function chipClass(ruolo) {
    if (ruolo === 'dipendente')      return 'chip-dip';
    if (ruolo === 'volontario')      return 'chip-vol';
    if (ruolo === 'servizio_civile') return 'chip-sc';
    return 'chip-sc';
}

// ── GESTIONE TURNI ────────────────────────────────────────────
function getTurno(emporio, dateStr, turno) {
    return turni[emporio]?.[dateStr]?.[turno] || [];
}

function addPersona(emporio, dateStr, turno, persona) {
    if (!turni[emporio]) turni[emporio] = {};
    if (!turni[emporio][dateStr]) turni[emporio][dateStr] = { mat: [], pom: [] };
    // Evita duplicati nello stesso turno
    if (!turni[emporio][dateStr][turno].find(p => p.nome === persona.nome)) {
        turni[emporio][dateStr][turno].push(persona);
    }
}

function removePersona(dateStr, turno, index) {
    if (turni[activeEmporio]?.[dateStr]?.[turno]) {
        turni[activeEmporio][dateStr][turno].splice(index, 1);
        refreshTurnoCell(dateStr, turno);
    }
}

function refreshTurnoCell(dateStr, turno) {
    const el = document.getElementById(`${turno}-${dateStr}`);
    if (el) el.innerHTML = renderChips(getTurno(activeEmporio, dateStr, turno), dateStr, turno);
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(dateStr, turno) {
    modalContext = { emporio: activeEmporio, dateStr, turno };
    document.getElementById('modal-title').innerText =
        `Aggiungi — ${turno === 'mat' ? '☀️ Mattino' : '🌙 Pomeriggio'} del ${formatDate(dateStr)}`;
    document.getElementById('modal-search').value = '';
    renderModalList('');
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    modalContext = null;
}

function filterModalList() {
    renderModalList(document.getElementById('modal-search').value.toLowerCase());
}

function renderModalList(query) {
    if (!modalContext) return;
    const persone = PERSONALE[modalContext.emporio] || [];
    const giàNelTurno = getTurno(modalContext.emporio, modalContext.dateStr, modalContext.turno).map(p => p.nome);

    const filtrati = persone.filter(p =>
        p.nome.toLowerCase().includes(query) && !giàNelTurno.includes(p.nome)
    );

    document.getElementById('modal-list').innerHTML = filtrati.length === 0
        ? '<p class="text-sm text-slate-400 text-center py-4">Nessuno disponibile</p>'
        : filtrati.map(p => `
            <button onclick="selectPersona('${p.nome}', '${p.ruolo}')"
                class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-colors text-left">
                <span class="chip ${chipClass(p.ruolo)}">${p.nome}</span>
            </button>
        `).join('');
}

function selectPersona(nome, ruolo) {
    if (!modalContext) return;
    addPersona(modalContext.emporio, modalContext.dateStr, modalContext.turno, { nome, ruolo });
    refreshTurnoCell(modalContext.dateStr, modalContext.turno);
    closeModal();
}

function formatDate(dateStr) {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('it-IT', { day: 'numeric', month: 'long' });
}

// Chiudi cliccando fuori
document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
</script>

<script src="/nav-script.js"></script>
</body>
</html>
